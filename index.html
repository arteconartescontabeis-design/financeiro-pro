async function criarEmpresa() {
  const nome  = $id('ne-nome').value.trim();
  const cnpj  = $id('ne-cnpj').value.replace(/\D/g,'');
  const setor = $id('ne-setor').value || null;
  const obs   = $id('ne-obs').value.trim() || null;

  if (!nome)              { toast('Nome é obrigatório.', 'error'); return; }
  if (cnpj.length !== 14) { toast('CNPJ deve ter 14 dígitos.', 'error'); return; }
  if (!_validaCNPJ(cnpj)) { toast('CNPJ inválido. Verifique os dígitos.', 'error'); return; }

  try {
    const r = await supaRpc('fin_criar_empresa', {
      p_nome: nome, p_cnpj: cnpj, p_setor: setor, p_observacao: obs
    });
    if (!r || !r.sucesso) throw new Error('Falha ao criar empresa');
    closeModal();
    toast(`Empresa "${nome}" cadastrada!`, 'success');
    // Recarrega lista de empresas no dropdown header
    try {
      APP.empresas = await supaRpc('fin_minhas_empresas') || APP.empresas;
      await carregarSeletorEmpresas();
    } catch(_) {}
    await renderEmpresas();
  } catch(e) {
    const msg = (e.message||'').replace(/.*"message":"([^"]*)".*/, '$1') || e.message;
    toast('Erro: ' + msg, 'error', 6000);
  }
}

// AUDITORIA — visualização de eventos do log
// ═══════════════════════════════════════════════════════════════

    dataInicio: null,    // string yyyy-mm-dd ou null
    dataFim:    null,

  kpis: null,
  expandedId: null,
};

const _AUDIT_LABELS = {
  // Tabelas → nome amigável
  tabelas: {
    fin_receitas: 'A Receber',
    fin_despesas: 'A Pagar',
    fin_movimentacoes: 'Caixa & Bancos',
    fin_transferencias: 'Transferências',
    fin_contas: 'Contas',
    fin_clientes: 'Clientes',
    fin_fornecedores: 'Fornecedores',

    fin_recorrencias: 'Recorrências',

    fin_convites: 'Convites',
  },
  operacoes: {
    INSERT: { label: 'Criação',     ico: '➕', cor: 'var(--green)',  bg: 'var(--green-lt)' },

    AUTORIZACAO_DIVERGENCIA: { label: 'Autorização', ico: '🔐', cor: '#7c3aed', bg: '#ede9fe' },
  },
};

function _auditTabela(t) {
  return _AUDIT_LABELS.tabelas[t] || t.replace(/^fin_/,'').replace(/_/g,' ');
}

function _auditDateInicial() {
  // 30 dias atrás
  const d = new Date();
  d.setDate(d.getDate() - 30);
  return d.toISOString().slice(0,10);
}

async function renderAuditoria() {
  // Permissão
  if (!isAdmin() && !podeVer('configuracoes')) {
    $id('page-content').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🔒</div>
        <h3>Acesso restrito</h3>
        <p style="font-size:13px;color:var(--text-3);margin-top:6px">Você não tem permissão para visualizar a auditoria.</p>
      </div>`;
    return;
  }

  // Inicializa filtros padrão (últimos 30 dias) na primeira vez
  if (_AUDIT.filtros.dataInicio === null && _AUDIT.filtros.dataFim === null) {
    _AUDIT.filtros.dataInicio = _auditDateInicial();
    _AUDIT.filtros.dataFim    = today();
  }

  $id('topbar-actions').innerHTML = `
    <button class="btn btn-outline btn-sm" onclick="modalAuditoriaConfig()">⚙️ Configurar tabelas</button>
    <button class="btn btn-outline btn-sm" onclick="exportarAuditoria('csv')">⬇️ CSV</button>
    <button class="btn btn-outline btn-sm" onclick="exportarAuditoria('pdf')">⬇️ PDF</button>
  `;

  $id('page-content').innerHTML = `<div id="audit-root"><div class="empty-state"><div class="spinner-loader" style="width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;margin:40px auto;animation:spin 0.8s linear infinite"></div><p style="font-size:13px;color:var(--text-3)">Carregando auditoria…</p></div></div>
  <style>@keyframes spin{to{transform:rotate(360deg)}}</style>`;

  await Promise.all([
    _auditCarregarKpis(),
    _auditCarregarUsuarios(),
    _auditCarregarTabelas(),
    _auditCarregarEventos(),
  ]);

  _renderAuditoriaUI();
}

async function _auditCarregarKpis() {
  try {
    _AUDIT.kpis = await supaRpc('fin_auditoria_kpis', {
      p_data_inicio: _AUDIT.filtros.dataInicio,
      p_data_fim:    _AUDIT.filtros.dataFim,
    });
  } catch(e) { console.warn('kpis:', e.message); _AUDIT.kpis = null; }
}

async function _auditCarregarUsuarios() {
  try { _AUDIT.usuariosLista = await supaRpc('fin_auditoria_usuarios') || []; }
  catch(e) { _AUDIT.usuariosLista = []; }
}

async function _auditCarregarTabelas() {
  try { _AUDIT.tabelasLista = await supaRpc('fin_auditoria_tabelas') || []; }
  catch(e) { _AUDIT.tabelasLista = []; }
}

async function _auditCarregarEventos() {
  try {
    const params = {
      p_data_inicio: _AUDIT.filtros.dataInicio || null,
      p_data_fim:    _AUDIT.filtros.dataFim    || null,
      p_usuario_id:  _AUDIT.filtros.usuarioId  || null,
      p_tabela:      _AUDIT.filtros.tabela     || null,
      p_operacoes:   _AUDIT.filtros.operacoes && _AUDIT.filtros.operacoes.length === 4 ? null : _AUDIT.filtros.operacoes,
      p_busca:       _AUDIT.filtros.busca      || null,
      p_limite:      _AUDIT.perPage,
      p_offset:      (_AUDIT.page - 1) * _AUDIT.perPage,
    };
    const linhas = await supaRpc('fin_auditoria_listar', params) || [];
    _AUDIT.eventos = linhas;
    _AUDIT.total   = linhas[0]?.total_count || 0;
  } catch(e) {
    console.warn('eventos:', e.message);
    _AUDIT.eventos = []; _AUDIT.total = 0;
  }
}

function _renderAuditEvent(e) {
  const op       = _AUDIT_LABELS.operacoes[e.operacao] || { label: e.operacao, ico: '•', cor: 'var(--text-2)', bg: 'var(--surface-2)' };
  const tabela   = _auditTabela(e.tabela);
  const dt       = new Date(e.criado_em);
  const dataStr  = dt.toLocaleDateString('pt-BR') + ' ' + dt.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
  const usuario  = e.usuario_nome || e.usuario_email || '—';
  const expanded = _AUDIT.expandedId === e.id;
  const resumo   = _auditResumo(e);

  return `
  <div style="border-bottom:1px solid var(--border)">
    <div onclick="_auditToggle(${e.id})" style="padding:12px 16px;cursor:pointer;transition:background .15s;${expanded?'background:var(--surface-2)':''}"
         onmouseover="if(${!expanded}) this.style.background='var(--surface-2)'"
         onmouseout="if(${!expanded}) this.style.background=''">
      <div style="display:flex;align-items:center;gap:12px">
        <div style="font-size:18px;flex-shrink:0">${op.ico}</div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <span style="font-size:10.5px;font-weight:700;color:${op.cor};background:${op.bg};padding:2px 7px;border-radius:5px;text-transform:uppercase;letter-spacing:.04em">${op.label}</span>
            <span style="font-size:13px;font-weight:600;color:var(--text)">${tabela}</span>
            <span style="font-size:11px;color:var(--text-3)">·</span>
            <span style="font-size:11.5px;color:var(--text-2);font-family:var(--mono)">${(e.registro_id||'').slice(0,8)}…</span>
          </div>
          <div style="margin-top:3px;font-size:12px;color:var(--text-2)">${resumo}</div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:12px;color:var(--text);font-weight:600">${usuario}</div>
          <div style="font-size:10.5px;color:var(--text-3);font-family:var(--mono)">${dataStr}</div>
        </div>
        <span style="color:var(--text-3);font-size:14px;flex-shrink:0;transform:${expanded?'rotate(90deg)':'rotate(0)'};transition:transform .2s">▸</span>
      </div>
    </div>
    ${expanded ? `
    <div style="padding:14px 16px 18px;background:var(--surface-2);border-top:1px solid var(--border)">
      ${_renderAuditDiff(e)}
    </div>` : ''}
  </div>`;
}

function _auditResumo(e) {
  const dados = e.dados_depois || e.dados_antes || {};
  if (e.operacao === 'AUTORIZACAO_DIVERGENCIA') {
    const motivo = dados.motivo || '—';
    const ctx = dados.contexto || {};
    const arquivo = ctx.arquivo || '—';
    return `Autorizou importação divergente <strong>${arquivo}</strong> — motivo: "${motivo.length>60?motivo.slice(0,60)+'…':motivo}"`;
  }
  if (e.operacao === 'INSERT') {
    if (dados.descricao) return `Criou: <strong>${dados.descricao}</strong>${dados.valor?` — ${fmtMoeda(dados.valor)}`:''}`;
    if (dados.nome)      return `Criou: <strong>${dados.nome}</strong>`;
    return 'Novo registro';
  }
  if (e.operacao === 'DELETE') {
    const ant = e.dados_antes || {};
    if (ant.descricao) return `Excluiu: <strong>${ant.descricao}</strong>${ant.valor?` — ${fmtMoeda(ant.valor)}`:''}`;
    if (ant.nome)      return `Excluiu: <strong>${ant.nome}</strong>`;
    return 'Registro removido';
  }
  if (e.operacao === 'UPDATE') {
    const a = e.dados_antes || {}, d = e.dados_depois || {};
    const mudancas = [];
    for (const k in d) {
      if (k === 'atualizado_em' || k === 'tenant_id') continue;
      if (JSON.stringify(a[k]) !== JSON.stringify(d[k])) mudancas.push(k);
    }
    const titulo = d.descricao || d.nome || a.descricao || a.nome || '—';
    return `Editou <strong>${titulo}</strong>${mudancas.length?` (${mudancas.length} ${mudancas.length===1?'campo':'campos'})`:''}`;
  }
  return '—';
}

function _renderAuditDiff(e) {
  const a = e.dados_antes  || {};
  const d = e.dados_depois || {};
  const todasChaves = new Set([...Object.keys(a), ...Object.keys(d)]);
  // Ignora campos de sistema
  const ignorar = new Set(['tenant_id','criado_em','atualizado_em','criado_por']);
  const linhas = [];
  for (const k of todasChaves) {
    if (ignorar.has(k)) continue;
    const va = a[k], vd = d[k];
    const mudou = JSON.stringify(va) !== JSON.stringify(vd);
    if (e.operacao === 'UPDATE' && !mudou) continue;
    linhas.push({ k, va, vd, mudou });
  }
  if (linhas.length === 0) {
    return `<div style="font-size:12px;color:var(--text-3);font-style:italic">Sem alterações relevantes para exibir.</div>`;
  }

  const fmt = v => {
    if (v === null || v === undefined) return '<span style="color:var(--text-3);font-style:italic">vazio</span>';
    if (typeof v === 'boolean') return v ? '✓ sim' : '✗ não';
    if (typeof v === 'object') return `<code style="font-size:10.5px;font-family:var(--mono);color:var(--text-2)">${JSON.stringify(v)}</code>`;
    if (typeof v === 'string' && /^\d{4}-\d{2}-\d{2}/.test(v)) {
      try { return new Date(v).toLocaleDateString('pt-BR'); } catch(_) { return v; }
    }
    return String(v);
  };

  return `
  <div style="font-size:11.5px;background:var(--bg-2);border:1px solid var(--border);border-radius:8px;overflow:hidden">
    <div style="display:grid;grid-template-columns:160px 1fr 1fr;background:var(--surface-2);font-weight:700;font-size:10.5px;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em">
      <div style="padding:8px 12px">Campo</div>
      <div style="padding:8px 12px;border-left:1px solid var(--border)">Antes</div>
      <div style="padding:8px 12px;border-left:1px solid var(--border)">Depois</div>
    </div>
    ${linhas.map(l => `
      <div style="display:grid;grid-template-columns:160px 1fr 1fr;border-top:1px solid var(--border);${l.mudou?'background:rgba(214,228,240,0.3)':''}">
        <div style="padding:7px 12px;font-weight:600;color:var(--text-2);font-size:11.5px">${l.k}</div>
        <div style="padding:7px 12px;border-left:1px solid var(--border);color:var(--text-2)">${e.operacao==='INSERT'?'<span style="color:var(--text-3);font-style:italic">—</span>':fmt(l.va)}</div>
        <div style="padding:7px 12px;border-left:1px solid var(--border);color:${l.mudou?'var(--text)':'var(--text-2)'};font-weight:${l.mudou?'600':'400'}">${e.operacao==='DELETE'?'<span style="color:var(--text-3);font-style:italic">—</span>':fmt(l.vd)}</div>
      </div>`).join('')}
  </div>
  <div style="margin-top:8px;font-size:10.5px;color:var(--text-3);display:flex;gap:14px;flex-wrap:wrap">
    <span>📍 ID: <code style="font-family:var(--mono);color:var(--text-2)">${e.registro_id||'—'}</code></span>
    <span>🆔 Evento: <code style="font-family:var(--mono);color:var(--text-2)">#${e.id}</code></span>
  </div>`;
}

let _AUDIT_BUSCA_TIMER = null;
function _auditOnBuscaDebounce() {
  clearTimeout(_AUDIT_BUSCA_TIMER);
  _AUDIT_BUSCA_TIMER = setTimeout(() => _auditOnFiltro(), 350);
}
async function _auditOnFiltro() {
  _AUDIT.filtros.dataInicio = $id('audit-data-ini')?.value || null;
  _AUDIT.filtros.dataFim    = $id('audit-data-fim')?.value || null;
  _AUDIT.filtros.usuarioId  = $id('audit-usuario')?.value || null;
  _AUDIT.filtros.tabela     = $id('audit-tabela')?.value || null;
  _AUDIT.filtros.busca      = $id('audit-busca')?.value || '';
  _AUDIT.page = 1;
  _AUDIT.expandedId = null;
  await Promise.all([_auditCarregarKpis(), _auditCarregarEventos()]);
  _renderAuditoriaUI();
}
function _auditOnOpToggle(cb) {
  const op = cb.value;
  if (cb.checked) {
    if (!_AUDIT.filtros.operacoes.includes(op)) _AUDIT.filtros.operacoes.push(op);
  } else {
    _AUDIT.filtros.operacoes = _AUDIT.filtros.operacoes.filter(x => x !== op);
    if (_AUDIT.filtros.operacoes.length === 0) {
      _AUDIT.filtros.operacoes = ['INSERT','UPDATE','DELETE','AUTORIZACAO_DIVERGENCIA'];
      cb.checked = true;
      toast('Mantenha ao menos uma operação selecionada.', 'warn');
    }
  }
  _auditOnFiltro();
}
function _auditFiltroAtalho(tipo) {
  const hoje = new Date();
  const fmt  = d => d.toISOString().slice(0,10);
  if (tipo === 'hoje') {
    _AUDIT.filtros.dataInicio = fmt(hoje);
    _AUDIT.filtros.dataFim    = fmt(hoje);
  } else if (tipo === '7d') {
    const d = new Date(); d.setDate(d.getDate()-6);
    _AUDIT.filtros.dataInicio = fmt(d);
    _AUDIT.filtros.dataFim    = fmt(hoje);
  } else if (tipo === '30d') {
    const d = new Date(); d.setDate(d.getDate()-29);
    _AUDIT.filtros.dataInicio = fmt(d);
    _AUDIT.filtros.dataFim    = fmt(hoje);
  } else if (tipo === 'mes') {
    const d = new Date(hoje.getFullYear(), hoje.getMonth(), 1);
    _AUDIT.filtros.dataInicio = fmt(d);
    _AUDIT.filtros.dataFim    = fmt(hoje);
  } else if (tipo === 'limpar') {
    _AUDIT.filtros = {
      dataInicio: null, dataFim: null, usuarioId: null,
      tabela: null, operacoes: ['INSERT','UPDATE','DELETE','AUTORIZACAO_DIVERGENCIA'], busca: ''
    };
  }
  _auditOnFiltro();
}
async function _auditPaginar(delta) {
  _AUDIT.page = Math.max(1, _AUDIT.page + delta);
  _AUDIT.expandedId = null;
  await _auditCarregarEventos();
  _renderAuditoriaUI();
}
function _auditToggle(id) {
  _AUDIT.expandedId = (_AUDIT.expandedId === id) ? null : id;
  _renderAuditoriaUI();
}

async function exportarAuditoria(formato) {
  // Carrega TODOS os eventos do filtro atual (limit alto)
  let dados = [];
  try {
    const params = {
      p_data_inicio: _AUDIT.filtros.dataInicio || null,
      p_data_fim:    _AUDIT.filtros.dataFim    || null,
      p_usuario_id:  _AUDIT.filtros.usuarioId  || null,
      p_tabela:      _AUDIT.filtros.tabela     || null,
      p_operacoes:   _AUDIT.filtros.operacoes && _AUDIT.filtros.operacoes.length === 4 ? null : _AUDIT.filtros.operacoes,
      p_busca:       _AUDIT.filtros.busca      || null,
      p_limite:      5000,
      p_offset:      0,
    };
    dados = await supaRpc('fin_auditoria_listar', params) || [];
  } catch(e) { toast('Erro ao carregar dados: ' + e.message, 'error'); return; }

  if (dados.length === 0) { toast('Sem dados para exportar com os filtros atuais.', 'warn'); return; }

  const tenantNome = (APP.tenant?.nome || 'empresa').replace(/[^a-zA-Z0-9]/g,'_');
  const stamp      = new Date().toISOString().slice(0,10);

  if (formato === 'csv') {
    const cab = ['Data/Hora','Usuário','E-mail','Tabela','Operação','Registro ID','Resumo'];
    const linhas = dados.map(e => [
      new Date(e.criado_em).toLocaleString('pt-BR'),
      (e.usuario_nome||'').replace(/"/g,'""'),
      (e.usuario_email||'').replace(/"/g,'""'),
      _auditTabela(e.tabela),
      _AUDIT_LABELS.operacoes[e.operacao]?.label || e.operacao,
      e.registro_id || '',
      _auditResumo(e).replace(/<[^>]+>/g,'').replace(/"/g,'""'),
    ]);
    const csv = [cab, ...linhas].map(r => r.map(c => `"${c}"`).join(';')).join('\r\n');
    const blob = new Blob(['\uFEFF'+csv], { type: 'text/csv;charset=utf-8;' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = `auditoria_${tenantNome}_${stamp}.csv`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    toast(`CSV exportado (${dados.length} eventos)`, 'success');
    return;
  }

  if (formato === 'pdf') {
    // PDF simples via window.print() de uma janela com HTML formatado
    const win = window.open('', '_blank');
    if (!win) { toast('Permita popups pra exportar PDF.', 'warn'); return; }
    const linhas = dados.map(e => {
      const op = _AUDIT_LABELS.operacoes[e.operacao] || { label: e.operacao };
      return `<tr>
        <td>${new Date(e.criado_em).toLocaleString('pt-BR')}</td>
        <td>${e.usuario_nome||e.usuario_email||'—'}</td>
        <td>${_auditTabela(e.tabela)}</td>
        <td>${op.label}</td>
        <td>${(_auditResumo(e)||'').replace(/<[^>]+>/g,'')}</td>
      </tr>`;
    }).join('');
    win.document.write(`<!doctype html><html><head><meta charset="utf-8"><title>Auditoria — ${APP.tenant?.nome||''}</title>
      <style>
        body{font-family:'DM Sans',Arial,sans-serif;padding:24px;color:#1a2332}
        h1{font-size:18px;margin-bottom:4px}
        .sub{font-size:12px;color:#64748b;margin-bottom:24px}
        table{width:100%;border-collapse:collapse;font-size:11px}
        th,td{padding:6px 8px;border-bottom:1px solid #e5e7eb;text-align:left;vertical-align:top}
        th{background:#f4f6f9;font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:#64748b;font-weight:700}
        tr:nth-child(even) td{background:#fafbfc}
        .footer{margin-top:24px;font-size:10px;color:#94a3b8;text-align:center}
      </style></head><body>
      <h1>Relatório de Auditoria</h1>
      <div class="sub">${APP.tenant?.nome||''} · CNPJ ${_formatCNPJ(APP.tenant?.cnpj||'')} · Período: ${_AUDIT.filtros.dataInicio||'—'} a ${_AUDIT.filtros.dataFim||'—'} · ${dados.length} evento(s)</div>
      <table><thead><tr><th>Data/Hora</th><th>Usuário</th><th>Tabela</th><th>Operação</th><th>Resumo</th></tr></thead><tbody>${linhas}</tbody></table>
      <div class="footer">Gerado em ${new Date().toLocaleString('pt-BR')} · Financeiro Pro</div>
      <scr` + `ipt>setTimeout(()=>window.print(),300);</scr` + `ipt>
    </body></html>`);
    win.document.close();
    toast('Relatório aberto. Use Ctrl+P pra salvar como PDF.', 'success', 4000);
    return;
  }
}

function _gerarSenhaAleatoria() {
  const cs = 'abcdefghjkmnpqrstuvwxyzABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let s = '';
  for (let i=0; i<10; i++) s += cs[Math.floor(Math.random()*cs.length)];

}

async function criarUsuarioDireto() {
  const nome  = $id('nu-nome').value.trim();
  const email = $id('nu-email').value.trim().toLowerCase();
  const senha = $id('nu-senha').value;
  const tpl   = $id('nu-template').value;

  if (!nome)  { toast('Nome é obrigatório.', 'error'); return; }
  if (!email) { toast('E-mail é obrigatório.', 'error'); return; }
  if (!senha || senha.length < 6) { toast('Senha precisa ter no mínimo 6 caracteres.', 'error'); return; }

  // ⚠️ IMPORTANTE: signup do Supabase troca a sessão atual.
  // Salvamos o token de admin antes e restauramos depois.
  const adminToken = APP.token;
  const adminUser  = APP.user;
  const adminTenant = APP.tenantId;

  try {
    // 1) Cria conta no Supabase Auth (envia email de confirmação)
    //    Isso muda APP.token implicitamente se houver auto-detect_session
    const su = await supaAuth('POST', 'signup', { email, password: senha });

    if (su.code === 429 || (su.error && /rate/i.test(su.error))) {
      throw new Error('Muitas tentativas em pouco tempo. Aguarde alguns minutos.');
    }
    if (su.error_description) {
      throw new Error(su.error_description);
    }

    const newAuthId = su.user?.id || su.id;
    if (!newAuthId) {
      throw new Error(su.msg || 'Falha ao obter ID do novo usuário no Auth');
    }

    // 2) RESTAURAR token de admin ANTES de fazer INSERTs
    //    (signup pode ter retornado uma session do novo usuário; precisamos do JWT do admin)
    APP.token    = adminToken;
    APP.user     = adminUser;
    APP.tenantId = adminTenant;

    // Re-seta o tenant na sessão Postgres
    try { await supaRpc('fin_set_tenant', { p_tenant_id: adminTenant }); } catch(_) {}

    // 3) RPC única: cria fin_usuarios + fin_usuarios_empresas com permissões
    //    do template, validando permissão do admin chamador no banco.
    //    Substitui os 2 INSERTs diretos que sofriam 403 por RLS.
    const r = await supaRpc('fin_admin_vincular_usuario', {
      p_auth_id:   newAuthId,
      p_tenant_id: APP.tenantId,
      p_template:  tpl,
      p_email:     email,
      p_nome:      nome
    });
    if (!r || r.sucesso !== true) {
      throw new Error('Falha ao vincular usuário: ' + JSON.stringify(r));
    }

    closeModal();
    toast(`Usuário criado! Senha: ${senha} (anote ou copie)`, 'success', 10000);
    await renderUsuarios();
  } catch(e) {
    // Em caso de falha, garante que admin continua logado
    APP.token    = adminToken;
    APP.user     = adminUser;
    APP.tenantId = adminTenant;
    // Trata 429 (rate limit) com mensagem clara
    const r = _tratarErroAuth(e);
    if (r.is429) toast(r.msg, 'error', 12000);
    else         toast('Erro: ' + e.message, 'error', 6000);
  }
}

const _MODULOS_PERMS = [
  { key: 'dashboard',     label: 'Dashboard / BI' },
  { key: 'receber',       label: 'A Receber' },
  { key: 'pagar',         label: 'A Pagar' },

];
const _ACOES_PERMS = [
  { key: 'v', label: 'Ver' },
  { key: 'c', label: 'Criar' },
  { key: 'e', label: 'Editar' },
  { key: 'x', label: 'Excluir' },
];

// Templates pré-definidos (reflete o SQL fin_template_permissoes)
const _PRESETS = {
  admin: () => Object.fromEntries(_MODULOS_PERMS.map(m =>
    [m.key, { v:true, c:true, e:true, x:true }])),
  financeiro: () => {
    const p = {};
    _MODULOS_PERMS.forEach(m => p[m.key] = { v:false, c:false, e:false, x:false });
    p.dashboard.v = true;
    ['receber','pagar','caixa_bancos','cadastros','recorrencias','impostos'].forEach(k =>
      p[k] = { v:true, c:true, e:true, x:false });
    p.metas.v = true;
    p.dre.v = true;
    p.fluxo_caixa.v = true;
    p.planos.v = true; // operacional vê plano de contas mas não edita
    p.importacao_ia.v = true; p.importacao_ia.c = true;
    return p;
  },
  leitura: () => {
    const p = {};
    _MODULOS_PERMS.forEach(m => p[m.key] = { v:false, c:false, e:false, x:false });
    ['dashboard','receber','pagar','caixa_bancos','cadastros','recorrencias','metas','impostos','dre','fluxo_caixa','planos']
      .forEach(k => p[k].v = true);
    return p;
  },
  custom: () => {
    // Custom começa do zero — admin define do jeito que quiser
    const p = {};
    _MODULOS_PERMS.forEach(m => p[m.key] = { v:false, c:false, e:false, x:false });
    return p;
  }
};

// ── DETECÇÃO SEMÂNTICA DE PERFIL ──────────────────────────────
// v31: substitui o JSON.stringify frágil que comparava ordem de chaves
// e gerava falso positivo "Personalizado" mesmo para usuários com
// permissões idênticas a um preset (bug recorrente no próprio admin).
// Compara módulo a módulo, ação a ação, ignorando ordem e chaves extras.
function _permsBatemComPreset(perms, preset) {
  if (!perms || !preset) return false;
  for (const m of _MODULOS_PERMS) {
    const a1 = perms[m.key]   || {};
    const a2 = preset[m.key]  || {};
    for (const a of _ACOES_PERMS) {
      if (!!a1[a.key] !== !!a2[a.key]) return false;
    }
  }
  return true;
}

// Retorna o template efetivo de um usuário, considerando suas permissões reais.
// Se as permissões salvas batem com algum preset puro → retorna esse preset.
// Se não batem com nenhum → 'custom'.
// Se o usuário não tem permissoes salvas (legacy), confia no template.
function _detectarPerfilEfetivo(u) {
  if (!u) return 'leitura';
  // Sem permissões salvas → confia no template (caso legado).
  if (!u.permissoes || typeof u.permissoes !== 'object'
      || !Object.keys(u.permissoes).length) {
    return u.template || 'leitura';
  }
  // Procura preset puro que bata exatamente.
  for (const nome of ['admin','financeiro','leitura']) {
    if (_permsBatemComPreset(u.permissoes, _PRESETS[nome]())) return nome;
  }
  return 'custom';
}

function _coletarMatriz() {
  const perms = {};
  _MODULOS_PERMS.forEach(m => {
    perms[m.key] = {};
    _ACOES_PERMS.forEach(a => {
      const cb = $id(`perm-${m.key}-${a.key}`);
      perms[m.key][a.key] = !!(cb && cb.checked);
    });
  });
  return perms;
}

function _aplicarPreset(nome) {
  const preset = _PRESETS[nome] && _PRESETS[nome]();
  if (!preset) return;
  _MODULOS_PERMS.forEach(m => {
    _ACOES_PERMS.forEach(a => {
      const cb = $id(`perm-${m.key}-${a.key}`);
      if (cb) cb.checked = !!(preset[m.key] && preset[m.key][a.key]);
    });
  });
  // Atualiza visualmente o select de template
  const sel = $id('eu-template');
  if (sel) sel.value = nome;
  toast(`Template "${nome}" aplicado. Ajuste os checkboxes conforme necessário antes de salvar.`, 'success', 4000);
}

async function carregarSeletorEmpresas() {
  try {
    const sel = $id('sa-empresa-select');
    const wrap = $id('sa-empresa-sel');
    if (!sel) return;

    let opcoes = [];
    if (APP.ehSuperadmin) {
      // Superadmin vê todas as empresas
      const tenants = await supa('GET', 'fin_tenants', {
        params: { select: 'id,nome', order: 'nome.asc', limit: 1000 }
      });
      SA.tenants = tenants || [];
      opcoes = (tenants || []).map(t => ({
        id: t.id, nome: t.nome, isAtual: t.id === APP.tenantId
      }));
    } else {
      // Usuário comum: vê apenas suas empresas
      opcoes = (APP.empresas || []).map(e => ({
        id: e.tenant_id, nome: e.nome, isAtual: e.tenant_id === APP.tenantId
      }));
    }

    if (!opcoes.length) { wrap.style.display = 'none'; return; }
    // Mostra dropdown se houver mais de 1 empresa OU se for superadmin
    if (opcoes.length === 1 && !APP.ehSuperadmin) { wrap.style.display = 'none'; return; }

    sel.innerHTML = opcoes.map(o =>
      `<option value="${o.id}"${o.isAtual?' selected':''}>${o.isAtual?'⭐ ':''}${o.nome}</option>`
    ).join('');
    wrap.style.display = 'flex';
  } catch(e) { console.warn('carregarSeletorEmpresas:', e.message); }
}

async function trocarEmpresaSA(tenantId) {
  if (!tenantId || tenantId === APP.tenantId) return;

  try {
    // 1) Seta tenant ativo no banco (RPC persistente — muda is_default)
    let ok = false;
    try {
      const r = await supaRpc('fin_set_tenant_persistente', { p_tenant_id: tenantId });
      ok = !!(r && r.sucesso);
    } catch(_) {
      // Fallback: tenta a função antiga (compat)
      try { ok = await supaRpc('fin_set_tenant', { p_tenant_id: tenantId }); }
      catch(_) { ok = false; }
    }
    if (!ok) {
      // Pode ter sido superadmin mudando pra empresa fora do vínculo: força mesmo assim
      if (!APP.ehSuperadmin) {
        toast('Você não tem acesso a esta empresa.', 'error');
        return;
      }
    }

    // 2) Atualiza permissões locais a partir de APP.empresas (se tiver vínculo)
    const link = (APP.empresas || []).find(e => e.tenant_id === tenantId);
    if (link) {
      APP.permissoes = link.permissoes || {};
      APP.template   = link.template;
    } else if (APP.ehSuperadmin) {
      // Superadmin entrando em empresa sem vínculo direto
      APP.permissoes = {}; // pode() retorna true via ehSuperadmin
      APP.template   = 'admin';
    }

    // 3) Carrega dados da empresa
    const tenants = await supa('GET', 'fin_tenants', {
      params: { id: `eq.${tenantId}`, select: '*', limit: 1 }
    });
    if (!tenants?.length) { toast('Empresa não encontrada.', 'error'); return; }

    APP.tenantId = tenantId;
    APP.tenant   = tenants[0];

    // 4) Atualiza sidebar
    $id('sb-tenant').textContent = APP.tenant.nome || '—';
    $id('sb-setor').textContent  = APP.tenant.setor || '—';

    await carregarDados();
    go(APP.page || 'dashboard');
    toast(`Visualizando: ${APP.tenant.nome}`, 'success');
  } catch(e) {
    toast('Erro ao trocar empresa: ' + e.message, 'error');
  }
}

async function carregarTenantsSA() {
  try {
    // Carrega todos os tenants
    const tenants = await supa('GET', 'fin_tenants', { params: { select: '*', order: 'criado_em.desc', limit: 1000 } });
    // Para cada tenant, carrega KPIs
    const ids = tenants.map(t => t.id);
    const [usuarios, receitas, despesas, contas] = await Promise.all([
      supa('GET', 'fin_usuarios',   { params: { select: 'tenant_id,perfil', limit: 500 } }).catch(()=>[]),
      supa('GET', 'fin_receitas',   { params: { select: 'tenant_id,valor,status', limit: 1000 } }).catch(()=>[]),
      supa('GET', 'fin_despesas',   { params: { select: 'tenant_id,valor,status', limit: 1000 } }).catch(()=>[]),
      supa('GET', 'fin_contas',     { params: { select: 'tenant_id,saldo_atual', limit: 500 } }).catch(()=>[]),
    ]);
    SA.tenants = tenants.map(t => {
      const tRec  = receitas.filter(r=>r.tenant_id===t.id);
      const tDesp = despesas.filter(d=>d.tenant_id===t.id);
      const tCont = contas.filter(c=>c.tenant_id===t.id);
      const tUser = usuarios.filter(u=>u.tenant_id===t.id);
      return {
        ...t,
        _usuarios:  tUser.length,
        _receitas:  tRec.reduce((s,r)=>s+(parseFloat(r.valor)||0),0),
        _despesas:  tDesp.reduce((s,d)=>s+(parseFloat(d.valor)||0),0),
        _saldo:     tCont.reduce((s,c)=>s+(parseFloat(c.saldo_atual)||0),0),
        _recPend:   tRec.filter(r=>r.status==='pendente').length,
        _despPend:  tDesp.filter(d=>d.status==='pendente').length,
      };
    });
  } catch(e) { console.error('Erro ao carregar tenants SA:', e); SA.tenants = []; }
}

          <th style="padding:12px 16px;text-align:center;font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.06em">Usuários</th>
          <th style="padding:12px 16px;text-align:right;font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.06em">Receitas</th>
          <th style="padding:12px 16px;text-align:right;font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.06em">Despesas</th>
          <th style="padding:12px 16px;text-align:right;font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.06em">Saldo</th>
          <th style="padding:12px 16px;text-align:left;font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.06em">Cadastro</th>
        </tr>
      </thead>
      <tbody>
        ${SA.tenants.length === 0
          ? `<tr><td colspan="7" style="padding:40px;text-align:center;color:#64748b">Nenhuma empresa cadastrada</td></tr>`
          : SA.tenants.map(t => `
            <tr style="border-top:1px solid #334155;transition:background .15s" onmouseover="this.style.background='#0f172a'" onmouseout="this.style.background=''">
              <td style="padding:14px 16px">
                <div style="font-size:13px;font-weight:600;color:#f1f5f9">${t.nome||'—'}</div>
                <div style="font-size:11px;color:#64748b;font-family:'DM Mono',monospace">${t.id.slice(0,8)}...</div>
              </td>
              <td style="padding:14px 16px">
                <span style="background:#1e3a5f;color:#60a5fa;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600">${t.setor||'—'}</span>
              </td>
              <td style="padding:14px 16px;text-align:center;color:#94a3b8;font-size:13px">${t._usuarios}</td>
              <td style="padding:14px 16px;text-align:right;font-family:'DM Mono',monospace;font-size:12px;color:#22c55e;font-weight:700">${fmtMoeda(t._receitas)}</td>
              <td style="padding:14px 16px;text-align:right;font-family:'DM Mono',monospace;font-size:12px;color:#ef4444;font-weight:700">${fmtMoeda(t._despesas)}</td>
              <td style="padding:14px 16px;text-align:right;font-family:'DM Mono',monospace;font-size:12px;font-weight:700;color:${t._saldo>=0?'#22c55e':'#ef4444'}">${fmtMoeda(t._saldo)}</td>
              <td style="padding:14px 16px;font-size:11px;color:#64748b;font-family:'DM Mono',monospace">${t.criado_em?new Date(t.criado_em).toLocaleDateString('pt-BR'):'—'}</td>
            </tr>`).join('')}
      </tbody>
    </table>
  </div>`;

  // ═══════════════════════════════════════════════════════════
  // FIX v2 · Botões "Gerenciar" / "+ Usuário"
  // 3 níveis de fallback:
  //  1. closest('button[data-action]')           — clique direto no botão
  //  2. closest('td[data-actions-cell]')         — clique no td/div pai
  //  3. bbox de cada botão na linha (±8px)       — clique fora mas próximo
  // ═══════════════════════════════════════════════════════════
  window.DEBUG_SA_CLICK = false; // ← logs de diagnóstico desligados (fix validado em 24/04/2026)

  // Remove handler anterior (idempotente a re-renders)
  if (window._saClickHandler) {
    el.removeEventListener('click', window._saClickHandler, true);
  }
  window._saClickHandler = function(ev) {
    // DIAGNÓSTICO: mostra TUDO que foi clicado
    if (window.DEBUG_SA_CLICK) {
      const stack = document.elementsFromPoint(ev.clientX, ev.clientY)
        .map(e => `${e.tagName.toLowerCase()}${e.id?'#'+e.id:''}${e.className&&typeof e.className==='string'?'.'+e.className.split(' ').filter(Boolean).slice(0,2).join('.'):''}`)
        .slice(0, 6);
      console.log('[SA-CLICK] target=', ev.target.tagName, ev.target.dataset?.action || '(sem data-action)',
                  '· stack:', stack.join(' → '));
    }

    // ── Nível 1: clique direto no botão ────────────────────────
    let btn = ev.target.closest('button[data-action]');
    let resolvedBy = 'button';

    // ── Nível 2: clique no <td data-actions-cell> ──────────────
    // (cobre clique no gap entre botões, no padding do td, ou em qq filho não-button)
    if (!btn) {
      const cell = ev.target.closest('td[data-actions-cell]');
      if (cell) {
        // Decide qual botão usar: o mais próximo do clique no eixo X
        const btns = Array.from(cell.querySelectorAll('button[data-action]'));
        if (btns.length) {
          let best = null, bestDist = Infinity;
          for (const b of btns) {
            const r = b.getBoundingClientRect();
            const cx = (r.left + r.right) / 2;
            const d = Math.abs(ev.clientX - cx);
            if (d < bestDist) { bestDist = d; best = b; }
          }
          btn = best;
          resolvedBy = 'td-cell-nearest';
        }
      }
    }

    // ── Nível 3: clique em qualquer lugar da <tr> que contenha um td-actions-cell ──
    // (último recurso: a linha inteira vira clicável pra "Gerenciar")
    if (!btn) {
      const row = ev.target.closest('tr');
      if (row) {
        const cell = row.querySelector('td[data-actions-cell]');
        if (cell) {
          btn = cell.querySelector('button[data-action="gerenciar"]');
          if (btn) resolvedBy = 'row-fallback-gerenciar';
        }
      }
    }

    if (!btn) {
      if (window.DEBUG_SA_CLICK) console.log('[SA-CLICK] ✗ nenhum botão resolvido — clique ignorado');
      return;
    }

    const action = btn.dataset.action;
    const tid    = btn.dataset.tenantId;
    const tnome  = btn.dataset.tenantNome || '';

    if (window.DEBUG_SA_CLICK) {
      console.log(`[SA-CLICK] ✓ delegate disparou (via ${resolvedBy}):`, action, 'tenant:', tid);
    }

    // Previne qualquer comportamento default ou bubble pra outros listeners
    ev.preventDefault();
    ev.stopPropagation();

    if (action === 'gerenciar')         { modalGerenciarEmpresa(tid); }
    else if (action === 'novo-usuario') { modalCriarUsuarioEmpresa(tid, tnome); }
  };
  // useCapture=true garante que pegamos o evento ANTES de qualquer
  // stopPropagation que possa estar atrapalhando
  el.addEventListener('click', window._saClickHandler, true);
}

// ── Modal Cadastrar Empresa ────────────────────────────────────
function modalCadastrarEmpresa() {
  openModal('Cadastrar Nova Empresa', `
    <div class="form-grid">
      <div class="form-field full"><label class="form-label">Nome da Empresa *</label><input class="form-input" id="sa-emp-nome" placeholder="Ex: Empresa XYZ Ltda"></div>
      <div class="form-field"><label class="form-label">CNPJ</label><input class="form-input" id="sa-emp-cnpj" placeholder="00.000.000/0000-00"></div>
      <div class="form-field"><label class="form-label">Setor</label>
        <select class="form-select" id="sa-emp-setor">
          ${['Contabilidade','Advocacia','Saúde','Educação','Comércio','Indústria','Tecnologia','Construção','Alimentação','Serviços Gerais','Outro'].map(s=>`<option value="${s}">${s}</option>`).join('')}
        </select>
      </div>
      <div class="form-field full"><label class="form-label">Observação</label><input class="form-input" id="sa-emp-obs" placeholder="Opcional"></div>
    </div>`,
    `<button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
     <button class="btn btn-gold" onclick="cadastrarEmpresaSA()">Cadastrar Empresa</button>`
  );
}

async function cadastrarEmpresaSA() {
  const nome  = $id('sa-emp-nome')?.value?.trim();
  const setor = $id('sa-emp-setor')?.value;
  const cnpj  = $id('sa-emp-cnpj')?.value?.trim();
  const obs   = $id('sa-emp-obs')?.value?.trim();

  if (!nome) { toast('Informe o nome da empresa.', 'error'); return; }

  try {
    toast('Cadastrando empresa...', 'default', 5000);

    // Criar tenant
    const tenant = await supa('POST', 'fin_tenants', {
      body: { nome, setor: setor||'Outro', cnpj: cnpj||null, observacao: obs||null },
      returning: true,
    });
    const tenantId = tenant[0]?.id;
    if (!tenantId) throw new Error('Erro ao criar empresa.');

    // Criar conta padrão (Caixa)
    await supa('POST', 'fin_contas', {
      body: { tenant_id: tenantId, nome: 'Caixa', tipo: 'caixa', saldo_inicial: 0, saldo_atual: 0 }
    });

    closeModal();
    toast(`Empresa "${nome}" cadastrada com sucesso!`, 'success');
    await renderSuperadmin();

  } catch(e) {
    toast('Erro: ' + e.message, 'error');
  }
}

// ── Modal Criar Usuário numa Empresa ──────────────────────────
function modalCriarUsuarioEmpresa(tenantId, nomeEmpresa) {
  openModal(`Criar Acesso — ${nomeEmpresa}`, `
    <div style="font-size:12.5px;color:var(--text-2);margin-bottom:16px;line-height:1.6;background:var(--bg-2);padding:12px;border-radius:9px;border:1px solid var(--border)">
      Crie o login de acesso para um usuário desta empresa. As credenciais serão geradas automaticamente.
    </div>
    <div class="form-grid">
      <div class="form-field full"><label class="form-label">Nome completo *</label><input class="form-input" id="sa-usr-nome" placeholder="Nome do usuário"></div>
      <div class="form-field full"><label class="form-label">E-mail *</label><input class="form-input" type="email" id="sa-usr-email" placeholder="email@empresa.com.br"></div>
      <div class="form-field"><label class="form-label">Perfil</label>
        <select class="form-select" id="sa-usr-perfil">
          <option value="admin">Admin (acesso total)</option>
          <option value="viewer">Viewer (somente leitura)</option>
        </select>
      </div>
      <div class="form-field"><label class="form-label">Senha *</label>
        <input class="form-input" type="text" id="sa-usr-senha" value="Artecon@2025" placeholder="Mínimo 6 caracteres">
      </div>
    </div>`,
    `<button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
     <button class="btn btn-gold" onclick="criarUsuarioEmpresaSA('${tenantId}','${nomeEmpresa.replace(/'/g,"\\'")}')">Criar Acesso</button>`
  );
}

async function criarUsuarioEmpresaSA(tenantId, nomeEmpresa) {
  const nome   = $id('sa-usr-nome')?.value?.trim();
  const email  = $id('sa-usr-email')?.value?.trim();
  const senha  = $id('sa-usr-senha')?.value?.trim();
  const perfil = $id('sa-usr-perfil')?.value;

  if (!nome || !email || !senha) { toast('Preencha todos os campos.', 'error'); return; }
  if (senha.length < 6) { toast('Senha mínima de 6 caracteres.', 'error'); return; }

  // Confirmação dobrada (superadmin): pede "CRIAR" pra evitar clique acidental.
  // Usar prompt nativo é proposital — modal customizado dentro de modal vira labirinto.
  const confirmacao = prompt(
    `Você está prestes a CRIAR um novo usuário com acesso à empresa "${nomeEmpresa}".\n\n` +
    `Nome: ${nome}\nE-mail: ${email}\nPerfil: ${perfil}\n\n` +
    `Digite a palavra CRIAR (em maiúsculas) para confirmar:`
  );
  if (confirmacao !== 'CRIAR') {
    toast('Criação cancelada.', 'default');
    return;
  }

  try {
    toast('Criando acesso...', 'default', 8000);

    // Chamar Edge Function criar-usuario
    const res = await fetch(`${SUPA_URL}/functions/v1/criar-usuario`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${APP.token}`,
        'apikey': SUPA_KEY,
      },
      body: JSON.stringify({ email, password: senha, nome, tenant_id: tenantId, perfil }),
    });

    const data = await res.json();
    if (data.error) throw new Error(data.error);

    closeModal();

    // Mostrar credenciais para entregar ao cliente
    openModal('✅ Acesso Criado com Sucesso!', `
      <div style="text-align:center;padding:8px 0">
        <div style="font-size:36px;margin-bottom:12px">🎉</div>
        <div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:6px">${nome}</div>
        <div style="font-size:12px;color:var(--text-3);margin-bottom:20px">${nomeEmpresa}</div>
        <div style="background:var(--surface-2);border-radius:10px;padding:16px;text-align:left;border:1px solid var(--border)">
          <div style="font-size:10.5px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px">Dados de acesso para entregar ao cliente</div>
          <div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)">
            <span style="font-size:12px;color:var(--text-3)">Sistema</span>
            <span style="font-size:11px;font-family:var(--mono);color:var(--gold)">financeiro-pro</span>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)">
            <span style="font-size:12px;color:var(--text-3)">E-mail</span>
            <strong style="font-size:13px;color:var(--text)">${email}</strong>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)">
            <span style="font-size:12px;color:var(--text-3)">Senha</span>
            <strong style="font-size:14px;color:var(--text);font-family:var(--mono)">${senha}</strong>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0">
            <span style="font-size:12px;color:var(--text-3)">Perfil</span>
            <span class="badge badge-gold">${perfil}</span>
          </div>
        </div>
        <div style="margin-top:12px;font-size:11.5px;color:var(--text-3)">⚠ Recomende que o cliente troque a senha no primeiro acesso.</div>
      </div>`,
      `<button class="btn btn-gold" onclick="closeModal()">Fechar</button>`
    );

    await renderSuperadmin();
  } catch(e) {
    toast('Erro: ' + e.message, 'error');
  }
}

// ── Modal Gerenciar Empresa ────────────────────────────────────
function modalGerenciarEmpresa(tenantId) {
  const t = SA.tenants.find(x => x.id === tenantId); if (!t) return;
  openModal(`Gerenciar — ${t.nome}`, `
    <div style="display:flex;flex-direction:column;gap:14px">
      <div style="background:var(--surface-2);border-radius:10px;padding:14px;border:1px solid var(--border)">
        <div style="font-size:11px;font-weight:700;color:var(--text-3);text-transform:uppercase;margin-bottom:10px">Resumo da empresa</div>
        ${[
          ['Setor', t.setor||'—'],
          ['Usuários', t._usuarios],
          ['Receitas totais', fmtMoeda(t._receitas)],
          ['Despesas totais', fmtMoeda(t._despesas)],
          ['Saldo atual', fmtMoeda(t._saldo)],
          ['Cadastro', t.criado_em ? new Date(t.criado_em).toLocaleDateString('pt-BR') : '—'],
        ].map(([l,v])=>`
          <div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)">
            <span style="font-size:12px;color:var(--text-3)">${l}</span>
            <strong style="font-size:12px;color:var(--text)">${v}</strong>
          </div>`).join('')}
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button onclick="modalCriarUsuarioEmpresa('${tenantId}','${t.nome?.replace(/'/g,"\'")}')" class="btn btn-gold btn-sm">+ Adicionar usuário</button>
        <button onclick="excluirEmpresaSA('${tenantId}','${t.nome?.replace(/'/g,"\'")||''}')" class="btn btn-sm" style="background:var(--red-lt);color:var(--red);border:1px solid rgba(192,57,43,.2)">Excluir empresa</button>
      </div>
    </div>`,
    `<button class="btn btn-outline" onclick="closeModal()">Fechar</button>`
  );
}

function excluirEmpresaSA(tenantId, nome) {
  openModal('🔐 Confirmar Exclusão de Empresa', `
    <div style="text-align:center;padding:8px 0">
      <div style="font-size:36px;margin-bottom:12px">⚠️</div>
      <div style="font-size:14px;font-weight:700;color:var(--red);margin-bottom:8px">Excluir "${nome}"?</div>
      <div style="font-size:12.5px;color:var(--text-2);margin-bottom:20px;line-height:1.6">
        Todos os dados desta empresa serão <strong>permanentemente apagados</strong>.<br>
        Esta ação é <strong>irreversível</strong>.
      </div>
      <div class="form-field">
        <label class="form-label">Para confirmar, digite o nome da empresa:</label>
        <input class="form-input" type="text" id="sa-del-nome" placeholder="${nome}"
          autocomplete="off" spellcheck="false" style="margin-bottom:12px">
      </div>
      <div class="form-field">
        <label class="form-label">Digite sua senha de admin para confirmar</label>
        <input class="form-input" type="password" id="sa-del-senha" placeholder="Sua senha de acesso">
      </div>
    </div>`,
    `<button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
     <button class="btn btn-sm" style="background:var(--red);color:#fff;border:none;padding:9px 18px;border-radius:9px;font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer" onclick="confirmarExcluirEmpresaSA('${tenantId}','${nome.replace(/'/g,"\'")}')">Excluir definitivamente</button>`
  );
}

async function confirmarExcluirEmpresaSA(tenantId, nome) {
  // 1) Validar que o nome digitado bate com o nome da empresa
  //    (anti-acidente — exige digitar o nome exato pra confirmar)
  const nomeDigitado = $id('sa-del-nome')?.value?.trim() || '';
  if (nomeDigitado !== nome) {
    toast(`Nome digitado não confere. Esperado: "${nome}".`, 'error', 6000);
    return;
  }
  const senha = $id('sa-del-senha')?.value?.trim();
  if (!senha) { toast('Digite sua senha para confirmar.', 'error'); return; }

  // Verificar senha fazendo login
  try {
    const res = await fetch(`${SUPA_URL}/auth/v1/token?grant_type=password`, {
      method: 'POST',
      headers: { 'apikey': SUPA_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: APP.user.email, password: senha }),
    });
    const data = await res.json();
    // Trata 429 explicitamente — diferente de senha errada
    if (res.status === 429 || /rate/i.test(data?.error_description || '')) {
      const r = _tratarErroAuth({ status: 429 });
      toast(r.msg, 'error', 12000);
      return;
    }
    if (!data.access_token) throw new Error('Senha incorreta.');
  } catch(e) {
    const r = _tratarErroAuth(e);
    if (r.is429) toast(r.msg, 'error', 12000);
    else         toast('Senha incorreta. Exclusão cancelada.', 'error');
    return;
  }

  try {
    await supa('DELETE', 'fin_tenants', { params: { id: `eq.${tenantId}` } });
    toast(`Empresa "${nome}" excluída permanentemente.`, 'success');
    closeModal();
    await renderSuperadmin();
  } catch(e) { toast('Erro: ' + e.message, 'error'); }
}
// Throttle 5s: previne duplo-clique no botão "Excluir definitivamente"
// que tenta fazer login pra validar senha (cada erro = 1 hit no Auth → 429).
window.confirmarExcluirEmpresaSA = _throttle(confirmarExcluirEmpresaSA, 5000);

// ── INIT ──────────────────────────────────────────────────────
window.addEventListener('load', () => {
  // v31: aplica guards granulares (módulo+ação) usando _PERMS_FUNCAO.
  // Isso é a 2ª camada de defesa — a 1ª é a RLS do Postgres.
  Object.entries(_PERMS_FUNCAO).forEach(([nomeFn, [modulo, acao]]) => {
    if (typeof window[nomeFn] === 'function') {
      window[nomeFn] = guardAcao(window[nomeFn], modulo, acao);
    }
  });
  $id('auth-screen').classList.add('visible');
});
</script>

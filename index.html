        Para extratos, recomendamos <strong>baixar o arquivo OFX</strong> no seu Internet Banking (Sicredi → Conta Corrente → Extrato → Exportar OFX) e arrastá-lo na seção <strong>"Extrato OFX/CSV"</strong>.
      </div>

      <div style="background:var(--bg-2);border:1px solid var(--border);border-radius:8px;padding:11px 13px;margin-bottom:6px;font-size:12px;line-height:1.6">
        <div style="font-weight:700;color:var(--text-2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em;font-size:10px">Por quê?</div>
        <ul style="margin:0;padding-left:18px;color:var(--text-2)">
          <li><strong>Sem erros:</strong> OFX traz dados exatos do banco, sem interpretação</li>
          <li><strong>Mais rápido:</strong> processa instantaneamente, não chama IA</li>
          <li><strong>CNPJs corretos:</strong> não há risco de a IA misturar dados</li>
        </ul>
      </div>
    `,
    `<button class="btn btn-outline" id="aviso-ext-continuar">Continuar com PDF/IA</button>
     <button class="btn btn-gold" id="aviso-ext-ofx">Cancelar e usar OFX</button>`);

    document.getElementById('aviso-ext-ofx').onclick = () => {
      closeModal(); resolve('ofx');
    };
    document.getElementById('aviso-ext-continuar').onclick = () => {
      closeModal(); resolve('continuar');
    };
  });
}


async function processarPDFAutoDoc(id, file) {
  const apiKey = getClaudeApiKey();
  if (!apiKey) {
    adicionarFilaItem(id, file.name, 'erro',
      'Chave da Claude API não configurada. Vá em Configurações → Claude API para configurar.', null);
    return;
  }

  // ── Detecção de extrato pelo nome do arquivo (Camada 1) ──
  // PDF de extrato bancário é caso ruim pra IA. Recomendamos OFX antes
  // de gastar chamada de API. O usuário pode escolher continuar mesmo assim.
  if (_pareceExtrato(file)) {
    const escolha = await _modalAvisoExtrato(file.name);
    if (escolha === 'ofx') {
      adicionarFilaItem(id, file.name, 'cancelado',
        'Importação cancelada — use OFX para extratos. Baixe em: Sicredi → Conta Corrente → Extrato → Exportar OFX.', null);
      return;
    }
    // 'continuar' → segue o fluxo normal (PDF/IA com risco conhecido)
  }

  adicionarFilaItem(id, file.name, 'processando', 'Enviando PDF para a IA...', null);

  // Converter PDF para base64
  const base64 = await new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload = () => res(reader.result.split(',')[1]);
    reader.onerror = rej;
    reader.readAsDataURL(file);
  });

  // Extrair texto do PDF no browser primeiro (evita enviar base64 enorme)
  // Usa abordagem de enviar o PDF em chunks via FormData
  let dados;
  let dadosLista = [];
  try {
    const proxyUrl = `${SUPA_URL}/functions/v1/validar-anexos`;

    // Verificar tamanho - PDFs grandes precisam ser limitados
    if (file.size > 5 * 1024 * 1024) {
      adicionarFilaItem(id, file.name, 'erro', 'PDF muito grande. Máximo 5MB para leitura por IA.', null);
      return;
    }

    const response = await fetch(proxyUrl, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${APP.token}`,
        'apikey': SUPA_KEY,
      },
      body: JSON.stringify({
        apiKey,
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1024,
        messages: [{
          role: 'user',
          content: [
            {
              type: 'document',
              source: { type: 'base64', media_type: 'application/pdf', data: base64 }
            },
            {
              type: 'text',
              text: 'Analise este documento brasileiro (NFS-e, NF-e, boleto, recibo, comprovante OU extrato bancário) e extraia as informacoes. Responda APENAS com JSON valido, sem explicacoes. FORMATO DE RESPOSTA: (a) Para documentos com UM lancamento (NFS-e, NF-e, boleto, comprovante avulso): retorne um OBJETO no formato {"tipo":"despesa ou receita","descricao":"NFS-e nº XXX - Nome ou descricao","valor":0.00,"vencimento":"YYYY-MM-DD","beneficiario":"nome do prestador ou emissor","numero_nf":"numero da nota se houver","cnpj_prestador":"cnpj sem pontuacao","cnpj_tomador":"cnpj sem pontuacao","observacao":"discriminacao do servico ou detalhes","prestador":{"cnpj":"","nome":"","nome_fantasia":"","ie":"","im":"","logradouro":"","numero":"","complemento":"","bairro":"","municipio":"","uf":"","cep":"","email":"","telefone":""},"tomador":{"cnpj":"","nome":"","nome_fantasia":"","ie":"","im":"","logradouro":"","numero":"","complemento":"","bairro":"","municipio":"","uf":"","cep":"","email":"","telefone":""}}. (b) Para EXTRATOS BANCARIOS, comprovantes com lista de transacoes ou documentos com MULTIPLOS lancamentos: retorne {"lancamentos":[item1, item2, ...]} onde cada item segue o mesmo formato acima — UM ITEM POR LINHA DO EXTRATO. ATENCAO ESPECIAL EXTRATO: incluir TODAS as linhas de transacao do extrato, mesmo as pequenas (tarifas de R$1, R$2, manutencao, IOF, etc) — nao filtrar nada, nao agrupar, nao consolidar. Cada linha vira um item separado. Identifique o documento como extrato quando houver tabela/lista com colunas Data + Descricao + Valor (positivo ou negativo) + Saldo, ou quando houver multiplas transacoes em sequencia. Regras: NFS-e emitida por voce=receita, NFS-e recebida de terceiro=despesa, boleto=despesa, comprovante de recebimento=receita. EM EXTRATOS BANCARIOS: valor positivo (entrada/credito/PIX_CRED/RECEBIMENTO/LIQ.COBRANCA)=receita; valor negativo (saida/debito/TARIFA/PAGAMENTO/LIQUIDACAO/COMPRA/MANUTENCAO/APLIC.FINANC)=despesa. SEMPRE retorne valor como numero POSITIVO no JSON, mesmo que apareca negativo no documento — o tipo (receita/despesa) ja indica o sentido. Para cada lancamento do extrato, use a Data da transacao como vencimento. Se nao houver vencimento use a data de emissao ou hoje. Para prestador e tomador, extraia TODOS os dados de identificacao e endereco que aparecerem no documento — se algum campo nao estiver visivel, deixe string vazia. CNPJ/CPF sempre sem pontuacao, CEP sem hifen, UF com 2 letras maiusculas. REGRAS CRITICAS DE CNPJ (siga rigorosamente): (1) NUNCA invente, deduza ou misture CNPJs de partes diferentes do documento — se nao tiver certeza absoluta de qual CNPJ pertence a qual parte, deixe vazio. (2) Em extratos bancarios e comprovantes PIX/TED/DOC: o titular da conta exibido no cabecalho/topo do documento e o tomador (se transacao=credito/recebimento) ou prestador (se transacao=debito/pagamento). O CNPJ do titular vem SEMPRE do cabecalho, nunca de linhas de transacao individuais. (3) Pagador/recebedor que e pessoa fisica (CPF de 11 digitos) deve ter cnpj vazio — NAO converta CPF em CNPJ inventando 3 digitos extras. (4) Se voce identificar o NOME de uma parte mas nao tiver o CNPJ dela visivel no documento, retorne nome preenchido e cnpj vazio — e melhor cnpj vazio do que cnpj errado. (5) Se o documento nao for fiscal (recibo informal, comprovante simples, anotacao, transacao avulsa do extrato), e normal nao haver CNPJ — deixe ambos vazios sem inventar. (6) Em transacoes individuais de um extrato, NORMALMENTE nao ha CNPJ explicito da contraparte — deixe vazio em vez de chutar. O CNPJ do titular do extrato (cabecalho) deve ir em cnpj_tomador (para creditos) ou cnpj_prestador (para debitos). (7) ALGUMAS linhas de extrato exibem o CNPJ da contraparte logo apos a palavra PIX/TED/DOC (ex: "RECEBIMENTO PIX 13619673000176 J. F. BIJUTERIAS" — aqui 13619673000176 EH o CNPJ do pagador). Nesse caso, extraia esse CNPJ corretamente para o lado da contraparte. LEMBRETE FINAL: a resposta DEVE ser um JSON valido completo. Para extratos com mais de uma transacao, SEMPRE use {"lancamentos":[...]} — nunca retorne so a primeira linha como objeto unico.'
            }
          ]
        }]
      })
    });

    if (!response.ok) {
      const err = await response.text();
      throw new Error(`Claude API: ${response.status} — ${err.slice(0,200)}`);
    }
    const result = await response.json();
    const text   = result.content?.[0]?.text || result.error?.message || '';
    if (result.error) throw new Error('Claude API: ' + result.error.message);

    console.log('Resposta bruta da IA:', text.slice(0, 500));

    // Parser tolerante — prioriza JSON top-level (pode ter objetos aninhados
    // como prestador/tomador); só cai no regex simples como último recurso.
    let dados = null;

    // 1) Tenta o maior bloco JSON (aninhamento via balanceamento de chaves)
    //    Encontra a primeira '{' e a última '}' e tenta parse.
    const firstBrace = text.indexOf('{');
    const lastBrace  = text.lastIndexOf('}');
    if (firstBrace >= 0 && lastBrace > firstBrace) {
      const slice = text.slice(firstBrace, lastBrace + 1);
      try { dados = JSON.parse(slice); } catch(_) {}
    }

    // 2) Se falhou, varre por balanceamento de chaves (aceita aninhamento)
    if (!dados) {
      let depth = 0, start = -1;
      for (let i = 0; i < text.length; i++) {
        const ch = text[i];
        if (ch === '{') { if (depth === 0) start = i; depth++; }
        else if (ch === '}') {
          depth--;
          if (depth === 0 && start >= 0) {
            const candidate = text.slice(start, i + 1);
            try {
              const obj = JSON.parse(candidate);
              // Prioriza objetos que parecem lançamento (têm valor/tipo/descricao)
              if (obj && (obj.valor !== undefined || obj.value !== undefined
                       || obj.tipo !== undefined  || obj.descricao !== undefined
                       || obj.lancamentos || obj.itens || obj.items)) {
                dados = obj;
                break;
              }
              // Guarda fallback: primeiro JSON válido qualquer
              if (!dados) dados = obj;
            } catch(_) {}
            start = -1;
          }
        }
      }
    }

    // 3) Último fallback: regex simples (só objetos sem aninhamento)
    if (!dados) {
      const jsonMatches = text.match(/\{[^{}]*\}/g) || [];
      for (const candidate of jsonMatches) {
        try { dados = JSON.parse(candidate); if (dados.valor !== undefined) break; } catch(_) {}
      }
    }

    if (!dados) throw new Error('Resposta da IA não contém JSON válido: ' + text.slice(0,150));

    // Log para diagnóstico
    console.log('IA retornou:', JSON.stringify(dados).slice(0,600));
    console.log('[DIAG] Campos top-level:', Object.keys(dados).join(', '));
    console.log('[DIAG] dados.valor =', dados.valor, '· dados.tipo =', dados.tipo);

    // Normalizar função
    function normalizarItem(d) {
      // Helper: extrai entidade (prestador/tomador) no formato esperado por resolveEntidadeXML
      const _ent = (raw, cnpjFallback) => {
        if (!raw && !cnpjFallback) return null;
        raw = raw || {};
        const cnpj = (raw.cnpj || raw.cpf || raw.cnpj_cpf || cnpjFallback || '').replace(/\D/g,'');
        if (!cnpj) return null;
        return {
          cpf_cnpj:            cnpj,
          nome:                raw.nome || raw.razao_social || raw.nome_razao_social || '—',
          nome_fantasia:       raw.nome_fantasia || raw.fantasia || null,
          inscricao_estadual:  raw.ie || raw.inscricao_estadual || null,
          inscricao_municipal: raw.im || raw.inscricao_municipal || null,
          logradouro:  raw.logradouro || null,
          numero:      raw.numero || null,
          complemento: raw.complemento || null,
          bairro:      raw.bairro || null,
          municipio:   raw.municipio || raw.cidade || null,
          uf:          (raw.uf || '').slice(0,2).toUpperCase() || null,
          cep:         (raw.cep || '').replace(/\D/g,'') || null,
          email:       raw.email || null,
          telefone:   (raw.telefone || raw.fone || '').replace(/\D/g,'') || null,
        };
      };
      return {
        valor:       Math.abs(parseFloat(String(d.valor||d.value||d.total||d.amount||d.valor_total||d.vl||0).replace(/[^\d.,\-]/g,'').replace(',','.')) || 0),
        tipo:        String(d.tipo||d.type||d.natureza||'despesa').toLowerCase().includes('receita') ? 'receita' : 'despesa',
        vencimento:  d.vencimento||d.due_date||d.data_vencimento||d.data||d.date||today(),
        descricao:   d.descricao||d.description||d.titulo||d.title||d.nome||file.name,
        beneficiario:d.beneficiario||d.beneficiary||d.emitente||d.pagador||d.cedente||'—',
        observacao:  d.observacao||d.observation||d.notes||d.detalhes||'',
        // Entidades (novo) — usadas pra cadastrar cliente/fornecedor automaticamente
        prestador:   _ent(d.prestador, d.cnpj_prestador),
        tomador:     _ent(d.tomador,   d.cnpj_tomador),
      };
    }

    // Suporta resposta com array ou objeto único
    let listaItens = [];
    if (Array.isArray(dados)) {
      listaItens = dados.map(normalizarItem);
    } else if (dados.lancamentos || dados.transacoes || dados.items || dados.itens || dados.movimentacoes || dados.movimentos || dados.entries || dados.linhas || dados.list || dados.data) {
      const arr = dados.lancamentos||dados.transacoes||dados.items||dados.itens||dados.movimentacoes||dados.movimentos||dados.entries||dados.linhas||dados.list||dados.data;
      listaItens = (Array.isArray(arr) ? arr : [arr]).map(normalizarItem);
    } else {
      listaItens = [normalizarItem(dados)];
    }

    // (Bloco de múltiplos JSONs removido — o novo parser já extrai o JSON
    //  top-level corretamente, e `dados.lancamentos/itens/items` cobre o caso
    //  de múltiplos lançamentos num único documento.)

    console.log('Itens normalizados:', listaItens.length, JSON.stringify(listaItens.slice(0,2)));
    console.log('[DIAG] Valores encontrados:', listaItens.map(x=>x.valor).join(', '));
    dadosLista = listaItens.filter(d => Math.abs(parseFloat(d.valor) || 0) > 0);
    if (!dadosLista.length) {
      // Diagnóstico melhorado: mostra o que a IA devolveu pra facilitar debug
      console.error('[PDF/IA] Nenhum lançamento com valor > 0. listaItens:', JSON.stringify(listaItens, null, 2));
      throw new Error('IA não encontrou valores válidos no documento. Veja console (F12) para detalhes.');
    }

  } catch(e) {
    console.error('PDF processing error:', e);
    adicionarFilaItem(id, file.name, 'erro', 'Erro na IA: ' + e.message, null);
    return;
  }

  // Criar lançamentos para cada item
  adicionarFilaItem(id, file.name, 'processando', `Criando ${dadosLista.length} lançamento(s)...`, null);
  let ok = 0;

  // CNPJ da empresa — usado pra escolher a contraparte correta E pra validar
  const cnpjEmpresaPDF = (APP.tenant?.cnpj||'').replace(/\D/g,'');

  // ═══ VALIDAÇÃO CNPJ (PDF/IA) ═════════════════════════════════
  // Bloqueia se a empresa ativa não tem CNPJ cadastrado
  if (!cnpjEmpresaPDF) {
    adicionarFilaItem(id, file.name, 'erro',
      `Empresa "${APP.tenant?.nome||'ativa'}" sem CNPJ cadastrado. Configure em "Empresas" antes de importar documentos fiscais.`, null);
    return;
  }

  // Coleta todos os CNPJs encontrados pela IA no documento (prestador/tomador
  // do objeto raiz e de todos os itens da lista, se houver)
  const cnpjsDoc = new Set();
  const _add = v => {
    const c = (v||'').replace(/\D/g,'');
    if (c.length === 14) cnpjsDoc.add(c);
  };
  for (const d of dadosLista) {
    _add(d?.cnpj_prestador);
    _add(d?.cnpj_tomador);
    _add(d?.prestador?.cpf_cnpj);
    _add(d?.tomador?.cpf_cnpj);
    _add(d?.prestador?.cnpj);
    _add(d?.tomador?.cnpj);
  }

  // ── Sanity check: filtra CNPJs alucinados pela IA (DV inválido OU
  //    inexistentes em fin_tenants). Quando a IA mistura nome de uma
  //    parte com CNPJ de outra, gera "fantasmas" que não existem no
  //    sistema. Ao filtrar, esses casos caem no fluxo "sem CNPJ" (modal
  //    de autorização) em vez de rejeitarem como "outra empresa".
  const cnpjsAlucinados = [];
  const cnpjsValidados = new Set();
  for (const c of cnpjsDoc) {
    const existe = await _cnpjExisteComoTenant(c);
    if (existe) cnpjsValidados.add(c);
    else        cnpjsAlucinados.push(c);
  }
  if (cnpjsAlucinados.length) {
    console.warn(`[PDF/IA] CNPJs descartados (DV inválido ou não cadastrados):`,
                 cnpjsAlucinados.map(c => _formatCNPJ(c)).join(', '));
  }

  let autorizacaoPDF = null;
  if (cnpjsValidados.size === 0) {
    // Nenhum CNPJ confiável → modal de autorização
    autorizacaoPDF = await _autorizarSemCNPJ(file.name, 'PDF/IA');
    if (!autorizacaoPDF) {
      adicionarFilaItem(id, file.name, 'erro',
        `Importação cancelada — documento sem CNPJ identificável não autorizado.`, null);
      return;
    }
  } else if (!cnpjsValidados.has(cnpjEmpresaPDF)) {
    const lista = [...cnpjsValidados].map(c => _formatCNPJ(c)).join(', ');
    adicionarFilaItem(id, file.name, 'erro',
      `Documento de outra empresa. CNPJ ativo (${_formatCNPJ(cnpjEmpresaPDF)}) não consta no documento. CNPJs encontrados: ${lista}.`, null);
    return;
  }
  // ═══════════════════════════════════════════════════════════════

  for (const dados of dadosLista) {
    const tipo      = dados.tipo;
    const descricao = dados.descricao;
    const valor     = dados.valor;
    const vencimento = dados.vencimento;

    // ── Resolver entidade (criar/atualizar cliente ou fornecedor) ──
    // Em receita: a contraparte é o TOMADOR (cliente); em despesa, é o PRESTADOR (fornecedor).
    // Se os CNPJs do doc permitirem identificar qual é a empresa, usa o oposto como contraparte.
    let contraparte = null;
    let categoriaEnt = null;
    if (tipo === 'receita') {
      // Prefere tomador; se tomador for a própria empresa, usa prestador
      if (dados.tomador && (!cnpjEmpresaPDF || dados.tomador.cpf_cnpj !== cnpjEmpresaPDF)) {
        contraparte = dados.tomador;
      } else if (dados.prestador && dados.prestador.cpf_cnpj !== cnpjEmpresaPDF) {
        contraparte = dados.prestador;
      }
      categoriaEnt = 'cliente';
    } else {
      // despesa: contraparte = prestador (emissor da nota/boleto)
      if (dados.prestador && (!cnpjEmpresaPDF || dados.prestador.cpf_cnpj !== cnpjEmpresaPDF)) {
        contraparte = dados.prestador;
      } else if (dados.tomador && dados.tomador.cpf_cnpj !== cnpjEmpresaPDF) {
        contraparte = dados.tomador;
      }
      categoriaEnt = 'fornecedor';
    }

    let entidadeResolvida = null;
    if (contraparte && contraparte.cpf_cnpj && typeof resolveEntidadeXML === 'function') {
      try {
        entidadeResolvida = await resolveEntidadeXML(contraparte, categoriaEnt, 'pdf_ia');
      } catch(e) {
        console.error('[PDF] erro resolvendo entidade:', e);
      }
    }

    const body = {
      tenant_id:  APP.tenantId,
      descricao,
      valor,
      vencimento,
      status:     'pendente',
      observacao: `${dados.observacao||''} | Beneficiário: ${dados.beneficiario||'—'} | Importado via PDF+IA${autorizacaoPDF ? ` | ⚠️ Autorizado sem CNPJ. Motivo: "${autorizacaoPDF.motivo}"` : ''}`,
    };
    if (entidadeResolvida) {
      if (categoriaEnt === 'cliente')   body.cliente_id = entidadeResolvida.id;
      else                              body.fornecedor_id = entidadeResolvida.id;
    }
    // Categorização automática: detecta tarifa, tributo, aplicação ou
    // recebimento de cobrança pela descrição e cria/reusa a categoria.
    const catAuto = _detectarCategoriaAuto(descricao, tipo);
    if (catAuto) {
      const tipoCat = catAuto.tipo === 'ambos' ? tipo : catAuto.tipo;
      const catId = await _garantirCategoria(catAuto.nome, tipoCat);
      if (catId) body.categoria_id = catId;
    }

    try {
      let refId;
      if (tipo === 'receita') {
        const r = await supa('POST', 'fin_receitas', { body, returning: true });
        refId = r[0]?.id;
      } else {
        const r = await supa('POST', 'fin_despesas', { body, returning: true });
        refId = r[0]?.id;
      }

      // Salvar PDF no storage apenas no primeiro lançamento
      if (refId && ok === 0) {
        try {
          const path = `${APP.tenantId}/${tipo}/${refId}/${Date.now()}_${file.name.replace(/[^a-zA-Z0-9._-]/g,'_')}`;
          await uploadStorage(path, file);
          await supa('POST', 'fin_anexos', { body: {
            tenant_id: APP.tenantId, tipo_ref: tipo, ref_id: refId,
            nome: file.name, tipo_arquivo: 'application/pdf',
            storage_path: path, tamanho: file.size,
          }});
        } catch(_) {}
      }
      ok++;
    } catch(e) {
      console.error('Erro ao salvar item:', e.message);
    }
  }

  adicionarFilaItem(id, file.name, ok > 0 ? 'ok' : 'erro',
    ok > 0
      ? `${ok} lançamento(s) criado(s) via PDF+IA`
      : 'Erro ao salvar os lançamentos.',
    dadosLista[0]?.tipo || null);
}

function processarArquivoExtrato(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const text = e.target.result;
    let items = [];

    // Tentar OFX
    if (file.name.toLowerCase().endsWith('.ofx') || text.includes('<OFX>') || text.includes('<STMTTRN>')) {
      items = parseOFX(text);
    } else {
      // CSV
      const linhas = text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
      for (const linha of linhas) {
        const sep = linha.includes(';') ? ';' : ',';
        const cols = linha.split(sep).map(c=>c.replace(/"/g,'').trim());
        if (cols.length < 3) continue;
        const valor = parseFloat(cols[2].replace(',','.'));
        if (isNaN(valor)) continue;
        const data = cols[0].length===10 ? cols[0] : null;
        if (!data) continue;
        items.push({ data, descricao: cols[1]||'—', valor, tipo: valor>=0?'receita':'despesa' });
      }
    }

    if (!items.length) { document.getElementById('extrato-preview').innerHTML = '<div style="color:var(--red);font-size:12px;margin-top:12px">Nenhum item encontrado. Verifique o formato do arquivo.</div>'; return; }

    _extratoPreview = items;
    const preview = document.getElementById('extrato-preview');
    const totalR = items.filter(i=>i.tipo==='receita').reduce((s,i)=>s+i.valor,0);
    const totalD = items.filter(i=>i.tipo==='despesa').reduce((s,i)=>s+Math.abs(i.valor),0);

    preview.innerHTML = `
      <div style="margin-top:14px">
        <div style="display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap">
          <span style="font-size:12px;background:var(--green-lt);color:var(--green);padding:4px 10px;border-radius:20px;font-weight:600">${items.filter(i=>i.tipo==='receita').length} entradas · ${fmtMoeda(totalR)}</span>
          <span style="font-size:12px;background:var(--red-lt);color:var(--red);padding:4px 10px;border-radius:20px;font-weight:600">${items.filter(i=>i.tipo==='despesa').length} saídas · ${fmtMoeda(totalD)}</span>
        </div>
        <div style="max-height:220px;overflow-y:auto;border:1px solid var(--border);border-radius:9px">
          <table style="width:100%;border-collapse:collapse">
            <thead><tr style="background:var(--surface-2)">
              <th style="padding:7px 12px;text-align:left;font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase">Data</th>
              <th style="padding:7px 12px;text-align:left;font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase">Descrição</th>
              <th style="padding:7px 12px;text-align:right;font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase">Valor</th>
              <th style="padding:7px 12px;text-align:center;font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase">Tipo</th>
            </tr></thead>
            <tbody>
              ${items.map(i=>`<tr style="border-bottom:1px solid var(--border)">
                <td style="padding:6px 12px;font-family:var(--mono);font-size:11px;color:var(--text-2)">${i.data}</td>
                <td style="padding:6px 12px;font-size:12px;color:var(--text);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${i.descricao}</td>
                <td style="padding:6px 12px;font-family:var(--mono);font-weight:700;text-align:right;color:${i.tipo==='receita'?'var(--green)':'var(--red)'}">${fmtMoeda(Math.abs(i.valor))}</td>
                <td style="padding:6px 12px;text-align:center"><span class="badge ${i.tipo==='receita'?'badge-green':'badge-red'}">${i.tipo==='receita'?'Receita':'Despesa'}</span></td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
        <div style="margin-top:10px;font-size:11.5px;color:var(--text-3)">Todos os lançamentos serão criados como <strong>Pendentes</strong>. Você pode editar ou excluir depois.</div>
      </div>`;
    document.getElementById('btn-importar-extrato').style.display = 'inline-flex';
  };
  reader.readAsText(file, 'UTF-8');
  input.value = '';
}

function parseOFX(text) {
  // Extrai header (banco/conta) — pode vir de <BANKACCTFROM> ou <CCACCTFROM>
  const _getHeader = (tag) => {
    const r = new RegExp('<'+tag+'>([^<\\r\\n]+)','i').exec(text);
    return r ? r[1].trim() : '';
  };
  const header = {
    bankid: _getHeader('BANKID'),         // Código do banco (ex: 001 = BB, 341 = Itaú)
    branchid: _getHeader('BRANCHID'),     // Agência
    acctid:   _getHeader('ACCTID'),       // Conta
    org:      _getHeader('ORG'),          // Organização (banco)
    fid:      _getHeader('FID'),          // Identificador da instituição
  };

  const items = [];
  const regex = /<STMTTRN>([\s\S]*?)<\/STMTTRN>/g;
  let m;
  while ((m = regex.exec(text)) !== null) {
    const bloco = m[1];
    const getTag = (tag) => { const r = new RegExp('<'+tag+'>([^<\\r\\n]+)','i').exec(bloco); return r?r[1].trim():''; };
    const dtpost = getTag('DTPOSTED');
    const trnamt = getTag('TRNAMT');
    const memo   = getTag('MEMO') || getTag('NAME') || '—';
    if (!dtpost || !trnamt) continue;
    // Converter data OFX (YYYYMMDD) para ISO
    const data = dtpost.length>=8 ? `${dtpost.slice(0,4)}-${dtpost.slice(4,6)}-${dtpost.slice(6,8)}` : null;
    if (!data) continue;
    const valor = parseFloat(trnamt.replace(',','.'));
    if (isNaN(valor)) continue;
    items.push({ data, descricao: memo, valor, tipo: valor>=0?'receita':'despesa' });
  }
  // Anexa header como propriedade não-enumerável (pra não quebrar quem itera)
  Object.defineProperty(items, 'header', { value: header, enumerable: false });
  return items;
}

// ═══════════════════════════════════════════════════════════════
// VALIDAÇÃO DO EXTRATO contra empresa ativa
// ═══════════════════════════════════════════════════════════════
// Tenta confirmar que o extrato pertence à empresa ativa por:
// 1. Banco + agência + conta batem com fin_contas da empresa
// 2. Se não bater, tenta nome (ORG/FID) bate com nome da empresa
// Retorna: { ok, motivo, contexto }
function _validarExtratoContraEmpresa(header, primeirasMemos) {
  const tenantNome = (APP.tenant?.nome || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const ehEmpresaAtual = (s) => {
    if (!s) return false;
    const norm = String(s).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    return tenantNome && (norm.includes(tenantNome) || tenantNome.includes(norm));
  };

  // ── Validação 1: banco/conta em fin_contas
  if (header && (header.bankid || header.acctid)) {
    const acctClean = (header.acctid||'').replace(/\D/g,'');
    const branchClean = (header.branchid||'').replace(/\D/g,'');
    const achouConta = (CONTAS||[]).find(c => {
      const cBanco = (c.banco||'').replace(/\D/g,'');
      const cConta = (c.conta||'').replace(/\D/g,'');
      const cAg    = (c.agencia||'').replace(/\D/g,'');
      const matchBanco = !header.bankid || cBanco === header.bankid || (c.banco||'').includes(header.bankid);
      const matchConta = acctClean && cConta === acctClean;
      const matchAg    = !branchClean || cAg === branchClean;
      return matchConta && matchBanco && matchAg;
    });
    if (achouConta) {
      return {
        ok: true,
        motivo: `Conta ${achouConta.nome} encontrada no cadastro da empresa.`,
        contexto: { contaId: achouConta.id, nomeConta: achouConta.nome }
      };
    }
  }

  // ── Validação 2: ORG/FID bate com nome da empresa
  if (header && (ehEmpresaAtual(header.org) || ehEmpresaAtual(header.fid))) {
    return {
      ok: true,
      motivo: `Identificação do banco coincide com o nome da empresa.`,
      contexto: { fonte: 'org_fid' }
    };
  }

  // ── Não bateu — divergência
  return {
    ok: false,
    motivo: 'Extrato não pôde ser associado à empresa ativa por banco/conta nem por nome.',
    contexto: {
      banco_arquivo:    header?.bankid || header?.org || '—',
      conta_arquivo:    header?.acctid || '—',
      agencia_arquivo:  header?.branchid || '—',
      empresa_ativa:    APP.tenant?.nome || '—',
      cnpj_empresa:     APP.tenant?.cnpj || '—',
    }
  };
}

async function confirmarImportacaoExtrato() {
  if (!_extratoPreview.length) return;
  const btn = document.getElementById('btn-importar-extrato');
  btn.disabled = true; btn.textContent = 'Importando...';
  let ok = 0, err = 0;
  for (const item of _extratoPreview) {
    try {
      const body = {
        tenant_id:  APP.tenantId,
        descricao:  item.descricao,
        valor:      Math.abs(item.valor),
        vencimento: item.data,
        status:     'pendente',
        observacao: 'Importado do extrato bancário',
      };
      if (item.tipo==='receita') await supa('POST', 'fin_receitas', { body });
      else                       await supa('POST', 'fin_despesas', { body });
      ok++;
    } catch(_) { err++; }
  }
  closeModal();
  await Promise.all([
    recarregarApenas('fin_receitas'),
    recarregarApenas('fin_despesas'),
  ]);
  toast(`${ok} lançamento(s) importado(s)${err?' · '+err+' erro(s)':''}!`, ok>0?'success':'error');
  _extratoPreview = [];
}

let _nfeData = null;

function processarXMLNFe(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const parser = new DOMParser();
      const doc    = parser.parseFromString(e.target.result, 'text/xml');
      const get    = (tag) => doc.getElementsByTagName(tag)[0]?.textContent?.trim() || '';

      const nNF    = get('nNF');
      const dhEmi  = get('dhEmi') || get('dEmi');
      const data   = dhEmi ? dhEmi.slice(0,10) : today();
      const vNF    = get('vNF');
      const xNome  = get('xNome'); // emitente
      const CNPJ   = get('CNPJ');
      const xMun   = get('xMun');
      const desc   = `NF-e nº ${nNF} — ${xNome}`;

      if (!vNF) { document.getElementById('nfe-preview').innerHTML = '<div style="color:var(--red);font-size:12px;margin-top:12px">XML inválido ou não é uma NF-e padrão SEFAZ.</div>'; return; }

      // ═══ VALIDAÇÃO CNPJ ═══════════════════════════════════════
      const cnpjEmpresa = (APP.tenant?.cnpj||'').replace(/\D/g,'');
      const cnpjEmit    = (CNPJ||'').replace(/\D/g,'');
      const cnpjDest    = (get('CNPJ') ? '' : get('CPF')) || '';
      // Pega CNPJ do destinatário (segundo bloco "dest")
      const allCNPJs    = [...doc.getElementsByTagName('CNPJ')].map(el => el.textContent.trim());
      const cnpjDestino = allCNPJs[1] || ''; // primeiro é emit, segundo é dest

      if (!cnpjEmpresa) {
        document.getElementById('nfe-preview').innerHTML = `<div style="color:var(--red);font-size:12px;margin-top:12px;background:var(--red-lt);padding:10px;border-radius:8px;border:1px solid var(--red)">⚠️ Empresa "${APP.tenant?.nome||'ativa'}" sem CNPJ cadastrado. Configure em "Empresas" antes de importar.</div>`;
        return;
      }
      if (cnpjEmit && cnpjDestino && cnpjEmpresa !== cnpjEmit && cnpjEmpresa !== cnpjDestino) {
        document.getElementById('nfe-preview').innerHTML = `<div style="color:var(--red);font-size:12px;margin-top:12px;background:var(--red-lt);padding:10px;border-radius:8px;border:1px solid var(--red)">⚠️ <strong>Documento de outra empresa.</strong><br>CNPJ ativo: ${_formatCNPJ(cnpjEmpresa)}<br>Emitente: ${_formatCNPJ(cnpjEmit)||'—'}<br>Destinatário: ${_formatCNPJ(cnpjDestino)||'—'}</div>`;
        return;
      }
      // ═══════════════════════════════════════════════════════════

      _nfeData = { desc, valor: parseFloat(vNF), data, nNF, xNome, CNPJ, xMun };

      document.getElementById('nfe-preview').innerHTML = `
        <div style="margin-top:14px;background:var(--surface-2);border-radius:9px;padding:14px;border:1px solid var(--border)">
          <div style="font-size:12px;font-weight:700;color:var(--text);margin-bottom:10px">Dados extraídos da NF-e</div>
          ${[
            ['Número', nNF],
            ['Data de emissão', fmtData(data)],
            ['Emitente', xNome],
            ['CNPJ emitente', CNPJ],
            ['Município', xMun],
            ['Valor total', fmtMoeda(parseFloat(vNF))],
          ].map(([l,v])=>`
            <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)">
              <span style="font-size:11.5px;color:var(--text-3)">${l}</span>
              <strong style="font-size:12px;color:var(--text)">${v||'—'}</strong>
            </div>`).join('')}
          <div style="margin-top:12px">
            <label class="form-label">Categoria (opcional)</label>
            <select class="form-select" id="nfe-cat" style="margin-top:4px">
              <option value="">— Nenhuma —</option>
              ${CATEGORIAS.filter(c=>c.tipo==='receita'||c.tipo==='ambos').map(c=>`<option value="${c.id}">${c.icone||''} ${c.nome}</option>`).join('')}
            </select>
          </div>
          <div style="margin-top:10px">
            <label class="form-label">Cliente (opcional)</label>
            <select class="form-select" id="nfe-cli" style="margin-top:4px">
              <option value="">— Nenhum —</option>
              ${CLIENTES.map(c=>`<option value="${c.id}">${c.nome}</option>`).join('')}
            </select>
          </div>
        </div>`;
      document.getElementById('btn-importar-nfe').style.display = 'inline-flex';
    } catch(err) {
      document.getElementById('nfe-preview').innerHTML = `<div style="color:var(--red);font-size:12px;margin-top:12px">Erro ao processar XML: ${err.message}</div>`;
    }
  };
  reader.readAsText(file, 'UTF-8');
  input.value = '';
}

async function confirmarImportacaoNFe() {
  if (!_nfeData) return;
  const btn = document.getElementById('btn-importar-nfe');

  try {
    await supa('POST', 'fin_receitas', { body: {

}

async function importarPlanoFinanceiro(input) {
  const file = input.files[0]; if (!file) return;
  const text = await file.text();
  const linhas = text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
  let ok=0, skip=0, err=0;

  const resultado = $id('plano-resultado');
  if (resultado) resultado.innerHTML = '<div style="color:var(--text-3);font-size:12px">Importando...</div>';

  for (const linha of linhas) {
    const sep  = linha.includes(';') ? ';' : ',';
    const cols = linha.split(sep).map(c=>c.replace(/"/g,'').trim());
    if (cols.length < 2) continue;
    const [nome, tipo, cor] = cols;
    if (!nome || !tipo) continue;
    const tipoNorm = tipo.toLowerCase().includes('rec') ? 'receita' : 'despesa';

    // Verificar duplicado
    const existe = CATEGORIAS.find(c => c.nome.toLowerCase() === nome.toLowerCase());
    if (existe) { skip++; continue; }

    try {
      await supa('POST', 'fin_categorias', { body: {
        tenant_id: APP.tenantId,
        nome, tipo: tipoNorm,
        cor: cor || (tipoNorm==='receita'?'#1e8449':'#c0392b'),
        icone: tipoNorm==='receita'?'💰':'💸',
      }});
      ok++;
    } catch(_) { err++; }
  }

  await recarregarApenas('fin_categorias');
  const msg = `${ok} categoria(s) importada(s) · ${skip} já existia(m) · ${err} erro(s)`;
  if (resultado) resultado.innerHTML = `<div style="background:var(--green-lt);border:1px solid var(--green);border-radius:9px;padding:12px 16px;font-size:12.5px;color:var(--green);font-weight:600">${msg}</div>`;
  toast(msg, ok>0?'success':'warn');
  input.value='';
}

async function importarPlanoContabil(input) {
  const file = input.files[0]; if (!file) return;
  const text = await file.text();
  const linhas = text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
  let ok=0, skip=0, err=0;

  const resultado = $id('plano-resultado');
  if (resultado) resultado.innerHTML = '<div style="color:var(--text-3);font-size:12px">Importando...</div>';

  // Salvar no localStorage por enquanto (tabela contábil separada é futura)
  const planoAtual = JSON.parse(localStorage.getItem(`plano_contabil_${APP.tenantId}`)||'[]');
  const novos = [];

  for (const linha of linhas) {
    const sep  = linha.includes(';') ? ';' : ',';
    const cols = linha.split(sep).map(c=>c.replace(/"/g,'').trim());
    if (cols.length < 2) continue;
    const [codigo, nome, tipo, natureza] = cols;
    if (!codigo || !nome) continue;
    const existe = planoAtual.find(c=>c.codigo===codigo);
    if (existe) { skip++; continue; }
    novos.push({ codigo, nome, tipo: tipo||'', natureza: natureza||'devedora' });
    ok++;
  }

  const planoFinal = [...planoAtual, ...novos];
  localStorage.setItem(`plano_contabil_${APP.tenantId}`, JSON.stringify(planoFinal));

  const msg = `${ok} conta(s) importada(s) · ${skip} já existia(m)`;
  if (resultado) resultado.innerHTML = `<div style="background:var(--green-lt);border:1px solid var(--green);border-radius:9px;padding:12px 16px;font-size:12.5px;color:var(--green);font-weight:600">${msg}<br><span style="font-size:11px;font-weight:400">Total no plano: ${planoFinal.length} contas</span></div>`;
  toast(msg, ok>0?'success':'warn');
  input.value='';
}

// ── CLIENTES A RECEBER ────────────────────────────────────────
function renderClientesAReceber() {
  $id('topbar-actions').innerHTML = '';
  const hoje = today();

  // Agrupar receitas pendentes por cliente
  const recPend = RECEITAS.filter(r => r.status === 'pendente');
  const porCliente = {};

  recPend.forEach(r => {
    const cliId  = r.cliente_id || '__sem_cliente__';
    const cliNome = r.cliente_id ? getNome(CLIENTES, r.cliente_id) : 'Sem cliente';
    if (!porCliente[cliId]) porCliente[cliId] = { nome: cliNome, total: 0, vencidas: 0, aVencer: 0, itens: [] };
    const valor = parseFloat(r.valor)||0;
    porCliente[cliId].total += valor;
    porCliente[cliId].itens.push(r);
    if (r.vencimento < hoje) porCliente[cliId].vencidas += valor;
    else porCliente[cliId].aVencer += valor;
  });

  const lista = Object.values(porCliente).sort((a,b)=>b.total-a.total);
  const totalGeral   = lista.reduce((s,c)=>s+c.total,0);
  const totalVencido = lista.reduce((s,c)=>s+c.vencidas,0);

  $id('page-content').innerHTML = `
  <div style="display:flex;flex-direction:column;gap:16px">

  <div class="kpi-grid" style="grid-template-columns:repeat(4,1fr)">
    <div class="kpi-card k-gold"><div class="kpi-label">Total a Receber</div><div class="kpi-value" style="color:var(--gold)">${fmtMoeda(totalGeral)}</div><div class="kpi-sub">${recPend.length} título(s)</div></div>
    <div class="kpi-card k-red"><div class="kpi-label">Vencidos</div><div class="kpi-value" style="color:var(--red)">${fmtMoeda(totalVencido)}</div><div class="kpi-sub">${recPend.filter(r=>r.vencimento<hoje).length} título(s)</div></div>
    <div class="kpi-card k-green"><div class="kpi-label">A Vencer</div><div class="kpi-value" style="color:var(--green)">${fmtMoeda(totalGeral-totalVencido)}</div></div>
    <div class="kpi-card"><div class="kpi-label">Clientes c/ pendência</div><div class="kpi-value">${lista.length}</div></div>
  </div>

  ${lista.length===0
    ? `<div class="empty-state"><div class="empty-icon">✅</div><h3>Nenhum título a receber</h3></div>`
    : `<div class="card" style="padding:0;overflow:hidden">
        <table>
          <thead><tr>
            <th>Cliente</th>
            <th style="text-align:right">Total</th>
            <th style="text-align:right">Vencido</th>
            <th style="text-align:right">A Vencer</th>
            <th style="text-align:center">Títulos</th>
            <th>Próx. Venc.</th>
          </tr></thead>
          <tbody>
            ${lista.map(c => {
              const proxVenc = c.itens.filter(r=>r.vencimento>=hoje).sort((a,b)=>a.vencimento.localeCompare(b.vencimento))[0];
              return `<tr style="${c.vencidas>0?'background:rgba(192,57,43,.03)':''}">
                <td style="font-weight:600;color:var(--text)">${c.nome}</td>
                <td style="text-align:right;font-family:var(--mono);font-weight:700;color:var(--gold)">${fmtMoeda(c.total)}</td>
                <td style="text-align:right;font-family:var(--mono);font-weight:700;color:${c.vencidas>0?'var(--red)':'var(--text-3)'}">${c.vencidas>0?fmtMoeda(c.vencidas):'—'}</td>
                <td style="text-align:right;font-family:var(--mono);color:var(--green)">${c.aVencer>0?fmtMoeda(c.aVencer):'—'}</td>
                <td style="text-align:center;color:var(--text-2)">${c.itens.length}</td>
                <td style="font-family:var(--mono);font-size:11px;color:var(--text-3)">${proxVenc?fmtData(proxVenc.vencimento):'—'}</td>
              </tr>`;
            }).join('')}

        </table>
      </div>`}
  </div>`;
}

// ── PDF: DRE ──────────────────────────────────────────────────
function gerarPdfDRE() {
  const periodoSel = window._drePeriodo || 'mes';
  const modoSel    = window._dreModo    || 'categoria';
  const hoje  = new Date();
  const ano   = hoje.getFullYear();
  const mes   = String(hoje.getMonth()+1).padStart(2,'0');
  const mesStr = `${ano}-${mes}`;

  function filtrar(arr) {
    return arr.filter(l => {
      const m = l.vencimento?.slice(0,7);
      if (periodoSel==='mes') return m===mesStr;
      if (periodoSel==='ano') return m?.startsWith(String(ano));
      return true;
    });
  }

  const recFilt  = filtrar(RECEITAS).filter(r=>r.status==='recebido');
  const despFilt = filtrar(DESPESAS).filter(d=>d.status==='pago');

  const contasFin = (typeof PLANOS_STATE !== 'undefined' && PLANOS_STATE?.financeiro?.contas) || [];
  const contaFinById = new Map(contasFin.map(c => [c.id, c]));
  function chaveGrupo(lancamento) {
    if (modoSel === 'categoria') {
      return getNome(CATEGORIAS, lancamento.categoria_id) || '(sem categoria)';
    }
    const cat = CATEGORIAS.find(c => c.id === lancamento.categoria_id);
    if (!cat?.conta_financeira_id) return '(sem vínculo)';
    const cf = contaFinById.get(cat.conta_financeira_id);
    return cf ? `${cf.codigo} · ${cf.descricao}` : '(sem vínculo)';
  }

  const catRec={}, catDesp={};
  recFilt.forEach(r  => { const c=chaveGrupo(r); catRec[c]  =(catRec[c]||0) +(parseFloat(r.valor)||0); });
  despFilt.forEach(d => { const c=chaveGrupo(d); catDesp[c] =(catDesp[c]||0)+(parseFloat(d.valor)||0); });

  const totalRec  = Object.values(catRec).reduce((s,v)=>s+v,0);
  const totalDesp = Object.values(catDesp).reduce((s,v)=>s+v,0);
  const resultado = totalRec - totalDesp;
  const margem    = totalRec>0 ? Math.round((resultado/totalRec)*100) : 0;

  const periodoLabel = periodoSel==='mes' ? `${mes}/${ano}` : periodoSel==='ano' ? `Ano ${ano}` : 'Todo o período';
  const modoLabel    = modoSel === 'categoria' ? 'Categoria' : 'Plano Financeiro';
  const subtitulo    = `${periodoLabel} · Valores realizados · Agrupado por ${modoLabel}`;

  const html = `
    ${pdfHeader('Demonstrativo de Resultado (DRE)', periodoLabel)}
    <div class="rpt-title">Demonstrativo de Resultado</div>
    <div class="rpt-period">${subtitulo}</div>

    <div class="kpi-row" style="grid-template-columns:1fr 1fr 1fr 1fr">
      <div class="kpi-cell"><div class="lbl">Receitas</div><div class="val" style="color:#16804a">${fmtMoeda(totalRec)}</div></div>
      <div class="kpi-cell"><div class="lbl">Despesas</div><div class="val" style="color:#c0392b">${fmtMoeda(totalDesp)}</div></div>
      <div class="kpi-cell"><div class="lbl">Resultado</div><div class="val" style="color:${resultado>=0?'#16804a':'#c0392b'}">${fmtMoeda(resultado)}</div></div>
      <div class="kpi-cell"><div class="lbl">Margem</div><div class="val" style="color:${margem>=0?'#16804a':'#c0392b'}">${margem}%</div></div>
    </div>

    <div class="section-title">Receitas por ${modoLabel}</div>
    <table>
      <thead><tr><th>${modoLabel}</th><th style="text-align:right">Valor</th><th style="text-align:right">% da Receita</th></tr></thead>
      <tbody>
        ${Object.entries(catRec).sort((a,b)=>b[1]-a[1]).map(([c,v])=>`
          <tr class="sub-row"><td>${c}</td><td style="text-align:right;font-family:'DM Mono';color:#16804a">${fmtMoeda(v)}</td><td style="text-align:right;color:#888">${Math.round(v/totalRec*100)}%</td></tr>
        `).join('')}
        <tr class="total-row highlight-green"><td>Total Receitas</td><td style="text-align:right;font-family:'DM Mono'">${fmtMoeda(totalRec)}</td><td style="text-align:right">100%</td></tr>
      </tbody>
    </table>

    <div class="section-title">Despesas por ${modoLabel}</div>
    <table>
      <thead><tr><th>${modoLabel}</th><th style="text-align:right">Valor</th><th style="text-align:right">% da Receita</th></tr></thead>
      <tbody>
        ${Object.entries(catDesp).sort((a,b)=>b[1]-a[1]).map(([c,v])=>`
          <tr class="sub-row"><td>${c}</td><td style="text-align:right;font-family:'DM Mono';color:#c0392b">${fmtMoeda(v)}</td><td style="text-align:right;color:#888">${totalRec>0?Math.round(v/totalRec*100):0}%</td></tr>
        `).join('')}
        <tr class="total-row highlight-red"><td>Total Despesas</td><td style="text-align:right;font-family:'DM Mono'">${fmtMoeda(totalDesp)}</td><td style="text-align:right">${totalRec>0?Math.round(totalDesp/totalRec*100):0}%</td></tr>
      </tbody>
    </table>

    <div class="section-title">Resumo Final</div>
    <table>
      <tbody>
        <tr class="total-row ${resultado>=0?'highlight-green':'highlight-red'}">
          <td>${resultado>=0?'Lucro Líquido':'Prejuízo Líquido'}</td>
          <td style="text-align:right;font-family:'DM Mono';font-size:14px">${fmtMoeda(resultado)}</td>
          <td style="text-align:right">${margem}% sobre receitas</td>
        </tr>
      </tbody>
    </table>`;

  abrirPDF(`DRE · ${periodoLabel}`, html);
}

// ── PDF: FLUXO DE CAIXA ───────────────────────────────────────
function gerarPdfFluxo() {
  const periodoSel = window._fluxoPeriodo || '6m';
  const hoje   = new Date();
  const ano    = hoje.getFullYear();
  const mesAtual = String(hoje.getMonth()+1).padStart(2,'0');
  const meses  = {};

  const filtrar = (l, tipo) => {
    const m = l.vencimento?.slice(0,7); if (!m) return;
    if (periodoSel==='ano' && !m.startsWith(String(ano))) return;
    if (periodoSel==='6m') {
      const lim = new Date(); lim.setMonth(lim.getMonth()-5);
      const limStr = lim.getFullYear()+'-'+String(lim.getMonth()+1).padStart(2,'0');
      if (m<limStr) return;
    }
    if (!meses[m]) meses[m]={rec:0,desp:0,recReal:0,despReal:0};
    if (tipo==='rec') { meses[m].rec+=parseFloat(l.valor)||0; if(l.status==='recebido') meses[m].recReal+=parseFloat(l.valor)||0; }
    else              { meses[m].desp+=parseFloat(l.valor)||0; if(l.status==='pago')     meses[m].despReal+=parseFloat(l.valor)||0; }
  };
  RECEITAS.forEach(r=>filtrar(r,'rec'));
  DESPESAS.forEach(d=>filtrar(d,'desp'));

  const lista      = Object.keys(meses).sort();
  const totalRec   = lista.reduce((s,m)=>s+meses[m].rec,0);
  const totalDesp  = lista.reduce((s,m)=>s+meses[m].desp,0);
  const totalRes   = totalRec - totalDesp;
  const periodoLabel = periodoSel==='6m' ? 'Últimos 6 meses' : periodoSel==='ano' ? `Ano ${ano}` : 'Todo o período';

  const html = `
    ${pdfHeader('Fluxo de Caixa', periodoLabel)}
    <div class="rpt-title">Fluxo de Caixa</div>
    <div class="rpt-period">${periodoLabel}</div>

function gerarPdfMetas() {
  const ativas = METAS.filter(m=>m.ativo!==false);
  const hoje   = today();

  const html = `
    ${pdfHeader('Relatório de Metas Financeiras', hoje)}
    <div class="rpt-title">Metas Financeiras</div>
    <div class="rpt-period">Posição em ${new Date().toLocaleDateString('pt-BR')}</div>

    <div class="kpi-row" style="grid-template-columns:1fr 1fr 1fr 1fr">
      ${[
        {l:'Total de Metas', v:ativas.length+'', s:'ativas'},
        {l:'Atingidas',  v:ativas.filter(m=>calcularProgressoMeta(m)>=parseFloat(m.valor_alvo)).length+'', s:''},
        {l:'Em Progresso', v:ativas.filter(m=>{ const p=calcularProgressoMeta(m)/parseFloat(m.valor_alvo)*100; return p>=10&&p<100; }).length+'', s:''},
        {l:'Em Risco', v:ativas.filter(m=>{ const p=calcularProgressoMeta(m)/parseFloat(m.valor_alvo)*100; return p<40&&m.prazo&&m.prazo>hoje; }).length+'', s:''},
      ].map(k=>`<div class="kpi-cell"><div class="lbl">${k.l}</div><div class="val">${k.v}</div><div class="sub">${k.s}</div></div>`).join('')}
    </div>

    <div class="section-title">Progresso das Metas</div>

    ${ativas.length===0
      ? `<p style="color:#aaa;font-size:11px;text-align:center;padding:20px">Nenhuma meta cadastrada</p>`
      : ativas.map(m=>{
          const atual = calcularProgressoMeta(m);
          const alvo  = parseFloat(m.valor_alvo);
          const pct   = Math.min(100, alvo>0 ? Math.round((atual/alvo)*100) : 0);
          const st    = statusMeta(m, atual);
          const diasR = m.prazo ? Math.ceil((new Date(m.prazo+' 12:00:00')-new Date())/86400000) : null;
          const corHex = m.cor || '#c9a84c';
          return `
          <div class="prog-wrap" style="background:#fafaf8;border:1px solid #e8e6e0;border-radius:8px;padding:14px;margin-bottom:10px;border-left:3px solid ${corHex}">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
              <div>
                <div style="font-size:12px;font-weight:700;color:#1a1a1a">${m.nome}</div>
                <div style="font-size:9.5px;color:#888;margin-top:1px">${TIPO_META_LABEL[m.tipo]||m.tipo}</div>
              </div>
              <span style="font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;background:${pct>=100?'#dcfce7':pct>=75?'#fef3c7':pct>=40?'#fff7ed':'#fef2f2'};color:${pct>=100?'#16804a':pct>=75?'#92400e':pct>=40?'#c2410c':'#991b1b'}">${st.label}</span>
            </div>
            <div class="prog-bar" style="margin-bottom:6px"><div class="prog-fill" style="width:${pct}%;background:${corHex}"></div></div>
            <div style="display:flex;justify-content:space-between;font-family:'DM Mono';font-size:10px">
              <span style="color:${corHex};font-weight:700">${pct}% · ${fmtMoeda(atual)}</span>
              <span style="color:#888">Alvo: ${fmtMoeda(alvo)}${diasR!==null?' · '+Math.abs(diasR)+(diasR>0?' dias restantes':' dias atrás'):''}${m.prazo?' · Prazo: '+fmtData(m.prazo):''}</span>
            </div>
          </div>`;
        }).join('')}`;

  abrirPDF('Metas Financeiras', html);
}

// ── v34 · PDF: CLIENTES A RECEBER ─────────────────────────────
// Agrupa receitas em aberto (pendente/vencido) por cliente e gera
// um relatório de cobrança com totais a vencer e vencidos.
//   modo='todos'    → todas as pendentes
//   modo='vencidos' → só as já vencidas
function gerarPdfClientesReceber(modo) {
  modo = modo || 'todos';
  const hoje = today();

  // Filtra receitas em aberto
  let abertas = (RECEITAS||[]).filter(r => r.status === 'pendente' || r.status === 'vencido');
  if (modo === 'vencidos') abertas = abertas.filter(r => r.vencimento < hoje);
  if (abertas.length === 0) {
    toast(modo==='vencidos' ? 'Sem títulos vencidos.' : 'Sem títulos em aberto.', 'info');
    return;
  }

  // Agrupa por cliente_id (null vira "Sem cliente")
  const grupos = {};
  abertas.forEach(r => {
    const k = r.cliente_id || '__SEM__';
    if (!grupos[k]) {
      const c = (CLIENTES||[]).find(x => x.id === r.cliente_id) || {};
      grupos[k] = {
        nome:      c.nome      || 'Sem cliente',
        documento: c.documento || c.cpf_cnpj || '',
        telefone:  c.telefone  || c.fone     || '',
        email:     c.email     || '',
        itens:     [],
      };
    }
    grupos[k].itens.push(r);
  });

  // Calcula totais e ordena
  const lista = Object.values(grupos).map(g => {
    g.itens.sort((a,b) => (a.vencimento||'').localeCompare(b.vencimento||''));
    g.totalAberto = g.itens.reduce((s,r)=>s+(parseFloat(r.valor)||0),0);
    g.totalVencido = g.itens.filter(r=>r.vencimento<hoje).reduce((s,r)=>s+(parseFloat(r.valor)||0),0);
    g.totalAVencer = g.totalAberto - g.totalVencido;
    g.qtdVencida   = g.itens.filter(r=>r.vencimento<hoje).length;
    return g;
  }).sort((a,b) => b.totalAberto - a.totalAberto);

  // Totais gerais
  const totalGeralAberto  = lista.reduce((s,g)=>s+g.totalAberto, 0);
  const totalGeralVencido = lista.reduce((s,g)=>s+g.totalVencido, 0);
  const totalGeralAVencer = totalGeralAberto - totalGeralVencido;
  const qtdTitulos = abertas.length;
  const qtdClientes = lista.length;

  // Função: dias em atraso
  const diasAtraso = (venc) => {
    if (!venc || venc >= hoje) return 0;
    const d1 = new Date(venc + 'T12:00:00');
    const d2 = new Date(hoje + 'T12:00:00');
    return Math.round((d2 - d1) / 86400000);
  };

  const subtitulo = modo === 'vencidos' ? 'Apenas títulos vencidos' : 'Todos os títulos em aberto';

  const html = `
    ${pdfHeader('Clientes a Receber', subtitulo)}
    <div class="rpt-title">Posição de Recebíveis por Cliente</div>
    <div class="rpt-period">Posição em ${fmtData(hoje)}</div>

    <div class="kpi-row" style="grid-template-columns:1fr 1fr 1fr 1fr">
      <div class="kpi-cell"><div class="lbl">Total em aberto</div><div class="val" style="color:#16804a">${fmtMoeda(totalGeralAberto)}</div><div class="sub">${qtdTitulos} título(s)</div></div>
      <div class="kpi-cell"><div class="lbl">A vencer</div><div class="val" style="color:#1a5276">${fmtMoeda(totalGeralAVencer)}</div></div>
      <div class="kpi-cell"><div class="lbl">Vencidos</div><div class="val" style="color:#c0392b">${fmtMoeda(totalGeralVencido)}</div></div>
      <div class="kpi-cell"><div class="lbl">Clientes</div><div class="val">${qtdClientes}</div></div>
    </div>

    <div class="section-title">Resumo por Cliente</div>
    <table>
      <thead><tr>
        <th>Cliente</th>
        <th style="text-align:center">Títulos</th>
        <th style="text-align:right">A vencer</th>
        <th style="text-align:right">Vencido</th>
        <th style="text-align:right">Total em aberto</th>
      </tr></thead>
      <tbody>
        ${lista.map(g => `<tr>
          <td style="font-weight:600">${escapeHtml(g.nome)}${g.documento?`<div style="font-size:9px;color:#888;font-weight:400">${escapeHtml(g.documento)}</div>`:''}</td>
          <td style="text-align:center;font-family:'DM Mono'">${g.itens.length}${g.qtdVencida>0?` <span style="color:#c0392b">(${g.qtdVencida}v)</span>`:''}</td>
          <td style="text-align:right;font-family:'DM Mono';color:#1a5276">${fmtMoeda(g.totalAVencer)}</td>
          <td style="text-align:right;font-family:'DM Mono';color:${g.totalVencido>0?'#c0392b':'#aaa'};font-weight:${g.totalVencido>0?700:400}">${fmtMoeda(g.totalVencido)}</td>
          <td style="text-align:right;font-family:'DM Mono';font-weight:700;color:#16804a">${fmtMoeda(g.totalAberto)}</td>
        </tr>`).join('')}
        <tr class="total-row highlight-green">
          <td>Totais</td>
          <td style="text-align:center;font-family:'DM Mono'">${qtdTitulos}</td>
          <td style="text-align:right;font-family:'DM Mono'">${fmtMoeda(totalGeralAVencer)}</td>
          <td style="text-align:right;font-family:'DM Mono';color:#c0392b">${fmtMoeda(totalGeralVencido)}</td>
          <td style="text-align:right;font-family:'DM Mono'">${fmtMoeda(totalGeralAberto)}</td>
        </tr>
      </tbody>
    </table>

    <div class="section-title">Detalhamento</div>
    ${lista.map(g => `
      <div style="margin:18px 0 6px 0;padding:8px 12px;background:#f4f6f9;border-left:3px solid #1a5276">
        <div style="font-size:11.5px;font-weight:700;color:#1a2332">${escapeHtml(g.nome)}</div>
        ${g.documento || g.telefone || g.email ? `<div style="font-size:9px;color:#666;margin-top:2px">
          ${g.documento?`Doc: ${escapeHtml(g.documento)}`:''}${g.documento && (g.telefone||g.email)?' · ':''}
          ${g.telefone?`Tel: ${escapeHtml(g.telefone)}`:''}${g.telefone && g.email?' · ':''}
          ${g.email?escapeHtml(g.email):''}
        </div>`:''}
      </div>
      <table>
        <thead><tr>
          <th>Descrição</th>
          <th style="text-align:right">Vencimento</th>
          <th style="text-align:center">Atraso</th>
          <th style="text-align:right">Valor</th>
          <th>Categoria</th>
        </tr></thead>
        <tbody>
          ${g.itens.map(r => {
            const atraso = diasAtraso(r.vencimento);
            return `<tr>
              <td style="font-weight:500">${escapeHtml(r.descricao||'')}</td>
              <td style="text-align:right;font-family:'DM Mono';font-size:10px;color:${atraso>0?'#c0392b':'#1a2332'};font-weight:${atraso>0?700:400}">${fmtData(r.vencimento)}</td>
              <td style="text-align:center;font-size:9.5px;color:${atraso>0?'#c0392b':'#aaa'};font-weight:${atraso>0?700:400}">${atraso>0?atraso+' dia(s)':'—'}</td>
              <td style="text-align:right;font-family:'DM Mono';font-weight:700;color:${atraso>0?'#c0392b':'#16804a'}">${fmtMoeda(r.valor)}</td>
              <td style="font-size:9.5px;color:#888">${escapeHtml(getNome(CATEGORIAS, r.categoria_id))}</td>
            </tr>`;
          }).join('')}
          <tr class="total-row">
            <td colspan="3">Total ${escapeHtml(g.nome)}</td>
            <td style="text-align:right;font-family:'DM Mono';font-weight:700">${fmtMoeda(g.totalAberto)}</td>
            <td></td>
          </tr>
        </tbody>
      </table>
    `).join('')}`;

  abrirPDF(`Clientes a Receber · ${fmtData(hoje)}`, html);
}

// ── NOTIFICAÇÕES ──────────────────────────────────────────────
const NOTIF_KEY = () => `artecon_notif_${APP.tenantId||'guest'}`;

function gerarNotificacoes() {
  if (!APP.user) return [];
  const hoje  = today();
  const em3   = new Date(); em3.setDate(em3.getDate()+3);
  const em3s  = em3.toISOString().slice(0,10);
  const notifs = [];

  // Vencidos
  (RECEITAS||[]).filter(r=>r.status==='pendente'&&r.vencimento<hoje).forEach(r=>
    notifs.push({ id:`rv_${r.id}`, tipo:'red', ico:'📥', txt:`Receita vencida: ${r.descricao}`, valor:fmtMoeda(r.valor), data:r.vencimento, acao:"go('lancamentos')" }));
  (DESPESAS||[]).filter(d=>d.status==='pendente'&&d.vencimento<hoje).forEach(d=>
    notifs.push({ id:`dv_${d.id}`, tipo:'red', ico:'📤', txt:`Despesa vencida: ${d.descricao}`, valor:fmtMoeda(d.valor), data:d.vencimento, acao:"go('lancamentos')" }));
  (IMPOSTOS||[]).filter(i=>i.status==='pendente'&&i.vencimento<hoje).forEach(i=>
    notifs.push({ id:`iv_${i.id}`, tipo:'red', ico:'📋', txt:`Imposto vencido: ${i.tipo}`, valor:fmtMoeda(i.valor), data:i.vencimento, acao:"go('impostos')" }));

  // Vencem em 3 dias
  (RECEITAS||[]).filter(r=>r.status==='pendente'&&r.vencimento>=hoje&&r.vencimento<=em3s).forEach(r=>
    notifs.push({ id:`r3_${r.id}`, tipo:'amber', ico:'⏰', txt:`Receita vence em breve: ${r.descricao}`, valor:fmtMoeda(r.valor), data:r.vencimento, acao:"go('lancamentos')" }));
  (DESPESAS||[]).filter(d=>d.status==='pendente'&&d.vencimento>=hoje&&d.vencimento<=em3s).forEach(d=>
    notifs.push({ id:`d3_${d.id}`, tipo:'amber', ico:'⏰', txt:`Despesa vence em breve: ${d.descricao}`, valor:fmtMoeda(d.valor), data:d.vencimento, acao:"go('lancamentos')" }));
  (IMPOSTOS||[]).filter(i=>i.status==='pendente'&&i.vencimento>=hoje&&i.vencimento<=em3s).forEach(i=>
    notifs.push({ id:`i3_${i.id}`, tipo:'amber', ico:'📋', txt:`Imposto vence em breve: ${i.tipo}`, valor:fmtMoeda(i.valor), data:i.vencimento, acao:"go('impostos')" }));

  return notifs.slice(0, 20);
}

function atualizarBadgeNotif() {
  if (!APP.user) return;
  const notifs = gerarNotificacoes();
  const lidas  = JSON.parse(localStorage.getItem(NOTIF_KEY())||'[]');
  const novas  = notifs.filter(n => !lidas.includes(n.id));
  const badge  = $id('notif-badge');
  if (badge) badge.style.display = novas.length ? 'block' : 'none';
}

function toggleNotifPanel() {
  if (!APP.user) return;
  const panel = $id('notif-panel');
  if (!panel) return;
  const aberto = panel.style.display !== 'none';
  panel.style.display = aberto ? 'none' : 'block';
  if (!aberto) renderNotifPanel();
}

function renderNotifPanel() {
  const notifs = gerarNotificacoes();
  const lidas  = JSON.parse(localStorage.getItem(NOTIF_KEY())||'[]');
  const list   = $id('notif-list');
  if (!list) return;

  if (!notifs.length) {
    list.innerHTML = `<div style="padding:24px;text-align:center;color:var(--text-3);font-size:12px">Nenhuma notificação pendente ✓</div>`;
    return;
  }

  list.innerHTML = notifs.map(n => {
    const lida = lidas.includes(n.id);
    return `<div onclick="marcarLida('${n.id}');${n.acao};toggleNotifPanel()"
      style="padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;background:${lida?'transparent':n.tipo==='red'?'rgba(224,92,92,.05)':'rgba(224,154,58,.05)'};transition:var(--tr)"
      onmouseover="this.style.background='var(--surface-2)'" onmouseout="this.style.background='${lida?'transparent':n.tipo==='red'?'rgba(224,92,92,.05)':'rgba(224,154,58,.05)'}'">
      <div style="display:flex;align-items:flex-start;gap:10px">
        <span style="font-size:16px;flex-shrink:0">${n.ico}</span>
        <div style="flex:1;min-width:0">
          <div style="font-size:12px;color:var(--text);line-height:1.4;${lida?'':'font-weight:500'}">${n.txt}</div>
          <div style="display:flex;justify-content:space-between;margin-top:3px">
            <span style="font-size:10.5px;font-family:var(--mono);color:${n.tipo==='red'?'var(--red)':'var(--amber)'};font-weight:700">${n.valor}</span>
            <span style="font-size:10px;color:var(--text-3)">${fmtData(n.data)}</span>
          </div>
        </div>
        ${!lida?`<span style="width:7px;height:7px;border-radius:50%;background:${n.tipo==='red'?'var(--red)':'var(--amber)'};flex-shrink:0;margin-top:3px"></span>`:''}
      </div>
    </div>`;
  }).join('');

  // Marca todas como lidas após visualizar
  const ids = notifs.map(n=>n.id);
  localStorage.setItem(NOTIF_KEY(), JSON.stringify(ids));
  if ($id('notif-badge')) $id('notif-badge').style.display = 'none';
}

function marcarLida(id) {
  const lidas = JSON.parse(localStorage.getItem(NOTIF_KEY())||'[]');
  if (!lidas.includes(id)) lidas.push(id);
  localStorage.setItem(NOTIF_KEY(), JSON.stringify(lidas));
}

function limparNotificacoes() {
  const notifs = gerarNotificacoes();
  localStorage.setItem(NOTIF_KEY(), JSON.stringify(notifs.map(n=>n.id)));
  if ($id('notif-badge')) $id('notif-badge').style.display = 'none';
  renderNotifPanel();
}

// Fecha painel ao clicar fora

};

// Wrapper que bloqueia execução sem permissão e exibe toast amigável.
// Se for evento (segundo arg), faz preventDefault/stopPropagation.
function guardAcao(fn, modulo, acao) {
  return function(...args) {
    if (!pode(modulo, acao)) {
      const e = args.find(a => a && typeof a.preventDefault === 'function');
      if (e) { try { e.preventDefault(); e.stopPropagation(); } catch(_) {} }
      toast(`Sem permissão para ${_ACAO_LABELS[acao]||acao} em ${_MOD_LABELS[modulo]||modulo}.`, 'error');
      return;
    }
    return fn.apply(this, args);
  };
}

// Compatibilidade reversa: guardAdmin antigo agora delega ao novo sistema.
// Mantido apenas pra não quebrar chamadas legadas que ainda existam.
function guardAdmin(fn) {
  return function(...args) {
    if (!isAdmin()) {
      toast('Esta ação requer permissão de administrador.', 'error');
      return;
    }
    return fn.apply(this, args);
  };
}

  financeiro: { label: 'Operacional',   desc: 'Cria/edita lançamentos, sem configurações', cor: 'var(--amber)' },

  custom:     { label: 'Personalizado', desc: 'Permissões definidas manualmente', cor: '#7d3c98' },

async function carregarUsuarios() {
  // Busca usuários do tenant atual via tabela de vínculos
  try {
    const vinculos = await supa('GET', 'fin_usuarios_empresas', {
      params: { tenant_id: `eq.${APP.tenantId}`, ativo: 'eq.true', select: '*,fin_usuarios!fin_usuarios_empresas_usuario_id_fkey(id,nome,email,criado_em)' }
    });
    _usuarios = (vinculos||[]).map(v => ({
      id:         v.fin_usuarios?.id || v.usuario_id,
      vinculo_id: v.id,
      nome:       v.fin_usuarios?.nome || '—',
      email:      v.fin_usuarios?.email || '—',
      criado_em:  v.fin_usuarios?.criado_em || v.criado_em,
      template:   v.template,
      permissoes: v.permissoes,
      is_default: v.is_default,
    }));
  } catch(e) {
    console.warn('carregarUsuarios:', e.message);
    // Fallback: busca direta em fin_usuarios pelo tenant
    try {
      const us = await supa('GET', 'fin_usuarios', {
        params: { tenant_id: `eq.${APP.tenantId}`, select: '*', order: 'criado_em.asc' }
      });
      _usuarios = us.map(u => ({ ...u, template: u.perfil === 'admin' ? 'admin' : 'leitura' }));
    } catch(_) { _usuarios = [APP.user]; }
  }
}

async function carregarConvites() {
  try { _convites = await supaRpc('fin_listar_convites') || []; }
  catch(e) { console.warn('carregarConvites:', e.message); _convites = []; }
}

// ═══════════════════════════════════════════════════════════════
// EMPRESAS
// ═══════════════════════════════════════════════════════════════
let _empresasList = [];

function _formatCNPJ(cnpj) {
  if (!cnpj) return '—';
  const c = String(cnpj).replace(/\D/g,'');
  if (c.length !== 14) return cnpj;
  return c.replace(/^(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})$/, '$1.$2.$3/$4-$5');
}

// Formata CPF: 12345678901 → 123.456.789-01
function _formatCPF(cpf) {
  if (!cpf) return '—';
  const c = String(cpf).replace(/\D/g,'');
  if (c.length !== 11) return cpf;
  return c.replace(/^(\d{3})(\d{3})(\d{3})(\d{2})$/, '$1.$2.$3-$4');
}

// Formata CPF (11 dígitos) ou CNPJ (14 dígitos) automaticamente
function _formatDoc(doc) {
  if (!doc) return '—';
  const c = String(doc).replace(/\D/g,'');
  if (c.length === 11) return _formatCPF(c);
  if (c.length === 14) return _formatCNPJ(c);
  return doc;
}

// Valida CPF pelo dígito verificador (algoritmo módulo 11 — Receita Federal).
// Retorna true se válido. Aceita string com ou sem máscara.
// Rejeita: comprimento errado, todos dígitos iguais (ex: 00000000000), DVs incorretos.
function _validaCPF(cpf) {
  if (!cpf) return false;
  const c = String(cpf).replace(/\D/g, '');
  if (c.length !== 11) return false;
  // Sequências repetidas (00000000000, 11111111111, etc.) são inválidas
  if (/^(\d)\1{10}$/.test(c)) return false;

  const calcDV = (base, pesoInicial) => {
    let soma = 0;
    for (let i = 0; i < base.length; i++) {
      soma += parseInt(base[i], 10) * (pesoInicial - i);
    }
    const resto = (soma * 10) % 11;
    return resto === 10 ? 0 : resto;
  };

  // 1º DV: pesos 10..2 sobre os 9 primeiros dígitos
  const dv1 = calcDV(c.slice(0, 9), 10);
  if (dv1 !== parseInt(c[9], 10)) return false;

  // 2º DV: pesos 11..2 sobre os 10 primeiros dígitos
  const dv2 = calcDV(c.slice(0, 10), 11);
  if (dv2 !== parseInt(c[10], 10)) return false;

  return true;
}

// Valida CPF (11 dígitos) ou CNPJ (14 dígitos). Vazio/null = false.
// Para validação opcional (aceitar vazio), use _validaDocumentoOpcional.
function _validaDocumento(doc) {
  const c = String(doc || '').replace(/\D/g, '');
  if (c.length === 11) return _validaCPF(c);
  if (c.length === 14) return _validaCNPJ(c);
  return false;
}

// Valida documento se preenchido. Vazio/null = aceita (true).
// Comprimentos diferentes de 11/14 = inválido.
function _validaDocumentoOpcional(doc) {
  const c = String(doc || '').replace(/\D/g, '');
  if (c.length === 0) return true;            // vazio é OK
  if (c.length === 11) return _validaCPF(c);
  if (c.length === 14) return _validaCNPJ(c);
  return false; // comprimento errado
}

// Liga validação visual em tempo real num input de CPF/CNPJ.
// - Vazio ou < 11 dígitos: neutro
// - 11 dígitos válidos: borda verde + mensagem "✓ CPF válido"
// - 14 dígitos válidos: borda verde + mensagem "✓ CNPJ válido"
// - Inválido (DV errado ou comprimento errado com ≥11 dígitos): borda vermelha + mensagem
// Cria automaticamente um <div> de feedback após o input se ainda não existir.
function _ligarValidacaoDocVivo(inputId) {
  const inp = document.getElementById(inputId);
  if (!inp || inp._validaLigado) return;
  inp._validaLigado = true;

  // Cria/reusa um elemento de feedback irmão
  let fb = inp.nextElementSibling;
  if (!fb || !fb.classList || !fb.classList.contains('doc-feedback')) {
    fb = document.createElement('div');
    fb.className = 'doc-feedback';
    fb.style.cssText = 'font-size:11px;margin-top:4px;min-height:14px;font-family:var(--font);transition:color .15s';
    inp.parentNode.insertBefore(fb, inp.nextSibling);
  }

  const atualizar = () => {
    const c = (inp.value || '').replace(/\D/g, '');
    if (c.length === 0) {
      inp.style.borderColor = '';
      fb.textContent = '';
      fb.style.color = '';
      return;
    }
    if (c.length < 11) {
      inp.style.borderColor = '';
      fb.textContent = `${c.length}/11 dígitos (CPF) ou ${c.length}/14 (CNPJ)`;
      fb.style.color = 'var(--text-3)';
      return;
    }
    if (c.length === 11) {
      if (_validaCPF(c)) {
        inp.style.borderColor = 'var(--green)';
        fb.textContent = '✓ CPF válido';
        fb.style.color = 'var(--green)';
      } else {
        inp.style.borderColor = 'var(--red)';
        fb.textContent = '✗ CPF inválido (dígito verificador incorreto)';
        fb.style.color = 'var(--red)';
      }
      return;
    }
    if (c.length === 14) {
      if (_validaCNPJ(c)) {
        inp.style.borderColor = 'var(--green)';
        fb.textContent = '✓ CNPJ válido';
        fb.style.color = 'var(--green)';
      } else {
        inp.style.borderColor = 'var(--red)';
        fb.textContent = '✗ CNPJ inválido (dígito verificador incorreto)';
        fb.style.color = 'var(--red)';
      }
      return;
    }
    // 12, 13 ou >14 dígitos: comprimento errado
    inp.style.borderColor = 'var(--red)';
    fb.textContent = `✗ ${c.length} dígitos — CPF tem 11, CNPJ tem 14`;
    fb.style.color = 'var(--red)';
  };

  inp.addEventListener('input', atualizar);
  inp.addEventListener('blur',  atualizar);
  // Validar estado inicial (caso já venha preenchido na edição)
  atualizar();
}

// Valida CNPJ pelo dígito verificador (algoritmo módulo 11 — Receita Federal).
// Retorna true se válido. Aceita string com ou sem máscara.
// Rejeita: comprimento errado, todos dígitos iguais (ex: 00000000000000), DVs incorretos.
function _validaCNPJ(cnpj) {
  if (!cnpj) return false;
  const c = String(cnpj).replace(/\D/g, '');
  if (c.length !== 14) return false;
  // Sequências repetidas (00000000000000, 11111111111111, etc.) são inválidas
  if (/^(\d)\1{13}$/.test(c)) return false;

  const calcDV = (base, pesos) => {
    let soma = 0;
    for (let i = 0; i < pesos.length; i++) soma += parseInt(base[i], 10) * pesos[i];
    const resto = soma % 11;
    return resto < 2 ? 0 : 11 - resto;
  };

  // 1º DV: pesos 5,4,3,2,9,8,7,6,5,4,3,2 sobre os 12 primeiros dígitos
  const pesos1 = [5,4,3,2,9,8,7,6,5,4,3,2];
  const dv1 = calcDV(c.slice(0, 12), pesos1);
  if (dv1 !== parseInt(c[12], 10)) return false;

  // 2º DV: pesos 6,5,4,3,2,9,8,7,6,5,4,3,2 sobre os 13 primeiros dígitos
  const pesos2 = [6,5,4,3,2,9,8,7,6,5,4,3,2];
  const dv2 = calcDV(c.slice(0, 13), pesos2);
  if (dv2 !== parseInt(c[13], 10)) return false;

  return true;
}

// Sanity check: o CNPJ extraído pela IA realmente existe em algum tenant?
// Usado pra detectar CNPJs alucinados antes de rejeitar documento como
// "outra empresa". Cache em memória pra economizar chamadas.
//   - cnpj válido + existe em fin_tenants  → true
//   - cnpj válido mas não existe          → false (provavelmente alucinação)
//   - cnpj inválido (DV ou formato)       → false (sem chamar RPC)
const _CNPJ_TENANT_CACHE = new Map();
async function _cnpjExisteComoTenant(cnpj) {
  const c = (cnpj || '').replace(/\D/g, '');
  if (c.length !== 14) return false;
  if (!_validaCNPJ(c))  return false;  // DV inválido = certeza de alucinação
  if (_CNPJ_TENANT_CACHE.has(c)) return _CNPJ_TENANT_CACHE.get(c);
  try {
    const existe = await supaRpc('fin_cnpj_tenant_existe', { p_cnpj: c });
    const valor = existe === true;
    _CNPJ_TENANT_CACHE.set(c, valor);
    return valor;
  } catch(e) {
    console.warn('[CNPJ check] RPC falhou, assumindo existe (fallback seguro):', e.message);
    return true;  // fallback conservador: se RPC falhar, deixa o fluxo seguir
  }
}

// Detecta se uma descrição de lançamento é de tarifa bancária ou movimentação
// interna do banco. Retorna o nome da categoria ou null se não identificar.
//
// v31: regras agora vivem em fin_regras_categorizacao (configurável por tenant).
// Mantemos _CATEGORIAS_AUTO como SEED de fallback caso a tabela ainda não exista
// ou o cache _REGRAS_CATEG ainda não tenha sido carregado.
const _CATEGORIAS_AUTO = [
  // Tarifas/encargos (despesa)
  { nome: 'Tarifas Bancárias',  tipo: 'despesa', padroes: [
    /\bTARIFA\b/i, /\bCESTA\b/i, /\bMANUTEN[CÇ][AÃ]O\b/i, /\bIOF\b/i,
    /\bANUIDADE\b/i, /\bBAIXA\s+DE\s+T[ÍI]TULO/i, /\bPLANO\s+(INT\s+)?CAPITAL/i,
    /\bINTEGR\.?\s*CAPITAL/i, /\bENCERRAMENTO\s+DE\s+CONTA/i,
    /\bDOC\s+ELET/i, /\bTED\s+ELET/i,
  ]},
  // Tributos (despesa) — Receita Federal, INSS, ISS, ICMS etc.
  { nome: 'Tributos',           tipo: 'despesa', padroes: [
    /\bRECEITA\s+FEDERAL\b/i, /\bDARF\b/i, /\bDAS\b/i, /\bGPS\b/i,
    /\bINSS\b/i, /\bISS\b/i, /\bICMS\b/i, /\bIPVA\b/i, /\bIPTU\b/i,
    /\bSIMPLES\s+NACIONAL\b/i, /\bFGTS\b/i,
  ]},
  // Aplicações financeiras (despesa OU receita — neutro, deixa o tipo do lançamento decidir)
  { nome: 'Aplicações Financeiras', tipo: 'ambos', padroes: [
    /\bAPLIC\.?\s*FINANC/i, /\bRESGATE\s+APLIC/i, /\bFUNDOS\s+CAPTACAO/i,
    /\bRENDIMENTO\s+APLIC/i,
  ]},
  // Cobranças recebidas (receita) — boletos liquidados
  { nome: 'Recebimentos de Cobrança', tipo: 'receita', padroes: [
    /\bLIQ\.?\s*COBRANCA/i, /\bLIQUIDAC[AÃ]O\s+(?:DE\s+)?COBRANC/i,
  ]},
];

// Cache em memória das regras carregadas do banco. Estrutura compatível com
// _CATEGORIAS_AUTO: { nome, tipo, padroes:[RegExp...], _id, _ativo, _prioridade }
let _REGRAS_CATEG = null;

// Compila uma string de regex (vinda do banco como texto JSON) em RegExp.
// Aceita formato bruto "\bTARIFA\b" ou já com flags inline. Retorna null se inválido.
function _compilarPadrao(p) {
  if (typeof p !== 'string' || !p.length) return null;
  try { return new RegExp(p, 'i'); } catch(_) { return null; }
}

// Carrega regras de categorização do tenant atual. Idempotente.
// Em caso de falha (RLS, rede, tabela ausente), faz fallback pro hardcoded.
async function carregarRegrasCategorizacao() {
  if (!APP.tenantId) { _REGRAS_CATEG = null; return; }
  try {
    const rows = await supa('GET', 'fin_regras_categorizacao', {
      params: {
        tenant_id: `eq.${APP.tenantId}`,
        ativo:     'eq.true',
        select:    'id,nome,tipo,padroes,prioridade,is_default',
        order:     'prioridade.asc,nome.asc'
      }
    }) || [];
    _REGRAS_CATEG = rows.map(r => ({
      _id:         r.id,
      _ativo:      true,
      _prioridade: r.prioridade,
      _is_default: !!r.is_default,
      nome:        r.nome,
      tipo:        r.tipo,
      padroes:     (Array.isArray(r.padroes) ? r.padroes : [])
                     .map(_compilarPadrao).filter(Boolean),
    }));
  } catch(e) {
    console.warn('carregarRegrasCategorizacao (fallback):', e.message);
    _REGRAS_CATEG = null; // sinaliza fallback
  }
}

function _detectarCategoriaAuto(descricao, tipo) {
  const d = String(descricao || '');
  // Usa cache do banco se disponível; senão fallback pro hardcoded.
  const fonte = (Array.isArray(_REGRAS_CATEG) && _REGRAS_CATEG.length)
    ? _REGRAS_CATEG : _CATEGORIAS_AUTO;
  for (const cat of fonte) {
    if (cat.tipo !== 'ambos' && cat.tipo !== tipo) continue;
    for (const re of cat.padroes) if (re.test(d)) return cat;
  }
  return null;
}

// Mantida para compatibilidade com código que chama o nome antigo
function _detectarTarifaBancaria(descricao) {
  const cat = _detectarCategoriaAuto(descricao, 'despesa');
  return cat && cat.nome === 'Tarifas Bancárias' ? cat.nome : null;
}

// Garante que a categoria existe no tenant ativo. Se não existir, cria.
// Retorna o id da categoria, ou null em caso de falha.
async function _garantirCategoria(nome, tipo) {
  if (!nome) return null;
  // Procura no array em memória primeiro (case-insensitive)
  const nomeLower = nome.toLowerCase();
  let cat = CATEGORIAS.find(c => (c.nome||'').toLowerCase() === nomeLower);
  if (cat) return cat.id;
  // Cria
  try {
    const cor = tipo === 'receita' ? '#52b882' : '#7d8596';
    const icone = tipo === 'receita' ? '💰' : '🏦';
    const r = await supa('POST', 'fin_categorias', {
      returning: true,
      body: { tenant_id: APP.tenantId, nome, tipo: tipo || 'despesa', cor, icone, ativo: true, padrao: false }
    });
    if (Array.isArray(r) && r[0]) {
      atualizarLocal(CATEGORIAS, r[0]);
      return r[0].id;
    }
  } catch(e) {
    console.warn(`Falha ao criar categoria "${nome}":`, e.message);
  }
  return null;
}

async function carregarEmpresas() {
  try {
    _empresasList = await supa('GET', 'fin_tenants', {

}

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financeiro Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #F8F7F4;
  --surface:   #FFFFFF;
  --border:    #E8E6E0;
  --text:      #1C1917;
  --text-2:    #57534E;
  --text-3:    #A8A29E;
  --accent:    #1A56DB;
  --accent-lt: #EFF6FF;
  --green:     #16A34A;
  --green-lt:  #DCFCE7;
  --red:       #DC2626;
  --red-lt:    #FEE2E2;
  --amber:     #D97706;
  --amber-lt:  #FEF3C7;
  --purple:    #7C3AED;
  --purple-lt: #EDE9FE;
  --sidebar-w: 220px;
  --radius:    10px;
  --shadow:    0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.04);
  --shadow-lg: 0 8px 32px rgba(0,0,0,.10);
  --font:      'Sora', sans-serif;
  --mono:      'JetBrains Mono', monospace;
  --tr:        180ms ease;
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body { font-family:var(--font); background:var(--bg); color:var(--text); font-size:13.5px; line-height:1.5; min-height:100vh; overflow-x:hidden; }

/* ── AUTH ─────────────────────────────────────────────────── */
#auth-screen { display:none; min-height:100vh; align-items:center; justify-content:center; background:linear-gradient(135deg,#EFF6FF 0%,#F8F7F4 50%,#EDE9FE 100%); }
#auth-screen.visible { display:flex; }
.auth-wrap { width:420px; }
.auth-logo { display:flex; align-items:center; gap:12px; margin-bottom:32px; }
.auth-logo-icon { width:44px; height:44px; background:var(--accent); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:22px; }
.auth-logo h1 { font-size:22px; font-weight:700; letter-spacing:-.5px; }
.auth-logo span { font-size:12px; color:var(--text-3); display:block; margin-top:1px; }
.auth-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:36px; box-shadow:var(--shadow-lg); }
.auth-tabs { display:flex; gap:4px; background:var(--bg); border-radius:8px; padding:4px; margin-bottom:28px; }
.auth-tab { flex:1; padding:8px; border:none; border-radius:6px; background:transparent; font-family:var(--font); font-size:13px; font-weight:500; color:var(--text-2); cursor:pointer; transition:var(--tr); }
.auth-tab.active { background:var(--surface); color:var(--text); box-shadow:0 1px 3px rgba(0,0,0,.08); }
.field { margin-bottom:14px; }
.field label { display:block; font-size:11px; font-weight:600; color:var(--text-2); text-transform:uppercase; letter-spacing:.05em; margin-bottom:5px; }
.field input, .field select { width:100%; padding:10px 13px; border:1.5px solid var(--border); border-radius:8px; font-family:var(--font); font-size:13.5px; background:var(--bg); color:var(--text); outline:none; transition:var(--tr); }
.field input:focus, .field select:focus { border-color:var(--accent); background:var(--surface); box-shadow:0 0 0 3px rgba(26,86,219,.08); }
.btn-primary { width:100%; padding:11px; background:var(--accent); color:#fff; border:none; border-radius:8px; font-family:var(--font); font-size:14px; font-weight:600; cursor:pointer; transition:var(--tr); margin-top:8px; }
.btn-primary:hover { background:#1447c0; }
.btn-primary:disabled { opacity:.6; cursor:not-allowed; }
.auth-err { color:var(--red); font-size:12px; margin-top:10px; text-align:center; min-height:18px; }

/* ── ONBOARDING ───────────────────────────────────────────── */
#onboard-screen { display:none; min-height:100vh; align-items:center; justify-content:center; background:linear-gradient(135deg,#EFF6FF 0%,#F8F7F4 60%,#DCFCE7 100%); }
#onboard-screen.visible { display:flex; }
.onboard-card { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:48px 44px; width:500px; box-shadow:var(--shadow-lg); }
.onboard-step-bar { display:flex; gap:6px; margin-bottom:36px; }
.onboard-step-dot { flex:1; height:4px; border-radius:2px; background:var(--border); transition:background .3s; }
.onboard-step-dot.done { background:var(--accent); }
.onboard-step-dot.active { background:var(--accent); opacity:.5; }
.onboard-title { font-size:22px; font-weight:700; letter-spacing:-.4px; margin-bottom:8px; }
.onboard-sub { font-size:13.5px; color:var(--text-2); margin-bottom:28px; }
.onboard-nav { display:flex; justify-content:space-between; align-items:center; margin-top:28px; gap:12px; }
.btn-outline { padding:10px 20px; border:1.5px solid var(--border); border-radius:8px; background:transparent; font-family:var(--font); font-size:13px; font-weight:500; color:var(--text-2); cursor:pointer; transition:var(--tr); }
.btn-outline:hover { border-color:var(--text-3); color:var(--text); }
.btn-accent { padding:10px 24px; background:var(--accent); color:#fff; border:none; border-radius:8px; font-family:var(--font); font-size:13px; font-weight:600; cursor:pointer; transition:var(--tr); }
.btn-accent:hover { background:#1447c0; }
.btn-accent:disabled { opacity:.6; cursor:not-allowed; }
.categoria-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.categoria-chip { display:flex; align-items:center; gap:8px; padding:10px 12px; border:1.5px solid var(--border); border-radius:8px; cursor:pointer; transition:var(--tr); font-size:13px; }
.categoria-chip.selected { border-color:var(--accent); background:var(--accent-lt); color:var(--accent); }
.categoria-chip:hover:not(.selected) { border-color:var(--text-3); }

/* ── APP ──────────────────────────────────────────────────── */
#app { display:none; min-height:100vh; }
#app.visible { display:flex; }
.sidebar { width:var(--sidebar-w); min-height:100vh; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; position:fixed; top:0; left:0; z-index:100; }
.sidebar-brand { padding:20px 18px 0; display:flex; align-items:center; gap:10px; }
.brand-icon { width:32px; height:32px; background:var(--accent); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:16px; }
.brand-name { font-size:15px; font-weight:700; letter-spacing:-.3px; }
.brand-version { font-size:10px; color:var(--text-3); margin-top:1px; }
.tenant-badge { margin:12px 14px; padding:10px 12px; background:var(--bg); border-radius:8px; border:1px solid var(--border); }
.tenant-name { font-size:12px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.tenant-setor { font-size:11px; color:var(--text-3); margin-top:1px; }
.sidebar-nav { flex:1; padding:6px 10px; overflow-y:auto; }
.nav-section { font-size:10px; font-weight:600; color:var(--text-3); text-transform:uppercase; letter-spacing:.08em; padding:10px 8px 4px; }
.nav-item { display:flex; align-items:center; gap:9px; padding:8px 10px; border-radius:8px; color:var(--text-2); font-size:13px; font-weight:500; cursor:pointer; transition:var(--tr); margin-bottom:1px; border:none; background:none; width:100%; text-align:left; }
.nav-item:hover { background:var(--bg); color:var(--text); }
.nav-item.active { background:var(--accent-lt); color:var(--accent); font-weight:600; }
.nav-item svg { width:15px; height:15px; flex-shrink:0; }
.sidebar-footer { padding:12px 14px; border-top:1px solid var(--border); }
.user-row { display:flex; align-items:center; gap:10px; }
.user-avatar { width:30px; height:30px; background:var(--accent); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:#fff; flex-shrink:0; }
.user-name { font-size:12px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; }
.btn-logout { padding:4px 8px; border:1px solid var(--border); border-radius:6px; background:none; font-size:11px; color:var(--text-2); cursor:pointer; font-family:var(--font); transition:var(--tr); }
.btn-logout:hover { border-color:var(--red); color:var(--red); }
.main { margin-left:var(--sidebar-w); flex:1; display:flex; flex-direction:column; min-height:100vh; }
.topbar { background:var(--surface); border-bottom:1px solid var(--border); padding:0 24px; height:56px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:50; }
.page-title { font-size:16px; font-weight:700; letter-spacing:-.2px; }
.topbar-actions { display:flex; gap:8px; align-items:center; }
.content { padding:24px; flex:1; }
.btn { padding:8px 16px; border-radius:8px; font-family:var(--font); font-size:13px; font-weight:500; cursor:pointer; transition:var(--tr); display:inline-flex; align-items:center; gap:6px; border:none; }
.btn-sm { padding:6px 12px; font-size:12px; }
.btn svg { width:14px; height:14px; }
.btn-green { background:var(--green); color:#fff; }
.btn-green:hover { background:#15803d; }
.btn-red { background:var(--red-lt); color:var(--red); }
.btn-red:hover { background:var(--red); color:#fff; }
.card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px; box-shadow:var(--shadow); }
.kpi-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:24px; }
.kpi-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:18px 20px; box-shadow:var(--shadow); }
.kpi-label { font-size:11px; font-weight:600; color:var(--text-3); text-transform:uppercase; letter-spacing:.06em; margin-bottom:6px; }
.kpi-value { font-size:26px; font-weight:700; letter-spacing:-1px; font-family:var(--mono); }
.kpi-sub { font-size:11px; color:var(--text-3); margin-top:4px; }
.kpi-card.k-green { border-left:3px solid var(--green); }
.kpi-card.k-red   { border-left:3px solid var(--red); }
.kpi-card.k-amber { border-left:3px solid var(--amber); }
.kpi-card.k-blue  { border-left:3px solid var(--accent); }
table { width:100%; border-collapse:collapse; }
thead th { text-align:left; padding:10px 14px; font-size:11px; font-weight:600; color:var(--text-3); text-transform:uppercase; letter-spacing:.05em; border-bottom:1px solid var(--border); background:var(--bg); }
tbody tr { border-bottom:1px solid var(--border); transition:var(--tr); cursor:pointer; }
tbody tr:last-child { border-bottom:none; }
tbody tr:hover { background:var(--bg); }
tbody td { padding:12px 14px; font-size:13px; }
.badge { display:inline-flex; align-items:center; padding:2px 9px; border-radius:20px; font-size:11px; font-weight:600; }
.badge-green  { background:var(--green-lt);  color:var(--green); }
.badge-red    { background:var(--red-lt);    color:var(--red); }
.badge-amber  { background:var(--amber-lt);  color:var(--amber); }
.badge-accent { background:var(--accent-lt); color:var(--accent); }
.badge-gray   { background:var(--bg);        color:var(--text-3); }
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.35); backdrop-filter:blur(4px); z-index:200; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity .2s; }
.modal-overlay.open { opacity:1; pointer-events:all; }
.modal { background:var(--surface); border-radius:14px; width:480px; max-height:90vh; overflow-y:auto; box-shadow:var(--shadow-lg); transform:translateY(8px); transition:transform .2s; }
.modal-overlay.open .modal { transform:translateY(0); }
.modal-header { padding:20px 24px 0; display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
.modal-title { font-size:15px; font-weight:700; }
.modal-close { width:28px; height:28px; border-radius:6px; border:none; background:var(--bg); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:16px; color:var(--text-2); }
.modal-close:hover { background:var(--border); }
.modal-body { padding:0 24px 24px; }
.modal-footer { padding:14px 24px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:8px; }
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.form-grid .full { grid-column:1/-1; }
.form-label { font-size:11px; font-weight:600; color:var(--text-2); display:block; margin-bottom:5px; }
.form-input, .form-select { width:100%; padding:9px 12px; border:1.5px solid var(--border); border-radius:8px; font-family:var(--font); font-size:13px; background:var(--bg); color:var(--text); outline:none; transition:var(--tr); }
.form-input:focus, .form-select:focus { border-color:var(--accent); background:var(--surface); }
.form-field { display:flex; flex-direction:column; }
.toast-container { position:fixed; bottom:24px; right:24px; z-index:999; display:flex; flex-direction:column; gap:8px; }
.toast { background:var(--text); color:#fff; padding:11px 18px; border-radius:10px; font-size:13px; font-weight:500; box-shadow:var(--shadow-lg); animation:slideUp .2s ease; }
.toast.success { background:var(--green); }
.toast.error   { background:var(--red); }
.toast.warn    { background:var(--amber); }
@keyframes slideUp { from{transform:translateY(8px);opacity:0;} to{transform:translateY(0);opacity:1;} }
.empty-state { text-align:center; padding:60px 20px; color:var(--text-3); }
.empty-icon { font-size:40px; margin-bottom:12px; }
.empty-state h3 { font-size:15px; font-weight:600; color:var(--text-2); margin-bottom:6px; }
.table-wrap { overflow-x:auto; }
.saldo-bar { height:6px; background:var(--bg); border-radius:3px; overflow:hidden; margin-top:6px; }
.saldo-fill { height:100%; border-radius:3px; background:var(--accent); }

/* ── ONBOARDING TUTORIAL ──────────────────────────────────── */
.tutorial-card { background:linear-gradient(135deg,var(--accent-lt),#F0FDF4); border:1px solid var(--accent); border-radius:12px; padding:20px 24px; margin-bottom:24px; display:flex; align-items:center; gap:20px; }
.tutorial-icon { font-size:32px; flex-shrink:0; }
.tutorial-title { font-size:14px; font-weight:700; margin-bottom:4px; color:var(--accent); }
.tutorial-steps { display:flex; gap:12px; margin-top:12px; flex-wrap:wrap; }
.tutorial-step { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text-2); }
.tutorial-step-num { width:20px; height:20px; border-radius:50%; background:var(--accent); color:#fff; font-size:11px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.tutorial-step.done .tutorial-step-num { background:var(--green); }

@media (max-width:768px) {
  .sidebar { transform:translateX(-100%); transition:transform .25s; z-index:200; }
  .sidebar.open { transform:translateX(0); box-shadow:var(--shadow-lg); }
  .main { margin-left:0; }
  .kpi-grid { grid-template-columns:1fr 1fr; }
  .content { padding:14px; }
}

/* ── DASHBOARD PRO ───────────────────────────────────────── */
@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
@keyframes countUp { from{opacity:0;transform:scale(.92)} to{opacity:1;transform:scale(1)} }
.dash-fade { animation:fadeUp .4s ease both }
.dash-fade:nth-child(1){animation-delay:.05s}.dash-fade:nth-child(2){animation-delay:.1s}
.dash-fade:nth-child(3){animation-delay:.15s}.dash-fade:nth-child(4){animation-delay:.2s}

.kpi-pro {
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  padding:20px 22px;box-shadow:var(--shadow);position:relative;overflow:hidden;
  transition:transform .18s,box-shadow .18s;cursor:pointer;
}
.kpi-pro:hover { transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,.09); }
.kpi-pro::after {
  content:'';position:absolute;bottom:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--kpi-c1),var(--kpi-c2));
}
.kpi-pro-label { font-size:11px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;display:flex;align-items:center;gap:6px; }
.kpi-pro-value { font-size:28px;font-weight:700;letter-spacing:-1.5px;font-family:var(--mono);animation:countUp .5s ease both; }
.kpi-pro-sub   { font-size:12px;color:var(--text-3);margin-top:6px;display:flex;align-items:center;gap:5px; }
.kpi-pro-icon  { position:absolute;top:18px;right:18px;font-size:24px;opacity:.15; }

.dash-section-title {
  font-size:13px;font-weight:700;color:var(--text-2);text-transform:uppercase;
  letter-spacing:.07em;margin-bottom:14px;display:flex;align-items:center;gap:8px;
}
.dash-section-title::after { content:'';flex:1;height:1px;background:var(--border); }

.spark-bar { display:flex;align-items:flex-end;gap:3px;height:40px; }
.spark-bar span {
  flex:1;border-radius:3px 3px 0 0;transition:height .4s ease;min-height:3px;
}

.venc-row {
  display:flex;align-items:center;gap:10px;padding:10px 0;
  border-bottom:1px solid var(--border);transition:background .15s;cursor:pointer;
}
.venc-row:last-child { border-bottom:none; }
.venc-row:hover { background:var(--bg);margin:0 -10px;padding:10px; border-radius:8px; }
.venc-dot { width:8px;height:8px;border-radius:50%;flex-shrink:0; }

.prog-bar { height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:5px; }
.prog-fill { height:100%;border-radius:3px;transition:width .6s ease; }

.conta-row {
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;border-radius:9px;background:var(--bg);margin-bottom:6px;
  border:1px solid var(--border);
}
.conta-row:last-child { margin-bottom:0; }

.tag-pill {
  display:inline-flex;align-items:center;gap:4px;padding:3px 10px;
  border-radius:20px;font-size:11px;font-weight:600;
}
</style>
</head>
<body>

<!-- TOAST -->
<div class="toast-container" id="toasts"></div>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-wrap">
    <div class="auth-logo">
      <div class="auth-logo-icon">💰</div>
      <div>
        <h1>Financeiro Pro</h1>
        <span>Gestão financeira inteligente</span>
      </div>
    </div>
    <div class="auth-card">
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="authTab('login')">Entrar</button>
        <button class="auth-tab" onclick="authTab('register')">Criar conta</button>
      </div>
      <!-- LOGIN -->
      <div id="auth-login">
        <div class="field"><label>E-mail</label><input type="email" id="l-email" placeholder="seu@email.com" autocomplete="email"></div>
        <div class="field"><label>Senha</label><input type="password" id="l-senha" placeholder="••••••••" autocomplete="current-password"></div>
        <button class="btn-primary" id="btn-login" onclick="doLogin()">Entrar</button>
        <div class="auth-err" id="login-err"></div>
      </div>
      <!-- REGISTER -->
      <div id="auth-register" style="display:none">
        <div class="field"><label>Seu nome</label><input type="text" id="r-nome" placeholder="Nome completo"></div>
        <div class="field"><label>E-mail</label><input type="email" id="r-email" placeholder="seu@email.com" autocomplete="email"></div>
        <div class="field"><label>Senha</label><input type="password" id="r-senha" placeholder="mínimo 6 caracteres" autocomplete="new-password"></div>
        <button class="btn-primary" id="btn-register" onclick="doRegister()">Criar conta</button>
        <div class="auth-err" id="register-err"></div>
      </div>
    </div>
  </div>
</div>

<!-- ONBOARDING -->
<div id="onboard-screen">
  <div class="onboard-card">
    <div class="onboard-step-bar">
      <div class="onboard-step-dot active" id="dot-1"></div>
      <div class="onboard-step-dot" id="dot-2"></div>
      <div class="onboard-step-dot" id="dot-3"></div>
      <div class="onboard-step-dot" id="dot-4"></div>
    </div>
    <div id="onboard-content"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">💰</div>
      <div>
        <div class="brand-name">Financeiro Pro</div>
        <div class="brand-version">v1.0</div>
      </div>
    </div>
    <div class="tenant-badge">
      <div class="tenant-name" id="sb-tenant">—</div>
      <div class="tenant-setor" id="sb-setor">—</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">Principal</div>
      <button class="nav-item active" onclick="go('dashboard')" data-page="dashboard">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
        Dashboard
      </button>
      <div class="nav-section">Financeiro</div>
      <button class="nav-item" onclick="go('receber')" data-page="receber">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4c-1.11 0-2 .89-2 2v12c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/></svg>
        A Receber

<script>
// ── CONFIG ────────────────────────────────────────────────────
const SUPA_URL = 'https://vuwgxndahrzinfdlapxz.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ1d2d4bmRhaHJ6aW5mZGxhcHh6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NTA0ODgsImV4cCI6MjA5MDMyNjQ4OH0.9DaPGHIxt0CO-pjYPBwsHaoSqDN35CwVU0lJUyTXQIQ';

// ── ESTADO ────────────────────────────────────────────────────
const APP = { token: null, user: null, tenant: null, page: 'dashboard' };
let CONTAS = [], CATEGORIAS = [], CLIENTES = [], FORNECEDORES = [], RECEITAS = [], DESPESAS = [];

// ── SUPABASE ──────────────────────────────────────────────────
const $id = id => document.getElementById(id);

async function supa(method, table, opts = {}) {
  const { body, params, token, returning = false } = opts;
  let url = `${SUPA_URL}/rest/v1/${table}`;
  if (params) url += '?' + Object.entries(params).map(([k,v]) => `${k}=${encodeURIComponent(v)}`).join('&');
  const headers = {
    'apikey': SUPA_KEY,
    'Authorization': `Bearer ${token || APP.token || SUPA_KEY}`,
    'Content-Type': 'application/json',
    'Prefer': returning ? 'return=representation' : 'return=minimal',
  };
  const res = await fetch(url, { method, headers, body: body ? JSON.stringify(body) : undefined });
  if (!res.ok) { const e = await res.text(); throw new Error(e); }
  if (method === 'GET' || returning) return res.json();
  return true;
}

async function supaAuth(method, path, body) {
  const res = await fetch(`${SUPA_URL}/auth/v1/${path}`, {
    method, headers: { 'apikey': SUPA_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  return res.json();
}

// ── TOAST ─────────────────────────────────────────────────────
function toast(msg, type = 'default', ms = 3000) {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  $id('toasts').appendChild(el);
  setTimeout(() => el.remove(), ms);
}

// ── MODAL ─────────────────────────────────────────────────────
function openModal(title, body, footer = '') {
  $id('modal-title').textContent = title;
  $id('modal-body').innerHTML = body;
  $id('modal-footer').innerHTML = footer;
  $id('modal-overlay').classList.add('open');
}
function closeModal() { $id('modal-overlay').classList.remove('open'); }

// ── AUTH ──────────────────────────────────────────────────────
function authTab(tab) {
  $id('auth-login').style.display    = tab === 'login'    ? '' : 'none';
  $id('auth-register').style.display = tab === 'register' ? '' : 'none';
  document.querySelectorAll('.auth-tab').forEach((b,i) => b.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')));
}

$id('l-senha').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
$id('r-senha').addEventListener('keydown', e => { if (e.key === 'Enter') doRegister(); });

async function doLogin() {
  const email = $id('l-email').value.trim();
  const senha  = $id('l-senha').value;
  const btn    = $id('btn-login');
  $id('login-err').textContent = '';
  if (!email || !senha) { $id('login-err').textContent = 'Preencha e-mail e senha.'; return; }
  btn.disabled = true; btn.textContent = 'Entrando...';
  try {
    const data = await supaAuth('POST', 'token?grant_type=password', { email, password: senha });
    if (!data.access_token) throw new Error(data.error_description || 'Credenciais inválidas.');
    APP.token = data.access_token;
    await inicializar();
  } catch(e) {
    $id('login-err').textContent = e.message;
    btn.disabled = false; btn.textContent = 'Entrar';
  }
}

async function doRegister() {
  const nome  = $id('r-nome').value.trim();
  const email = $id('r-email').value.trim();
  const senha = $id('r-senha').value;
  const btn   = $id('btn-register');
  $id('register-err').textContent = '';
  if (!nome || !email || !senha) { $id('register-err').textContent = 'Preencha todos os campos.'; return; }
  if (senha.length < 6) { $id('register-err').textContent = 'Senha mínimo 6 caracteres.'; return; }
  btn.disabled = true; btn.textContent = 'Criando...';
  try {
    const data = await supaAuth('POST', 'signup', { email, password: senha });
    if (!data.access_token) throw new Error(data.error_description || 'Erro ao criar conta.');
    APP.token = data.access_token;
    APP.nomeTemp = nome;
    APP.emailTemp = email;
    iniciarOnboarding();
  } catch(e) {
    $id('register-err').textContent = e.message;
    btn.disabled = false; btn.textContent = 'Criar conta';
  }
}

async function doLogout() {
  APP.token = null; APP.user = null; APP.tenant = null;
  CONTAS = []; CATEGORIAS = []; CLIENTES = []; FORNECEDORES = []; RECEITAS = []; DESPESAS = [];
  $id('app').classList.remove('visible');
  $id('auth-screen').classList.add('visible');
  $id('l-senha').value = '';
  $id('btn-login').disabled = false; $id('btn-login').textContent = 'Entrar';
}

// ── INICIALIZAR ───────────────────────────────────────────────
async function inicializar() {
  try {
    // Buscar usuário do sistema
    const usuarios = await supa('GET', 'fin_usuarios', { params: { select: '*', limit: 1 } });
    if (!usuarios || !usuarios.length) {
      // Novo usuário sem tenant → onboarding
      APP.nomeTemp = APP.nomeTemp || 'Usuário';
      iniciarOnboarding();
      return;
    }
    APP.user = usuarios[0];
    const tenants = await supa('GET', 'fin_tenants', { params: { id: `eq.${APP.user.tenant_id}`, select: '*' } });
    APP.tenant = tenants[0];
    await carregarDados();
    mostrarApp();
  } catch(e) {
    toast('Erro ao carregar: ' + e.message, 'error');
  }
}

async function carregarDados() {
  const tid = APP.user.tenant_id;
  const [contas, cats, clis, fors, recs, desps] = await Promise.all([
    supa('GET', 'fin_contas',       { params: { tenant_id: `eq.${tid}`, ativo: 'eq.true', select: '*' } }),
    supa('GET', 'fin_categorias',   { params: { tenant_id: `eq.${tid}`, ativo: 'eq.true', select: '*', order: 'nome.asc' } }),
    supa('GET', 'fin_clientes',     { params: { tenant_id: `eq.${tid}`, ativo: 'eq.true', select: '*', order: 'nome.asc' } }),
    supa('GET', 'fin_fornecedores', { params: { tenant_id: `eq.${tid}`, ativo: 'eq.true', select: '*', order: 'nome.asc' } }),
    supa('GET', 'fin_receitas',     { params: { tenant_id: `eq.${tid}`, select: '*', order: 'vencimento.desc', limit: 200 } }),
    supa('GET', 'fin_despesas',     { params: { tenant_id: `eq.${tid}`, select: '*', order: 'vencimento.desc', limit: 200 } }),
  ]);
  CONTAS = contas; CATEGORIAS = cats; CLIENTES = clis;
  FORNECEDORES = fors; RECEITAS = recs; DESPESAS = desps;
}

function mostrarApp() {
  $id('auth-screen').classList.remove('visible');
  $id('onboard-screen').classList.remove('visible');
  $id('app').classList.add('visible');
  $id('sb-tenant').textContent = APP.tenant?.nome || '—';
  $id('sb-setor').textContent  = APP.tenant?.setor || '—';
  $id('sb-user').textContent   = APP.user?.nome || '—';
  $id('sb-avatar').textContent = (APP.user?.nome || 'U')[0].toUpperCase();
  go('dashboard');
}

// ── ONBOARDING ────────────────────────────────────────────────
let OB = { step: 1, empresa: '', setor: '', contaNome: 'Caixa', contaSaldo: 0, contaTipo: 'caixa', categoriasSel: [] };
const CATEGORIAS_PADRAO = [
  { nome:'Honorários', tipo:'receita', cor:'#16A34A', icone:'💼' },
  { nome:'Consultoria', tipo:'receita', cor:'#2563EB', icone:'🧠' },
  { nome:'Vendas', tipo:'receita', cor:'#7C3AED', icone:'🛒' },
  { nome:'Outros (receita)', tipo:'receita', cor:'#6B7280', icone:'💰' },
  { nome:'Aluguel', tipo:'despesa', cor:'#DC2626', icone:'🏢' },
  { nome:'Salários', tipo:'despesa', cor:'#D97706', icone:'👤' },
  { nome:'Impostos', tipo:'despesa', cor:'#9D174D', icone:'📋' },
  { nome:'Fornecedores', tipo:'despesa', cor:'#B45309', icone:'📦' },
  { nome:'Tecnologia', tipo:'despesa', cor:'#4F46E5', icone:'💻' },
  { nome:'Outros (despesa)', tipo:'despesa', cor:'#6B7280', icone:'💸' },
];

const SETORES = ['Contabilidade','Advocacia','Saúde','Educação','Comércio','Indústria','Tecnologia','Construção','Alimentação','Serviços Gerais','Outro'];

function iniciarOnboarding() {
  $id('auth-screen').classList.remove('visible');
  $id('onboard-screen').classList.add('visible');
  OB = { step: 1, empresa: '', setor: '', contaNome: 'Caixa', contaSaldo: 0, contaTipo: 'caixa', categoriasSel: [] };
  renderOnboard();
}

function renderOnboard() {
  // Dots
  for (let i = 1; i <= 4; i++) {
    const dot = $id(`dot-${i}`);
    dot.className = 'onboard-step-dot' + (i < OB.step ? ' done' : i === OB.step ? ' active' : '');
  }
  const steps = {
    1: `
      <div class="onboard-title">👋 Bem-vindo ao Financeiro Pro!</div>
      <div class="onboard-sub">Vamos configurar sua empresa em 4 etapas rápidas.</div>
      <div class="field"><label>Nome da empresa</label><input type="text" id="ob-empresa" placeholder="Ex: Artecon Artes Contábeis" value="${OB.empresa}"></div>
      <div class="field"><label>Setor de atuação</label><select id="ob-setor">${SETORES.map(s=>`<option value="${s}" ${OB.setor===s?'selected':''}>${s}</option>`).join('')}</select></div>
      <div class="onboard-nav">
        <span style="font-size:12px;color:var(--text-3)">Passo 1 de 4</span>
        <button class="btn-accent" onclick="obNext1()">Próximo →</button>
      </div>`,
    2: `
      <div class="onboard-title">🏦 Primeira conta bancária</div>
      <div class="onboard-sub">Qual conta quer cadastrar primeiro? Pode adicionar mais depois.</div>
      <div class="field"><label>Nome da conta</label><input type="text" id="ob-conta-nome" placeholder="Ex: Caixa, Banco Itaú CC, Nubank PJ" value="${OB.contaNome}"></div>
      <div class="field"><label>Tipo</label><select id="ob-conta-tipo">
        <option value="caixa" ${OB.contaTipo==='caixa'?'selected':''}>Caixa físico</option>
        <option value="corrente" ${OB.contaTipo==='corrente'?'selected':''}>Conta corrente</option>
        <option value="poupanca" ${OB.contaTipo==='poupanca'?'selected':''}>Poupança</option>
        <option value="cartao" ${OB.contaTipo==='cartao'?'selected':''}>Cartão</option>
        <option value="investimento" ${OB.contaTipo==='investimento'?'selected':''}>Investimento</option>
      </select></div>
      <div class="field"><label>Saldo inicial (R$)</label><input type="number" id="ob-conta-saldo" placeholder="0,00" value="${OB.contaSaldo}" step="0.01"></div>
      <div class="onboard-nav">
        <button class="btn-outline" onclick="OB.step=1;renderOnboard()">← Voltar</button>
        <button class="btn-accent" onclick="obNext2()">Próximo →</button>
      </div>`,
    3: `
      <div class="onboard-title">📁 Categorias padrão</div>
      <div class="onboard-sub">Selecione as categorias que fazem sentido para sua empresa. Pode editar depois.</div>
      <div class="categoria-grid" id="cat-grid">
        ${CATEGORIAS_PADRAO.map((c,i) => `
          <div class="categoria-chip ${OB.categoriasSel.includes(i)?'selected':''}" onclick="toggleCat(${i})">
            <span>${c.icone}</span>
            <span style="flex:1">${c.nome}</span>
            <span style="font-size:10px;color:var(--text-3)">${c.tipo==='receita'?'↑':'↓'}</span>
          </div>`).join('')}
      </div>
      <div class="onboard-nav" style="margin-top:16px">
        <button class="btn-outline" onclick="OB.step=2;renderOnboard()">← Voltar</button>
        <button class="btn-accent" onclick="obNext3()">Próximo →</button>
      </div>`,
    4: `
      <div class="onboard-title">✅ Tudo pronto!</div>
      <div class="onboard-sub">Revise as configurações antes de começar:</div>
      <div style="background:var(--bg);border-radius:10px;padding:16px;margin-bottom:16px">
        <div style="display:flex;flex-direction:column;gap:10px">
          <div style="display:flex;justify-content:space-between"><span style="color:var(--text-3);font-size:12px">Empresa</span><strong>${OB.empresa}</strong></div>
          <div style="display:flex;justify-content:space-between"><span style="color:var(--text-3);font-size:12px">Setor</span><strong>${OB.setor}</strong></div>
          <div style="display:flex;justify-content:space-between"><span style="color:var(--text-3);font-size:12px">Conta inicial</span><strong>${OB.contaNome}</strong></div>
          <div style="display:flex;justify-content:space-between"><span style="color:var(--text-3);font-size:12px">Saldo inicial</span><strong>${fmtMoeda(OB.contaSaldo)}</strong></div>
          <div style="display:flex;justify-content:space-between"><span style="color:var(--text-3);font-size:12px">Categorias</span><strong>${OB.categoriasSel.length} selecionadas</strong></div>
        </div>
      </div>
      <div class="onboard-nav">
        <button class="btn-outline" onclick="OB.step=3;renderOnboard()">← Voltar</button>
        <button class="btn-accent" id="btn-finalizar" onclick="finalizarOnboarding()">🚀 Começar</button>
      </div>`
  };
  $id('onboard-content').innerHTML = steps[OB.step] || '';
}

function obNext1() {
  const empresa = ($id('ob-empresa')||{}).value?.trim();
  const setor   = ($id('ob-setor')||{}).value;
  if (!empresa) { toast('Informe o nome da empresa.', 'error'); return; }
  OB.empresa = empresa; OB.setor = setor; OB.step = 2; renderOnboard();
}
function obNext2() {
  OB.contaNome  = $id('ob-conta-nome').value.trim() || 'Caixa';
  OB.contaTipo  = $id('ob-conta-tipo').value;
  OB.contaSaldo = parseFloat($id('ob-conta-saldo').value) || 0;
  OB.step = 3; renderOnboard();
}
function obNext3() { OB.step = 4; renderOnboard(); }
function toggleCat(i) {
  const idx = OB.categoriasSel.indexOf(i);
  if (idx === -1) OB.categoriasSel.push(i); else OB.categoriasSel.splice(idx, 1);
  document.querySelectorAll('.categoria-chip').forEach((el, j) => el.classList.toggle('selected', OB.categoriasSel.includes(j)));
}

async function finalizarOnboarding() {
  const btn = $id('btn-finalizar');
  btn.disabled = true; btn.textContent = 'Criando...';
  try {
    // 1. Criar tenant
    const tenants = await supa('POST', 'fin_tenants', {
      body: { nome: OB.empresa, setor: OB.setor },
      returning: true
    });
    const tenant = tenants[0];

    // 2. Criar usuário
    const authUser = await fetch(`${SUPA_URL}/auth/v1/user`, {
      headers: { apikey: SUPA_KEY, Authorization: `Bearer ${APP.token}` }
    }).then(r => r.json());

    await supa('POST', 'fin_usuarios', {
      body: { tenant_id: tenant.id, auth_id: authUser.id, nome: APP.nomeTemp, email: authUser.email, perfil: 'admin' }
    });

    // 3. Criar conta bancária
    await supa('POST', 'fin_contas', {
      body: { tenant_id: tenant.id, nome: OB.contaNome, tipo: OB.contaTipo, saldo_inicial: OB.contaSaldo, saldo_atual: OB.contaSaldo }
    });

    // 4. Criar categorias selecionadas (ou todas se nenhuma selecionada)
    const cats = OB.categoriasSel.length > 0
      ? OB.categoriasSel.map(i => CATEGORIAS_PADRAO[i])
      : CATEGORIAS_PADRAO;
    if (cats.length > 0) {
      await supa('POST', 'fin_categorias', {
        body: cats.map(c => ({ tenant_id: tenant.id, ...c, padrao: true }))
      });
    }

    // 5. Recarregar e mostrar app
    const usuarios = await supa('GET', 'fin_usuarios', { params: { select: '*', limit: 1 } });
    APP.user = usuarios[0];
    APP.tenant = tenant;
    await carregarDados();
    mostrarApp();
  } catch(e) {
    toast('Erro: ' + e.message, 'error');
    btn.disabled = false; btn.textContent = '🚀 Começar';
  }
}

function go(page) {
  APP.page = page;
  document.querySelectorAll('.nav-item').forEach(b => b.classList.toggle('active', b.dataset.page === page));
  const cfg = PAGES[page]; if (!cfg) return;
  $id('page-title').textContent = cfg.title;
  $id('topbar-actions').innerHTML = '';
  cfg.render();
}

  const despVenc = DESPESAS.filter(d => d.status === 'pendente' && d.vencimento < hoje);
  const recHoje  = RECEITAS.filter(r => r.status === 'pendente' && r.vencimento === hoje);
  const despHoje = DESPESAS.filter(d => d.status === 'pendente' && d.vencimento === hoje);

  const saldoTotal   = CONTAS.reduce((s,c) => s + (parseFloat(c.saldo_atual)||0), 0);
  const totalReceber = recPend.reduce((s,r) => s + (parseFloat(r.valor)||0), 0);
  const totalPagar   = despPend.reduce((s,d) => s + (parseFloat(d.valor)||0), 0);
  const resultado    = totalReceber - totalPagar;

  // Mês atual realizados
  const recMesVal  = RECEITAS.filter(r => r.status==='recebido' && r.vencimento?.startsWith(mesAtual)).reduce((s,r)=>s+(parseFloat(r.valor)||0),0);
  const despMesVal = DESPESAS.filter(d => d.status==='pago'     && d.vencimento?.startsWith(mesAtual)).reduce((s,d)=>s+(parseFloat(d.valor)||0),0);

  // ── Últimos 6 meses ────────────────────────────────────────

  for (let i=5; i>=0; i--) {
    const d = new Date(); d.setMonth(d.getMonth()-i);
    const k  = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    const lb = d.toLocaleDateString('pt-BR',{month:'short'}).replace('.','');
    const r  = RECEITAS.filter(x=>x.vencimento?.startsWith(k)).reduce((s,x)=>s+(parseFloat(x.valor)||0),0);
    const dp = DESPESAS.filter(x=>x.vencimento?.startsWith(k)).reduce((s,x)=>s+(parseFloat(x.valor)||0),0);
    meses6.push({k,lb,r,dp,isCur:k===mesAtual});

  const grafMax = Math.max(...meses6.flatMap(m=>[m.r,m.dp]),1);

  // ── Gráfico SVG barras duplas animado ──────────────────────
  function svgChart() {
    const W=500,H=160,BOT=24,PAD=10,barW=22,gap=(W-PAD*2)/meses6.length;
    const sc = v => H-BOT-Math.max((v/grafMax)*(H-BOT-8),0);
    let rects='',labels='',grid='';
    for(let i=1;i<=3;i++){
      const y=H-BOT-((i/4)*(H-BOT-8));
      grid+=`<line x1="${PAD}" y1="${y.toFixed(0)}" x2="${W-PAD}" y2="${y.toFixed(0)}" stroke="var(--border)" stroke-width="1" stroke-dasharray="3,3"/>`;
    }
    meses6.forEach((m,i)=>{
      const cx=PAD+i*gap+gap/2;
      const yr=sc(m.r),ydp=sc(m.dp);
      const hr=H-BOT-yr,hdp=H-BOT-ydp;
      const hl=m.isCur?'1':'0.5';
      rects+=`
        <rect x="${(cx-barW-2).toFixed(0)}" y="${yr.toFixed(0)}" width="${barW}" height="${Math.max(hr,2).toFixed(0)}"
          fill="var(--green)" opacity="${hl}" rx="4">
          <animate attributeName="height" from="0" to="${Math.max(hr,2).toFixed(0)}" dur=".5s" begin="${i*0.07}s" fill="freeze"/>
          <animate attributeName="y" from="${(H-BOT).toFixed(0)}" to="${yr.toFixed(0)}" dur=".5s" begin="${i*0.07}s" fill="freeze"/>
        </rect>
        <rect x="${(cx+2).toFixed(0)}" y="${ydp.toFixed(0)}" width="${barW}" height="${Math.max(hdp,2).toFixed(0)}"
          fill="var(--red)" opacity="${hl}" rx="4">
          <animate attributeName="height" from="0" to="${Math.max(hdp,2).toFixed(0)}" dur=".5s" begin="${i*0.07+0.05}s" fill="freeze"/>
          <animate attributeName="y" from="${(H-BOT).toFixed(0)}" to="${ydp.toFixed(0)}" dur=".5s" begin="${i*0.07+0.05}s" fill="freeze"/>
        </rect>
        ${m.isCur?`<rect x="${(cx-barW-6).toFixed(0)}" y="4" width="${barW*2+16}" height="${H-BOT-6}" fill="var(--accent)" opacity="0.04" rx="8"/>`:``}`;
      labels+=`<text x="${cx.toFixed(0)}" y="${H-6}" text-anchor="middle" font-size="10" fill="${m.isCur?'var(--text)':'var(--text-3)'}" font-weight="${m.isCur?700:400}" font-family="var(--font)">${m.lb}</text>`;
    });
    return `<svg width="100%" viewBox="0 0 ${W} ${H}" style="overflow:visible;display:block">
      ${grid}${rects}${labels}
      <line x1="${PAD}" y1="${H-BOT}" x2="${W-PAD}" y2="${H-BOT}" stroke="var(--border)" stroke-width="1.5"/>

// ── PÁGINAS PLACEHOLDER ───────────────────────────────────────
function renderFluxo() {
  // Filtro de período
  const hoje = new Date();
  const anoAtual = hoje.getFullYear();
  const mesAtual = String(hoje.getMonth()+1).padStart(2,'0');
  const periodoSel = window._fluxoPeriodo || 'ano';

  function getMeses() {
    const meses = {};
    const filtrar = (l, tipo) => {
      const m = l.vencimento?.slice(0,7); if (!m) return;
      if (periodoSel === 'ano' && !m.startsWith(String(anoAtual))) return;
      if (periodoSel === '6m') {
        const limite = new Date(); limite.setMonth(limite.getMonth()-5);
        const limStr = limite.getFullYear()+'-'+String(limite.getMonth()+1).padStart(2,'0');
        if (m < limStr) return;
      }
      if (!meses[m]) meses[m] = { rec:0, desp:0, recReal:0, despReal:0 };
      if (tipo === 'rec') { meses[m].rec += parseFloat(l.valor)||0; if (l.status==='recebido') meses[m].recReal += parseFloat(l.valor)||0; }
      else { meses[m].desp += parseFloat(l.valor)||0; if (l.status==='pago') meses[m].despReal += parseFloat(l.valor)||0; }
    };
    RECEITAS.forEach(r => filtrar(r,'rec'));
    DESPESAS.forEach(d => filtrar(d,'desp'));
    return meses;
  }

  const meses = getMeses();
  const lista = Object.keys(meses).sort();
  const maxVal = Math.max(...lista.map(m => Math.max(meses[m].rec, meses[m].desp)), 1);
  const totalRec  = lista.reduce((s,m)=>s+meses[m].rec,0);
  const totalDesp = lista.reduce((s,m)=>s+meses[m].desp,0);
  const totalRes  = totalRec - totalDesp;
  const saldoAcum = [];
  let acum = CONTAS.reduce((s,c)=>s+(parseFloat(c.saldo_inicial)||0),0);
  lista.forEach(m => { acum += meses[m].recReal - meses[m].despReal; saldoAcum.push(acum); });

  // Gráfico SVG de barras
  function barChart() {
    if (!lista.length) return '<div style="color:var(--text-3);font-size:13px;padding:20px 0;text-align:center">Sem dados no período</div>';
    const W=560, H=180, PAD=40, barW=Math.max(10, Math.min(40, (W-PAD*2)/lista.length/2.5));
    const gap = (W-PAD*2)/lista.length;
    const scale = v => H - PAD - (v/maxVal)*(H-PAD-10);
    let bars = '';
    lista.forEach((m,i) => {
      const x = PAD + i*gap;
      const r = meses[m].rec, d = meses[m].desp;
      const yr = scale(r), yd = scale(d);
      const [yr2,mo2] = m.split('-');
      bars += `
        <rect x="${x-barW-2}" y="${yr}" width="${barW}" height="${H-PAD-yr}" fill="var(--green)" opacity="0.7" rx="3"/>
        <rect x="${x+2}" y="${yd}" width="${barW}" height="${H-PAD-yd}" fill="var(--red)" opacity="0.7" rx="3"/>
        <text x="${x}" y="${H-8}" text-anchor="middle" font-size="10" fill="var(--text-3)">${mo2}/${yr2.slice(2)}</text>`;
    });
    return `<svg width="100%" viewBox="0 0 ${W} ${H}" style="overflow:visible">
      <line x1="${PAD}" y1="10" x2="${PAD}" y2="${H-PAD}" stroke="var(--border)" stroke-width="1"/>
      <line x1="${PAD}" y1="${H-PAD}" x2="${W}" y2="${H-PAD}" stroke="var(--border)" stroke-width="1"/>
      ${bars}
    </svg>`;
  }

  $id('page-content').innerHTML = `
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px">
    <div style="display:flex;gap:6px">
      ${['6m','ano','tudo'].map(p=>`<button onclick="window._fluxoPeriodo='${p}';renderFluxo()" style="padding:7px 14px;border-radius:8px;border:1.5px solid ${periodoSel===p?'var(--accent)':'var(--border)'};background:${periodoSel===p?'var(--accent-lt)':'transparent'};color:${periodoSel===p?'var(--accent)':'var(--text-2)'};font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer">${p==='6m'?'6 meses':p==='ano'?'Este ano':'Tudo'}</button>`).join('')}
    </div>
  </div>

  <div class="kpi-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:20px">
    <div class="kpi-card k-green"><div class="kpi-label">Total Entradas</div><div class="kpi-value" style="color:var(--green)">${fmtMoeda(totalRec)}</div><div class="kpi-sub">previsto no período</div></div>
    <div class="kpi-card k-red"><div class="kpi-label">Total Saídas</div><div class="kpi-value" style="color:var(--red)">${fmtMoeda(totalDesp)}</div><div class="kpi-sub">previsto no período</div></div>
    <div class="kpi-card ${totalRes>=0?'k-green':'k-red'}"><div class="kpi-label">Resultado</div><div class="kpi-value" style="color:${totalRes>=0?'var(--green)':'var(--red)'}">${fmtMoeda(totalRes)}</div><div class="kpi-sub">${totalRes>=0?'positivo':'negativo'}</div></div>
  </div>

  <div class="card" style="margin-bottom:20px">
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:16px">
      <strong style="font-size:14px">Entradas × Saídas por Mês</strong>
      <div style="display:flex;gap:12px;font-size:12px">
        <span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:2px;background:var(--green);display:inline-block"></span>Entradas</span>
        <span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:2px;background:var(--red);display:inline-block"></span>Saídas</span>
      </div>
    </div>
    ${barChart()}
  </div>

  <div class="card">
    <strong style="font-size:14px;display:block;margin-bottom:14px">Detalhamento Mensal</strong>
    ${lista.length === 0 ? '<div style="color:var(--text-3);font-size:13px;text-align:center;padding:20px">Sem dados no período selecionado</div>' :
    `<div class="table-wrap"><table>
      <thead><tr><th>Mês</th><th>Entradas (Prev.)</th><th>Saídas (Prev.)</th><th>Resultado</th><th>Realizado</th></tr></thead>
      <tbody>${lista.map((m,i) => {
        const res = meses[m].rec - meses[m].desp;
        const real = meses[m].recReal - meses[m].despReal;
        const [y,mo] = m.split('-');
        const isFut = m > String(anoAtual)+'-'+mesAtual;
        return `<tr style="${isFut?'opacity:.6':''}">
          <td style="font-weight:600">${mo}/${y}${isFut?' <span style=\"font-size:10px;color:var(--text-3)\">(projeção)</span>':''}</td>
          <td style="color:var(--green);font-family:var(--mono)">${fmtMoeda(meses[m].rec)}</td>
          <td style="color:var(--red);font-family:var(--mono)">${fmtMoeda(meses[m].desp)}</td>
          <td style="font-weight:700;font-family:var(--mono);color:${res>=0?'var(--green)':'var(--red)'}">${fmtMoeda(res)}</td>
          <td style="font-family:var(--mono);color:${real>=0?'var(--green)':'var(--red)'};">${fmtMoeda(real)}</td>
        </tr>`;
      }).join('')}
      <tr style="border-top:2px solid var(--border);font-weight:700">
        <td>Total</td>
        <td style="color:var(--green);font-family:var(--mono)">${fmtMoeda(totalRec)}</td>
        <td style="color:var(--red);font-family:var(--mono)">${fmtMoeda(totalDesp)}</td>
        <td style="font-family:var(--mono);color:${totalRes>=0?'var(--green)':'var(--red)'}">${fmtMoeda(totalRes)}</td>
        <td></td>
      </tr>
      </tbody>
    </table></div>`}
  </div>`;
}

function renderDRE() {
  const periodoSel = window._drePeriodo || 'mes';
  const hoje = new Date();
  const anoAtual = hoje.getFullYear();
  const mesAtual = String(hoje.getMonth()+1).padStart(2,'0');
  const mesStr = String(anoAtual)+'-'+mesAtual;

  function filtrar(arr) {
    return arr.filter(l => {
      const m = l.vencimento?.slice(0,7);
      if (periodoSel === 'mes')  return m === mesStr;
      if (periodoSel === 'ano')  return m?.startsWith(String(anoAtual));
      return true;
    });
  }

  const recFilt  = filtrar(RECEITAS).filter(r => r.status === 'recebido');
  const despFilt = filtrar(DESPESAS).filter(d => d.status === 'pago');
  const recPrev  = filtrar(RECEITAS).filter(r => r.status === 'pendente');
  const despPrev = filtrar(DESPESAS).filter(d => d.status === 'pendente');

  const catRec  = {}, catDesp = {};
  recFilt.forEach(r  => { const c=getNome(CATEGORIAS,r.categoria_id);  catRec[c]  = (catRec[c]||0)  + (parseFloat(r.valor)||0); });
  despFilt.forEach(d => { const c=getNome(CATEGORIAS,d.categoria_id);  catDesp[c] = (catDesp[c]||0) + (parseFloat(d.valor)||0); });

  const totalRec   = Object.values(catRec).reduce((s,v)=>s+v,0);
  const totalDesp  = Object.values(catDesp).reduce((s,v)=>s+v,0);
  const resultado  = totalRec - totalDesp;
  const totalPrevR = recPrev.reduce((s,r)=>s+(parseFloat(r.valor)||0),0);
  const totalPrevD = despPrev.reduce((s,d)=>s+(parseFloat(d.valor)||0),0);
  const margem     = totalRec > 0 ? Math.round((resultado/totalRec)*100) : 0;

  $id('page-content').innerHTML = `
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px">
    <div style="display:flex;gap:6px">
      ${['mes','ano','tudo'].map(p=>`<button onclick="window._drePeriodo='${p}';renderDRE()" style="padding:7px 14px;border-radius:8px;border:1.5px solid ${periodoSel===p?'var(--accent)':'var(--border)'};background:${periodoSel===p?'var(--accent-lt)':'transparent'};color:${periodoSel===p?'var(--accent)':'var(--text-2)'};font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer">${p==='mes'?'Este mês':p==='ano'?'Este ano':'Tudo'}</button>`).join('')}
    </div>
  </div>

  <div class="kpi-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:20px">
    <div class="kpi-card k-green"><div class="kpi-label">Receitas Realizadas</div><div class="kpi-value" style="color:var(--green)">${fmtMoeda(totalRec)}</div><div class="kpi-sub">${fmtMoeda(totalPrevR)} a receber</div></div>
    <div class="kpi-card k-red"><div class="kpi-label">Despesas Realizadas</div><div class="kpi-value" style="color:var(--red)">${fmtMoeda(totalDesp)}</div><div class="kpi-sub">${fmtMoeda(totalPrevD)} a pagar</div></div>
    <div class="kpi-card ${resultado>=0?'k-green':'k-red'}"><div class="kpi-label">Resultado</div><div class="kpi-value" style="color:${resultado>=0?'var(--green)':'var(--red)'}">${fmtMoeda(resultado)}</div><div class="kpi-sub">${resultado>=0?'lucro':'prejuízo'}</div></div>
    <div class="kpi-card"><div class="kpi-label">Margem</div><div class="kpi-value" style="color:${margem>=0?'var(--green)':'var(--red)'}">${margem}%</div><div class="kpi-sub">sobre receitas</div></div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px">
    <div class="card">
      <strong style="font-size:14px;display:block;margin-bottom:14px;color:var(--green)">↑ Receitas Realizadas por Categoria</strong>
      ${Object.keys(catRec).length === 0 ? '<div style="color:var(--text-3);font-size:13px">Nenhuma receita realizada no período</div>' :
      Object.entries(catRec).sort((a,b)=>b[1]-a[1]).map(([c,v]) => `
        <div style="margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px">
            <span style="font-size:13px;font-weight:500">${c}</span>
            <span style="font-family:var(--mono);font-size:12px;color:var(--green);font-weight:600">${fmtMoeda(v)}</span>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <div class="saldo-bar" style="flex:1"><div class="saldo-fill" style="width:${Math.round(v/totalRec*100)}%;background:var(--green)"></div></div>
            <span style="font-size:11px;color:var(--text-3);min-width:32px">${Math.round(v/totalRec*100)}%</span>
          </div>
        </div>`).join('')}
      ${Object.keys(catRec).length > 0 ? `<div style="border-top:1px solid var(--border);padding-top:10px;margin-top:4px;display:flex;justify-content:space-between;font-weight:700;font-size:13px"><span>Total</span><span style="color:var(--green);font-family:var(--mono)">${fmtMoeda(totalRec)}</span></div>` : ''}
    </div>
    <div class="card">
      <strong style="font-size:14px;display:block;margin-bottom:14px;color:var(--red)">↓ Despesas Realizadas por Categoria</strong>
      ${Object.keys(catDesp).length === 0 ? '<div style="color:var(--text-3);font-size:13px">Nenhuma despesa realizada no período</div>' :
      Object.entries(catDesp).sort((a,b)=>b[1]-a[1]).map(([c,v]) => `
        <div style="margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px">
            <span style="font-size:13px;font-weight:500">${c}</span>
            <span style="font-family:var(--mono);font-size:12px;color:var(--red);font-weight:600">${fmtMoeda(v)}</span>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <div class="saldo-bar" style="flex:1"><div class="saldo-fill" style="width:${Math.round(v/totalDesp*100)}%;background:var(--red)"></div></div>
            <span style="font-size:11px;color:var(--text-3);min-width:32px">${Math.round(v/totalDesp*100)}%</span>
          </div>
        </div>`).join('')}
      ${Object.keys(catDesp).length > 0 ? `<div style="border-top:1px solid var(--border);padding-top:10px;margin-top:4px;display:flex;justify-content:space-between;font-weight:700;font-size:13px"><span>Total</span><span style="color:var(--red);font-family:var(--mono)">${fmtMoeda(totalDesp)}</span></div>` : ''}
    </div>
  </div>

  <div class="card">
    <strong style="font-size:14px;display:block;margin-bottom:14px">📊 Resumo DRE</strong>
    <div class="table-wrap"><table>
      <thead><tr><th>Item</th><th style="text-align:right">Valor</th><th style="text-align:right">%</th></tr></thead>
      <tbody>
        <tr style="background:var(--green-lt)"><td style="font-weight:700;color:var(--green)">Receitas Brutas</td><td style="text-align:right;font-family:var(--mono);font-weight:700;color:var(--green)">${fmtMoeda(totalRec)}</td><td style="text-align:right;color:var(--green)">100%</td></tr>
        ${Object.entries(catRec).sort((a,b)=>b[1]-a[1]).map(([c,v])=>`<tr><td style="padding-left:24px;color:var(--text-2)">${c}</td><td style="text-align:right;font-family:var(--mono);color:var(--green)">${fmtMoeda(v)}</td><td style="text-align:right;color:var(--text-3)">${Math.round(v/totalRec*100)||0}%</td></tr>`).join('')}
        <tr style="background:var(--red-lt)"><td style="font-weight:700;color:var(--red)">(-) Despesas</td><td style="text-align:right;font-family:var(--mono);font-weight:700;color:var(--red)">${fmtMoeda(totalDesp)}</td><td style="text-align:right;color:var(--red)">${totalRec>0?Math.round(totalDesp/totalRec*100):0}%</td></tr>
        ${Object.entries(catDesp).sort((a,b)=>b[1]-a[1]).map(([c,v])=>`<tr><td style="padding-left:24px;color:var(--text-2)">${c}</td><td style="text-align:right;font-family:var(--mono);color:var(--red)">${fmtMoeda(v)}</td><td style="text-align:right;color:var(--text-3)">${totalRec>0?Math.round(v/totalRec*100):0}%</td></tr>`).join('')}
        <tr style="border-top:2px solid var(--border);background:${resultado>=0?'var(--green-lt)':'var(--red-lt)'}">
          <td style="font-weight:700;color:${resultado>=0?'var(--green)':'var(--red)'}">${resultado>=0?'✅ Lucro Líquido':'❌ Prejuízo'}</td>
          <td style="text-align:right;font-family:var(--mono);font-weight:700;color:${resultado>=0?'var(--green)':'var(--red)'}">${fmtMoeda(resultado)}</td>
          <td style="text-align:right;font-weight:700;color:${resultado>=0?'var(--green)':'var(--red)'}">${margem}%</td>
        </tr>
      </tbody>
    </table></div>
  </div>`;
}

async function salvarCliente() {
  const nome = $id('ncli-nome').value.trim();
  if (!nome) { toast('Informe o nome.', 'error'); return; }
  try {
    await supa('POST', 'fin_clientes', { body: {
      tenant_id: APP.user.tenant_id, nome,
      cpf_cnpj:  $id('ncli-doc').value   || null,
      email:     $id('ncli-email').value || null,
      telefone:  $id('ncli-tel').value   || null,
    }});
    closeModal(); toast('Cliente cadastrado!', 'success');
    await carregarDados(); renderClientes();
  } catch(e) { toast('Erro: ' + e.message, 'error'); }
}

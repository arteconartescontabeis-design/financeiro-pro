<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artecon · Financeiro Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root {
  /* ── Artecon IRRF Palette ── */
  --bg:          #f4f6f9;
  --bg-2:        #ffffff;
  --surface:     #ffffff;
  --surface-2:   #f0f2f5;
  --border:      rgba(0,0,0,0.08);
  --border-lt:   rgba(0,0,0,0.14);
  --text:        #1a2332;
  --text-2:      #4a5568;
  --text-3:      #8896a8;
  --gold:        #1a5276;
  --gold-lt:     #d6e4f0;
  --gold-dim:    #154360;
  --green:       #1e8449;
  --green-lt:    #eafaf1;
  --red:         #c0392b;
  --red-lt:      #fdedec;
  --amber:       #b7770d;
  --amber-lt:    #fef9e7;
  --sidebar-w:   200px;
  --radius:      12px;
  --shadow:      0 2px 12px rgba(0,0,0,0.08);
  --shadow-lg:   0 8px 32px rgba(0,0,0,0.14);
  --font:        'DM Sans', sans-serif;
  --mono:        'DM Mono', monospace;
  --tr:          160ms cubic-bezier(.4,0,.2,1);
  --gold-glow:   0 0 20px rgba(26,82,118,.15);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  font-size: 13.5px;
  line-height: 1.55;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── SCROLLBAR ─────────────────────────────────────────────── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-lt); border-radius: 99px; }

/* ── AUTH ─────────────────────────────────────────────────── */
#auth-screen { display: none; min-height: 100vh; align-items: center; justify-content: center; background: linear-gradient(135deg,#1a3a5c 0%,#1a5276 50%,#2e86c1 100%); position: relative; overflow: hidden; }
#auth-screen::before {
  content: '';
  position: absolute;
  top: -200px; left: 50%; transform: translateX(-50%);
  width: 800px; height: 800px;
  background: radial-gradient(circle, rgba(26,82,118,.06) 0%, transparent 70%);
  pointer-events: none;
}
#auth-screen.visible { display: flex; }

.auth-wrap { width: 400px; position: relative; z-index: 1; }

.auth-brand {
  display: flex; align-items: center; gap: 14px; margin-bottom: 36px; justify-content: center;
}
.auth-brand-mark {
  width: 48px; height: 48px;
  background: linear-gradient(135deg, var(--gold-dim), var(--gold));
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: 700; color: #ffffff;
  letter-spacing: -1px; font-family: var(--mono);
  box-shadow: 0 4px 20px rgba(26,82,118,.3);
}
.auth-brand-text h1 { font-size: 20px; font-weight: 700; letter-spacing: -.4px; color: #ffffff; }
.auth-brand-text span { font-size: 11px; color: rgba(255,255,255,.7); letter-spacing: .04em; text-transform: uppercase; }

.auth-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 32px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.35);
}

.auth-tabs { display: flex; gap: 3px; background: var(--bg); border-radius: 9px; padding: 3px; margin-bottom: 26px; }
.auth-tab {
  flex: 1; padding: 8px; border: none; border-radius: 7px;
  background: transparent; font-family: var(--font); font-size: 12.5px; font-weight: 500;
  color: var(--text-3); cursor: pointer; transition: var(--tr);
}
.auth-tab.active { background: var(--surface-2); color: var(--text); }

.auth-form { display: block; }
.form-field { margin-bottom: 20px; }
.form-field label {
  display: block; margin-bottom: 6px; font-size: 12px;
  font-weight: 600; color: var(--text-2);
}
.form-field input {
  width: 100%; padding: 12px; border: 1px solid var(--border);
  border-radius: 8px; font-size: 13px; transition: var(--tr);
  background: var(--surface);
}
.form-field input:focus {
  outline: none; border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(26,82,118,.1);
}

.auth-error { color: var(--red); font-size: 12px; margin: 10px 0; }

.btn {
  padding: 12px 24px; border: none; border-radius: 8px;
  font-family: var(--font); font-size: 13px; font-weight: 600;
  cursor: pointer; transition: var(--tr); text-decoration: none;
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-gold { background: var(--gold); color: #ffffff; }
.btn-gold:hover { background: var(--gold-dim); transform: translateY(-1px); }
.btn-block { width: 100%; }

/* ── APP LAYOUT ────────────────────────────────────────────── */
#app-screen { display: none; }
#app-screen.visible { display: block; }

.app-layout { display: flex; min-height: 100vh; }

.sidebar {
  width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border);
  position: fixed; left: 0; top: 0; height: 100vh; z-index: 100;
  overflow-y: auto; transition: var(--tr);
}

.main-content {
  flex: 1; margin-left: var(--sidebar-w); padding: 24px;
  min-height: 100vh; background: var(--bg);
}

/* ── SIDEBAR ───────────────────────────────────────────────── */
.sidebar-header {
  padding: 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
}
.sidebar-logo {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--gold-dim), var(--gold));
  border-radius: 10px; display: flex; align-items: center; justify-content: center;
  color: #ffffff; font-weight: 700; font-size: 14px; font-family: var(--mono);
}
.sidebar-title { font-size: 16px; font-weight: 700; color: var(--text); }
.sidebar-subtitle { font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.05em; }

.sidebar-nav { padding: 20px 0; }
.nav-section {
  margin-bottom: 24px;
}
.nav-section-title {
  font-size: 10px; font-weight: 700; color: var(--text-3);
  text-transform: uppercase; letter-spacing: 0.06em;
  padding: 0 20px 8px; margin-bottom: 8px;
}

.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 20px; margin: 0 12px; border-radius: 8px;
  color: var(--text-2); font-size: 13px; font-weight: 500;
  cursor: pointer; transition: var(--tr); text-decoration: none;
}
.nav-item:hover { background: var(--surface-2); color: var(--text); }
.nav-item.active {
  background: var(--gold-lt); color: var(--gold-dim);
  font-weight: 600; box-shadow: var(--gold-glow);
}
.nav-icon { width: 20px; text-align: center; font-size: 16px; }

/* ── MAIN CONTENT ──────────────────────────────────────────── */
.page-header {
  margin-bottom: 24px;
}
.page-title {
  font-size: 24px; font-weight: 700; color: var(--text);
  margin-bottom: 8px;
}
.page-subtitle {
  font-size: 14px; color: var(--text-2);
}

.content-card {
  background: var(--surface); border-radius: var(--radius);
  border: 1px solid var(--border); padding: 24px;
  box-shadow: var(--shadow); margin-bottom: 24px;
}

/* ── DASHBOARD ─────────────────────────────────────────────── */
.kpi-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px; margin-bottom: 24px;
}

.kpi-card {
  background: var(--surface); border-radius: var(--radius);
  border: 1px solid var(--border); padding: 20px;
  box-shadow: var(--shadow);
}
.kpi-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 16px;
}
.kpi-title { font-size: 12px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.05em; }
.kpi-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
.kpi-value { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
.kpi-subtitle { font-size: 12px; color: var(--text-3); }

/* ── FORMS ─────────────────────────────────────────────────── */
.form-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}
.form-group {
  margin-bottom: 20px;
}
.form-label {
  display: block; margin-bottom: 6px; font-size: 12px;
  font-weight: 600; color: var(--text-2);
}
.form-input, .form-select {
  width: 100%; padding: 12px; border: 1px solid var(--border);
  border-radius: 8px; font-size: 13px; transition: var(--tr);
  background: var(--surface);
}
.form-input:focus, .form-select:focus {
  outline: none; border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(26,82,118,.1);
}

/* ── TABLES ────────────────────────────────────────────────── */
.table-container {
  overflow-x: auto; border-radius: var(--radius);
  border: 1px solid var(--border);
}
.data-table {
  width: 100%; border-collapse: collapse;
}
.data-table th {
  background: var(--surface-2); padding: 12px 16px;
  text-align: left; font-size: 11px; font-weight: 700;
  color: var(--text-3); text-transform: uppercase;
  letter-spacing: 0.05em; border-bottom: 1px solid var(--border);
}
.data-table td {
  padding: 16px; border-bottom: 1px solid var(--border);
  font-size: 13px; color: var(--text);
}
.data-table tr:hover { background: var(--surface-2); }

/* ── BADGES ────────────────────────────────────────────────── */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 600;
}
.badge-green { background: var(--green-lt); color: var(--green); }
.badge-red { background: var(--red-lt); color: var(--red); }
.badge-amber { background: var(--amber-lt); color: var(--amber); }
.badge-gold { background: var(--gold-lt); color: var(--gold-dim); }

/* ── MODAL ─────────────────────────────────────────────────── */
.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6); z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; visibility: hidden; transition: var(--tr);
}
.modal-overlay.visible { opacity: 1; visibility: visible; }

.modal {
  background: var(--surface); border-radius: 16px;
  box-shadow: var(--shadow-lg); max-width: 500px; width: 90%;
  max-height: 90vh; overflow-y: auto;
}
.modal-header {
  padding: 24px 24px 16px; border-bottom: 1px solid var(--border);
}
.modal-title {
  font-size: 18px; font-weight: 700; color: var(--text);
}
.modal-body {
  padding: 24px;
}
.modal-footer {
  padding: 16px 24px; border-top: 1px solid var(--border);
  display: flex; gap: 12px; justify-content: flex-end;
}

/* ── TOAST ─────────────────────────────────────────────────── */
.toast {
  position: fixed; top: 20px; right: 20px; z-index: 2000;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 16px 20px; box-shadow: var(--shadow-lg);
  transform: translateX(400px); transition: var(--tr);
}
.toast.show { transform: translateX(0); }
.toast-success { border-left: 4px solid var(--green); }
.toast-error { border-left: 4px solid var(--red); }
.toast-warning { border-left: 4px solid var(--amber); }

/* ── RESPONSIVE ────────────────────────────────────────────── */
@media (max-width: 768px) {
  .sidebar {
    transform: translateX(-100%);
  }
  .sidebar.open {
    transform: translateX(0);
  }
  .main-content {
    margin-left: 0;
    padding: 16px;
  }
  .kpi-grid {
    grid-template-columns: 1fr;
  }
  .form-grid {
    grid-template-columns: 1fr;
  }
}

/* ── ONBOARDING ────────────────────────────────────────────── */
#onboard-screen {
  display: none; min-height: 100vh; align-items: center; justify-content: center;
  background: linear-gradient(135deg,#1a3a5c 0%,#1a5276 50%,#2e86c1 100%);
  position: relative; overflow: hidden;
}
#onboard-screen.visible { display: flex; }

.onboard-container {
  width: 500px; position: relative; z-index: 1;
}

.onboard-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 18px; padding: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.35);
}

.onboard-steps {
  display: flex; justify-content: center; gap: 12px; margin-bottom: 32px;
}
.onboard-step-dot {
  width: 12px; height: 12px; border-radius: 50%;
  background: var(--border-lt); transition: var(--tr);
}
.onboard-step-dot.active { background: var(--gold); }
.onboard-step-dot.done { background: var(--green); }

.onboard-title {
  font-size: 22px; font-weight: 700; color: var(--text);
  margin-bottom: 8px; text-align: center;
}
.onboard-sub {
  font-size: 14px; color: var(--text-2); margin-bottom: 24px;
  text-align: center; line-height: 1.5;
}

.onboard-nav {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 24px;
}

.btn-accent {
  background: var(--gold); color: #ffffff; border: none;
  padding: 12px 24px; border-radius: 8px; font-family: var(--font);
  font-size: 13px; font-weight: 600; cursor: pointer; transition: var(--tr);
}
.btn-accent:hover { background: var(--gold-dim); transform: translateY(-1px); }

.btn-outline {
  background: transparent; color: var(--text-2); border: 1px solid var(--border);
  padding: 12px 24px; border-radius: 8px; font-family: var(--font);
  font-size: 13px; font-weight: 600; cursor: pointer; transition: var(--tr);
}
.btn-outline:hover { background: var(--surface-2); color: var(--text); }

.categoria-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px; margin-bottom: 16px;
}
.categoria-chip {
  display: flex; align-items: center; gap: 12px;
  padding: 12px; border: 1px solid var(--border); border-radius: 8px;
  cursor: pointer; transition: var(--tr); background: var(--surface);
}
.categoria-chip:hover { background: var(--surface-2); }
.categoria-chip.selected {
  background: var(--gold-lt); border-color: var(--gold);
  color: var(--gold-dim);
}

.field {
  margin-bottom: 20px;
}
.field label {
  display: block; margin-bottom: 6px; font-size: 12px;
  font-weight: 600; color: var(--text-2);
}
.field input, .field select {
  width: 100%; padding: 12px; border: 1px solid var(--border);
  border-radius: 8px; font-size: 13px; transition: var(--tr);
  background: var(--surface);
}
.field input:focus, .field select:focus {
  outline: none; border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(26,82,118,.1);
}
</style>
</head>
<body>

<!-- Auth Screen -->
<div id="auth-screen">
  <div class="auth-wrap">

      <div class="auth-brand-mark">F</div>
      <div class="auth-brand-text">

<script>
// ── CONFIG ────────────────────────────────────────────────────
const SUPA_URL = 'https://vuwgxndahrzinfdlapxz.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ1d2d4bmRhaHJ6aW5mZGxhcHh6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NTA0ODgsImV4cCI6MjA5MDMyNjQ4OH0.9DaPGHIxt0CO-pjYPBwsHaoSqDN35CwVU0lJUyTXQIQ';

// ── ESTADO ────────────────────────────────────────────────────
const APP = { token: null, user: null, tenant: null, page: 'dashboard' };
let CONTAS = [], CATEGORIAS = [], CLIENTES = [], FORNECEDORES = [], RECEITAS = [], DESPESAS = [], METAS = [], RECORRENCIAS = [], IMPOSTOS = [], ANEXOS = [];

// ── SUPABASE ──────────────────────────────────────────────────
const $id = id => document.getElementById(id);

async function supa(method, table, opts = {}) {
  const { body, params, token, returning = false } = opts;
  let url = `${SUPA_URL}/rest/v1/${table}`;
  if (params) url += '?' + Object.entries(params).map(([k,v]) => `${k}=${encodeURIComponent(v)}`).join('&');
  const headers = {
    'apikey': SUPA_KEY,
    'Authorization': `Bearer ${token || APP.token || SUPA_KEY}`,
    'Content-Type': 'application/json',
    'Prefer': returning ? 'return=representation' : 'return=minimal',
  };
  const res = await fetch(url, { method, headers, body: body ? JSON.stringify(body) : undefined });
  if (!res.ok) { const e = await res.text(); throw new Error(e); }
  if (method === 'GET' || returning) return res.json();
  return true;
}

async function supaAuth(method, path, body) {
  const res = await fetch(`${SUPA_URL}/auth/v1/${path}`, {
    method, headers: { 'apikey': SUPA_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  return res.json();
}

// ── FUNÇÃO CRÍTICA: SETAR TENANT_ID NO JWT ────────────────────
async function setTenantIdInJWT(tenantId) {
  try {
    console.log('🔧 Setando tenant_id no JWT:', tenantId);
    
    // Atualizar user metadata com tenant_id
    const updateRes = await fetch(`${SUPA_URL}/auth/v1/user`, {
      method: 'PUT',
      headers: {
        'apikey': SUPA_KEY,
        'Authorization': `Bearer ${APP.token}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        data: { tenant_id: tenantId }
      })
    });
    
    if (updateRes.ok) {
      console.log('✅ tenant_id setado no JWT:', tenantId);
      
      // Refresh token para pegar as claims atualizadas
      const refreshToken = JSON.parse(localStorage.getItem('supabase.auth.token') || '{}').refresh_token;
      if (refreshToken) {
        const refreshRes = await fetch(`${SUPA_URL}/auth/v1/token?grant_type=refresh_token`, {
          method: 'POST',
          headers: { 'apikey': SUPA_KEY, 'Content-Type': 'application/json' },
          body: JSON.stringify({ refresh_token: refreshToken })
        });
        
        if (refreshRes.ok) {
          const newTokenData = await refreshRes.json();
          APP.token = newTokenData.access_token;
          localStorage.setItem('supabase.auth.token', JSON.stringify(newTokenData));
          console.log('✅ Token refreshed com tenant_id no JWT');
        }
      }
    }
  } catch(e) {
    console.error('❌ Erro ao setar tenant_id no JWT:', e);
  }
}

// ── TOAST ─────────────────────────────────────────────────────
function toast(msg, type = 'default', ms = 3000) {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.classList.add('show'), 10);
  setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 300); }, ms);
}

// ── AUTENTICAÇÃO ──────────────────────────────────────────────
function setTab(tab) {
  ['login', 'register'].forEach(t => {
    const tabEl = document.querySelector(`[onclick="setTab('${t}')"]`);
    const formEl = $id(`tab-${t}`);
    if (t === tab) {
      tabEl.classList.add('active');
      formEl.style.display = 'block';
    } else {
      tabEl.classList.remove('active');
      formEl.style.display = 'none';
    }
  });
}

$id('l-senha').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
$id('r-senha').addEventListener('keydown', e => { if (e.key === 'Enter') doRegister(); });

async function doLogin() {
  const email = $id('l-email').value.trim();
  const senha  = $id('l-senha').value;
  const btn    = $id('btn-login');
  $id('login-err').textContent = '';
  if (!email || !senha) { $id('login-err').textContent = 'Preencha e-mail e senha.'; return; }
  btn.disabled = true; btn.textContent = 'Entrando...';
  try {
    const data = await supaAuth('POST', 'token?grant_type=password', { email, password: senha });
    if (!data.access_token) throw new Error(data.error_description || 'Credenciais inválidas.');
    APP.token = data.access_token;
    
    // Salvar token no localStorage para refresh
    localStorage.setItem('supabase.auth.token', JSON.stringify(data));
    
    await inicializar();
  } catch(e) {
    $id('login-err').textContent = e.message;
    btn.disabled = false; btn.textContent = 'Entrar';
  }
}

async function doRegister() {
  const nome  = $id('r-nome').value.trim();
  const email = $id('r-email').value.trim();
  const senha = $id('r-senha').value;
  const btn   = $id('btn-register');
  $id('register-err').textContent = '';
  if (!nome || !email || !senha) { $id('register-err').textContent = 'Preencha todos os campos.'; return; }
  if (senha.length < 6) { $id('register-err').textContent = 'Senha mínimo 6 caracteres.'; return; }
  btn.disabled = true; btn.textContent = 'Criando...';
  try {
    const data = await supaAuth('POST', 'signup', { email, password: senha });
    if (!data.access_token) throw new Error(data.error_description || 'Erro ao criar conta.');
    APP.token = data.access_token;
    APP.nomeTemp = nome;
    APP.emailTemp = email;
    
    // Salvar token no localStorage para refresh
    localStorage.setItem('supabase.auth.token', JSON.stringify(data));
    
    iniciarOnboarding();
  } catch(e) {
    $id('register-err').textContent = e.message;
    btn.disabled = false; btn.textContent = 'Criar conta';
  }
}

function logout() {
  APP.token = null; APP.user = null; APP.tenant = null;
  localStorage.removeItem('supabase.auth.token');
  $id('l-email').value = '';
  $id('l-senha').value = '';
  $id('btn-login').disabled = false; $id('btn-login').textContent = 'Entrar';
  $id('app-screen').classList.remove('visible');
  $id('onboard-screen').classList.remove('visible');
  $id('auth-screen').classList.add('visible');
}

// ── INICIALIZAR CORRIGIDO COM RLS ─────────────────────────────
async function inicializar() {
  try {
    console.log('🔧 Inicializando sistema...');
    
    // MUDANÇA CRÍTICA: Remover filtros manuais de tenant_id, confiar no RLS
    const usuarios = await supa('GET', 'fin_usuarios', { params: { select: '*', limit: 1 } });
    if (!usuarios || !usuarios.length) {
      console.log('👤 Usuário não encontrado, iniciando onboarding...');
      APP.nomeTemp = APP.nomeTemp || 'Usuário';
      iniciarOnboarding();
      return;
    }
    APP.user = usuarios[0];
    console.log('👤 Usuário carregado:', APP.user.nome, '| Tenant:', APP.user.tenant_id);
    
    // CRÍTICO: Setar tenant_id no JWT para RLS funcionar
    await setTenantIdInJWT(APP.user.tenant_id);
    
    const tenants = await supa('GET', 'fin_tenants', { params: { id: `eq.${APP.user.tenant_id}`, select: '*' } });
    APP.tenant = tenants[0];
    console.log('🏢 Empresa carregada:', APP.tenant.nome);
    
    await carregarDados();
    mostrarApp();
  } catch(e) {
    console.error('❌ Erro ao inicializar:', e);
    toast('Erro ao carregar: ' + e.message, 'error');
  }
}

// ── CARREGAR DADOS CORRIGIDO COM RLS ──────────────────────────
async function carregarDados() {
  try {
    console.log('📊 Carregando dados via RLS...');
    
    // MUDANÇA CRÍTICA: Remover filtros manuais de tenant_id, deixar RLS fazer o trabalho
    const [contas, cats, clis, fors, recs, desps, metas, recorr] = await Promise.all([
      supa('GET', 'fin_contas',        { params: { ativo: 'eq.true', select: '*' } }),
      supa('GET', 'fin_categorias',    { params: { ativo: 'eq.true', select: '*', order: 'nome.asc' } }),
      supa('GET', 'fin_clientes',      { params: { ativo: 'eq.true', select: '*', order: 'nome.asc' } }),
      supa('GET', 'fin_fornecedores',  { params: { ativo: 'eq.true', select: '*', order: 'nome.asc' } }),
      supa('GET', 'fin_receitas',      { params: { select: '*', order: 'vencimento.desc', limit: 200 } }),
      supa('GET', 'fin_despesas',      { params: { select: '*', order: 'vencimento.desc', limit: 200 } }),
      supa('GET', 'fin_metas',         { params: { select: '*', order: 'prazo.asc' } }).catch(()=>[]),
      supa('GET', 'fin_recorrencias',  { params: { select: '*', order: 'criado_em.asc' } }).catch(()=>[]),
    ]);
    
    CONTAS = contas; CATEGORIAS = cats; CLIENTES = clis;
    FORNECEDORES = fors; RECEITAS = recs; DESPESAS = desps; 
    METAS = metas; RECORRENCIAS = recorr;
    
    console.log('✅ Dados carregados via RLS:', {
      contas: contas.length,
      categorias: cats.length,
      clientes: clis.length,
      fornecedores: fors.length,
      receitas: recs.length,
      despesas: desps.length,
      metas: metas.length,
      recorrencias: recorr.length
    });
  } catch(e) {
    console.error('❌ Erro ao carregar dados via RLS:', e);
    toast('Erro ao carregar dados: ' + e.message, 'error');
  }
}

function obNext1() {
  const empresa = ($id('ob-empresa')||{}).value?.trim();
  const setor   = ($id('ob-setor')||{}).value;
  if (!empresa) { toast('Informe o nome da empresa.', 'error'); return; }
  OB.empresa = empresa; OB.setor = setor; OB.step = 2; renderOnboard();
}
function obNext2() {
  OB.contaNome  = $id('ob-conta-nome').value.trim() || 'Caixa';
  OB.contaTipo  = $id('ob-conta-tipo').value;
  OB.contaSaldo = parseFloat($id('ob-conta-saldo').value) || 0;
  OB.step = 3; renderOnboard();
}
function obNext3() { OB.step = 4; renderOnboard(); }

function toggleCat(i) {
  const idx = OB.categoriasSel.indexOf(i);
  if (idx === -1) OB.categoriasSel.push(i); else OB.categoriasSel.splice(idx, 1);
  document.querySelectorAll('.categoria-chip').forEach((el, j) => el.classList.toggle('selected', OB.categoriasSel.includes(j)));
}

async function finalizarOnboarding() {
  const btn = $id('btn-finalizar');
  btn.disabled = true; btn.textContent = 'Criando...';
  try {
    console.log('🔧 Finalizando onboarding...');
    
    // Criar tenant
    const tenants = await supa('POST', 'fin_tenants', { 
      body: { nome: OB.empresa, setor: OB.setor }, 
      returning: true 
    });
    const tenant = tenants[0];
    console.log('🏢 Tenant criado:', tenant.id, '-', tenant.nome);
    
    // Pegar auth user info
    const authUser = await fetch(`${SUPA_URL}/auth/v1/user`, {
      headers: { apikey: SUPA_KEY, Authorization: `Bearer ${APP.token}` }
    }).then(r => r.json());
    
    // Criar usuário
    await supa('POST', 'fin_usuarios', { 
      body: { 
        tenant_id: tenant.id, 
        auth_id: authUser.id, 
        nome: APP.nomeTemp, 
        email: authUser.email, 
        perfil: 'admin' 
      } 
    });
    console.log('👤 Usuário criado:', APP.nomeTemp);
    
    // CRÍTICO: Setar tenant_id no JWT antes de continuar
    await setTenantIdInJWT(tenant.id);
    
    // Agora podemos criar conta e categorias sem especificar tenant_id manualmente (RLS fará)
    await supa('POST', 'fin_contas', { 
      body: { 
        nome: OB.contaNome, 
        tipo: OB.contaTipo, 
        saldo_inicial: OB.contaSaldo, 
        saldo_atual: OB.contaSaldo 
      } 
    });
    console.log('🏦 Conta criada:', OB.contaNome);
    
    const cats = OB.categoriasSel.length > 0 ? OB.categoriasSel.map(i => CATEGORIAS_PADRAO[i]) : CATEGORIAS_PADRAO;
    if (cats.length > 0) {
      await supa('POST', 'fin_categorias', { 
        body: cats.map(c => ({ ...c, padrao: true })) // tenant_id será adicionado automaticamente pelo RLS
      });
      console.log('🏷️ Categorias criadas:', cats.length);
    }
    
    // Recarregar dados do usuário
    const usuarios = await supa('GET', 'fin_usuarios', { params: { select: '*', limit: 1 } });
    APP.user = usuarios[0];
    APP.tenant = tenant;
    
    await carregarDados();
    mostrarApp();
  } catch(e) {
    console.error('❌ Erro no onboarding:', e);
    toast('Erro: ' + e.message, 'error');
    btn.disabled = false; btn.textContent = 'Começar →';
  }
}

        <div class="kpi-value" style="color: var(--red);">R$ 0,00</div>

        <div class="kpi-subtitle">${RECEITAS.filter(r => r.status === 'pendente').length} pendente(s)</div>
      </div>
    </div>
    
    <div class="content-card">
      <h3 style="margin-bottom: 16px; display: flex; align-items: center; gap: 8px;">

      </h3>

      </p>
      <button class="btn btn-gold" onclick="testarRLS()">🧪 Executar Teste RLS</button>
    </div>
  `;

// ── UTILS ─────────────────────────────────────────────────────
function fmtMoeda(valor) {
  return new Intl.NumberFormat('pt-BR', {
    style: 'currency',
    currency: 'BRL'
  }).format(valor || 0);
}

function today() {
  return new Date().toISOString().split('T')[0];
}

// Adicionar função de teste ao escopo global para acesso via console
window.testarRLS = testarRLS;

// ── MODAL ─────────────────────────────────────────────────────
function openModal(title, body, footer) {
  $id('modal-title').innerHTML = title;
  $id('modal-body').innerHTML = body;
  $id('modal-footer').innerHTML = footer || '<button class="btn btn-outline" onclick="closeModal()">Fechar</button>';
  $id('modal-overlay').classList.add('visible');
}

function closeModal() {
  $id('modal-overlay').classList.remove('visible');
}

// ── INIT ──────────────────────────────────────────────────────
window.addEventListener('load', () => {
  $id('auth-screen').classList.add('visible');
  console.log('🚀 Financeiro Pro carregado - versão com RLS corrigido');
  console.log('💡 Para testar RLS após login, execute: testarRLS()');
});
</script>

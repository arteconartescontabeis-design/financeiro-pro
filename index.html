async function salvarEdicaoConta(id) {
  const nome = $id('ect-nome').value.trim();
  if (!nome) { toast('Informe o nome.', 'error'); return; }
  try {
    const atualizada = await supa('PATCH', 'fin_contas', { params: { id: `eq.${id}` }, returning: true, body: {
      nome, tipo: $id('ect-tipo').value,
      banco: $id('ect-banco').value||null,
      saldo_atual: parseFloat($id('ect-saldo').value)||0,
    }});
    closeModal(); toast('Conta atualizada!', 'success');
    // ── Performance · Fase B ──
    if (Array.isArray(atualizada) && atualizada[0]) atualizarLocal(CONTAS, atualizada[0]);
    rerenderTelaAtual();
  } catch(e) { toast('Erro: ' + e.message, 'error'); }
}

async function excluirConta(id) {
  if (!await confirmarAcao('Excluir conta?', 'As movimentações vinculadas não serão removidas.')) return;
  try {
    await supa('PATCH', 'fin_contas', { params: { id: `eq.${id}` }, body: { ativo: false } });
    toast('Conta desativada.', 'success');
    // ── Performance · Fase B ──
    // Soft-delete: ativo=false. O array CONTAS só guarda os ativos,
    // então removemos localmente pra refletir o filtro.
    removerLocal(CONTAS, id);
    rerenderTelaAtual();
  } catch(e) { toast('Erro: ' + e.message, 'error'); }
}

// ── FLUXO DE CAIXA ────────────────────────────────────────────
function renderFluxo() {
  const periodoSel = window._fluxoPeriodo || '6m';
  const hoje = new Date();
  const anoAtual = hoje.getFullYear();
  const mesAtual = String(hoje.getMonth()+1).padStart(2,'0');
  const meses = {};

  function getMeses() {
    const filtrar = (l, tipo) => {
      const m = l.vencimento?.slice(0,7); if (!m) return;
      if (periodoSel === 'ano' && !m.startsWith(String(anoAtual))) return;
      if (periodoSel === '6m') {
        const limite = new Date(); limite.setMonth(limite.getMonth()-5);
        const limStr = limite.getFullYear()+'-'+String(limite.getMonth()+1).padStart(2,'0');
        if (m < limStr) return;
      }
      if (!meses[m]) meses[m] = { rec:0, desp:0, recReal:0, despReal:0 };
      if (tipo === 'rec') { meses[m].rec += parseFloat(l.valor)||0; if (l.status==='recebido') meses[m].recReal += parseFloat(l.valor)||0; }
      else { meses[m].desp += parseFloat(l.valor)||0; if (l.status==='pago') meses[m].despReal += parseFloat(l.valor)||0; }
    };
    RECEITAS.forEach(r => filtrar(r,'rec'));
    DESPESAS.forEach(d => filtrar(d,'desp'));
    return meses;
  }

  const mesObj = getMeses();

  // ── PERFORMANCE v21 — sobrescreve mesObj com dados da RPC quando disponível ──
  // Chaves do mesObj: { rec, desp, recReal, despReal }
  // RPC fin_fluxo retorna: { mes, rec_previsto, rec_realizado, desp_previsto, desp_realizado }
  (function() {
    let _diIni, _diFim;
    if (periodoSel === '6m') {
      const _d = new Date(); _d.setMonth(_d.getMonth() - 5);
      _diIni = `${_d.getFullYear()}-${String(_d.getMonth()+1).padStart(2,'0')}-01`;
      const _ult = new Date(anoAtual, hoje.getMonth()+1, 0).getDate();
      _diFim = `${anoAtual}-${mesAtual}-${String(_ult).padStart(2,'0')}`;
    } else if (periodoSel === 'ano') {
      _diIni = `${anoAtual}-01-01`;
      _diFim = `${anoAtual}-12-31`;
    } else {
      _diIni = '1900-01-01';
      _diFim = '2999-12-31';
    }
    const _rpcArgsFluxo = { p_tenant_id: APP.tenantId, p_data_inicio: _diIni, p_data_fim: _diFim };
    const _rpcFluxo = _rpcCacheGet('fin_fluxo', _rpcArgsFluxo);
    if (_rpcFluxo && Array.isArray(_rpcFluxo.meses)) {
      // Limpa mesObj e reconstroi a partir da RPC
      Object.keys(mesObj).forEach(k => delete mesObj[k]);
      _rpcFluxo.meses.forEach(it => {
        mesObj[it.mes] = {
          rec:      parseFloat(it.rec_previsto)   || 0,
          desp:     parseFloat(it.desp_previsto)  || 0,
          recReal:  parseFloat(it.rec_realizado)  || 0,
          despReal: parseFloat(it.desp_realizado) || 0,
        };
      });
    } else {
      _rpcAquecer('fin_fluxo', _rpcArgsFluxo, () => {
        if (APP.pagina === 'fluxo') renderFluxo();
      });
    }
  })();

  const lista = Object.keys(mesObj).sort();
  const maxVal = Math.max(...lista.map(m => Math.max(mesObj[m].rec, mesObj[m].desp)), 1);
  const totalRec  = lista.reduce((s,m)=>s+mesObj[m].rec,0);
  const totalDesp = lista.reduce((s,m)=>s+mesObj[m].desp,0);
  const totalRes  = totalRec - totalDesp;

  function barChart() {
    if (!lista.length) return '<div style="color:var(--text-3);font-size:13px;padding:20px 0;text-align:center">Sem dados no período</div>';
    const W=560, H=180, PAD=40, barW=Math.max(10, Math.min(38, (W-PAD*2)/lista.length/2.5));
    const gap = (W-PAD*2)/lista.length;
    const scale = v => H - PAD - (v/maxVal)*(H-PAD-10);
    let bars = '';
    lista.forEach((m,i) => {
      const x = PAD + i*gap;
      const r = mesObj[m].rec, d = mesObj[m].desp;
      const yr = scale(r), yd = scale(d);
      const [yr2,mo2] = m.split('-');
      bars += `
        <rect x="${x-barW-2}" y="${yr}" width="${barW}" height="${H-PAD-yr}" fill="var(--green)" opacity="${m===String(anoAtual)+'-'+mesAtual?'1':'0.5'}" rx="4"/>
        <rect x="${x+2}" y="${yd}" width="${barW}" height="${H-PAD-yd}" fill="var(--red)" opacity="${m===String(anoAtual)+'-'+mesAtual?'1':'0.5'}" rx="4"/>
        <text x="${x}" y="${H-8}" text-anchor="middle" font-size="10" fill="var(--text-3)" font-family="DM Mono">${mo2}/${yr2.slice(2)}</text>`;
    });
    for (let i=1; i<=3; i++) {
      const y = 10 + (i/4)*(H-PAD-10);
      bars = `<line x1="${PAD}" y1="${y.toFixed(0)}" x2="${W}" y2="${y.toFixed(0)}" stroke="var(--border)" stroke-width="1" stroke-dasharray="3,3"/>` + bars;
    }
    return `<svg width="100%" viewBox="0 0 ${W} ${H}" style="overflow:visible">
      <line x1="${PAD}" y1="10" x2="${PAD}" y2="${H-PAD}" stroke="var(--border)" stroke-width="1"/>
      <line x1="${PAD}" y1="${H-PAD}" x2="${W}" y2="${H-PAD}" stroke="var(--border)" stroke-width="1"/>
      ${bars}
    </svg>`;
  }

  function btnPeriodo(p, label) {
    const active = periodoSel === p;
    return `<button onclick="window._fluxoPeriodo='${p}';renderFluxo()" style="padding:7px 14px;border-radius:9px;border:1.5px solid ${active?'var(--gold)':'var(--border-lt)'};background:${active?'var(--gold-lt)':'transparent'};color:${active?'var(--gold)':'var(--text-2)'};font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;transition:var(--tr)">${label}</button>`;
  }

  $id('page-content').innerHTML = `
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px">
    <div style="display:flex;gap:6px">
      ${btnPeriodo('6m','6 meses')}${btnPeriodo('ano','Este ano')}${btnPeriodo('tudo','Tudo')}
    </div>
    <button class="btn btn-sm" style="background:var(--surface-2);color:var(--text-2);border:1px solid var(--border-lt)" onclick="gerarPdfFluxo()">⬇ PDF</button>
  </div>

  <div class="kpi-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:20px">
    <div class="kpi-card k-green"><div class="kpi-label">Total Entradas</div><div class="kpi-value" style="color:var(--green)">${fmtMoeda(totalRec)}</div><div class="kpi-sub">previsto no período</div></div>
    <div class="kpi-card k-red"><div class="kpi-label">Total Saídas</div><div class="kpi-value" style="color:var(--red)">${fmtMoeda(totalDesp)}</div><div class="kpi-sub">previsto no período</div></div>
    <div class="kpi-card ${totalRes>=0?'k-green':'k-red'}"><div class="kpi-label">Resultado</div><div class="kpi-value" style="color:${totalRes>=0?'var(--green)':'var(--red)'}">${fmtMoeda(totalRes)}</div><div class="kpi-sub">${totalRes>=0?'positivo':'negativo'}</div></div>
  </div>

  <div class="card" style="margin-bottom:20px">
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:16px">
      <strong style="font-size:14px;color:var(--text)">Entradas × Saídas</strong>
      <div style="display:flex;gap:12px;font-size:11px">
        <span style="display:flex;align-items:center;gap:5px"><span style="width:8px;height:8px;border-radius:2px;background:var(--green);display:inline-block"></span>Entradas</span>
        <span style="display:flex;align-items:center;gap:5px"><span style="width:8px;height:8px;border-radius:2px;background:var(--red);display:inline-block"></span>Saídas</span>
      </div>
    </div>
    ${barChart()}
  </div>

  <div class="card">
    <strong style="font-size:14px;display:block;margin-bottom:14px;color:var(--text)">Detalhamento Mensal</strong>
    ${lista.length === 0 ? '<div style="color:var(--text-3);font-size:13px;text-align:center;padding:20px">Sem dados no período selecionado</div>' :
    `<div class="table-wrap"><table>
      <thead><tr><th>Mês</th><th>Entradas (Prev.)</th><th>Saídas (Prev.)</th><th>Resultado</th><th>Realizado</th></tr></thead>
      <tbody>${lista.map((m) => {
        const res = mesObj[m].rec - mesObj[m].desp;
        const real = mesObj[m].recReal - mesObj[m].despReal;
        const [y,mo] = m.split('-');
        const isFut = m > String(anoAtual)+'-'+mesAtual;
        return `<tr style="${isFut?'opacity:.55':''}">
          <td style="font-weight:600;color:var(--text)">${mo}/${y}${isFut?` <span style="font-size:10px;color:var(--text-3)">(projeção)</span>`:''}</td>
          <td style="color:var(--green);font-family:var(--mono)">${fmtMoeda(mesObj[m].rec)}</td>
          <td style="color:var(--red);font-family:var(--mono)">${fmtMoeda(mesObj[m].desp)}</td>
          <td style="font-weight:700;font-family:var(--mono);color:${res>=0?'var(--green)':'var(--red)'}">${fmtMoeda(res)}</td>
          <td style="font-family:var(--mono);color:${real>=0?'var(--green)':'var(--red)'};">${fmtMoeda(real)}</td>
        </tr>`;
      }).join('')}
      <tr style="border-top:2px solid var(--border-lt);font-weight:700">
        <td style="color:var(--text)">Total</td>
        <td style="color:var(--green);font-family:var(--mono)">${fmtMoeda(totalRec)}</td>
        <td style="color:var(--red);font-family:var(--mono)">${fmtMoeda(totalDesp)}</td>
        <td style="font-family:var(--mono);color:${totalRes>=0?'var(--green)':'var(--red)'}">${fmtMoeda(totalRes)}</td>
        <td></td>
      </tr>
      </tbody>
    </table></div>`}
  </div>`;
}

// ── DRE ───────────────────────────────────────────────────────
function renderDRE() {
  // Carregar plano financeiro em background (não-bloqueante) para o modo "plano"
  if (typeof _carregarContasFinanceirasSeNecessario === 'function') {
    _carregarContasFinanceirasSeNecessario().then(() => {
      // se o usuário ainda está no DRE e o modo é "plano", re-renderiza com dados completos
      if (APP.pagina === 'dre' && (window._dreModo || 'categoria') === 'plano') {
        renderDRE();
      }
    }).catch(()=>{});
  }

  const periodoSel = window._drePeriodo || 'mes';
  const modoSel    = window._dreModo    || 'categoria'; // 'categoria' | 'plano'
  const hoje = new Date();
  const anoAtual = hoje.getFullYear();
  const mesAtual = String(hoje.getMonth()+1).padStart(2,'0');
  const mesStr = String(anoAtual)+'-'+mesAtual;

  function filtrar(arr) {
    return arr.filter(l => {
      const m = l.vencimento?.slice(0,7);
      if (periodoSel === 'mes')  return m === mesStr;
      if (periodoSel === 'ano')  return m?.startsWith(String(anoAtual));
      return true;
    });
  }

  const recFilt  = filtrar(RECEITAS).filter(r => r.status === 'recebido');
  const despFilt = filtrar(DESPESAS).filter(d => d.status === 'pago');
  const recPrev  = filtrar(RECEITAS).filter(r => r.status === 'pendente');
  const despPrev = filtrar(DESPESAS).filter(d => d.status === 'pendente');

  // Função de agrupamento: por categoria (default) ou por conta financeira
  // Retorna a chave de agrupamento para um lançamento.
  const contasFin = (typeof PLANOS_STATE !== 'undefined' && PLANOS_STATE?.financeiro?.contas) || [];
  const contaFinById = new Map(contasFin.map(c => [c.id, c]));

  function chaveGrupo(lancamento) {
    if (modoSel === 'categoria') {
      return getNome(CATEGORIAS, lancamento.categoria_id) || '(sem categoria)';
    }
    // modo 'plano': usa conta_financeira_id da categoria
    const cat = CATEGORIAS.find(c => c.id === lancamento.categoria_id);
    if (!cat?.conta_financeira_id) return '(sem vínculo)';
    const cf = contaFinById.get(cat.conta_financeira_id);
    return cf ? `${cf.codigo} · ${cf.descricao}` : '(sem vínculo)';
  }

  const catRec = {}, catDesp = {};
  recFilt.forEach(r  => { const c=chaveGrupo(r); catRec[c]  = (catRec[c]||0)  + (parseFloat(r.valor)||0); });
  despFilt.forEach(d => { const c=chaveGrupo(d); catDesp[c] = (catDesp[c]||0) + (parseFloat(d.valor)||0); });

  let totalRec   = Object.values(catRec).reduce((s,v)=>s+v,0);
  let totalDesp  = Object.values(catDesp).reduce((s,v)=>s+v,0);
  let totalPrevR = recPrev.reduce((s,r)=>s+(parseFloat(r.valor)||0),0);
  let totalPrevD = despPrev.reduce((s,d)=>s+(parseFloat(d.valor)||0),0);

  // ── PERFORMANCE — sobrescreve com dados da RPC quando disponível ──
  // Cada modo usa uma RPC diferente:
  //   modo 'categoria' → fin_dre        (v21) agrupa por categoria.nome
  //   modo 'plano'     → fin_dre_por_plano (v22) agrupa por conta financeira
  // Se a RPC ainda não está em cache, dispara aquecimento e usa cálculo local.
  {
    let _diIni, _diFim;
    if (periodoSel === 'mes') {
      _diIni = `${anoAtual}-${mesAtual}-01`;
      const _ult = new Date(anoAtual, hoje.getMonth()+1, 0).getDate();
      _diFim = `${anoAtual}-${mesAtual}-${String(_ult).padStart(2,'0')}`;
    } else if (periodoSel === 'ano') {
      _diIni = `${anoAtual}-01-01`;
      _diFim = `${anoAtual}-12-31`;
    } else {
      _diIni = '1900-01-01';
      _diFim = '2999-12-31';
    }
    const _rpcArgsDre = { p_tenant_id: APP.tenantId, p_data_inicio: _diIni, p_data_fim: _diFim };

    if (modoSel === 'categoria') {
      const _rpcDre = _rpcCacheGet('fin_dre', _rpcArgsDre);
      if (_rpcDre && Array.isArray(_rpcDre.por_categoria_receita)) {
        const _catRec = {}, _catDesp = {};
        _rpcDre.por_categoria_receita.forEach(it => { _catRec[it.categoria] = parseFloat(it.valor) || 0; });
        _rpcDre.por_categoria_despesa.forEach(it => { _catDesp[it.categoria] = parseFloat(it.valor) || 0; });
        Object.keys(catRec).forEach(k => delete catRec[k]);
        Object.keys(catDesp).forEach(k => delete catDesp[k]);
        Object.assign(catRec, _catRec);
        Object.assign(catDesp, _catDesp);
        totalRec   = parseFloat(_rpcDre.rec_realizada)  || 0;
        totalDesp  = parseFloat(_rpcDre.desp_realizada) || 0;
        totalPrevR = parseFloat(_rpcDre.rec_pendente)   || 0;
        totalPrevD = parseFloat(_rpcDre.desp_pendente)  || 0;
      } else {
        _rpcAquecer('fin_dre', _rpcArgsDre, () => {
          if (APP.pagina === 'dre') renderDRE();
        });
      }
    } else if (modoSel === 'plano') {
      // RPC fin_dre_por_plano retorna {codigo, descricao, grupo, valor}.
      // A chave de exibição precisa bater com a do cálculo local: "código · descrição"
      // (ou "(sem vínculo)" pra categorias sem conta financeira).
      const _rpcPlano = _rpcCacheGet('fin_dre_por_plano', _rpcArgsDre);
      if (_rpcPlano && Array.isArray(_rpcPlano.por_plano_receita)) {
        const chaveDe = (it) => {
          if (!it.codigo || it.codigo === '(sem vínculo)') return '(sem vínculo)';
          return `${it.codigo} · ${it.descricao || ''}`.trim();
        };
        const _catRec = {}, _catDesp = {};
        _rpcPlano.por_plano_receita.forEach(it => { _catRec[chaveDe(it)] = (parseFloat(it.valor) || 0); });
        _rpcPlano.por_plano_despesa.forEach(it => { _catDesp[chaveDe(it)] = (parseFloat(it.valor) || 0); });
        Object.keys(catRec).forEach(k => delete catRec[k]);
        Object.keys(catDesp).forEach(k => delete catDesp[k]);
        Object.assign(catRec, _catRec);
        Object.assign(catDesp, _catDesp);
        totalRec   = parseFloat(_rpcPlano.rec_realizada)  || 0;
        totalDesp  = parseFloat(_rpcPlano.desp_realizada) || 0;
        totalPrevR = parseFloat(_rpcPlano.rec_pendente)   || 0;
        totalPrevD = parseFloat(_rpcPlano.desp_pendente)  || 0;
      } else {
        _rpcAquecer('fin_dre_por_plano', _rpcArgsDre, () => {
          if (APP.pagina === 'dre') renderDRE();
        });
      }
    }
  }

  const resultado  = totalRec - totalDesp;
  const margem     = totalRec > 0 ? Math.round((resultado/totalRec)*100) : 0;

  // Aviso de categorias sem vínculo (apenas no modo "plano")
  let avisoSemVinculo = '';
  if (modoSel === 'plano') {
    const semVincValor = (catRec['(sem vínculo)'] || 0) + (catDesp['(sem vínculo)'] || 0);
    const semVincQtd   = CATEGORIAS.filter(c => !c.conta_financeira_id).length;
    if (semVincValor > 0 || semVincQtd > 0) {
      avisoSemVinculo = `
        <div style="background:rgba(212,175,55,.08);border:1px solid var(--gold);border-radius:10px;padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap">
          <div style="font-size:13px;color:var(--text-2)">
            <strong style="color:var(--gold)">⚠ ${semVincQtd} categoria${semVincQtd===1?'':'s'} sem vínculo</strong>
            ${semVincValor>0 ? ` — ${fmtMoeda(semVincValor)} no período aparecerão como "(sem vínculo)"` : ''}
          </div>
          <button class="btn btn-sm btn-gold" onclick="go('categorias')">Vincular agora</button>
        </div>`;
    }
  }

  function btnP(p, label) {
    const active = periodoSel === p;
    return `<button onclick="window._drePeriodo='${p}';renderDRE()" style="padding:7px 14px;border-radius:9px;border:1.5px solid ${active?'var(--gold)':'var(--border-lt)'};background:${active?'var(--gold-lt)':'transparent'};color:${active?'var(--gold)':'var(--text-2)'};font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer">${label}</button>`;
  }
  function btnM(m, label, ico) {
    const active = modoSel === m;
    return `<button onclick="window._dreModo='${m}';renderDRE()" title="Agrupar por ${label}" style="padding:7px 12px;border-radius:9px;border:1.5px solid ${active?'var(--gold)':'var(--border-lt)'};background:${active?'var(--gold-lt)':'transparent'};color:${active?'var(--gold)':'var(--text-2)'};font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px">${ico}<span>${label}</span></button>`;
  }

  const labelGrupo = modoSel === 'categoria' ? 'Categoria' : 'Plano Financeiro';

  $id('page-content').innerHTML = `
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px">
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      ${btnP('mes','Este mês')}${btnP('ano','Este ano')}${btnP('tudo','Tudo')}
      <span style="display:inline-block;width:1px;background:var(--border-lt);margin:0 4px"></span>
      ${btnM('categoria','Categoria','🏷')}${btnM('plano','Plano Financeiro','📊')}
    </div>
    <button class="btn btn-sm" style="background:var(--surface-2);color:var(--text-2);border:1px solid var(--border-lt)" onclick="gerarPdfDRE()">⬇ PDF</button>
  </div>
  ${avisoSemVinculo}

  <div class="kpi-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:20px">
    <div class="kpi-card k-green"><div class="kpi-label">Receitas Realizadas</div><div class="kpi-value" style="color:var(--green)">${fmtMoeda(totalRec)}</div><div class="kpi-sub">${fmtMoeda(totalPrevR)} a receber</div></div>
    <div class="kpi-card k-red"><div class="kpi-label">Despesas Realizadas</div><div class="kpi-value" style="color:var(--red)">${fmtMoeda(totalDesp)}</div><div class="kpi-sub">${fmtMoeda(totalPrevD)} a pagar</div></div>
    <div class="kpi-card ${resultado>=0?'k-green':'k-red'}"><div class="kpi-label">Resultado</div><div class="kpi-value" style="color:${resultado>=0?'var(--green)':'var(--red)'}">${fmtMoeda(resultado)}</div><div class="kpi-sub">${resultado>=0?'lucro':'prejuízo'}</div></div>
    <div class="kpi-card k-gold"><div class="kpi-label">Margem</div><div class="kpi-value" style="color:${margem>=0?'var(--gold)':'var(--red)'}">${margem}%</div><div class="kpi-sub">sobre receitas</div></div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px">
    <div class="card">
      <strong style="font-size:13.5px;display:block;margin-bottom:14px;color:var(--green)">↑ Receitas por ${labelGrupo}</strong>
      ${Object.keys(catRec).length === 0 ? '<div style="color:var(--text-3);font-size:13px">Nenhuma receita realizada no período</div>' :
      Object.entries(catRec).sort((a,b)=>b[1]-a[1]).map(([c,v]) => `
        <div style="margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px">
            <span style="font-size:13px;font-weight:500;color:var(--text)">${c}</span>
            <span style="font-family:var(--mono);font-size:12px;color:var(--green);font-weight:600">${fmtMoeda(v)}</span>
          </div>
          <div class="saldo-bar"><div class="saldo-fill" style="width:${Math.round(v/totalRec*100)}%;background:var(--green)"></div></div>
        </div>`).join('')}
      ${Object.keys(catRec).length > 0 ? `<div style="border-top:1px solid var(--border);padding-top:10px;margin-top:4px;display:flex;justify-content:space-between;font-weight:700;font-size:13px"><span style="color:var(--text)">Total</span><span style="color:var(--green);font-family:var(--mono)">${fmtMoeda(totalRec)}</span></div>` : ''}
    </div>
    <div class="card">
      <strong style="font-size:13.5px;display:block;margin-bottom:14px;color:var(--red)">↓ Despesas por ${labelGrupo}</strong>
      ${Object.keys(catDesp).length === 0 ? '<div style="color:var(--text-3);font-size:13px">Nenhuma despesa realizada no período</div>' :
      Object.entries(catDesp).sort((a,b)=>b[1]-a[1]).map(([c,v]) => `
        <div style="margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px">
            <span style="font-size:13px;font-weight:500;color:var(--text)">${c}</span>
            <span style="font-family:var(--mono);font-size:12px;color:var(--red);font-weight:600">${fmtMoeda(v)}</span>
          </div>
          <div class="saldo-bar"><div class="saldo-fill" style="width:${Math.round(v/totalDesp*100)}%;background:var(--red)"></div></div>
        </div>`).join('')}
      ${Object.keys(catDesp).length > 0 ? `<div style="border-top:1px solid var(--border);padding-top:10px;margin-top:4px;display:flex;justify-content:space-between;font-weight:700;font-size:13px"><span style="color:var(--text)">Total</span><span style="color:var(--red);font-family:var(--mono)">${fmtMoeda(totalDesp)}</span></div>` : ''}
    </div>
  </div>

  <div class="card">
    <strong style="font-size:14px;display:block;margin-bottom:14px;color:var(--text)">Resumo DRE</strong>
    <div class="table-wrap"><table>
      <thead><tr><th>Item</th><th style="text-align:right">Valor</th><th style="text-align:right">%</th></tr></thead>
      <tbody>
        <tr style="background:rgba(82,184,130,.08)"><td style="font-weight:700;color:var(--green)">Receitas Brutas</td><td style="text-align:right;font-family:var(--mono);font-weight:700;color:var(--green)">${fmtMoeda(totalRec)}</td><td style="text-align:right;color:var(--green)">100%</td></tr>
        ${Object.entries(catRec).sort((a,b)=>b[1]-a[1]).map(([c,v])=>`<tr><td style="padding-left:24px;color:var(--text-2)">${c}</td><td style="text-align:right;font-family:var(--mono);color:var(--green)">${fmtMoeda(v)}</td><td style="text-align:right;color:var(--text-3)">${Math.round(v/totalRec*100)||0}%</td></tr>`).join('')}
        <tr style="background:rgba(224,92,92,.08)"><td style="font-weight:700;color:var(--red)">(-) Despesas</td><td style="text-align:right;font-family:var(--mono);font-weight:700;color:var(--red)">${fmtMoeda(totalDesp)}</td><td style="text-align:right;color:var(--red)">${totalRec>0?Math.round(totalDesp/totalRec*100):0}%</td></tr>
        ${Object.entries(catDesp).sort((a,b)=>b[1]-a[1]).map(([c,v])=>`<tr><td style="padding-left:24px;color:var(--text-2)">${c}</td><td style="text-align:right;font-family:var(--mono);color:var(--red)">${fmtMoeda(v)}</td><td style="text-align:right;color:var(--text-3)">${totalRec>0?Math.round(v/totalRec*100):0}%</td></tr>`).join('')}
        <tr style="border-top:2px solid var(--border-lt);background:${resultado>=0?'rgba(82,184,130,.1)':'rgba(224,92,92,.1)'}">
          <td style="font-weight:700;color:${resultado>=0?'var(--green)':'var(--red)'}">${resultado>=0?'Lucro Líquido':'Prejuízo'}</td>
          <td style="text-align:right;font-family:var(--mono);font-weight:700;color:${resultado>=0?'var(--green)':'var(--red)'}">${fmtMoeda(resultado)}</td>
          <td style="text-align:right;font-weight:700;color:${resultado>=0?'var(--green)':'var(--red)'}">${margem}%</td>
        </tr>
      </tbody>
    </table></div>
  </div>`;
}

// ── RAZÃO CONTÁBIL ────────────────────────────────────────────
// Mostra todos os lançamentos (receitas + despesas) de uma conta contábil
// num período, em ordem cronológica, com saldo acumulado.
// Caminho: lançamento → categoria → conta_contabil_id → fin_plano_contabil
// Modo simplificado: apenas a perna de receita/despesa (sem contrapartida).
// Conta sintética soma todos os filhos (analíticas descendentes).
function renderRazao() {
  // Carregar plano contábil em background se necessário
  if (typeof _carregarContasFinanceirasSeNecessario === 'function') {
    if (!PLANOS_STATE?.contabil?.contas?.length && typeof planosCarregarDados === 'function') {
      planosCarregarDados().then(() => {
        if (APP.pagina === 'razao') renderRazao();
      }).catch(()=>{});
    }
  }

  const periodoSel = window._razaoPeriodo || 'mes';
  const contaSel   = window._razaoConta   || ''; // id da conta contábil
  const hoje = new Date();
  const anoAtual = hoje.getFullYear();
  const mesAtual = String(hoje.getMonth()+1).padStart(2,'0');
  const mesStr   = `${anoAtual}-${mesAtual}`;

  const contasCont = (PLANOS_STATE?.contabil?.contas) || [];
  const contaById  = new Map(contasCont.map(c => [c.id, c]));

  // Calcular conjunto de IDs descendentes (inclui o próprio) para sintéticas
  function descendentesDe(idRaiz) {
    const raiz = contaById.get(idRaiz);
    if (!raiz) return new Set();
    if (raiz.tipo === 'A') return new Set([idRaiz]);
    // Sintética: prefixo de código → todos com codigo começando com raiz.codigo
    const prefixo = raiz.codigo;
    const ids = new Set();
    contasCont.forEach(c => {
      if (c.codigo === prefixo || (c.codigo || '').startsWith(prefixo + '.')) {
        ids.add(c.id);
      }
    });
    return ids;
  }

  // Categorias cujo conta_contabil_id está dentro do conjunto selecionado
  function categoriasDaConta(idsContas) {
    return new Set(
      CATEGORIAS
        .filter(c => c.conta_contabil_id && idsContas.has(c.conta_contabil_id))
        .map(c => c.id)
    );
  }

  // Filtro de período
  function dentroPeriodo(dataStr) {
    const m = dataStr?.slice(0, 7);
    if (periodoSel === 'mes')  return m === mesStr;
    if (periodoSel === 'ano')  return m?.startsWith(String(anoAtual));
    return true;
  }
  function antesPeriodo(dataStr) {
    if (!dataStr) return false;
    if (periodoSel === 'tudo') return false;
    if (periodoSel === 'mes')  return dataStr < (mesStr + '-01');
    if (periodoSel === 'ano')  return dataStr < (anoAtual + '-01-01');
    return false;
  }

  // Selectbox hierárquico (igual estilo do plano de contas)
  function selectHierarquico() {
    if (!contasCont.length) {
      return `<select class="form-input" disabled style="min-width:280px"><option>Carregando plano contábil…</option></select>`;
    }
    const ordenadas = [...contasCont].sort((a, b) => (a.codigo || '').localeCompare(b.codigo || ''));
    const opts = ordenadas.map(c => {
      const indent = '&nbsp;&nbsp;'.repeat(Math.max(0, (c.nivel || 1) - 1));
      const tag = c.tipo === 'A' ? '' : ' [Sintética]';
      const sel = c.id === contaSel ? 'selected' : '';
      return `<option value="${c.id}" ${sel}>${indent}${c.codigo} · ${c.descricao}${tag}</option>`;
    }).join('');
    return `
      <select class="form-input" id="razao-conta-select" onchange="window._razaoConta=this.value;renderRazao()" style="min-width:340px;font-family:var(--mono);font-size:12px">
        <option value="">— Selecione uma conta contábil —</option>
        ${opts}
      </select>`;
  }

  function btnP(p, label) {
    const active = periodoSel === p;
    return `<button onclick="window._razaoPeriodo='${p}';renderRazao()" style="padding:7px 14px;border-radius:9px;border:1.5px solid ${active?'var(--gold)':'var(--border-lt)'};background:${active?'var(--gold-lt)':'transparent'};color:${active?'var(--gold)':'var(--text-2)'};font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer">${label}</button>`;
  }

  const cabecalho = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px">
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
        ${selectHierarquico()}
      </div>
      <div style="display:flex;gap:6px">
        ${btnP('mes','Este mês')}${btnP('ano','Este ano')}${btnP('tudo','Tudo')}
      </div>
    </div>`;

  // Estado: nenhuma conta selecionada
  if (!contaSel) {
    const totalContas = contasCont.length;
    const totalCatComVinc = CATEGORIAS.filter(c => c.conta_contabil_id).length;
    const totalCat = CATEGORIAS.length;
    $id('page-content').innerHTML = `
      ${cabecalho}
      <div class="card" style="text-align:center;padding:50px 20px">
        <div style="font-size:48px;margin-bottom:10px">📖</div>
        <strong style="font-size:15px;color:var(--text);display:block;margin-bottom:6px">Selecione uma conta contábil</strong>
        <div style="color:var(--text-3);font-size:13px;margin-bottom:16px">
          Escolha uma conta no seletor acima para ver seus lançamentos no período.
        </div>
        <div style="display:inline-flex;gap:18px;font-size:12px;color:var(--text-2);background:var(--surface-2);padding:10px 16px;border-radius:8px">
          <span><strong style="color:var(--gold)">${totalContas}</strong> contas no plano</span>
          <span><strong style="color:var(--gold)">${totalCatComVinc}/${totalCat}</strong> categorias vinculadas</span>
        </div>
        ${totalCatComVinc < totalCat ? `
          <div style="margin-top:14px">
            <button class="btn btn-sm" style="background:var(--surface-2);color:var(--text-2);border:1px solid var(--border-lt)" onclick="go('categorias')">Ver categorias sem vínculo</button>
          </div>` : ''}
      </div>`;
    return;
  }

  // Conta selecionada — montar razão
  const conta = contaById.get(contaSel);
  if (!conta) {
    $id('page-content').innerHTML = `${cabecalho}<div class="card" style="color:var(--red)">Conta não encontrada.</div>`;
    return;
  }

  const idsConta = descendentesDe(contaSel);
  const idsCategoria = categoriasDaConta(idsConta);

  // Coletar lançamentos
  function coletarLancamentos(arr, tipo) {
    return arr
      .filter(l => idsCategoria.has(l.categoria_id))
      .map(l => ({
        data: l.vencimento,
        historico: l.descricao || '(sem descrição)',
        documento: l.numero_documento || l.numero_doc || '',
        valor: parseFloat(l.valor) || 0,
        tipo, // 'R' (receita) ou 'D' (despesa)
        categoria: getNome(CATEGORIAS, l.categoria_id),
        status: l.status,
        id: l.id,
      }));
  }
  const todasReceitas = coletarLancamentos(RECEITAS.filter(r => r.status === 'recebido'), 'R');
  const todasDespesas = coletarLancamentos(DESPESAS.filter(d => d.status === 'pago'), 'D');
  const todos = [...todasReceitas, ...todasDespesas].sort((a, b) => (a.data || '').localeCompare(b.data || ''));

  // Saldo anterior (lançamentos antes do período)
  let saldoAnterior = 0;
  todos.forEach(l => {
    if (antesPeriodo(l.data)) {
      // Convenção contábil simplificada:
      // Conta de receita → crédito aumenta (entrada positiva)
      // Conta de despesa → débito aumenta (entrada positiva)
      // Para o razão, mostramos saldo "natural" da conta (positivo = movimento normal)
      saldoAnterior += l.valor;
    }
  });

  // Lançamentos do período
  const doPeriodo = todos.filter(l => dentroPeriodo(l.data));
  let saldo = saldoAnterior;

  // Determinar natureza da conta a partir do código (1 = ativo, 2 = passivo, 3 = PL, 4 = receita, 5 = despesa)
  // No nosso fin_plano_contabil pode usar grupo. Vamos inferir pelo grupo de pelo menos uma categoria.
  // Mais simples: olhar o tipo das categorias vinculadas — se a maioria forem receita, é "receita"; senão "despesa".
  let recCount = 0, despCount = 0;
  CATEGORIAS.forEach(c => {
    if (idsCategoria.has(c.id)) {
      if (c.tipo === 'receita') recCount++;
      else if (c.tipo === 'despesa') despCount++;
    }
  });
  const naturezaCredito = recCount >= despCount; // true = receita (crédito), false = despesa (débito)
  const colDebitoLabel  = naturezaCredito ? 'Estorno' : 'Débito';
  const colCreditoLabel = naturezaCredito ? 'Crédito' : 'Estorno';

  // Render
  const periodoLabel = periodoSel === 'mes' ? `${mesAtual}/${anoAtual}` : periodoSel === 'ano' ? `${anoAtual}` : 'Todo o período';
  const totalDeb = doPeriodo.filter(l => l.tipo === 'D').reduce((s, l) => s + l.valor, 0);
  const totalCre = doPeriodo.filter(l => l.tipo === 'R').reduce((s, l) => s + l.valor, 0);
  const totalMov = naturezaCredito ? totalCre - totalDeb : totalDeb - totalCre;
  const saldoFinal = saldoAnterior + totalMov;

  $id('page-content').innerHTML = `
    ${cabecalho}

    <div class="card" style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px">
        <div>
          <div style="font-family:var(--mono);font-size:11px;color:var(--text-3);margin-bottom:2px">${conta.codigo}</div>
          <strong style="font-size:16px;color:var(--text);display:block">${conta.descricao}</strong>
          <div style="font-size:12px;color:var(--text-3);margin-top:3px">
            ${conta.tipo === 'A' ? 'Conta analítica' : 'Conta sintética · agrega ' + (idsConta.size - 1) + ' conta(s) filha(s)'}
            · ${idsCategoria.size} categoria(s) vinculada(s)
            · ${periodoLabel}
          </div>
        </div>
        <div style="text-align:right">
          <div style="font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:.5px">Saldo do período</div>
          <div style="font-family:var(--mono);font-size:20px;font-weight:700;color:${saldoFinal >= 0 ? 'var(--green)' : 'var(--red)'}">${fmtMoeda(saldoFinal)}</div>
        </div>
      </div>
    </div>

    <div class="kpi-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:14px">
      <div class="kpi-card"><div class="kpi-label">Saldo Anterior</div><div class="kpi-value" style="color:var(--text-2)">${fmtMoeda(saldoAnterior)}</div><div class="kpi-sub">antes do período</div></div>
      <div class="kpi-card k-green"><div class="kpi-label">Movimentos a Crédito</div><div class="kpi-value" style="color:var(--green)">${fmtMoeda(totalCre)}</div><div class="kpi-sub">${doPeriodo.filter(l=>l.tipo==='R').length} lançamento(s)</div></div>
      <div class="kpi-card k-red"><div class="kpi-label">Movimentos a Débito</div><div class="kpi-value" style="color:var(--red)">${fmtMoeda(totalDeb)}</div><div class="kpi-sub">${doPeriodo.filter(l=>l.tipo==='D').length} lançamento(s)</div></div>
      <div class="kpi-card k-gold"><div class="kpi-label">Saldo Final</div><div class="kpi-value" style="color:var(--gold)">${fmtMoeda(saldoFinal)}</div><div class="kpi-sub">${doPeriodo.length} movimento(s) no período</div></div>
    </div>

    <div class="card">
      <strong style="font-size:13.5px;display:block;margin-bottom:14px;color:var(--text)">Movimentos cronológicos</strong>
      <div class="table-wrap"><table>
        <thead>
          <tr>
            <th style="width:90px">Data</th>
            <th>Histórico</th>
            <th>Categoria</th>
            <th style="width:90px">Doc.</th>
            <th style="text-align:right;width:120px">${colDebitoLabel}</th>
            <th style="text-align:right;width:120px">${colCreditoLabel}</th>
            <th style="text-align:right;width:130px">Saldo</th>
          </tr>
        </thead>
        <tbody>
          ${saldoAnterior !== 0 || periodoSel !== 'tudo' ? `
            <tr style="background:var(--surface-2)">
              <td colspan="4" style="font-style:italic;color:var(--text-3);font-size:12px">Saldo anterior</td>
              <td></td><td></td>
              <td style="text-align:right;font-family:var(--mono);font-weight:600;color:var(--text-2)">${fmtMoeda(saldoAnterior)}</td>
            </tr>` : ''}
          ${doPeriodo.length === 0 ? `
            <tr><td colspan="7" style="text-align:center;color:var(--text-3);padding:30px">Nenhum movimento no período.</td></tr>
          ` : doPeriodo.map(l => {
            // tipo R (receita) → crédito; tipo D (despesa) → débito
            // se conta natureza crédito (receita): R aumenta saldo; D estorna (diminui)
            // se conta natureza débito (despesa): D aumenta saldo; R estorna (diminui)
            const ehCredito = l.tipo === 'R';
            if (naturezaCredito) {
              saldo += ehCredito ? l.valor : -l.valor;
            } else {
              saldo += ehCredito ? -l.valor : l.valor;
            }
            const debCol = (ehCredito === naturezaCredito) ? '' : fmtMoeda(l.valor);
            const creCol = (ehCredito === naturezaCredito) ? fmtMoeda(l.valor) : '';
            const dataFmt = l.data ? l.data.split('-').reverse().join('/') : '';
            return `
              <tr>
                <td style="font-family:var(--mono);font-size:12px">${dataFmt}</td>
                <td>${l.historico}</td>
                <td style="font-size:12px;color:var(--text-2)">${l.categoria}</td>
                <td style="font-family:var(--mono);font-size:11px;color:var(--text-3)">${l.documento || '—'}</td>
                <td style="text-align:right;font-family:var(--mono);color:var(--red)">${debCol}</td>
                <td style="text-align:right;font-family:var(--mono);color:var(--green)">${creCol}</td>
                <td style="text-align:right;font-family:var(--mono);font-weight:600;color:${saldo >= 0 ? 'var(--text)' : 'var(--red)'}">${fmtMoeda(saldo)}</td>
              </tr>`;
          }).join('')}
          ${doPeriodo.length > 0 ? `
            <tr style="border-top:2px solid var(--border-lt);background:var(--surface-2);font-weight:700">
              <td colspan="4" style="color:var(--text)">Totais do período</td>
              <td style="text-align:right;font-family:var(--mono);color:var(--red)">${fmtMoeda(totalDeb)}</td>
              <td style="text-align:right;font-family:var(--mono);color:var(--green)">${fmtMoeda(totalCre)}</td>
              <td style="text-align:right;font-family:var(--mono);color:${saldoFinal >= 0 ? 'var(--text)' : 'var(--red)'}">${fmtMoeda(saldoFinal)}</td>
            </tr>` : ''}
        </tbody>
      </table></div>
    </div>`;
}

// ── BALANCETE ─────────────────────────────────────────────────
// Visão consolidada de todas as contas contábeis num período:
// código · descrição · saldo anterior · débitos · créditos · saldo atual.
// Sintéticas somam descendentes; analíticas mostram só os próprios.
// Click numa analítica abre o Razão daquela conta.
function renderBalancete() {
  if (!PLANOS_STATE?.contabil?.contas?.length && typeof planosCarregarDados === 'function') {
    planosCarregarDados().then(() => {
      if (APP.pagina === 'balancete') renderBalancete();
    }).catch(()=>{});
  }

  const periodoSel = window._balancetePeriodo || 'mes';
  const grupoSel   = window._balanceteGrupo   || 'todos'; // todos | receita | despesa | ativo | passivo
  const ocultarZero = window._balanceteOcultarZero !== false; // default: oculta sem movimento
  const hoje = new Date();
  const anoAtual = hoje.getFullYear();
  const mesAtual = String(hoje.getMonth()+1).padStart(2,'0');
  const mesStr   = `${anoAtual}-${mesAtual}`;

  const contasCont = (PLANOS_STATE?.contabil?.contas) || [];

  function dentroPeriodo(dataStr) {
    const m = dataStr?.slice(0, 7);
    if (periodoSel === 'mes')  return m === mesStr;
    if (periodoSel === 'ano')  return m?.startsWith(String(anoAtual));
    return true;
  }
  function antesPeriodo(dataStr) {
    if (!dataStr) return false;
    if (periodoSel === 'tudo') return false;
    if (periodoSel === 'mes')  return dataStr < (mesStr + '-01');
    if (periodoSel === 'ano')  return dataStr < (anoAtual + '-01-01');
    return false;
  }

  // Mapa: categoria_id → conta_contabil_id (e tipo da categoria)
  const catContaMap = new Map();
  CATEGORIAS.forEach(c => {
    if (c.conta_contabil_id) {
      catContaMap.set(c.id, { contaId: c.conta_contabil_id, tipo: c.tipo });
    }
  });

  // Para cada conta analítica, agregar movimentos (próprios + descendentes)
  // Estratégia: percorrer lançamentos uma vez, distribuir saldo por conta analítica
  // Depois rolar para sintéticas via prefixo de código.

  // Estrutura: { [contaId]: { antes: 0, debPer: 0, crePer: 0, naturezaCredito: bool } }
  const movPorConta = new Map();

  function aplicarLancamentos(arr, statusOk, tipoLanc /* 'R' ou 'D' */) {
    arr.forEach(l => {
      if (l.status !== statusOk) return;
      const cat = catContaMap.get(l.categoria_id);
      if (!cat) return;
      const contaId = cat.contaId;
      let m = movPorConta.get(contaId);
      if (!m) {
        m = { antes: 0, debPer: 0, crePer: 0, recCount: 0, despCount: 0 };
        movPorConta.set(contaId, m);
      }
      const valor = parseFloat(l.valor) || 0;
      // Contagem de tipos para inferir natureza
      if (cat.tipo === 'receita') m.recCount += valor;
      if (cat.tipo === 'despesa') m.despCount += valor;

      if (antesPeriodo(l.vencimento)) {
        // Saldo anterior: receita = +valor; despesa = +valor (saldo natural positivo)
        m.antes += valor;
      } else if (dentroPeriodo(l.vencimento)) {
        // Receita lançada → crédito; despesa lançada → débito
        if (tipoLanc === 'R') m.crePer += valor;
        else m.debPer += valor;
      }
    });
  }

  aplicarLancamentos(RECEITAS, 'recebido', 'R');
  aplicarLancamentos(DESPESAS, 'pago',     'D');

  // Sintéticas: agregar pelo prefixo de código
  // Construir saldos finais para cada conta
  const linhas = contasCont.map(c => {
    const m = movPorConta.get(c.id) || { antes: 0, debPer: 0, crePer: 0, recCount: 0, despCount: 0 };
    let antes = m.antes, deb = m.debPer, cre = m.crePer;
    let recVal = m.recCount, despVal = m.despCount;

    // Se sintética, somar todas as analíticas descendentes
    if (c.tipo !== 'A') {
      const prefixo = c.codigo + '.';
      contasCont.forEach(filho => {
        if (filho.id === c.id) return;
        if (filho.tipo !== 'A') return;
        if (!(filho.codigo || '').startsWith(prefixo)) return;
        const mf = movPorConta.get(filho.id);
        if (!mf) return;
        antes += mf.antes;
        deb   += mf.debPer;
        cre   += mf.crePer;
        recVal  += mf.recCount;
        despVal += mf.despCount;
      });
    }

    const naturezaCredito = recVal >= despVal;
    // Movimento líquido no período (saldo natural positivo)
    const movPeriodo = naturezaCredito ? (cre - deb) : (deb - cre);
    const saldoAtual = antes + movPeriodo;

    return {
      ...c,
      antes,
      deb,
      cre,
      saldoAtual,
      naturezaCredito,
      temMov: (deb !== 0 || cre !== 0 || antes !== 0),
    };
  });

  // Filtro por grupo
  function passaGrupo(linha) {
    if (grupoSel === 'todos') return true;
    if (linha.grupo) return linha.grupo === grupoSel;
    // Fallback: inferir pelo primeiro dígito do código (1=ativo, 2=passivo, 3=PL, 4=receita, 5=despesa)
    const prefDig = (linha.codigo || '')[0];
    if (grupoSel === 'receita')  return prefDig === '4' || prefDig === '3';
    if (grupoSel === 'despesa')  return prefDig === '5' || prefDig === '6';
    if (grupoSel === 'ativo')    return prefDig === '1';
    if (grupoSel === 'passivo')  return prefDig === '2';
    return true;
  }

  let visiveis = linhas.filter(passaGrupo);
  if (ocultarZero) visiveis = visiveis.filter(l => l.temMov);
  visiveis.sort((a,b) => (a.codigo || '').localeCompare(b.codigo || ''));

  // Totalizadores (só de analíticas para evitar dupla contagem)
  const analiticasVisiveis = visiveis.filter(l => l.tipo === 'A');
  const totalAntes = analiticasVisiveis.reduce((s,l) => s + l.antes, 0);
  const totalDeb   = analiticasVisiveis.reduce((s,l) => s + l.deb, 0);
  const totalCre   = analiticasVisiveis.reduce((s,l) => s + l.cre, 0);
  const totalSaldo = analiticasVisiveis.reduce((s,l) => s + l.saldoAtual, 0);

  // Helpers de UI
  function btnP(p, label) {
    const active = periodoSel === p;
    return `<button onclick="window._balancetePeriodo='${p}';renderBalancete()" style="padding:7px 14px;border-radius:9px;border:1.5px solid ${active?'var(--gold)':'var(--border-lt)'};background:${active?'var(--gold-lt)':'transparent'};color:${active?'var(--gold)':'var(--text-2)'};font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer">${label}</button>`;
  }
  function btnG(g, label) {
    const active = grupoSel === g;
    return `<button onclick="window._balanceteGrupo='${g}';renderBalancete()" style="padding:7px 12px;border-radius:9px;border:1.5px solid ${active?'var(--gold)':'var(--border-lt)'};background:${active?'var(--gold-lt)':'transparent'};color:${active?'var(--gold)':'var(--text-2)'};font-family:var(--font);font-size:11px;font-weight:600;cursor:pointer">${label}</button>`;
  }

  // Estado vazio
  if (!contasCont.length) {
    $id('page-content').innerHTML = `
      <div class="card" style="text-align:center;padding:50px 20px">
        <div style="font-size:48px;margin-bottom:10px">📊</div>
        <strong style="font-size:15px;color:var(--text);display:block;margin-bottom:6px">Carregando plano contábil…</strong>
        <div style="color:var(--text-3);font-size:13px">Aguarde um instante.</div>
      </div>`;
    return;
  }

  $id('page-content').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px">
      <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
        ${btnP('mes','Este mês')}${btnP('ano','Este ano')}${btnP('tudo','Tudo')}
        <span style="display:inline-block;width:1px;height:24px;background:var(--border-lt);margin:0 4px"></span>
        ${btnG('todos','Todas')}${btnG('receita','Receitas')}${btnG('despesa','Despesas')}${btnG('ativo','Ativo')}${btnG('passivo','Passivo')}
      </div>
      <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-2);cursor:pointer;user-select:none">
        <input type="checkbox" ${ocultarZero ? 'checked' : ''} onchange="window._balanceteOcultarZero=this.checked;renderBalancete()">
        Ocultar contas sem movimento
      </label>
    </div>

    <div class="kpi-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:14px">
      <div class="kpi-card"><div class="kpi-label">Saldo Anterior</div><div class="kpi-value" style="color:var(--text-2)">${fmtMoeda(totalAntes)}</div><div class="kpi-sub">soma das analíticas</div></div>
      <div class="kpi-card k-red"><div class="kpi-label">Total Débitos</div><div class="kpi-value" style="color:var(--red)">${fmtMoeda(totalDeb)}</div><div class="kpi-sub">no período</div></div>
      <div class="kpi-card k-green"><div class="kpi-label">Total Créditos</div><div class="kpi-value" style="color:var(--green)">${fmtMoeda(totalCre)}</div><div class="kpi-sub">no período</div></div>
      <div class="kpi-card k-gold"><div class="kpi-label">Saldo Final</div><div class="kpi-value" style="color:var(--gold)">${fmtMoeda(totalSaldo)}</div><div class="kpi-sub">${analiticasVisiveis.length} conta(s) analítica(s)</div></div>
    </div>

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <strong style="font-size:13.5px;color:var(--text)">Balancete · ${periodoSel === 'mes' ? mesAtual+'/'+anoAtual : periodoSel === 'ano' ? anoAtual : 'Todo o período'}</strong>
        <span style="font-size:11px;color:var(--text-3)">${visiveis.length} de ${linhas.length} conta(s)</span>
      </div>
      <div class="table-wrap"><table>
        <thead>
          <tr>
            <th style="width:120px">Código</th>
            <th>Descrição</th>
            <th style="text-align:right;width:130px">Saldo Anterior</th>
            <th style="text-align:right;width:120px">Débitos</th>
            <th style="text-align:right;width:120px">Créditos</th>
            <th style="text-align:right;width:130px">Saldo Atual</th>
          </tr>
        </thead>
        <tbody>
          ${visiveis.length === 0 ? `
            <tr><td colspan="6" style="text-align:center;color:var(--text-3);padding:30px">
              Nenhuma conta com movimento no período.${ocultarZero ? ' Desmarque "Ocultar contas sem movimento" para ver todas.' : ''}
            </td></tr>
          ` : visiveis.map(l => {
            const isSint = l.tipo !== 'A';
            const indent = '&nbsp;&nbsp;&nbsp;'.repeat(Math.max(0, (l.nivel || 1) - 1));
            const corLinha = isSint ? 'var(--surface-2)' : 'transparent';
            const peso = isSint ? '600' : '400';
            const corText = isSint ? 'var(--text)' : 'var(--text-2)';
            const cursor = l.tipo === 'A' ? 'pointer' : 'default';
            const onclickAttr = l.tipo === 'A'
              ? `onclick="window._razaoConta='${l.id}';window._razaoPeriodo='${periodoSel}';go('razao')" title="Ver razão desta conta"`
              : '';
            const corSaldo = l.saldoAtual >= 0 ? 'var(--text)' : 'var(--red)';
            return `
              <tr style="background:${corLinha};cursor:${cursor}" ${onclickAttr}>
                <td style="font-family:var(--mono);font-size:12px;font-weight:${peso};color:${corText}">${indent}${l.codigo}${isSint ? ' ▸' : ''}</td>
                <td style="font-weight:${peso};color:${corText}">${l.descricao}</td>
                <td style="text-align:right;font-family:var(--mono);font-size:12px;color:var(--text-2)">${l.antes !== 0 ? fmtMoeda(l.antes) : '—'}</td>
                <td style="text-align:right;font-family:var(--mono);font-size:12px;color:${l.deb > 0 ? 'var(--red)' : 'var(--text-3)'}">${l.deb > 0 ? fmtMoeda(l.deb) : '—'}</td>
                <td style="text-align:right;font-family:var(--mono);font-size:12px;color:${l.cre > 0 ? 'var(--green)' : 'var(--text-3)'}">${l.cre > 0 ? fmtMoeda(l.cre) : '—'}</td>
                <td style="text-align:right;font-family:var(--mono);font-size:12px;font-weight:${peso};color:${corSaldo}">${fmtMoeda(l.saldoAtual)}</td>
              </tr>`;
          }).join('')}
          ${visiveis.length > 0 ? `
            <tr style="border-top:2px solid var(--border-lt);background:var(--surface-2);font-weight:700">
              <td colspan="2" style="color:var(--text)">Totais (analíticas)</td>
              <td style="text-align:right;font-family:var(--mono);color:var(--text-2)">${fmtMoeda(totalAntes)}</td>
              <td style="text-align:right;font-family:var(--mono);color:var(--red)">${fmtMoeda(totalDeb)}</td>
              <td style="text-align:right;font-family:var(--mono);color:var(--green)">${fmtMoeda(totalCre)}</td>
              <td style="text-align:right;font-family:var(--mono);color:${totalSaldo >= 0 ? 'var(--text)' : 'var(--red)'}">${fmtMoeda(totalSaldo)}</td>
            </tr>` : ''}
        </tbody>
      </table></div>
      ${visiveis.some(l => l.tipo === 'A') ? `
        <div style="margin-top:10px;font-size:11px;color:var(--text-3)">
          💡 Clique em uma conta analítica para abrir seu Razão.
        </div>` : ''}
    </div>`;
}

      : pagList.map(c => `<tr>
          <td style="font-weight:500;color:var(--text)">${c.nome}</td>

          <td style="color:var(--text-2)">${c.telefone||'—'}</td>

            <div style="display:flex;gap:5px">

              ${podeExcluir('cadastros') ? `<button onclick="excluirCliente('${c.id}')" class="btn btn-sm" style="padding:4px 10px;font-size:11px;background:var(--red-lt);color:var(--red);border:1px solid rgba(192,57,43,.2)">✕</button>` : ''}

        </tr>`).join('')}

  </table></div>

async function salvarCliente() {
  const nome = $id('ncli-nome').value.trim();
  if (!nome) { toast('Informe o nome.', 'error'); return; }

// ── Helper: garante que PLANOS_STATE.financeiro.contas está carregado ──
async function _carregarContasFinanceirasSeNecessario() {
  if (PLANOS_STATE?.financeiro?.contas?.length) return;
  if (typeof planosCarregarDados === 'function') {
    await planosCarregarDados();
  }
}

// ── Datalist com contas financeiras analíticas (para o modal) ──
function _datalistContasFinanceiras(idDatalist) {
  const contas = (PLANOS_STATE?.financeiro?.contas || [])
    .filter(c => c.tipo === 'A' && c.ativo !== false)
    .sort((a,b) => (a.codigo||'').localeCompare(b.codigo||''));
  const opts = contas.map(c => `<option data-id="${c.id}" value="${c.codigo} · ${c.descricao}"></option>`).join('');
  return `<datalist id="${idDatalist}">${opts}</datalist>`;
}

function _resolveContaFinanceira(textoInput) {
  if (!textoInput) return null;
  const codigo = textoInput.split('·')[0].trim();
  const c = (PLANOS_STATE?.financeiro?.contas || []).find(c => c.codigo === codigo && c.tipo === 'A');
  return c?.id || null;
}

function _labelContaFinanceira(id) {
  const c = (PLANOS_STATE?.financeiro?.contas || []).find(c => c.id === id);
  return c ? `${c.codigo} · ${c.descricao}` : '';
}

async function salvarCategoria() {
  const nome = $id('ncat-nome').value.trim();
  if (!nome) { toast('Informe o nome.', 'error'); return; }
  try {
    const payload = {
      tenant_id: APP.tenantId, nome,
      tipo:  $id('ncat-tipo').value,
      icone: $id('ncat-icone').value || '📁',
    };
    const planoTexto = $id('ncat-plano')?.value?.trim();
    if (planoTexto) {
      const cfId = _resolveContaFinanceira(planoTexto);
      if (cfId) payload.conta_financeira_id = cfId;
    }
    const criada = await supa('POST', 'fin_categorias', { returning: true, body: payload });
    closeModal(); toast('Categoria criada!', 'success');
    if (Array.isArray(criada) && criada[0]) atualizarLocal(CATEGORIAS, criada[0]);
    rerenderTelaAtual();
  } catch(e) { toast('Erro: ' + e.message, 'error'); }

async function salvarEdicaoCategoria(id) {
  const nome = $id('ecat-nome').value.trim();
  if (!nome) { toast('Informe o nome.', 'error'); return; }
  try {
    const planoTexto = $id('ecat-plano')?.value?.trim();
    const update = {
      nome,
      tipo:  $id('ecat-tipo').value,
      icone: $id('ecat-icone').value || '📁',
      conta_financeira_id: planoTexto ? _resolveContaFinanceira(planoTexto) : null,
    };
    await supa('PATCH', 'fin_categorias', { params: { id: 'eq.' + id }, body: update });
    const c = CATEGORIAS.find(x => x.id === id);
    if (c) Object.assign(c, update);
    // Invalida cache RPC: vínculo categoria→conta afeta fin_dre_por_plano
    if (typeof invalidarCacheDashboard === 'function') invalidarCacheDashboard();
    closeModal();
    toast('Categoria atualizada.', 'success');
    rerenderTelaAtual();
  } catch(e) { toast('Erro: ' + e.message, 'error'); }
}

  try {
    await supa('PATCH', 'fin_categorias', { params: { id: 'eq.' + id }, body: { ativo: false } });
    removerLocal(CATEGORIAS, id);
    closeModal();
    toast('Categoria desativada.', 'success');
    rerenderTelaAtual();
  } catch(e) { toast('Erro: ' + e.message, 'error'); }
}

// ── Modal de vinculação em lote (sugestões automáticas via RPC) ──
async function modalVincularLote() {
  if (!isAdmin() && !podeEditar('cadastros')) {
    toast('Sem permissão.', 'error'); return;
  }
  await _carregarContasFinanceirasSeNecessario();

  // Carrega sugestões via RPC
  let sugestoes = [];
  try {
    sugestoes = await supaRpc('fin_categorias_sugerir_vinculo', { p_tenant_id: APP.tenantId }) || [];
  } catch(e) { console.warn('sugerir_vinculo:', e.message); }

  const semVinculo = CATEGORIAS.filter(c => !c.conta_financeira_id);
  if (semVinculo.length === 0) {
    toast('Todas as categorias já estão vinculadas!', 'success'); return;
  }

  // Mapa categoria_id → sugestão
  const sugMap = new Map();
  sugestoes.forEach(s => sugMap.set(s.categoria_id, s));

  const linhas = semVinculo.map(c => {
    const s = sugMap.get(c.id);
    const sugLabel = s ? `${s.conta_codigo} · ${s.conta_descricao}` : '';
    return `
      <tr>
        <td style="padding:6px 8px">
          <span style="font-weight:600">${c.icone||'📁'} ${c.nome}</span>
          <span class="badge ${c.tipo==='receita'?'badge-green':c.tipo==='despesa'?'badge-red':'badge-gray'}" style="margin-left:6px">${c.tipo}</span>
        </td>
        <td style="padding:6px 8px">
          <input class="form-input" id="vl-${c.id}" list="dl-plano-fin-lote"
            value="${sugLabel}" placeholder="Digite ou selecione..."
            style="font-size:12px;padding:5px 8px" autocomplete="off">
          ${s ? `<div style="font-size:10px;color:var(--text-3);margin-top:2px">💡 sugestão (${(s.similaridade*100).toFixed(0)}% similar)</div>` : ''}
        </td>
      </tr>`;
  }).join('');

  openModal('Vincular Categorias ao Plano Financeiro', `
    <div style="font-size:12.5px;color:var(--text-2);margin-bottom:14px;line-height:1.6">
      ${semVinculo.length} categoria${semVinculo.length>1?'s':''} sem vínculo. As sugestões abaixo foram geradas automaticamente por similaridade de nome — revise e ajuste antes de salvar.
    </div>
    <div style="max-height:50vh;overflow-y:auto;border:1px solid var(--border);border-radius:8px">
      <table style="width:100%;font-size:12.5px">
        <thead style="background:var(--surface-2);position:sticky;top:0;z-index:1">
          <tr>
            <th style="text-align:left;padding:8px;font-weight:700">Categoria</th>
            <th style="text-align:left;padding:8px;font-weight:700">Conta do Plano Financeiro</th>
          </tr>
        </thead>
        <tbody>${linhas}</tbody>
      </table>
      ${_datalistContasFinanceiras('dl-plano-fin-lote')}
    </div>
    <div style="font-size:11px;color:var(--text-3);margin-top:10px">
      💡 Deixe vazio para pular uma categoria. Você pode vincular depois individualmente.
    </div>
  `, `
    <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-gold" onclick="salvarVinculacaoLote()">Salvar Vínculos</button>
  `);
}

async function salvarVinculacaoLote() {
  const semVinculo = CATEGORIAS.filter(c => !c.conta_financeira_id);
  let salvas = 0, ignoradas = 0, erros = 0;
  for (const c of semVinculo) {
    const inp = $id(`vl-${c.id}`);
    const texto = inp?.value?.trim();
    if (!texto) { ignoradas++; continue; }
    const cfId = _resolveContaFinanceira(texto);
    if (!cfId) { ignoradas++; continue; }
    try {
      await supa('PATCH', 'fin_categorias', { params: { id: 'eq.' + c.id }, body: { conta_financeira_id: cfId } });
      c.conta_financeira_id = cfId;
      salvas++;
    } catch(e) { erros++; }
  }
  // Invalida cache RPC: novos vínculos afetam fin_dre_por_plano
  if (salvas > 0 && typeof invalidarCacheDashboard === 'function') invalidarCacheDashboard();
  closeModal();
  if (salvas > 0) toast(`${salvas} vínculo${salvas>1?'s':''} salvo${salvas>1?'s':''}.${ignoradas>0?` (${ignoradas} sem alteração)`:''}${erros>0?` ⚠ ${erros} erro${erros>1?'s':''}`:''}`, salvas > 0 ? 'success' : 'error');
  else toast('Nenhuma categoria foi alterada.', 'default');
  rerenderTelaAtual();
}



// ═══════════════════════════════════════════════════════════════════════════
// PLANOS DE CONTAS (v19) ─ Financeiro + Contábil + De-Para
// ─────────────────────────────────────────────────────────────────────────
// Tabelas backend: fin_plano_financeiro, fin_plano_contabil, fin_plano_depara
// (criadas em migration_v19_FINAL_fix.sql, com seed automático ao criar tenant)
// Permissões: leitura para quem tem 'planos.v'; escrita conforme permissoes JSONB
// (admin sempre pode tudo; usuários custom/financeiro/leitura conforme template)
// ═══════════════════════════════════════════════════════════════════════════

const PLANOS_STATE = {
  financeiro: { contas: [], filtro: '', expanded: new Set() },
  contabil:   { contas: [], filtro: '', natureza: '', expanded: new Set() },
  depara: {
    selFin: null,      // id da conta financeira selecionada
    selCont: null,     // id da conta contábil selecionada
    vinculos: [],
    stats: null,
    filtroFin: '',
    filtroCont: '',
  },
  tabAtual: 'financeiro',
  carregado: false,
};

function renderPlanos() {
  // ── Permissão v2: 'planos' precisa estar autorizado para ver ──
  if (!isAdmin() && !podeVer('planos')) {
    $id('topbar-actions').innerHTML = '';
    $id('page-content').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🔒</div>
        <h3>Acesso restrito</h3>
        <p style="font-size:13px;color:var(--text-3);margin-top:6px">Você não tem permissão para visualizar o Plano de Contas.</p>
      </div>`;
    return;
  }

  $id('topbar-actions').innerHTML = (isAdmin() || APP.ehSuperadmin) ? `

    </button>

    </nav>

// ── Helpers de permissão para módulo planos ─────────────────────────────
// admin sempre pode tudo; senão, checa o módulo 'planos' no JSONB permissoes
function podeCriarPlanos()  { return isAdmin() || podeCriar('planos'); }
function podeEditarPlanos() { return isAdmin() || podeEditar('planos'); }
function podeExcluirPlanos(){ return isAdmin() || podeExcluir('planos'); }
// Para criar/editar/excluir vínculos de-para usamos a mesma permissão de edição
function podeEditarDePara() { return isAdmin() || podeEditar('planos'); }

async function planosCarregarDados() {
  if (!APP.tenantId) return;
  try {
    // Helper de paginação — PostgREST tem limite default de 1000 linhas.
    // Como o plano contábil tem 1.438 contas, precisamos paginar.
    async function fetchTudo(tabela, paramsBase) {
      const PAGE = 1000;
      let offset = 0;
      let acc = [];
      while (true) {
        const params = { ...paramsBase, limit: String(PAGE), offset: String(offset) };
        const chunk = await supa('GET', tabela, { params });
        if (!chunk || chunk.length === 0) break;
        acc = acc.concat(chunk);
        if (chunk.length < PAGE) break; // última página
        offset += PAGE;
        if (offset > 50000) break; // safety net
      }
      return acc;
    }

    const [fin, cont, vincs] = await Promise.all([
      fetchTudo('fin_plano_financeiro', {
        select: '*', tenant_id: 'eq.' + APP.tenantId, ativo: 'eq.true', order: 'ordem.asc'
      }),
      fetchTudo('fin_plano_contabil', {
        select: '*', tenant_id: 'eq.' + APP.tenantId, ativo: 'eq.true', order: 'ordem.asc'
      }),
      fetchTudo('fin_plano_depara', {
        select: '*', tenant_id: 'eq.' + APP.tenantId
      }),
    ]);
    PLANOS_STATE.financeiro.contas = fin || [];
    PLANOS_STATE.contabil.contas   = cont || [];
    PLANOS_STATE.depara.vinculos   = vincs || [];
    // Expandir nível 1 e 2 por padrão (primeira carga)
    if (!PLANOS_STATE.carregado) {
      (fin  || []).forEach(c => { if (c.nivel <= 2) PLANOS_STATE.financeiro.expanded.add(c.id); });
      (cont || []).forEach(c => { if (c.nivel <= 2) PLANOS_STATE.contabil.expanded.add(c.id); });
      PLANOS_STATE.carregado = true;
    }
    // Stats via RPC
    try {
      const stats = await supa('POST', 'rpc/fin_depara_stats', {
        body: { p_tenant_id: APP.tenantId }, returning: true,
      });
      PLANOS_STATE.depara.stats = Array.isArray(stats) ? stats[0] : stats;
    } catch(e) { /* RPC opcional, segue sem stats */ }
  } catch(e) {
    toast('Erro ao carregar planos: ' + e.message, 'error');
  }
}

function planosShowTab(tab) {
  PLANOS_STATE.tabAtual = tab;
  document.querySelectorAll('.planos-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.tab === tab));
  if (tab === 'financeiro') renderPlanoArvore('financeiro');
  else if (tab === 'contabil') renderPlanoArvore('contabil');
  else if (tab === 'depara') renderDePara();
}

function renderPlanoArvore(tipo) {
  const state = PLANOS_STATE[tipo];
  const filtro = (state.filtro || '').toLowerCase().trim();
  const filtroNat = tipo === 'contabil' ? state.natureza : '';

  const byId = new Map(state.contas.map(c => [c.id, c]));
  const filhos = new Map();
  state.contas.forEach(c => {
    if (c.conta_pai_id) {
      if (!filhos.has(c.conta_pai_id)) filhos.set(c.conta_pai_id, []);
      filhos.get(c.conta_pai_id).push(c);
    }
  });

  // Filtros: marca contas visíveis (e seus ancestrais)
  let visiveis = null;
  if (filtro || filtroNat) {
    visiveis = new Set();
    state.contas.forEach(c => {
      const matchTexto = !filtro || (
        (c.codigo || '').toLowerCase().includes(filtro) ||
        (c.descricao || '').toLowerCase().includes(filtro) ||
        (c.apelido || '').toLowerCase().includes(filtro)
      );
      const matchNat = !filtroNat || c.natureza === filtroNat;
      if (matchTexto && matchNat) {
        visiveis.add(c.id);
        let pai = c.conta_pai_id;
        while (pai) { visiveis.add(pai); pai = byId.get(pai)?.conta_pai_id; }
      }
    });
  }

  const raizes = state.contas.filter(c => !c.conta_pai_id).sort((a,b)=>(a.ordem||0)-(b.ordem||0));
  const linhas = [];

  function renderConta(c, depth) {
    if (visiveis && !visiveis.has(c.id)) return;
    const childs = (filhos.get(c.id) || []).sort((a,b)=>(a.ordem||0)-(b.ordem||0));
    const isExpanded = state.expanded.has(c.id) || (visiveis && visiveis.size > 0);
    const hasChild = childs.length > 0;
    const sintetica = (tipo === 'financeiro' ? c.tipo === 'S' : c.sintetica);
    const indent = depth * 18;
    const desc = (c.descricao || '').replace(/"/g,'&quot;');

    let tag = '';
    if (tipo === 'financeiro' && c.grupo) {
      tag = `<span class="nat-tag nat-${c.grupo.toLowerCase()}">${c.grupo.replace('_',' ')}</span>`;
    } else if (tipo === 'contabil' && c.natureza) {
      tag = `<span class="nat-tag nat-${c.natureza}">${c.natureza}</span>`;
    }

    const adminBtns = (podeEditarPlanos() || podeExcluirPlanos()) ? `
      ${podeEditarPlanos()  ? `<button onclick="planoEditarConta('${tipo}','${c.id}')" title="Editar">✎</button>` : ''}
      ${(!hasChild && podeExcluirPlanos()) ? `<button onclick="planoExcluirConta('${tipo}','${c.id}')" title="Desativar">🗑</button>` : ''}
    ` : '';

    // Para contábil, exibe apelido entre parênteses (desambigua códigos duplicados)
    const descShow = (tipo === 'contabil' && c.apelido)
      ? `${desc} <span style="color:var(--text-3);font-size:11px">· ${c.apelido}</span>`
      : desc;

    linhas.push(`
      <div class="plano-tree-row ${sintetica ? 'sintetica' : ''}" style="padding-left:${12 + indent}px">
        <span class="toggle" onclick="planosToggle('${tipo}','${c.id}')">${hasChild ? (isExpanded ? '▾' : '▸') : ''}</span>
        <span class="codigo">${c.codigo}</span>
        <span class="descricao" title="${desc}${c.apelido?' · '+c.apelido:''}">${descShow}</span>
        <span>${tag}</span>
        <span style="font-size:11px;color:var(--text-3)">${sintetica ? 'Sintética' : 'Analítica'}</span>
        <span class="row-actions">${adminBtns}</span>
      </div>
    `);

    if (isExpanded && hasChild) {
      childs.forEach(ch => renderConta(ch, depth + 1));
    }
  }

  raizes.forEach(r => renderConta(r, 0));

  const filtroNatHtml = tipo === 'contabil' ? `
    <select id="filtro-natureza" onchange="planosFiltrarArvore('contabil')">
      <option value="">Todas naturezas</option>
      <option value="ATIVO">Ativo</option>
      <option value="PASSIVO">Passivo</option>
      <option value="PL">Patrimônio Líquido</option>
      <option value="RECEITA">Receitas</option>
      <option value="DESPESA">Despesas</option>
      <option value="RESULTADO">Resultado</option>
      <option value="COMPENSACAO">Compensação</option>
      <option value="OUTROS">Outros</option>
    </select>
  ` : '';

  const novoBtn = podeCriarPlanos() ? `<button class="btn btn-gold btn-sm" onclick="planoModalNovaConta('${tipo}')">+ Nova conta</button>` : '';

  $id('planos-tab-body').innerHTML = `
    <div class="planos-toolbar">
      <input type="search" id="busca-${tipo}" placeholder="Buscar por código ou descrição..." value="${state.filtro||''}" oninput="planosFiltrarArvore('${tipo}')">
      ${filtroNatHtml}
      <button class="btn btn-sm btn-outline" onclick="planosExpandirTodos('${tipo}')">Expandir tudo</button>
      <button class="btn btn-sm btn-outline" onclick="planosColapsarTodos('${tipo}')">Colapsar tudo</button>
      ${novoBtn}
    </div>
    <div class="plano-tree" id="arvore-${tipo}">
      ${linhas.length ? linhas.join('') : '<div class="empty-state-mini">Nenhuma conta encontrada.</div>'}
    </div>
  `;

  // Restaurar valores dos filtros (perdidos no innerHTML)
  if (tipo === 'contabil') {
    const sel = $id('filtro-natureza');
    if (sel) sel.value = state.natureza || '';
  }
  // Foco preserva caret no input se tinha valor
  const inp = $id('busca-' + tipo);
  if (inp && state.filtro) { inp.focus(); inp.setSelectionRange(state.filtro.length, state.filtro.length); }
}

function planosToggle(tipo, id) {
  const s = PLANOS_STATE[tipo].expanded;
  if (s.has(id)) s.delete(id); else s.add(id);
  renderPlanoArvore(tipo);
}
function planosExpandirTodos(tipo) {
  PLANOS_STATE[tipo].contas.forEach(c => PLANOS_STATE[tipo].expanded.add(c.id));
  renderPlanoArvore(tipo);
}
function planosColapsarTodos(tipo) {
  PLANOS_STATE[tipo].expanded.clear();
  renderPlanoArvore(tipo);
}
function planosFiltrarArvore(tipo) {
  PLANOS_STATE[tipo].filtro = $id('busca-' + tipo).value;
  if (tipo === 'contabil') {
    PLANOS_STATE.contabil.natureza = $id('filtro-natureza').value;
  }
  renderPlanoArvore(tipo);
}

      <div class="form-field"><label class="form-label">Natureza</label><select class="form-select" id="np-natureza">
        <option value="">Herdar do pai</option>
        <option value="ATIVO">Ativo</option>
        <option value="PASSIVO">Passivo</option>
        <option value="PL">Patrimônio Líquido</option>
        <option value="RECEITA">Receita</option>
        <option value="DESPESA">Despesa</option>
        <option value="RESULTADO">Resultado</option>
        <option value="COMPENSACAO">Compensação</option>
      </select></div>`}

    <button class="btn btn-gold" onclick="planoSalvarNovaConta('${tipo}')">Salvar</button>

}

async function planoSalvarNovaConta(tipo) {
  const codigo = $id('np-codigo').value.trim();
  const desc   = $id('np-desc').value.trim();
  const sint   = $id('np-sint').value === 'true';
  if (!codigo || !desc) { toast('Preencha código e descrição.', 'error'); return; }

  const state = PLANOS_STATE[tipo];
  // No financeiro código é único; no contábil pode repetir (várias instituições
  // compartilham o mesmo código). Para contábil, validamos só se já existe
  // com mesmo código + mesmo apelido.
  if (tipo === 'financeiro') {
    if (state.contas.find(c => c.codigo === codigo)) {
      toast('Já existe uma conta com este código.', 'error'); return;
    }
  } else {
    const apel = ($id('np-apelido')?.value || '').trim();
    if (state.contas.find(c => c.codigo === codigo && (c.apelido||'') === apel)) {
      toast('Já existe uma conta com este código e apelido.', 'error'); return;
    }
  }

  // Localiza pai pelo código — preferindo a conta SINTÉTICA (importante quando
  // há duplicados: o pai correto é sempre a sintética, não outras analíticas)
  const codigoPai = codigo.includes('.') ? codigo.split('.').slice(0, -1).join('.') : null;
  let pai = null;
  if (codigoPai) {
    const candidatos = state.contas.filter(c => c.codigo === codigoPai);
    pai = candidatos.find(c => (tipo === 'financeiro' ? c.tipo === 'S' : c.sintetica)) || candidatos[0] || null;
  }
  const nivel = codigo.split('.').length;
  const ordem = (Math.max(0, ...state.contas.map(c => c.ordem || 0)) + 1);

  const payload = {
    tenant_id: APP.tenantId,
    codigo, descricao: desc, nivel, ordem,
    conta_pai_id: pai?.id || null,
  };

  if (tipo === 'financeiro') {
    payload.tipo = sint ? 'S' : 'A';
    payload.grupo = $id('np-grupo').value || pai?.grupo || null;
  } else {
    payload.sintetica = sint;
    payload.apelido = ($id('np-apelido')?.value || '').trim() || null;
    payload.natureza = $id('np-natureza').value || pai?.natureza || null;
    payload.entra_balanco = true;
  }

  const tabela = tipo === 'financeiro' ? 'fin_plano_financeiro' : 'fin_plano_contabil';
  try {
    const criada = await supa('POST', tabela, { returning: true, body: payload });
    closeModal();
    if (Array.isArray(criada) && criada[0]) atualizarLocal(state.contas, criada[0]);
    toast('Conta criada!', 'success');
    renderPlanoArvore(tipo);
  } catch(e) { toast('Erro: ' + e.message, 'error'); }
}

async function planoEditarConta(tipo, id) {
  if (!podeEditarPlanos()) { toast('Sem permissão para editar.', 'error'); return; }
  const state = PLANOS_STATE[tipo];
  const conta = state.contas.find(c => c.id === id);
  if (!conta) return;
  openModal('Editar Conta', `
    <div class="form-grid">
      <div class="form-field"><label class="form-label">Código</label><input class="form-input" id="ne-codigo" value="${conta.codigo||''}" disabled style="background:var(--surface-2)"></div>
      <div class="form-field full"><label class="form-label">Descrição *</label><input class="form-input" id="ne-desc" value="${(conta.descricao||'').replace(/"/g,'&quot;')}"></div>
      ${tipo === 'contabil' ? `<div class="form-field full"><label class="form-label">Apelido</label><input class="form-input" id="ne-apel" value="${(conta.apelido||'').replace(/"/g,'&quot;')}"></div>` : ''}
    </div>
  `, `
    <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-gold" onclick="planoSalvarEdicao('${tipo}','${id}')">Salvar</button>
  `);
}

async function planoSalvarEdicao(tipo, id) {
  const desc = $id('ne-desc').value.trim();
  if (!desc) { toast('Descrição obrigatória.', 'error'); return; }
  const tabela = tipo === 'financeiro' ? 'fin_plano_financeiro' : 'fin_plano_contabil';
  const update = { descricao: desc };
  if (tipo === 'contabil') update.apelido = $id('ne-apel').value.trim() || null;
  try {
    await supa('PATCH', tabela, { params: { id: 'eq.' + id }, body: update });
    closeModal();
    const state = PLANOS_STATE[tipo];
    const conta = state.contas.find(c => c.id === id);
    if (conta) Object.assign(conta, update);
    toast('Conta atualizada!', 'success');
    renderPlanoArvore(tipo);
  } catch(e) { toast('Erro: ' + e.message, 'error'); }
}

async function planoExcluirConta(tipo, id) {
  if (!podeExcluirPlanos()) { toast('Sem permissão para desativar.', 'error'); return; }
  if (!await confirmarAcao('Desativar conta?', 'Vínculos de-para serão removidos.', { tipo:'amber', labelOk:'Desativar' })) return;
  const tabela = tipo === 'financeiro' ? 'fin_plano_financeiro' : 'fin_plano_contabil';
  try {
    await supa('PATCH', tabela, { params: { id: 'eq.' + id }, body: { ativo: false } });
    const state = PLANOS_STATE[tipo];
    const idx = state.contas.findIndex(c => c.id === id);
    if (idx >= 0) state.contas.splice(idx, 1);
    // Remove vínculos órfãos do estado local
    PLANOS_STATE.depara.vinculos = PLANOS_STATE.depara.vinculos.filter(v =>
      v.conta_financeira_id !== id && v.conta_contabil_id !== id);
    toast('Conta desativada.', 'success');
    renderPlanoArvore(tipo);
  } catch(e) { toast('Erro: ' + e.message, 'error'); }
}

// Carrega contas e vínculos de outro tenant. Usa o mesmo padrão de paginação.
async function _planosFetchTenant(tenantId) {
  async function fetchTudo(tabela, paramsBase) {
    const PAGE = 1000;
    let offset = 0, acc = [];
    while (true) {
      const params = { ...paramsBase, limit: String(PAGE), offset: String(offset) };
      const chunk = await supa('GET', tabela, { params });
      if (!chunk || chunk.length === 0) break;
      acc = acc.concat(chunk);
      if (chunk.length < PAGE) break;
      offset += PAGE;
      if (offset > 50000) break;
    }
    return acc;
  }
  const [fin, cont, dep] = await Promise.all([
    fetchTudo('fin_plano_financeiro', { tenant_id: 'eq.' + tenantId, ativo: 'eq.true', select: '*', order: 'ordem.asc' }),
    fetchTudo('fin_plano_contabil',   { tenant_id: 'eq.' + tenantId, ativo: 'eq.true', select: '*', order: 'ordem.asc' }),
    fetchTudo('fin_plano_depara',     { tenant_id: 'eq.' + tenantId, select: '*' }),
  ]);
  return { financeiro: fin || [], contabil: cont || [], depara: dep || [] };
}

// Pré-visualização: conta quantas contas serão copiadas / sobrepostas / ignoradas

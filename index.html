<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artecon · Financeiro Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  /* ── Artecon Dark Premium Palette ── */
  --bg:          #151618;
  --bg-2:        #1c1d20;
  --surface:     #222428;
  --surface-2:   #2a2c31;
  --border:      #2e3036;
  --border-lt:   #383b42;
  --text:        #f0eee9;
  --text-2:      #9b9894;
  --text-3:      #5c5a57;
  --gold:        #c9a84c;
  --gold-lt:     #c9a84c18;
  --gold-dim:    #9a7e3a;
  --green:       #52b882;
  --green-lt:    #52b88218;
  --red:         #e05c5c;
  --red-lt:      #e05c5c18;
  --amber:       #e09a3a;
  --amber-lt:    #e09a3a18;
  --sidebar-w:   230px;
  --radius:      12px;
  --shadow:      0 1px 3px rgba(0,0,0,.4), 0 4px 20px rgba(0,0,0,.25);
  --shadow-lg:   0 8px 40px rgba(0,0,0,.5);
  --font:        'DM Sans', sans-serif;
  --mono:        'DM Mono', monospace;
  --tr:          160ms cubic-bezier(.4,0,.2,1);
  --gold-glow:   0 0 20px rgba(201,168,76,.12);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  font-size: 13.5px;
  line-height: 1.55;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── SCROLLBAR ─────────────────────────────────────────────── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-lt); border-radius: 99px; }

/* ── AUTH ─────────────────────────────────────────────────── */
#auth-screen { display: none; min-height: 100vh; align-items: center; justify-content: center; background: var(--bg); position: relative; overflow: hidden; }
#auth-screen::before {
  content: '';
  position: absolute;
  top: -200px; left: 50%; transform: translateX(-50%);
  width: 800px; height: 800px;
  background: radial-gradient(circle, rgba(201,168,76,.06) 0%, transparent 70%);
  pointer-events: none;
}
#auth-screen.visible { display: flex; }

.auth-wrap { width: 400px; position: relative; z-index: 1; }

.auth-brand {
  display: flex; align-items: center; gap: 14px; margin-bottom: 36px; justify-content: center;
}
.auth-brand-mark {
  width: 48px; height: 48px;
  background: linear-gradient(135deg, var(--gold-dim), var(--gold));
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: 700; color: #0f0e0c;
  letter-spacing: -1px; font-family: var(--mono);
  box-shadow: 0 4px 20px rgba(201,168,76,.3);
}
.auth-brand-text h1 { font-size: 20px; font-weight: 700; letter-spacing: -.4px; color: var(--text); }
.auth-brand-text span { font-size: 11px; color: var(--text-3); letter-spacing: .04em; text-transform: uppercase; }

.auth-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 32px;
  box-shadow: var(--shadow-lg), var(--gold-glow);
}

.auth-tabs { display: flex; gap: 3px; background: var(--bg); border-radius: 9px; padding: 3px; margin-bottom: 26px; }
.auth-tab {
  flex: 1; padding: 8px; border: none; border-radius: 7px;
  background: transparent; font-family: var(--font); font-size: 12.5px; font-weight: 500;
  color: var(--text-3); cursor: pointer; transition: var(--tr);
}
.auth-tab.active { background: var(--surface-2); color: var(--text); }

.field { margin-bottom: 14px; }
.field label { display: block; font-size: 10.5px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 6px; }
.field input, .field select {
  width: 100%; padding: 10px 14px;
  border: 1.5px solid var(--border);
  border-radius: 9px;
  font-family: var(--font); font-size: 13.5px;
  background: var(--bg-2); color: var(--text); outline: none;
  transition: var(--tr);
}
.field input:focus, .field select:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,.1); }

.btn-primary {
  width: 100%; padding: 11px;
  background: linear-gradient(135deg, var(--gold-dim), var(--gold));
  color: #0f0e0c; border: none; border-radius: 9px;
  font-family: var(--font); font-size: 13.5px; font-weight: 700;
  cursor: pointer; transition: var(--tr); margin-top: 8px;
  letter-spacing: .01em;
}
.btn-primary:hover { filter: brightness(1.1); box-shadow: 0 4px 20px rgba(201,168,76,.3); }
.btn-primary:disabled { opacity: .5; cursor: not-allowed; }
.auth-err { color: var(--red); font-size: 12px; margin-top: 10px; text-align: center; min-height: 18px; }

/* ── ONBOARDING ───────────────────────────────────────────── */
#onboard-screen { display: none; min-height: 100vh; align-items: center; justify-content: center; background: var(--bg); }
#onboard-screen.visible { display: flex; }
.onboard-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; padding: 44px 40px; width: 480px;
  box-shadow: var(--shadow-lg);
}
.onboard-step-bar { display: flex; gap: 6px; margin-bottom: 32px; }
.onboard-step-dot { flex: 1; height: 3px; border-radius: 2px; background: var(--border-lt); transition: background .3s; }
.onboard-step-dot.done  { background: var(--gold); }
.onboard-step-dot.active { background: var(--gold-dim); }
.onboard-title { font-size: 21px; font-weight: 700; letter-spacing: -.4px; margin-bottom: 8px; }
.onboard-sub { font-size: 13px; color: var(--text-2); margin-bottom: 26px; line-height: 1.6; }
.onboard-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 26px; gap: 12px; }

.btn-outline {
  padding: 10px 20px; border: 1.5px solid var(--border-lt); border-radius: 9px;
  background: transparent; font-family: var(--font); font-size: 13px; font-weight: 500;
  color: var(--text-2); cursor: pointer; transition: var(--tr);
}
.btn-outline:hover { border-color: var(--text-3); color: var(--text); }

.btn-accent {
  padding: 10px 24px;
  background: linear-gradient(135deg, var(--gold-dim), var(--gold));
  color: #0f0e0c; border: none; border-radius: 9px;
  font-family: var(--font); font-size: 13px; font-weight: 700;
  cursor: pointer; transition: var(--tr);
}
.btn-accent:hover { filter: brightness(1.1); }
.btn-accent:disabled { opacity: .5; cursor: not-allowed; }

.categoria-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.categoria-chip {
  display: flex; align-items: center; gap: 8px; padding: 10px 12px;
  border: 1.5px solid var(--border-lt); border-radius: 9px; cursor: pointer;
  transition: var(--tr); font-size: 13px; color: var(--text-2);
}
.categoria-chip.selected { border-color: var(--gold); background: var(--gold-lt); color: var(--gold); }
.categoria-chip:hover:not(.selected) { border-color: var(--border-lt); color: var(--text); background: var(--surface-2); }

/* ── APP SHELL ────────────────────────────────────────────── */
#app { display: none; min-height: 100vh; }
#app.visible { display: flex; }

/* ── SIDEBAR ─────────────────────────────────────────────── */
.sidebar {
  width: var(--sidebar-w); min-height: 100vh;
  background: var(--bg-2);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  position: fixed; top: 0; left: 0; z-index: 100;
}

.sidebar-brand {
  padding: 22px 18px 16px;
  display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid var(--border);
}
.brand-mark {
  width: 34px; height: 34px;
  background: linear-gradient(135deg, var(--gold-dim), var(--gold));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: #0f0e0c;
  font-family: var(--mono); letter-spacing: -1px;
  flex-shrink: 0;
}
.brand-text { }
.brand-name { font-size: 13.5px; font-weight: 700; letter-spacing: -.2px; color: var(--text); }
.brand-sub  { font-size: 10px; color: var(--text-3); letter-spacing: .04em; text-transform: uppercase; }

.tenant-badge {
  margin: 12px 12px 4px;
  padding: 10px 13px;
  background: var(--surface); border-radius: 10px; border: 1px solid var(--border);
}
.tenant-name { font-size: 11.5px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tenant-setor { font-size: 10.5px; color: var(--text-3); margin-top: 1px; }

.sidebar-nav { flex: 1; padding: 8px 10px; overflow-y: auto; }
.nav-section {
  font-size: 9.5px; font-weight: 700; color: var(--text-3);
  text-transform: uppercase; letter-spacing: .1em;
  padding: 14px 10px 5px;
}

.nav-item {
  display: flex; align-items: center; gap: 9px;
  padding: 8px 11px; border-radius: 9px;
  color: var(--text-3); font-size: 13px; font-weight: 500;
  cursor: pointer; transition: var(--tr); margin-bottom: 1px;
  border: none; background: none; width: 100%; text-align: left;
}
.nav-item:hover { background: var(--surface); color: var(--text-2); }
.nav-item.active { background: var(--gold-lt); color: var(--gold); font-weight: 600; }
.nav-item svg { width: 15px; height: 15px; flex-shrink: 0; }

.sidebar-footer {
  padding: 12px 14px; border-top: 1px solid var(--border);
}
.user-row { display: flex; align-items: center; gap: 10px; }
.user-avatar {
  width: 30px; height: 30px;
  background: linear-gradient(135deg, var(--gold-dim), var(--gold));
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: #0f0e0c; flex-shrink: 0;
}
.user-name { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; color: var(--text); }
.btn-logout {
  padding: 4px 9px; border: 1px solid var(--border-lt); border-radius: 6px;
  background: none; font-size: 10.5px; color: var(--text-3); cursor: pointer;
  font-family: var(--font); transition: var(--tr);
}
.btn-logout:hover { border-color: var(--red); color: var(--red); }

/* ── MAIN ────────────────────────────────────────────────── */
.main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }

.topbar {
  background: var(--bg-2); border-bottom: 1px solid var(--border);
  padding: 0 28px; height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 50;
}
.page-title { font-size: 15px; font-weight: 700; letter-spacing: -.2px; color: var(--text); }
.topbar-actions { display: flex; gap: 8px; align-items: center; }
.content { padding: 24px 28px; flex: 1; }

/* ── BUTTONS ─────────────────────────────────────────────── */
.btn {
  padding: 8px 16px; border-radius: 9px; font-family: var(--font); font-size: 13px; font-weight: 500;
  cursor: pointer; transition: var(--tr); display: inline-flex; align-items: center; gap: 6px; border: none;
}
.btn-sm { padding: 6px 13px; font-size: 12px; border-radius: 8px; }
.btn svg { width: 14px; height: 14px; }
.btn-green { background: var(--green-lt); color: var(--green); border: 1px solid rgba(82,184,130,.2); }
.btn-green:hover { background: var(--green); color: #0f1f16; }
.btn-red { background: var(--red-lt); color: var(--red); border: 1px solid rgba(224,92,92,.2); }
.btn-red:hover { background: var(--red); color: #fff; }
.btn-gold { background: linear-gradient(135deg, var(--gold-dim), var(--gold)); color: #0f0e0c; font-weight: 700; }
.btn-gold:hover { filter: brightness(1.08); box-shadow: 0 4px 16px rgba(201,168,76,.25); }

/* ── CARDS ───────────────────────────────────────────────── */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px;
  box-shadow: var(--shadow);
}
.card-gold-line { border-top: 2px solid var(--gold); }

/* ── KPI GRID ────────────────────────────────────────────── */
.kpi-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 22px; }
.kpi-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 18px 20px; box-shadow: var(--shadow);
}
.kpi-label { font-size: 10.5px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 7px; }
.kpi-value { font-size: 24px; font-weight: 700; letter-spacing: -1px; font-family: var(--mono); }
.kpi-sub { font-size: 11px; color: var(--text-3); margin-top: 5px; }
.kpi-card.k-green { border-left: 3px solid var(--green); }
.kpi-card.k-red   { border-left: 3px solid var(--red); }
.kpi-card.k-amber { border-left: 3px solid var(--amber); }
.kpi-card.k-gold  { border-left: 3px solid var(--gold); }

/* ── TABLES ──────────────────────────────────────────────── */
table { width: 100%; border-collapse: collapse; }
thead th {
  text-align: left; padding: 10px 16px;
  font-size: 10.5px; font-weight: 700; color: var(--text-3);
  text-transform: uppercase; letter-spacing: .06em;
  border-bottom: 1px solid var(--border); background: var(--bg-2);
}
tbody tr { border-bottom: 1px solid var(--border); transition: var(--tr); cursor: pointer; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--surface-2); }
tbody td { padding: 11px 16px; font-size: 13px; }

/* ── BADGES ──────────────────────────────────────────────── */
.badge { display: inline-flex; align-items: center; padding: 2px 9px; border-radius: 20px; font-size: 10.5px; font-weight: 600; }
.badge-green  { background: var(--green-lt);  color: var(--green); }
.badge-red    { background: var(--red-lt);    color: var(--red); }
.badge-amber  { background: var(--amber-lt);  color: var(--amber); }
.badge-gold   { background: var(--gold-lt);   color: var(--gold); }
.badge-gray   { background: var(--surface-2); color: var(--text-3); }

/* ── MODAL ───────────────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.65); backdrop-filter: blur(6px);
  z-index: 200; display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity .2s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--surface); border: 1px solid var(--border-lt);
  border-radius: 16px; width: 480px; max-height: 90vh; overflow-y: auto;
  box-shadow: var(--shadow-lg); transform: translateY(10px); transition: transform .22s;
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-header { padding: 22px 26px 0; display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
.modal-title { font-size: 15px; font-weight: 700; color: var(--text); }
.modal-close {
  width: 28px; height: 28px; border-radius: 7px; border: none;
  background: var(--surface-2); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; color: var(--text-2); transition: var(--tr);
}
.modal-close:hover { background: var(--border-lt); color: var(--text); }
.modal-body { padding: 0 26px 24px; }
.modal-footer { padding: 14px 26px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }

/* ── FORMS ───────────────────────────────────────────────── */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 13px; }
.form-grid .full { grid-column: 1 / -1; }
.form-label { font-size: 10.5px; font-weight: 700; color: var(--text-3); display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: .06em; }
.form-input, .form-select {
  width: 100%; padding: 9px 13px;
  border: 1.5px solid var(--border-lt); border-radius: 9px;
  font-family: var(--font); font-size: 13px;
  background: var(--bg-2); color: var(--text); outline: none; transition: var(--tr);
}
.form-input:focus, .form-select:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,.08); }
.form-field { display: flex; flex-direction: column; }

/* ── TOAST ───────────────────────────────────────────────── */
.toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 999; display: flex; flex-direction: column; gap: 8px; }
.toast {
  background: var(--surface-2); color: var(--text);
  padding: 11px 18px; border-radius: 10px; font-size: 13px; font-weight: 500;
  box-shadow: var(--shadow-lg); animation: slideUp .2s ease;
  border: 1px solid var(--border-lt);
}
.toast.success { background: var(--green); color: #0f1f16; border-color: transparent; }
.toast.error   { background: var(--red);   color: #fff; border-color: transparent; }
.toast.warn    { background: var(--amber); color: #0f0e0c; border-color: transparent; }

@keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── MISC ────────────────────────────────────────────────── */
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-3); }
.empty-icon  { font-size: 36px; margin-bottom: 12px; opacity: .5; }
.empty-state h3 { font-size: 15px; font-weight: 600; color: var(--text-2); margin-bottom: 6px; }
.table-wrap { overflow-x: auto; }

.saldo-bar { height: 4px; background: var(--surface-2); border-radius: 3px; overflow: hidden; margin-top: 6px; }
.saldo-fill { height: 100%; border-radius: 3px; }

/* ── TUTORIAL BANNER ─────────────────────────────────────── */
.tutorial-card {
  background: linear-gradient(135deg, var(--gold-lt), rgba(201,168,76,.05));
  border: 1px solid rgba(201,168,76,.25); border-radius: 12px;
  padding: 18px 22px; margin-bottom: 22px;
  display: flex; align-items: center; gap: 18px;
}
.tutorial-icon { font-size: 28px; flex-shrink: 0; }
.tutorial-title { font-size: 13.5px; font-weight: 700; margin-bottom: 4px; color: var(--gold); }
.tutorial-steps { display: flex; gap: 12px; margin-top: 10px; flex-wrap: wrap; }
.tutorial-step { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-2); }
.tutorial-step-num { width: 18px; height: 18px; border-radius: 50%; background: var(--gold); color: #0f0e0c; font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.tutorial-step.done .tutorial-step-num { background: var(--green); color: #0f1f16; }

/* ── DASHBOARD ANIMATIONS ────────────────────────────────── */
@keyframes fadeUp   { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
@keyframes countUp  { from { opacity: 0; transform: scale(.93); }       to { opacity: 1; transform: scale(1); } }

.dash-fade { animation: fadeUp .38s ease both; }
.dash-fade:nth-child(1) { animation-delay: .04s; }
.dash-fade:nth-child(2) { animation-delay: .09s; }
.dash-fade:nth-child(3) { animation-delay: .14s; }
.dash-fade:nth-child(4) { animation-delay: .19s; }

/* ── KPI PRO ─────────────────────────────────────────────── */
.kpi-pro {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 20px 22px;
  box-shadow: var(--shadow); position: relative; overflow: hidden;
  transition: transform .18s, box-shadow .18s; cursor: pointer;
}
.kpi-pro:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,.4); }
.kpi-pro::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--kpi-c1), var(--kpi-c2));
}
.kpi-pro-label { font-size: 10.5px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
.kpi-pro-value { font-size: 26px; font-weight: 700; letter-spacing: -1.5px; font-family: var(--mono); animation: countUp .45s ease both; }
.kpi-pro-sub   { font-size: 11px; color: var(--text-3); margin-top: 6px; display: flex; align-items: center; gap: 5px; }
.kpi-pro-icon  { position: absolute; top: 18px; right: 18px; font-size: 22px; opacity: .08; }

.dash-section-title {
  font-size: 10.5px; font-weight: 700; color: var(--text-3);
  text-transform: uppercase; letter-spacing: .1em;
  margin-bottom: 13px; display: flex; align-items: center; gap: 8px;
}
.dash-section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* ── UPCOMING ITEMS ──────────────────────────────────────── */
.venc-row {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 0; border-bottom: 1px solid var(--border);
}
.venc-row:last-child { border-bottom: none; }
.venc-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.venc-info { flex: 1; min-width: 0; }
.venc-name { font-size: 12.5px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
.venc-date { font-size: 11px; color: var(--text-3); font-family: var(--mono); }
.venc-val  { font-size: 12px; font-weight: 700; font-family: var(--mono); flex-shrink: 0; }

.tag-pill {
  display: inline-flex; align-items: center; gap: 4px; padding: 2px 9px;
  border-radius: 20px; font-size: 10.5px; font-weight: 600;
}

/* ── DIVIDER LINE ────────────────────────────────────────── */

<script>
// ── CONFIG ────────────────────────────────────────────────────
const SUPA_URL = 'https://vuwgxndahrzinfdlapxz.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ1d2d4bmRhaHJ6aW5mZGxhcHh6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NTA0ODgsImV4cCI6MjA5MDMyNjQ4OH0.9DaPGHIxt0CO-pjYPBwsHaoSqDN35CwVU0lJUyTXQIQ';

// ── ESTADO ────────────────────────────────────────────────────
const APP = { token: null, user: null, tenant: null, page: 'dashboard' };
let CONTAS = [], CATEGORIAS = [], CLIENTES = [], FORNECEDORES = [], RECEITAS = [], DESPESAS = [];

// ── SUPABASE ──────────────────────────────────────────────────
const $id = id => document.getElementById(id);

async function supa(method, table, opts = {}) {
  const { body, params, token, returning = false } = opts;
  let url = `${SUPA_URL}/rest/v1/${table}`;
  if (params) url += '?' + Object.entries(params).map(([k,v]) => `${k}=${encodeURIComponent(v)}`).join('&');
  const headers = {
    'apikey': SUPA_KEY,
    'Authorization': `Bearer ${token || APP.token || SUPA_KEY}`,
    'Content-Type': 'application/json',
    'Prefer': returning ? 'return=representation' : 'return=minimal',
  };
  const res = await fetch(url, { method, headers, body: body ? JSON.stringify(body) : undefined });
  if (!res.ok) { const e = await res.text(); throw new Error(e); }
  if (method === 'GET' || returning) return res.json();
  return true;
}

async function supaAuth(method, path, body) {
  const res = await fetch(`${SUPA_URL}/auth/v1/${path}`, {
    method, headers: { 'apikey': SUPA_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  return res.json();
}

// ── TOAST ─────────────────────────────────────────────────────
function toast(msg, type = 'default', ms = 3000) {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  $id('toasts').appendChild(el);
  setTimeout(() => el.remove(), ms);
}

// ── MODAL ─────────────────────────────────────────────────────
function openModal(title, body, footer = '') {
  $id('modal-title').textContent = title;
  $id('modal-body').innerHTML = body;
  $id('modal-footer').innerHTML = footer;
  $id('modal-overlay').classList.add('open');
}
function closeModal() { $id('modal-overlay').classList.remove('open'); }

// ── AUTH ──────────────────────────────────────────────────────
function authTab(tab) {
  $id('auth-login').style.display    = tab === 'login'    ? '' : 'none';
  $id('auth-register').style.display = tab === 'register' ? '' : 'none';
  document.querySelectorAll('.auth-tab').forEach((b,i) => b.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')));
}

$id('l-senha').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
$id('r-senha').addEventListener('keydown', e => { if (e.key === 'Enter') doRegister(); });

async function doLogin() {
  const email = $id('l-email').value.trim();
  const senha  = $id('l-senha').value;
  const btn    = $id('btn-login');
  $id('login-err').textContent = '';
  if (!email || !senha) { $id('login-err').textContent = 'Preencha e-mail e senha.'; return; }
  btn.disabled = true; btn.textContent = 'Entrando...';
  try {
    const data = await supaAuth('POST', 'token?grant_type=password', { email, password: senha });
    if (!data.access_token) throw new Error(data.error_description || 'Credenciais inválidas.');
    APP.token = data.access_token;
    await inicializar();
  } catch(e) {
    $id('login-err').textContent = e.message;
    btn.disabled = false; btn.textContent = 'Entrar';
  }
}

async function doRegister() {
  const nome  = $id('r-nome').value.trim();
  const email = $id('r-email').value.trim();
  const senha = $id('r-senha').value;
  const btn   = $id('btn-register');
  $id('register-err').textContent = '';
  if (!nome || !email || !senha) { $id('register-err').textContent = 'Preencha todos os campos.'; return; }
  if (senha.length < 6) { $id('register-err').textContent = 'Senha mínimo 6 caracteres.'; return; }
  btn.disabled = true; btn.textContent = 'Criando...';
  try {
    const data = await supaAuth('POST', 'signup', { email, password: senha });
    if (!data.access_token) throw new Error(data.error_description || 'Erro ao criar conta.');
    APP.token = data.access_token;
    APP.nomeTemp = nome;
    APP.emailTemp = email;
    iniciarOnboarding();
  } catch(e) {
    $id('register-err').textContent = e.message;
    btn.disabled = false; btn.textContent = 'Criar conta';
  }
}

async function doLogout() {
  APP.token = null; APP.user = null; APP.tenant = null;
  CONTAS = []; CATEGORIAS = []; CLIENTES = []; FORNECEDORES = []; RECEITAS = []; DESPESAS = [];
  $id('app').classList.remove('visible');
  $id('auth-screen').classList.add('visible');
  $id('l-senha').value = '';
  $id('btn-login').disabled = false; $id('btn-login').textContent = 'Entrar';
}

// ── INICIALIZAR ───────────────────────────────────────────────
async function inicializar() {
  try {
    const usuarios = await supa('GET', 'fin_usuarios', { params: { select: '*', limit: 1 } });
    if (!usuarios || !usuarios.length) {
      APP.nomeTemp = APP.nomeTemp || 'Usuário';
      iniciarOnboarding();
      return;
    }
    APP.user = usuarios[0];
    const tenants = await supa('GET', 'fin_tenants', { params: { id: `eq.${APP.user.tenant_id}`, select: '*' } });
    APP.tenant = tenants[0];
    await carregarDados();
    mostrarApp();
  } catch(e) {
    toast('Erro ao carregar: ' + e.message, 'error');
  }
}

async function carregarDados() {
  const tid = APP.user.tenant_id;
  const [contas, cats, clis, fors, recs, desps] = await Promise.all([
    supa('GET', 'fin_contas',       { params: { tenant_id: `eq.${tid}`, ativo: 'eq.true', select: '*' } }),
    supa('GET', 'fin_categorias',   { params: { tenant_id: `eq.${tid}`, ativo: 'eq.true', select: '*', order: 'nome.asc' } }),
    supa('GET', 'fin_clientes',     { params: { tenant_id: `eq.${tid}`, ativo: 'eq.true', select: '*', order: 'nome.asc' } }),
    supa('GET', 'fin_fornecedores', { params: { tenant_id: `eq.${tid}`, ativo: 'eq.true', select: '*', order: 'nome.asc' } }),
    supa('GET', 'fin_receitas',     { params: { tenant_id: `eq.${tid}`, select: '*', order: 'vencimento.desc', limit: 200 } }),
    supa('GET', 'fin_despesas',     { params: { tenant_id: `eq.${tid}`, select: '*', order: 'vencimento.desc', limit: 200 } }),
  ]);
  CONTAS = contas; CATEGORIAS = cats; CLIENTES = clis;
  FORNECEDORES = fors; RECEITAS = recs; DESPESAS = desps;
}

function mostrarApp() {
  $id('auth-screen').classList.remove('visible');
  $id('onboard-screen').classList.remove('visible');
  $id('app').classList.add('visible');
  $id('sb-tenant').textContent = APP.tenant?.nome || '—';
  $id('sb-setor').textContent  = APP.tenant?.setor || '—';
  $id('sb-user').textContent   = APP.user?.nome || '—';
  $id('sb-avatar').textContent = (APP.user?.nome || 'U')[0].toUpperCase();
  go('dashboard');
}

// ── ONBOARDING ────────────────────────────────────────────────
let OB = { step: 1, empresa: '', setor: '', contaNome: 'Caixa', contaSaldo: 0, contaTipo: 'caixa', categoriasSel: [] };
const CATEGORIAS_PADRAO = [
  { nome:'Honorários',      tipo:'receita', cor:'#52b882', icone:'💼' },
  { nome:'Consultoria',     tipo:'receita', cor:'#c9a84c', icone:'🧠' },
  { nome:'Vendas',          tipo:'receita', cor:'#9b8cd4', icone:'🛒' },
  { nome:'Outros (receita)',tipo:'receita', cor:'#5c5a57', icone:'💰' },
  { nome:'Aluguel',         tipo:'despesa', cor:'#e05c5c', icone:'🏢' },
  { nome:'Salários',        tipo:'despesa', cor:'#e09a3a', icone:'👤' },
  { nome:'Impostos',        tipo:'despesa', cor:'#c0536a', icone:'📋' },
  { nome:'Fornecedores',    tipo:'despesa', cor:'#b47a3a', icone:'📦' },
  { nome:'Tecnologia',      tipo:'despesa', cor:'#5b7ae0', icone:'💻' },
  { nome:'Outros (despesa)',tipo:'despesa', cor:'#5c5a57', icone:'💸' },
];
const SETORES = ['Contabilidade','Advocacia','Saúde','Educação','Comércio','Indústria','Tecnologia','Construção','Alimentação','Serviços Gerais','Outro'];

function iniciarOnboarding() {
  $id('auth-screen').classList.remove('visible');
  $id('onboard-screen').classList.add('visible');

          <option value="poupanca" ${OB.contaTipo==='poupanca'?'selected':''}>Poupança</option>
          <option value="cartao" ${OB.contaTipo==='cartao'?'selected':''}>Cartão</option>

        <div class="field"><label>Saldo inicial (R$)</label><input type="number" id="ob-conta-saldo" placeholder="0,00" value="${OB.contaSaldo}" step="0.01"></div>

          <button class="btn-outline" onclick="OB.step=1;renderOnboard()">← Voltar</button>

    3: `<div class="onboard-title">Categorias padrão</div>
        <div class="onboard-sub">Selecione as categorias que fazem sentido para sua empresa. Você pode editar depois.</div>
        <div class="categoria-grid" id="cat-grid">
          ${CATEGORIAS_PADRAO.map((c,i) => `
            <div class="categoria-chip ${OB.categoriasSel.includes(i)?'selected':''}" onclick="toggleCat(${i})">
              <span>${c.icone}</span>
              <span style="flex:1">${c.nome}</span>
              <span style="font-size:10px;color:var(--text-3)">${c.tipo==='receita'?'↑':'↓'}</span>
            </div>`).join('')}
        </div>
        <div class="onboard-nav" style="margin-top:16px">
          <button class="btn-outline" onclick="OB.step=2;renderOnboard()">← Voltar</button>
          <button class="btn-accent" onclick="obNext3()">Próximo →</button>
        </div>`,
    4: `<div class="onboard-title">Tudo pronto!</div>
        <div class="onboard-sub">Revise as configurações antes de começar.</div>
        <div style="background:var(--bg-2);border-radius:10px;padding:16px;margin-bottom:16px;border:1px solid var(--border)">
          <div style="display:flex;flex-direction:column;gap:10px">
            <div style="display:flex;justify-content:space-between"><span style="color:var(--text-3);font-size:12px">Empresa</span><strong>${OB.empresa}</strong></div>
            <div style="display:flex;justify-content:space-between"><span style="color:var(--text-3);font-size:12px">Setor</span><strong>${OB.setor}</strong></div>
            <div style="display:flex;justify-content:space-between"><span style="color:var(--text-3);font-size:12px">Conta inicial</span><strong>${OB.contaNome}</strong></div>
            <div style="display:flex;justify-content:space-between"><span style="color:var(--text-3);font-size:12px">Saldo inicial</span><strong>${fmtMoeda(OB.contaSaldo)}</strong></div>
            <div style="display:flex;justify-content:space-between"><span style="color:var(--text-3);font-size:12px">Categorias</span><strong>${OB.categoriasSel.length} selecionadas</strong></div>
          </div>
        </div>
        <div class="onboard-nav">
          <button class="btn-outline" onclick="OB.step=3;renderOnboard()">← Voltar</button>
          <button class="btn-accent" id="btn-finalizar" onclick="finalizarOnboarding()">Começar →</button>
        </div>`
  };
  $id('onboard-content').innerHTML = steps[OB.step] || '';
}

function obNext1() {
  const empresa = ($id('ob-empresa')||{}).value?.trim();
  const setor   = ($id('ob-setor')||{}).value;
  if (!empresa) { toast('Informe o nome da empresa.', 'error'); return; }
  OB.empresa = empresa; OB.setor = setor; OB.step = 2; renderOnboard();
}
function obNext2() {
  OB.contaNome  = $id('ob-conta-nome').value.trim() || 'Caixa';
  OB.contaTipo  = $id('ob-conta-tipo').value;
  OB.contaSaldo = parseFloat($id('ob-conta-saldo').value) || 0;
  OB.step = 3; renderOnboard();
}
function obNext3() { OB.step = 4; renderOnboard(); }
function toggleCat(i) {
  const idx = OB.categoriasSel.indexOf(i);
  if (idx === -1) OB.categoriasSel.push(i); else OB.categoriasSel.splice(idx, 1);
  document.querySelectorAll('.categoria-chip').forEach((el, j) => el.classList.toggle('selected', OB.categoriasSel.includes(j)));
}

async function finalizarOnboarding() {
  const btn = $id('btn-finalizar');
  btn.disabled = true; btn.textContent = 'Criando...';
  try {
    const tenants = await supa('POST', 'fin_tenants', { body: { nome: OB.empresa, setor: OB.setor }, returning: true });
    const tenant = tenants[0];
    const authUser = await fetch(`${SUPA_URL}/auth/v1/user`, {
      headers: { apikey: SUPA_KEY, Authorization: `Bearer ${APP.token}` }
    }).then(r => r.json());
    await supa('POST', 'fin_usuarios', { body: { tenant_id: tenant.id, auth_id: authUser.id, nome: APP.nomeTemp, email: authUser.email, perfil: 'admin' } });
    await supa('POST', 'fin_contas', { body: { tenant_id: tenant.id, nome: OB.contaNome, tipo: OB.contaTipo, saldo_inicial: OB.contaSaldo, saldo_atual: OB.contaSaldo } });
    const cats = OB.categoriasSel.length > 0 ? OB.categoriasSel.map(i => CATEGORIAS_PADRAO[i]) : CATEGORIAS_PADRAO;
    if (cats.length > 0) await supa('POST', 'fin_categorias', { body: cats.map(c => ({ tenant_id: tenant.id, ...c, padrao: true })) });
    const usuarios = await supa('GET', 'fin_usuarios', { params: { select: '*', limit: 1 } });
    APP.user = usuarios[0];
    APP.tenant = tenant;
    await carregarDados();
    mostrarApp();
  } catch(e) {
    toast('Erro: ' + e.message, 'error');
    btn.disabled = false; btn.textContent = 'Começar →';
  }
}

function go(page) {
  APP.page = page;
  document.querySelectorAll('.nav-item').forEach(b => b.classList.toggle('active', b.dataset.page === page));
  const cfg = PAGES[page]; if (!cfg) return;
  $id('page-title').textContent = cfg.title;
  $id('topbar-actions').innerHTML = '';
  cfg.render();
  // Close mobile sidebar
  document.getElementById('sidebar').classList.remove('open');
}

// ── HELPERS ───────────────────────────────────────────────────
const fmtMoeda = v => 'R$\u202f' + parseFloat(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtData  = d => d ? new Date(d+'T12:00:00').toLocaleDateString('pt-BR') : '—';
const today    = () => new Date().toISOString().slice(0,10);
const getNome  = (arr, id) => (arr.find(x => x.id === id)||{}).nome || '—';

const STATUS_LABEL = { pendente:'Pendente', recebido:'Recebido', pago:'Pago', vencido:'Vencido', cancelado:'Cancelado' };
const STATUS_BADGE = { pendente:'badge-amber', recebido:'badge-green', pago:'badge-green', vencido:'badge-red', cancelado:'badge-gray' };

function badgeStatus(s) {
  return `<span class="badge ${STATUS_BADGE[s]||'badge-gray'}">${STATUS_LABEL[s]||s}</span>`;
}

// ── DASHBOARD ─────────────────────────────────────────────────
function renderDashboard() {
  const hoje = today();
  const mesAtual    = hoje.slice(0,7);
  const anoAtual    = hoje.slice(0,4);
  const mesAnterior = (() => { const d=new Date(); d.setMonth(d.getMonth()-1); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); })();

  const saldoTotal   = CONTAS.reduce((s,c) => s+(parseFloat(c.saldo_atual)||0), 0);
  const recPend      = RECEITAS.filter(r => r.status==='pendente');
  const despPend     = DESPESAS.filter(d => d.status==='pendente');
  const recVenc      = RECEITAS.filter(r => r.status==='pendente' && r.vencimento<hoje);
  const despVenc     = DESPESAS.filter(d => d.status==='pendente' && d.vencimento<hoje);
  const totalReceber = recPend.reduce((s,r) => s+(parseFloat(r.valor)||0), 0);
  const totalPagar   = despPend.reduce((s,d) => s+(parseFloat(d.valor)||0), 0);

  const recMes  = RECEITAS.filter(r=>r.status==='recebido'&&r.vencimento?.startsWith(mesAtual)).reduce((s,r)=>s+(parseFloat(r.valor)||0),0);
  const despMes = DESPESAS.filter(d=>d.status==='pago'&&d.vencimento?.startsWith(mesAtual)).reduce((s,d)=>s+(parseFloat(d.valor)||0),0);
  const recAnt  = RECEITAS.filter(r=>r.status==='recebido'&&r.vencimento?.startsWith(mesAnterior)).reduce((s,r)=>s+(parseFloat(r.valor)||0),0);
  const despAnt = DESPESAS.filter(d=>d.status==='pago'&&d.vencimento?.startsWith(mesAnterior)).reduce((s,d)=>s+(parseFloat(d.valor)||0),0);

  const varRec  = recAnt>0  ? ((recMes-recAnt)/recAnt*100).toFixed(1)  : null;
  const varDesp = despAnt>0 ? ((despMes-despAnt)/despAnt*100).toFixed(1) : null;

  // Últimos 6 meses
  const meses6 = [];
  for (let i=5; i>=0; i--) {
    const d=new Date(); d.setMonth(d.getMonth()-i);
    const k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    const lb=d.toLocaleDateString('pt-BR',{month:'short'}).replace('.','');
    const r =RECEITAS.filter(x=>x.vencimento?.startsWith(k)&&x.status==='recebido').reduce((s,x)=>s+(parseFloat(x.valor)||0),0);
    const dp=DESPESAS.filter(x=>x.vencimento?.startsWith(k)&&x.status==='pago').reduce((s,x)=>s+(parseFloat(x.valor)||0),0);
    const rp=RECEITAS.filter(x=>x.vencimento?.startsWith(k)).reduce((s,x)=>s+(parseFloat(x.valor)||0),0);
    meses6.push({k,lb,r,dp,rp,isCur:k===mesAtual});
  }
  const grafMax = Math.max(...meses6.flatMap(m=>[m.rp,m.dp]), 1);

  // Top categorias
  const catR={}, catD={};
  RECEITAS.forEach(r=>{const c=(CATEGORIAS.find(x=>x.id===r.categoria_id)||{}).nome||'Outros'; catR[c]=(catR[c]||0)+(parseFloat(r.valor)||0);});
  DESPESAS.forEach(d=>{const c=(CATEGORIAS.find(x=>x.id===d.categoria_id)||{}).nome||'Outros'; catD[c]=(catD[c]||0)+(parseFloat(d.valor)||0);});
  const topR=Object.entries(catR).sort((a,b)=>b[1]-a[1]).slice(0,4);
  const topD=Object.entries(catD).sort((a,b)=>b[1]-a[1]).slice(0,4);
  const maxR=Math.max(...topR.map(([,v])=>v),1);
  const maxD=Math.max(...topD.map(([,v])=>v),1);

  // Últimos lançamentos
  const ults=[
    ...RECEITAS.slice(-8).map(r=>({...r,_t:'rec'})),
    ...DESPESAS.slice(-8).map(d=>({...d,_t:'dep'})),
  ].sort((a,b)=>(b.criado_em||b.vencimento||'').localeCompare(a.criado_em||a.vencimento||'')).slice(0,7);

  // Próximos vencimentos (7 dias)
  const em7=new Date(); em7.setDate(em7.getDate()+7);
  const em7s=em7.toISOString().slice(0,10);
  const proxVenc=[
    ...RECEITAS.filter(r=>r.status==='pendente'&&r.vencimento>=hoje&&r.vencimento<=em7s).map(r=>({...r,_t:'rec'})),
    ...DESPESAS.filter(d=>d.status==='pendente'&&d.vencimento>=hoje&&d.vencimento<=em7s).map(d=>({...d,_t:'dep'})),
  ].sort((a,b)=>a.vencimento.localeCompare(b.vencimento)).slice(0,5);

  // Chip variação
  function chip(v) {
    if (v===null) return `<span style="font-size:10px;color:var(--text-3)">sem ref. ant.</span>`;
    const up = parseFloat(v) >= 0;
    return `<span style="font-size:10px;font-weight:700;color:${up?'var(--green)':'var(--red)'}">${up?'▲':'▼'} ${Math.abs(v)}%</span>`;
  }

  // SVG Chart
  function svgChart() {
    const W=380, H=130, BOT=24, PAD=8, bW=16, gap=(W-PAD*2)/meses6.length;
    const sc = v => H-BOT-Math.max((v/grafMax)*(H-BOT-8),0);
    let out='';
    // grid lines
    for (let i=1; i<=3; i++) {
      const y = H-BOT-((i/4)*(H-BOT-8));
      out += `<line x1="${PAD}" y1="${y.toFixed(0)}" x2="${W-PAD}" y2="${y.toFixed(0)}" stroke="#2e3036" stroke-width="1" stroke-dasharray="3,3"/>`;
    }
    meses6.forEach((m,i) => {
      const cx=PAD+i*gap+gap/2;
      const yr=sc(m.rp), ydp=sc(m.dp);
      const hr=H-BOT-yr, hdp=H-BOT-ydp;
      out += `
        <rect x="${(cx-bW-1.5).toFixed(0)}" y="${yr.toFixed(0)}" width="${bW}" height="${Math.max(hr,2).toFixed(0)}" fill="${m.isCur?'#52b882':'#52b88240'}" rx="4">
          <animate attributeName="height" from="0" to="${Math.max(hr,2).toFixed(0)}" dur=".45s" begin="${i*0.06}s" fill="freeze"/>
          <animate attributeName="y" from="${H-BOT}" to="${yr.toFixed(0)}" dur=".45s" begin="${i*0.06}s" fill="freeze"/>
        </rect>
        <rect x="${(cx+1.5).toFixed(0)}" y="${ydp.toFixed(0)}" width="${bW}" height="${Math.max(hdp,2).toFixed(0)}" fill="${m.isCur?'#e05c5c':'#e05c5c40'}" rx="4">
          <animate attributeName="height" from="0" to="${Math.max(hdp,2).toFixed(0)}" dur=".45s" begin="${i*0.06+0.04}s" fill="freeze"/>
          <animate attributeName="y" from="${H-BOT}" to="${ydp.toFixed(0)}" dur=".45s" begin="${i*0.06+0.04}s" fill="freeze"/>
        </rect>
        <text x="${cx.toFixed(0)}" y="${H-6}" text-anchor="middle" font-size="9" fill="${m.isCur?'var(--gold)':'#5c5a57'}" font-weight="${m.isCur?700:400}" font-family="DM Mono">${m.lb}</text>`;
    });
    out += `<line x1="${PAD}" y1="${H-BOT}" x2="${W-PAD}" y2="${H-BOT}" stroke="#2e3036" stroke-width="1.5"/>`;
    return `<svg width="100%" viewBox="0 0 ${W} ${H}" style="overflow:visible;display:block">${out}</svg>`;
  }

  $id('topbar-actions').innerHTML = `
    <button class="btn btn-sm btn-green" onclick="go('receber')">+ Receita</button>
    <button class="btn btn-sm btn-red" onclick="go('pagar')">+ Despesa</button>`;

  // Alerta vencidos
  const alertaVenc = (recVenc.length || despVenc.length) ? `
    <div style="background:rgba(224,92,92,.1);border:1px solid rgba(224,92,92,.25);border-radius:10px;padding:12px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:10px">
        <span style="color:var(--red);font-size:16px">⚠</span>
        <span style="font-size:12.5px;font-weight:600;color:var(--red)">
          ${[recVenc.length?`${recVenc.length} receita${recVenc.length>1?'s':''} vencida${recVenc.length>1?'s':''}`:null,
             despVenc.length?`${despVenc.length} despesa${despVenc.length>1?'s':''} vencida${despVenc.length>1?'s':''}`:null]
            .filter(Boolean).join(' · ')}
        </span>
      </div>
      <div style="display:flex;gap:6px">
        ${recVenc.length?`<button class="btn btn-sm btn-red" onclick="go('receber')">Ver →</button>`:''}
        ${despVenc.length?`<button class="btn btn-sm btn-red" onclick="go('pagar')">Ver →</button>`:''}
      </div>
    </div>` : '';

  $id('page-content').innerHTML = `
  <div style="display:flex;flex-direction:column;gap:16px">

  ${alertaVenc}

  <!-- KPI ROW -->
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 20px;display:grid;grid-template-columns:repeat(5,1fr);gap:0;box-shadow:var(--shadow)">
    ${[
      {l:'Saldo Total',     v:fmtMoeda(saldoTotal),   ch:null,   c:'var(--gold)',  click:"go('contas')"},
      {l:'A Receber',       v:fmtMoeda(totalReceber), ch:null,   c:'var(--green)', click:"go('receber')"},
      {l:'A Pagar',         v:fmtMoeda(totalPagar),   ch:null,   c:'var(--red)',   click:"go('pagar')"},
      {l:'Recebido no Mês', v:fmtMoeda(recMes),       ch:varRec, c:'var(--green)', click:"go('receber')"},
      {l:'Pago no Mês',     v:fmtMoeda(despMes),      ch:varDesp,c:'var(--red)',   click:"go('pagar')"},
    ].map((k,i)=>`
      <div onclick="${k.click}" style="padding:6px 18px;${i>0?'border-left:1px solid var(--border)':''}cursor:pointer;transition:opacity .15s" onmouseover="this.style.opacity='.8'" onmouseout="this.style.opacity='1'">
        <div style="font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">${k.l}</div>
        <div style="font-size:17px;font-weight:700;font-family:var(--mono);color:${k.c};letter-spacing:-.5px">${k.v}</div>
        <div style="margin-top:4px">${chip(k.ch)}</div>
      </div>`).join('')}
  </div>

  <!-- ROW 2: Chart + Lançamentos recentes -->
  <div style="display:grid;grid-template-columns:360px 1fr;gap:16px">

    <!-- Gráfico -->
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow)">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <div>
          <div style="font-size:12px;font-weight:700;color:var(--text)">Realizado</div>
          <div style="font-size:10px;color:var(--text-3);margin-top:1px">Últimos 6 meses</div>
        </div>
        <div style="display:flex;gap:10px;font-size:10px;color:var(--text-3)">
          <span style="display:flex;align-items:center;gap:4px">
            <span style="width:8px;height:8px;background:var(--green);border-radius:2px;display:inline-block"></span>Receita
          </span>
          <span style="display:flex;align-items:center;gap:4px">
            <span style="width:8px;height:8px;background:var(--red);border-radius:2px;display:inline-block"></span>Despesa
          </span>
        </div>
      </div>
      ${svgChart()}
    </div>

    <!-- Lançamentos recentes -->
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow);overflow:hidden">
      <div style="padding:13px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
        <span style="font-size:12px;font-weight:700;color:var(--text)">Lançamentos Recentes</span>
        <div style="display:flex;gap:6px">
          <button class="btn btn-sm btn-green" onclick="go('receber')" style="font-size:11px;padding:4px 10px">+ Receita</button>
          <button class="btn btn-sm btn-red" onclick="go('pagar')" style="font-size:11px;padding:4px 10px">+ Despesa</button>
        </div>
      </div>
      ${ults.length===0
        ? `<div style="text-align:center;padding:32px;color:var(--text-3);font-size:12px">Nenhum lançamento ainda</div>`
        : `<table style="width:100%;border-collapse:collapse">
            <thead><tr style="background:var(--bg-2)">
              <th style="padding:8px 16px;text-align:left;font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border)">Descrição</th>
              <th style="padding:8px 16px;text-align:left;font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border)">Categoria</th>
              <th style="padding:8px 16px;text-align:left;font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border)">Vcto</th>
              <th style="padding:8px 16px;text-align:right;font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border)">Valor</th>

              <tr style="border-bottom:1px solid var(--border);cursor:pointer"
                onclick="go('${l._t==='rec'?'receber':'pagar'}')"
                onmouseover="this.style.background='var(--surface-2)'" onmouseout="this.style.background=''">
                <td style="padding:9px 16px;font-size:12.5px;font-weight:500;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)">
                  <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${l._t==='rec'?'var(--green)':'var(--red)'};margin-right:8px;flex-shrink:0;vertical-align:middle"></span>${l.descricao}
                </td>
                <td style="padding:9px 16px;font-size:11px;color:var(--text-3)">${(CATEGORIAS.find(x=>x.id===l.categoria_id)||{}).nome||'—'}</td>
                <td style="padding:9px 16px;font-size:11px;font-family:var(--mono);color:var(--text-2)">${fmtData(l.vencimento)}</td>
                <td style="padding:9px 16px;font-size:12px;font-family:var(--mono);font-weight:700;text-align:right;color:${l._t==='rec'?'var(--green)':'var(--red)'}">${fmtMoeda(l.valor)}</td>
                <td style="padding:9px 16px;text-align:center">${badgeStatus(l.status)}</td>
              </tr>`).join('')}
            </tbody>
          </table>`}
    </div>
  </div>

  <!-- ROW 3: Categorias Receita + Categorias Despesa + Vencimentos + Contas -->
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr 200px;gap:16px">

    <!-- Top Receitas por Categoria -->
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:var(--shadow)">
      <div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px">
        <span style="width:8px;height:8px;border-radius:2px;background:var(--green);display:inline-block"></span>
        <span style="font-size:11px;font-weight:700;color:var(--text)">Top Receitas</span>
      </div>
      <div style="padding:12px 16px">
        ${topR.length === 0
          ? `<div style="font-size:12px;color:var(--text-3);text-align:center;padding:12px 0">Sem dados</div>`
          : topR.map(([c,v])=>`

}

// ── FLUXO DE CAIXA ────────────────────────────────────────────
function renderFluxo() {
  const periodoSel = window._fluxoPeriodo || '6m';
  const hoje = new Date();
  const anoAtual = hoje.getFullYear();
  const mesAtual = String(hoje.getMonth()+1).padStart(2,'0');
  const meses = {};

  function getMeses() {
    const filtrar = (l, tipo) => {
      const m = l.vencimento?.slice(0,7); if (!m) return;
      if (periodoSel === 'ano' && !m.startsWith(String(anoAtual))) return;
      if (periodoSel === '6m') {
        const limite = new Date(); limite.setMonth(limite.getMonth()-5);
        const limStr = limite.getFullYear()+'-'+String(limite.getMonth()+1).padStart(2,'0');
        if (m < limStr) return;
      }
      if (!meses[m]) meses[m] = { rec:0, desp:0, recReal:0, despReal:0 };
      if (tipo === 'rec') { meses[m].rec += parseFloat(l.valor)||0; if (l.status==='recebido') meses[m].recReal += parseFloat(l.valor)||0; }
      else { meses[m].desp += parseFloat(l.valor)||0; if (l.status==='pago') meses[m].despReal += parseFloat(l.valor)||0; }
    };
    RECEITAS.forEach(r => filtrar(r,'rec'));
    DESPESAS.forEach(d => filtrar(d,'desp'));
    return meses;
  }

  const mesObj = getMeses();
  const lista = Object.keys(mesObj).sort();
  const maxVal = Math.max(...lista.map(m => Math.max(mesObj[m].rec, mesObj[m].desp)), 1);
  const totalRec  = lista.reduce((s,m)=>s+mesObj[m].rec,0);
  const totalDesp = lista.reduce((s,m)=>s+mesObj[m].desp,0);
  const totalRes  = totalRec - totalDesp;

  function barChart() {
    if (!lista.length) return '<div style="color:var(--text-3);font-size:13px;padding:20px 0;text-align:center">Sem dados no período</div>';
    const W=560, H=180, PAD=40, barW=Math.max(10, Math.min(38, (W-PAD*2)/lista.length/2.5));
    const gap = (W-PAD*2)/lista.length;
    const scale = v => H - PAD - (v/maxVal)*(H-PAD-10);
    let bars = '';
    lista.forEach((m,i) => {
      const x = PAD + i*gap;
      const r = mesObj[m].rec, d = mesObj[m].desp;
      const yr = scale(r), yd = scale(d);
      const [yr2,mo2] = m.split('-');
      bars += `
        <rect x="${x-barW-2}" y="${yr}" width="${barW}" height="${H-PAD-yr}" fill="var(--green)" opacity="${m===String(anoAtual)+'-'+mesAtual?'1':'0.5'}" rx="4"/>
        <rect x="${x+2}" y="${yd}" width="${barW}" height="${H-PAD-yd}" fill="var(--red)" opacity="${m===String(anoAtual)+'-'+mesAtual?'1':'0.5'}" rx="4"/>
        <text x="${x}" y="${H-8}" text-anchor="middle" font-size="10" fill="var(--text-3)" font-family="DM Mono">${mo2}/${yr2.slice(2)}</text>`;
    });
    for (let i=1; i<=3; i++) {
      const y = 10 + (i/4)*(H-PAD-10);
      bars = `<line x1="${PAD}" y1="${y.toFixed(0)}" x2="${W}" y2="${y.toFixed(0)}" stroke="var(--border)" stroke-width="1" stroke-dasharray="3,3"/>` + bars;
    }
    return `<svg width="100%" viewBox="0 0 ${W} ${H}" style="overflow:visible">
      <line x1="${PAD}" y1="10" x2="${PAD}" y2="${H-PAD}" stroke="var(--border)" stroke-width="1"/>

// ── DRE ───────────────────────────────────────────────────────
function renderDRE() {
  const periodoSel = window._drePeriodo || 'mes';
  const hoje = new Date();
  const anoAtual = hoje.getFullYear();
  const mesAtual = String(hoje.getMonth()+1).padStart(2,'0');
  const mesStr = String(anoAtual)+'-'+mesAtual;

  function filtrar(arr) {
    return arr.filter(l => {
      const m = l.vencimento?.slice(0,7);
      if (periodoSel === 'mes')  return m === mesStr;
      if (periodoSel === 'ano')  return m?.startsWith(String(anoAtual));
      return true;
    });
  }

  const recFilt  = filtrar(RECEITAS).filter(r => r.status === 'recebido');
  const despFilt = filtrar(DESPESAS).filter(d => d.status === 'pago');
  const recPrev  = filtrar(RECEITAS).filter(r => r.status === 'pendente');
  const despPrev = filtrar(DESPESAS).filter(d => d.status === 'pendente');

  const catRec = {}, catDesp = {};
  recFilt.forEach(r  => { const c=getNome(CATEGORIAS,r.categoria_id);  catRec[c]  = (catRec[c]||0)  + (parseFloat(r.valor)||0); });
  despFilt.forEach(d => { const c=getNome(CATEGORIAS,d.categoria_id);  catDesp[c] = (catDesp[c]||0) + (parseFloat(d.valor)||0); });

  const totalRec   = Object.values(catRec).reduce((s,v)=>s+v,0);
  const totalDesp  = Object.values(catDesp).reduce((s,v)=>s+v,0);
  const resultado  = totalRec - totalDesp;
  const totalPrevR = recPrev.reduce((s,r)=>s+(parseFloat(r.valor)||0),0);
  const totalPrevD = despPrev.reduce((s,d)=>s+(parseFloat(d.valor)||0),0);
  const margem     = totalRec > 0 ? Math.round((resultado/totalRec)*100) : 0;

  function btnP(p, label) {
    const active = periodoSel === p;
    return `<button onclick="window._drePeriodo='${p}';renderDRE()" style="padding:7px 14px;border-radius:9px;border:1.5px solid ${active?'var(--gold)':'var(--border-lt)'};background:${active?'var(--gold-lt)':'transparent'};color:${active?'var(--gold)':'var(--text-2)'};font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer">${label}</button>`;
  }

  $id('page-content').innerHTML = `
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px">
    <div style="display:flex;gap:6px">
      ${btnP('mes','Este mês')}${btnP('ano','Este ano')}${btnP('tudo','Tudo')}
    </div>
  </div>

  <div class="kpi-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:20px">
    <div class="kpi-card k-green"><div class="kpi-label">Receitas Realizadas</div><div class="kpi-value" style="color:var(--green)">${fmtMoeda(totalRec)}</div><div class="kpi-sub">${fmtMoeda(totalPrevR)} a receber</div></div>
    <div class="kpi-card k-red"><div class="kpi-label">Despesas Realizadas</div><div class="kpi-value" style="color:var(--red)">${fmtMoeda(totalDesp)}</div><div class="kpi-sub">${fmtMoeda(totalPrevD)} a pagar</div></div>
    <div class="kpi-card ${resultado>=0?'k-green':'k-red'}"><div class="kpi-label">Resultado</div><div class="kpi-value" style="color:${resultado>=0?'var(--green)':'var(--red)'}">${fmtMoeda(resultado)}</div><div class="kpi-sub">${resultado>=0?'lucro':'prejuízo'}</div></div>
    <div class="kpi-card k-gold"><div class="kpi-label">Margem</div><div class="kpi-value" style="color:${margem>=0?'var(--gold)':'var(--red)'}">${margem}%</div><div class="kpi-sub">sobre receitas</div></div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px">
    <div class="card">
      <strong style="font-size:13.5px;display:block;margin-bottom:14px;color:var(--green)">↑ Receitas por Categoria</strong>
      ${Object.keys(catRec).length === 0 ? '<div style="color:var(--text-3);font-size:13px">Nenhuma receita realizada no período</div>' :
      Object.entries(catRec).sort((a,b)=>b[1]-a[1]).map(([c,v]) => `
        <div style="margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px">
            <span style="font-size:13px;font-weight:500;color:var(--text)">${c}</span>
            <span style="font-family:var(--mono);font-size:12px;color:var(--green);font-weight:600">${fmtMoeda(v)}</span>
          </div>
          <div class="saldo-bar"><div class="saldo-fill" style="width:${Math.round(v/totalRec*100)}%;background:var(--green)"></div></div>
        </div>`).join('')}
      ${Object.keys(catRec).length > 0 ? `<div style="border-top:1px solid var(--border);padding-top:10px;margin-top:4px;display:flex;justify-content:space-between;font-weight:700;font-size:13px"><span style="color:var(--text)">Total</span><span style="color:var(--green);font-family:var(--mono)">${fmtMoeda(totalRec)}</span></div>` : ''}
    </div>
    <div class="card">
      <strong style="font-size:13.5px;display:block;margin-bottom:14px;color:var(--red)">↓ Despesas por Categoria</strong>
      ${Object.keys(catDesp).length === 0 ? '<div style="color:var(--text-3);font-size:13px">Nenhuma despesa realizada no período</div>' :
      Object.entries(catDesp).sort((a,b)=>b[1]-a[1]).map(([c,v]) => `
        <div style="margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px">
            <span style="font-size:13px;font-weight:500;color:var(--text)">${c}</span>
            <span style="font-family:var(--mono);font-size:12px;color:var(--red);font-weight:600">${fmtMoeda(v)}</span>
          </div>
          <div class="saldo-bar"><div class="saldo-fill" style="width:${Math.round(v/totalDesp*100)}%;background:var(--red)"></div></div>
        </div>`).join('')}
      ${Object.keys(catDesp).length > 0 ? `<div style="border-top:1px solid var(--border);padding-top:10px;margin-top:4px;display:flex;justify-content:space-between;font-weight:700;font-size:13px"><span style="color:var(--text)">Total</span><span style="color:var(--red);font-family:var(--mono)">${fmtMoeda(totalDesp)}</span></div>` : ''}
    </div>
  </div>

  <div class="card">
    <strong style="font-size:14px;display:block;margin-bottom:14px;color:var(--text)">Resumo DRE</strong>
    <div class="table-wrap"><table>
      <thead><tr><th>Item</th><th style="text-align:right">Valor</th><th style="text-align:right">%</th></tr></thead>
      <tbody>
        <tr style="background:rgba(82,184,130,.08)"><td style="font-weight:700;color:var(--green)">Receitas Brutas</td><td style="text-align:right;font-family:var(--mono);font-weight:700;color:var(--green)">${fmtMoeda(totalRec)}</td><td style="text-align:right;color:var(--green)">100%</td></tr>
        ${Object.entries(catRec).sort((a,b)=>b[1]-a[1]).map(([c,v])=>`<tr><td style="padding-left:24px;color:var(--text-2)">${c}</td><td style="text-align:right;font-family:var(--mono);color:var(--green)">${fmtMoeda(v)}</td><td style="text-align:right;color:var(--text-3)">${Math.round(v/totalRec*100)||0}%</td></tr>`).join('')}
        <tr style="background:rgba(224,92,92,.08)"><td style="font-weight:700;color:var(--red)">(-) Despesas</td><td style="text-align:right;font-family:var(--mono);font-weight:700;color:var(--red)">${fmtMoeda(totalDesp)}</td><td style="text-align:right;color:var(--red)">${totalRec>0?Math.round(totalDesp/totalRec*100):0}%</td></tr>
        ${Object.entries(catDesp).sort((a,b)=>b[1]-a[1]).map(([c,v])=>`<tr><td style="padding-left:24px;color:var(--text-2)">${c}</td><td style="text-align:right;font-family:var(--mono);color:var(--red)">${fmtMoeda(v)}</td><td style="text-align:right;color:var(--text-3)">${totalRec>0?Math.round(v/totalRec*100):0}%</td></tr>`).join('')}
        <tr style="border-top:2px solid var(--border-lt);background:${resultado>=0?'rgba(82,184,130,.1)':'rgba(224,92,92,.1)'}">
          <td style="font-weight:700;color:${resultado>=0?'var(--green)':'var(--red)'}">${resultado>=0?'Lucro Líquido':'Prejuízo'}</td>
          <td style="text-align:right;font-family:var(--mono);font-weight:700;color:${resultado>=0?'var(--green)':'var(--red)'}">${fmtMoeda(resultado)}</td>
          <td style="text-align:right;font-weight:700;color:${resultado>=0?'var(--green)':'var(--red)'}">${margem}%</td>
        </tr>
      </tbody>
    </table></div>
  </div>`;
}

        <span style="color:var(--text-3);font-size:12px">Tenant ID</span>
        <span style="font-family:var(--mono);font-size:11px;color:var(--text-3)">${APP.user?.tenant_id||'—'}</span>
      </div>
    </div>
    <hr class="divider">
    <strong style="font-size:14px;display:block;margin-bottom:16px;color:var(--text)">Meu Perfil</strong>
    <div style="display:flex;flex-direction:column;gap:12px">
      <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)">
        <span style="color:var(--text-3);font-size:12px">Nome</span>
        <strong style="color:var(--text)">${APP.user?.nome||'—'}</strong>
      </div>
      <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)">
        <span style="color:var(--text-3);font-size:12px">E-mail</span>
        <strong style="color:var(--text)">${APP.user?.email||'—'}</strong>
      </div>
      <div style="display:flex;justify-content:space-between;padding:10px 0">
        <span style="color:var(--text-3);font-size:12px">Perfil</span>
        <span class="badge badge-gold">${APP.user?.perfil||'—'}</span>
      </div>
    </div>
    <hr class="divider">
    <strong style="font-size:14px;display:block;margin-bottom:10px;color:var(--text)">Banco de Dados</strong>
    <div style="font-size:12px;color:var(--text-3);font-family:var(--mono)">Supabase · ${SUPA_URL.replace('https://','').split('.')[0]}</div>
  </div>`;
}

// ── MOBILE MENU ────────────────────────────────────────────────
if (window.innerWidth <= 768) {
  document.getElementById('mob-menu').style.display = 'block';
}
window.addEventListener('resize', () => {
  document.getElementById('mob-menu').style.display = window.innerWidth <= 768 ? 'block' : 'none';
});

// ── INIT ──────────────────────────────────────────────────────
window.addEventListener('load', () => {
  $id('auth-screen').classList.add('visible');
});
</script>
</body>
</html>

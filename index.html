// Helper para período de mês a partir de uma string YYYY-MM
function _periodoMes(yyyymm) {
  const [yyyy, mm] = yyyymm.split('-').map(Number);
  const inicio = `${yyyy}-${String(mm).padStart(2,'0')}-01`;
  const ultDia = new Date(yyyy, mm, 0).getDate();
  const fim    = `${yyyy}-${String(mm).padStart(2,'0')}-${ultDia}`;
  return { inicio, fim };
}

// ── DASHBOARD ─────────────────────────────────────────────────
// ── v35 · Estado de período do Dashboard ──────────────────────
// Períodos: 'hoje' | '7d' | '30d' | 'mes' | 'trimestre' | 'ano' | 'tudo'
// Default: 'mes'. Persiste durante a sessão.
window._dashPeriodo = window._dashPeriodo || 'mes';
window._dashGraf6mTipo = window._dashGraf6mTipo || 'barras'; // 'barras' | 'linha'
window._dashSaldoTipo = window._dashSaldoTipo || 'linha';    // 'linha' | 'barras'

// Calcula o intervalo {ini, fim} ISO yyyy-mm-dd para o período escolhido
function dashIntervalo(periodo) {
  const hoje = today();
  const hojeD = new Date(hoje + 'T12:00:00');
  const fim = hoje;
  let ini = '0001-01-01';
  if (periodo === 'hoje') {
    ini = hoje;
  } else if (periodo === '7d') {
    const d = new Date(hojeD); d.setDate(d.getDate() - 6);
    ini = d.toISOString().slice(0,10);
  } else if (periodo === '30d') {
    const d = new Date(hojeD); d.setDate(d.getDate() - 29);
    ini = d.toISOString().slice(0,10);
  } else if (periodo === 'mes') {
    ini = hoje.slice(0,7) + '-01';
  } else if (periodo === 'trimestre') {
    const m = hojeD.getMonth();
    const inicioTri = Math.floor(m / 3) * 3;
    ini = hojeD.getFullYear() + '-' + String(inicioTri+1).padStart(2,'0') + '-01';
  } else if (periodo === 'ano') {
    ini = hojeD.getFullYear() + '-01-01';
  } else if (periodo === 'tudo') {
    ini = '0001-01-01';
  }
  return { ini, fim };
}

function dashLabelPeriodo(periodo) {
  return ({
    'hoje':       'Hoje',
    '7d':         'Últimos 7 dias',
    '30d':        'Últimos 30 dias',
    'mes':        'Mês atual',
    'trimestre':  'Trimestre atual',
    'ano':        'Ano atual',
    'tudo':       'Todo período',
  })[periodo] || 'Período';
}

function dashSetPeriodo(p) {
  window._dashPeriodo = p;
  renderDashboard();
}

function dashToggleGraf(qual) {
  if (qual === '6m') {
    window._dashGraf6mTipo = window._dashGraf6mTipo === 'barras' ? 'linha' : 'barras';
  } else if (qual === 'saldo') {
    window._dashSaldoTipo = window._dashSaldoTipo === 'linha' ? 'barras' : 'linha';
  }
  renderDashboard();
}

// Filtra um array de lançamentos pelo período (usa vencimento)
function dashFiltrarPeriodo(arr, periodo, campo='vencimento') {
  const { ini, fim } = dashIntervalo(periodo);
  return arr.filter(x => x[campo] >= ini && x[campo] <= fim);
}

function renderDashboard() {
  const hoje = today();
  const mesAtual    = hoje.slice(0,7);
  const anoAtual    = hoje.slice(0,4);
  const diaAtual    = parseInt(hoje.slice(8,10));
  const diasNoMes   = new Date(parseInt(anoAtual), new Date().getMonth()+1, 0).getDate();
  const mesAnterior = (() => { const d=new Date(); d.setMonth(d.getMonth()-1); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); })();

  // ── Dados base (cálculo legado — usado como fallback) ─────
  let saldoTotal     = CONTAS.reduce((s,c) => s+(parseFloat(c.saldo_atual)||0), 0);
  const recPend      = RECEITAS.filter(r => r.status==='pendente');
  const despPend     = DESPESAS.filter(d => d.status==='pendente');
  const recVenc      = RECEITAS.filter(r => r.status==='pendente' && r.vencimento<hoje);
  const despVenc     = DESPESAS.filter(d => d.status==='pendente' && d.vencimento<hoje);
  let totalReceber = recPend.reduce((s,r) => s+(parseFloat(r.valor)||0), 0);
  let totalPagar   = despPend.reduce((s,d) => s+(parseFloat(d.valor)||0), 0);

  let recMes  = RECEITAS.filter(r=>r.status==='recebido'&&r.vencimento?.startsWith(mesAtual)).reduce((s,r)=>s+(parseFloat(r.valor)||0),0);
  let despMes = DESPESAS.filter(d=>d.status==='pago'&&d.vencimento?.startsWith(mesAtual)).reduce((s,d)=>s+(parseFloat(d.valor)||0),0);
  let recAnt  = RECEITAS.filter(r=>r.status==='recebido'&&r.vencimento?.startsWith(mesAnterior)).reduce((s,r)=>s+(parseFloat(r.valor)||0),0);
  let despAnt = DESPESAS.filter(d=>d.status==='pago'&&d.vencimento?.startsWith(mesAnterior)).reduce((s,d)=>s+(parseFloat(d.valor)||0),0);

  // ── PERFORMANCE v21 — sobrescreve KPIs com dados da RPC quando disponível ──
  // Mantém arrays para os cálculos derivados (score/projeção/sugestões/gráfico).
  const _rpcArgs = { p_tenant_id: APP.tenantId, p_data_ref: hoje };
  const _rpcDash = _rpcCacheGet('fin_dashboard_kpis', _rpcArgs);
  if (_rpcDash && typeof _rpcDash.saldo_total !== 'undefined') {
    saldoTotal   = parseFloat(_rpcDash.saldo_total) || 0;
    totalReceber = parseFloat(_rpcDash.total_a_receber) || 0;
    totalPagar   = parseFloat(_rpcDash.total_a_pagar) || 0;
    recMes       = parseFloat(_rpcDash.rec_mes) || 0;
    despMes      = parseFloat(_rpcDash.desp_mes) || 0;
    recAnt       = parseFloat(_rpcDash.rec_ant) || 0;
    despAnt      = parseFloat(_rpcDash.desp_ant) || 0;
  } else {
    // Não está em cache: aquece em background para o próximo render
    _rpcAquecer('fin_dashboard_kpis', _rpcArgs, () => {
      if (APP.pagina === 'dashboard') renderDashboard();
    });
  }

  const varRec  = recAnt>0  ? ((recMes-recAnt)/recAnt*100).toFixed(1)  : null;
  const varDesp = despAnt>0 ? ((despMes-despAnt)/despAnt*100).toFixed(1) : null;

  // ── Últimos 6 meses ───────────────────────────────────────
  const meses6 = [];
  for (let i=5; i>=0; i--) {
    const d=new Date(); d.setMonth(d.getMonth()-i);
    const k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    const lb=d.toLocaleDateString('pt-BR',{month:'short'}).replace('.','');
    const r =RECEITAS.filter(x=>x.vencimento?.startsWith(k)&&x.status==='recebido').reduce((s,x)=>s+(parseFloat(x.valor)||0),0);
    const dp=DESPESAS.filter(x=>x.vencimento?.startsWith(k)&&x.status==='pago').reduce((s,x)=>s+(parseFloat(x.valor)||0),0);
    const rp=RECEITAS.filter(x=>x.vencimento?.startsWith(k)).reduce((s,x)=>s+(parseFloat(x.valor)||0),0);
    meses6.push({k,lb,r,dp,rp,isCur:k===mesAtual});
  }
  const grafMax = Math.max(...meses6.flatMap(m=>[m.rp,m.dp]), 1);

  // ── Tendência (média 3 meses) ─────────────────────────────
  const meses3Rec  = meses6.slice(-4,-1).map(m=>m.r);
  const meses3Desp = meses6.slice(-4,-1).map(m=>m.dp);
  const mediaRec3  = meses3Rec.length  ? meses3Rec.reduce((s,v)=>s+v,0)/meses3Rec.length   : 0;
  const mediaDesp3 = meses3Desp.length ? meses3Desp.reduce((s,v)=>s+v,0)/meses3Desp.length : 0;
  function tendencia(atual, media) {
    if (!media || !atual) return '';
    const diff = ((atual - media) / media * 100).toFixed(0);
    const up = atual >= media;
    return `<span style="font-size:10px;font-weight:700;color:${up?'var(--green)':'var(--red)'}">${up?'▲':'▼'} ${Math.abs(diff)}% vs média 3m</span>`;
  }

  // ── v35 · Período selecionado pelo usuário ────────────────
  const periodo = window._dashPeriodo;
  const { ini: pIni, fim: pFim } = dashIntervalo(periodo);
  // Receitas/despesas baixadas no período (recebido/pago)
  const recBaixadasPer = RECEITAS.filter(r => r.status==='recebido' && r.vencimento >= pIni && r.vencimento <= pFim);
  const despBaixadasPer = DESPESAS.filter(d => d.status==='pago' && d.vencimento >= pIni && d.vencimento <= pFim);
  const recValorPer  = recBaixadasPer.reduce((s,r) => s+(parseFloat(r.valor)||0), 0);
  const despValorPer = despBaixadasPer.reduce((s,d) => s+(parseFloat(d.valor)||0), 0);
  // Margem (% sobre receita)
  const margemPer = recValorPer > 0 ? ((recValorPer - despValorPer) / recValorPer * 100) : 0;

  // ── v35 · Juros e Multas no PERÍODO selecionado ────────────
  // Detecta lançamentos com categoria de juros/multa OU descrição
  // contendo "juros"/"multa" para somar no KPI dedicado.
  const ehJurosMulta = (item) => {
    const cat = (CATEGORIAS||[]).find(c => c.id === item.categoria_id);
    if (cat && /juros|multa/i.test(cat.nome||'')) return true;
    return /juros|multa/i.test(item.descricao||'');
  };
  const jurosRecebMes = recBaixadasPer.filter(ehJurosMulta).reduce((s,r) => s + (parseFloat(r.valor)||0), 0);
  const jurosPagosMes = despBaixadasPer.filter(ehJurosMulta).reduce((s,d) => s + (parseFloat(d.valor)||0), 0);
  const jurosLiqMes = jurosRecebMes - jurosPagosMes;

  // ── Projeção do mês ───────────────────────────────────────
  const temMovimento = recMes > 0 || despMes > 0;
  const recProjetado  = (temMovimento && diaAtual > 0) ? Math.round((recMes  / diaAtual) * diasNoMes) : 0;
  const despProjetado = (temMovimento && diaAtual > 0) ? Math.round((despMes / diaAtual) * diasNoMes) : 0;
  const resultProjetado = recProjetado - despProjetado;
  const percMes = Math.round((diaAtual / diasNoMes) * 100);

  // ── Índice de Saúde Financeira (0–100) ────────────────────
  let score = 50;
  const pontos = [];
  // 1. Saldo positivo (+20)
  if (saldoTotal > 0) { score += 20; pontos.push({ok:true, txt:'Saldo total positivo'}); }
  else if (saldoTotal < 0) { score -= 15; pontos.push({ok:false, txt:'Saldo total negativo'}); }
  else { pontos.push({ok:false, txt:'Saldo zerado — sem reservas'}); }
  // 2. Margem do mês (max +20)
  const margemMes = recMes > 0 ? (recMes - despMes) / recMes : -1;
  if (margemMes >= 0.3)  { score += 20; pontos.push({ok:true,  txt:'Margem do mês acima de 30%'}); }
  else if (margemMes >= 0) { score += 10; pontos.push({ok:true,  txt:'Margem do mês positiva'}); }
  else { score -= 10; pontos.push({ok:false, txt:'Despesas superam receitas no mês'}); }
  // 3. Inadimplência (-5 por vencido, máx -20)
  const penalVenc = Math.min(20, (recVenc.length + despVenc.length) * 5);
  if (penalVenc === 0) { score += 10; pontos.push({ok:true,  txt:'Sem títulos vencidos'}); }
  else { score -= penalVenc; pontos.push({ok:false, txt:`${recVenc.length+despVenc.length} título(s) vencido(s)`}); }
  // 4. Receitas crescendo vs ant (+10)
  if (recAnt > 0 && recMes > recAnt) { score += 10; pontos.push({ok:true,  txt:'Receitas maiores que mês anterior'}); }
  else if (recAnt > 0 && recMes < recAnt) { score -= 5; pontos.push({ok:false, txt:'Receitas menores que mês anterior'}); }
  // 5. Reserva (saldo cobre pelo menos 1 mês de despesas)
  if (despMes > 0 && saldoTotal >= despMes) { score += 10; pontos.push({ok:true,  txt:'Reserva cobre ao menos 1 mês'}); }
  else if (despMes > 0) { score -= 5; pontos.push({ok:false, txt:'Reserva abaixo de 1 mês de despesas'}); }

  score = Math.max(0, Math.min(100, score));
  const scoreLabel = score >= 80 ? 'Excelente' : score >= 60 ? 'Bom' : score >= 40 ? 'Moderado' : 'Crítico';
  const scoreColor = score >= 80 ? 'var(--green)' : score >= 60 ? 'var(--gold)' : score >= 40 ? 'var(--amber)' : 'var(--red)';
  const scoreDash  = Math.round((score / 100) * 220);

  // ── Sugestões inteligentes ────────────────────────────────
  const sugestoes = [];
  if (recVenc.length > 0)
    sugestoes.push({tipo:'red',  ico:'⚠', txt:`${recVenc.length} receita(s) vencida(s) sem baixa. Regularize para manter o fluxo.`, acao:"go('lancamentos')", label:'Ver recebíveis'});
  if (despVenc.length > 0)
    sugestoes.push({tipo:'red',  ico:'⚠', txt:`${despVenc.length} despesa(s) vencida(s) em aberto. Risco de multa/juros.`, acao:"go('lancamentos')", label:'Ver a pagar'});
  if (margemMes > 0 && margemMes < 0.15 && recMes > 0)
    sugestoes.push({tipo:'amber',ico:'📉', txt:`Margem do mês em ${(margemMes*100).toFixed(0)}%. Revise despesas para ampliar resultado.`, acao:"go('dre')", label:'Ver DRE'});
  if (recAnt > 0 && recMes < recAnt * 0.8)
    sugestoes.push({tipo:'amber',ico:'📊', txt:`Receita do mês ${Math.round((1-recMes/recAnt)*100)}% abaixo do mês anterior. Monitore a carteira.`, acao:"go('lancamentos')", label:'Ver receitas'});
  if (despAnt > 0 && despMes > despAnt * 1.2)
    sugestoes.push({tipo:'amber',ico:'💸', txt:`Despesas cresceram ${Math.round((despMes/despAnt-1)*100)}% vs mês anterior. Verifique a origem.`, acao:"go('lancamentos')", label:'Ver despesas'});
  if (resultProjetado < 0 && recProjetado > 0)
    sugestoes.push({tipo:'red',  ico:'🔮', txt:`Projeção aponta resultado negativo de ${fmtMoeda(Math.abs(resultProjetado))} no fechamento do mês.`, acao:"go('fluxo')", label:'Ver fluxo'});
  if (saldoTotal > 0 && despMes > 0 && saldoTotal < despMes)
    sugestoes.push({tipo:'amber',ico:'🏦', txt:`Saldo disponível menor que as despesas do mês. Atenção ao caixa.`, acao:"go('contas')", label:'Ver contas'});
  if (sugestoes.length === 0)
    sugestoes.push({tipo:'green',ico:'✓',  txt:`Finanças sob controle. Continue monitorando seus indicadores regularmente.`, acao:null, label:null});

  // Impostos vencidos
  const impostosVenc = IMPOSTOS.filter(i => i.status==='pendente' && i.vencimento < hoje);
  if (impostosVenc.length)
    sugestoes.unshift({tipo:'red', ico:'📋', txt:`${impostosVenc.length} guia(s) de imposto vencida(s). Regularize para evitar multas e juros.`, acao:"go('impostos')", label:'Ver impostos'});

  // ── Top categorias ────────────────────────────────────────
  const catR={}, catD={};
  RECEITAS.forEach(r=>{const c=(CATEGORIAS.find(x=>x.id===r.categoria_id)||{}).nome||'Outros'; catR[c]=(catR[c]||0)+(parseFloat(r.valor)||0);});
  DESPESAS.forEach(d=>{const c=(CATEGORIAS.find(x=>x.id===d.categoria_id)||{}).nome||'Outros'; catD[c]=(catD[c]||0)+(parseFloat(d.valor)||0);});
  const topR=Object.entries(catR).sort((a,b)=>b[1]-a[1]).slice(0,4);
  const topD=Object.entries(catD).sort((a,b)=>b[1]-a[1]).slice(0,4);
  const maxR=Math.max(...topR.map(([,v])=>v),1);
  const maxD=Math.max(...topD.map(([,v])=>v),1);

  // ── Últimos lançamentos ───────────────────────────────────
  const ults=[
    ...RECEITAS.slice(-8).map(r=>({...r,_t:'rec'})),
    ...DESPESAS.slice(-8).map(d=>({...d,_t:'dep'})),
  ].sort((a,b)=>(b.criado_em||b.vencimento||'').localeCompare(a.criado_em||a.vencimento||'')).slice(0,7);

  // ── Próximos vencimentos (7 dias) ─────────────────────────
  const em7=new Date(); em7.setDate(em7.getDate()+7);
  const em7s=em7.toISOString().slice(0,10);
  const proxVenc=[
    ...RECEITAS.filter(r=>r.status==='pendente'&&r.vencimento>=hoje&&r.vencimento<=em7s).map(r=>({...r,_t:'rec'})),
    ...DESPESAS.filter(d=>d.status==='pendente'&&d.vencimento>=hoje&&d.vencimento<=em7s).map(d=>({...d,_t:'dep'})),
  ].sort((a,b)=>a.vencimento.localeCompare(b.vencimento)).slice(0,5);

  // ── Helpers de render ─────────────────────────────────────
  function chip(v) {
    if (v===null) return `<span style="font-size:10px;color:var(--text-3)">sem ref. ant.</span>`;
    const up = parseFloat(v) >= 0;
    return `<span style="font-size:10px;font-weight:700;color:${up?'var(--green)':'var(--red)'}">${up?'▲':'▼'} ${Math.abs(v)}%</span>`;
  }

  // ── SVG Gauge Saúde ───────────────────────────────────────
  function svgGauge() {
    const r=52, cx=70, cy=72, stroke=10;
    const circ=Math.PI*r; // semicírculo
    return `<svg width="140" height="90" viewBox="0 0 140 90" style="display:block;margin:0 auto">
      <path d="M ${cx-r} ${cy} A ${r} ${r} 0 0 1 ${cx+r} ${cy}" fill="none" stroke="#e5e7eb" stroke-width="${stroke}" stroke-linecap="round"/>
      <path d="M ${cx-r} ${cy} A ${r} ${r} 0 0 1 ${cx+r} ${cy}" fill="none" stroke="${scoreColor}" stroke-width="${stroke}" stroke-linecap="round"
        stroke-dasharray="${scoreDash} ${220-scoreDash}" style="transition:stroke-dasharray .8s ease"/>
      <text x="${cx}" y="${cy-8}" text-anchor="middle" font-size="26" font-weight="700" fill="${scoreColor}" font-family="DM Mono">${score}</text>
      <text x="${cx}" y="${cy+10}" text-anchor="middle" font-size="11" fill="#9ca3af" font-family="DM Sans">${scoreLabel}</text>
    </svg>`;
  }

  // ── SVG Chart ─────────────────────────────────────────────
  function svgChart() {
    const W=380, H=130, BOT=24, PAD=8, bW=16, gap=(W-PAD*2)/meses6.length;
    const sc = v => H-BOT-Math.max((v/grafMax)*(H-BOT-8),0);
    let out='';
    for (let i=1; i<=3; i++) {
      const y = H-BOT-((i/4)*(H-BOT-8));
      out += `<line x1="${PAD}" y1="${y.toFixed(0)}" x2="${W-PAD}" y2="${y.toFixed(0)}" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="3,3"/>`;
    }
    meses6.forEach((m,i) => {
      const cx=PAD+i*gap+gap/2;
      const yr=sc(m.rp), ydp=sc(m.dp);
      const hr=H-BOT-yr, hdp=H-BOT-ydp;
      out += `
        <rect x="${(cx-bW-1.5).toFixed(0)}" y="${yr.toFixed(0)}" width="${bW}" height="${Math.max(hr,2).toFixed(0)}" fill="${m.isCur?'#52b882':'#52b88240'}" rx="4">
          <animate attributeName="height" from="0" to="${Math.max(hr,2).toFixed(0)}" dur=".45s" begin="${i*0.06}s" fill="freeze"/>
          <animate attributeName="y" from="${H-BOT}" to="${yr.toFixed(0)}" dur=".45s" begin="${i*0.06}s" fill="freeze"/>
        </rect>
        <rect x="${(cx+1.5).toFixed(0)}" y="${ydp.toFixed(0)}" width="${bW}" height="${Math.max(hdp,2).toFixed(0)}" fill="${m.isCur?'#e05c5c':'#e05c5c40'}" rx="4">
          <animate attributeName="height" from="0" to="${Math.max(hdp,2).toFixed(0)}" dur=".45s" begin="${i*0.06+0.04}s" fill="freeze"/>
          <animate attributeName="y" from="${H-BOT}" to="${ydp.toFixed(0)}" dur=".45s" begin="${i*0.06+0.04}s" fill="freeze"/>
        </rect>
        <text x="${cx.toFixed(0)}" y="${H-6}" text-anchor="middle" font-size="9" fill="${m.isCur?'var(--gold)':'#9ca3af'}" font-weight="${m.isCur?700:400}" font-family="DM Mono">${m.lb}</text>`;
    });
    out += `<line x1="${PAD}" y1="${H-BOT}" x2="${W-PAD}" y2="${H-BOT}" stroke="#e5e7eb" stroke-width="1.5"/>`;
    return `<svg width="100%" viewBox="0 0 ${W} ${H}" style="overflow:visible;display:block">${out}</svg>`;
  }

  // ── v35 · Gráfico 1: Receitas×Despesas (barras OU linha, com tooltip e drill-down) ───
  function svgGraficoBarras6m(meses) {
    const W=420, H=180, BOT=30, TOP=14, PAD_L=46, PAD_R=12;
    const innerW = W - PAD_L - PAD_R;
    const innerH = H - BOT - TOP;
    const max = Math.max(...meses.flatMap(m => [m.r, m.dp]), 1);
    const escala = Math.max(Math.ceil(max / 1000) * 1000, 1000);
    const sc = v => TOP + innerH - (v / escala) * innerH;
    const slot = innerW / meses.length;
    const bW = Math.min(slot * 0.32, 22);
    const tipo = window._dashGraf6mTipo;

    // Grid + escala Y
    let grid = '';
    for (let i=1; i<=4; i++) {
      const v = (escala / 4) * i;
      const y = sc(v);
      grid += `<line x1="${PAD_L}" y1="${y.toFixed(1)}" x2="${W-PAD_R}" y2="${y.toFixed(1)}" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="2,3"/>`;
      grid += `<text x="${PAD_L-6}" y="${(y+3).toFixed(1)}" text-anchor="end" font-size="8.5" fill="#9ca3af" font-family="DM Mono">${v>=1000?(v/1000).toFixed(0)+'k':v.toFixed(0)}</text>`;
    }

    let conteudo = '';
    if (tipo === 'barras') {
      meses.forEach((m, i) => {
        const cx = PAD_L + slot * i + slot / 2;
        const yR = sc(m.r), yD = sc(m.dp);
        const hR = Math.max(TOP+innerH - yR, 0);
        const hD = Math.max(TOP+innerH - yD, 0);
        // Hit area transparente para hover do mês inteiro
        conteudo += `<g style="cursor:pointer" onclick="goLancamentosFiltro('','','','')">`;
        conteudo += `<rect x="${(cx - slot/2).toFixed(1)}" y="${TOP}" width="${slot.toFixed(1)}" height="${innerH}" fill="transparent"/>`;
        conteudo += `
          <rect x="${(cx - bW - 1.5).toFixed(1)}" y="${yR.toFixed(1)}" width="${bW.toFixed(1)}" height="${hR.toFixed(1)}" fill="${m.isCur?'#1e8449':'#1e844988'}" rx="3" style="transition:opacity .15s" onmouseover="this.style.opacity=0.7" onmouseout="this.style.opacity=1">
            <title>${m.lb}: ${fmtMoeda(m.r)} recebido</title>
            <animate attributeName="height" from="0" to="${hR.toFixed(1)}" dur=".5s" begin="${i*.06}s" fill="freeze"/>
            <animate attributeName="y" from="${TOP+innerH}" to="${yR.toFixed(1)}" dur=".5s" begin="${i*.06}s" fill="freeze"/>
          </rect>
          <rect x="${(cx + 1.5).toFixed(1)}" y="${yD.toFixed(1)}" width="${bW.toFixed(1)}" height="${hD.toFixed(1)}" fill="${m.isCur?'#c0392b':'#c0392b88'}" rx="3" style="transition:opacity .15s" onmouseover="this.style.opacity=0.7" onmouseout="this.style.opacity=1">
            <title>${m.lb}: ${fmtMoeda(m.dp)} pago</title>
            <animate attributeName="height" from="0" to="${hD.toFixed(1)}" dur=".5s" begin="${i*.06+.04}s" fill="freeze"/>
            <animate attributeName="y" from="${TOP+innerH}" to="${yD.toFixed(1)}" dur=".5s" begin="${i*.06+.04}s" fill="freeze"/>
          </rect>
          <text x="${cx.toFixed(1)}" y="${H-10}" text-anchor="middle" font-size="9.5" fill="${m.isCur?'#1a5276':'#9ca3af'}" font-weight="${m.isCur?700:400}" font-family="DM Sans">${m.lb}</text>`;
        conteudo += `</g>`;
      });
    } else {
      // Modo linha
      const pontosR = meses.map((m,i) => `${(PAD_L + slot*i + slot/2).toFixed(1)},${sc(m.r).toFixed(1)}`).join(' ');
      const pontosD = meses.map((m,i) => `${(PAD_L + slot*i + slot/2).toFixed(1)},${sc(m.dp).toFixed(1)}`).join(' ');
      conteudo += `<polyline points="${pontosR}" fill="none" stroke="#1e8449" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>`;
      conteudo += `<polyline points="${pontosD}" fill="none" stroke="#c0392b" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>`;
      meses.forEach((m, i) => {
        const cx = PAD_L + slot*i + slot/2;
        const yR = sc(m.r), yD = sc(m.dp);
        conteudo += `<circle cx="${cx.toFixed(1)}" cy="${yR.toFixed(1)}" r="${m.isCur?5:3.5}" fill="#1e8449" stroke="#fff" stroke-width="${m.isCur?2:1.5}" style="cursor:pointer"><title>${m.lb}: ${fmtMoeda(m.r)} recebido</title></circle>`;
        conteudo += `<circle cx="${cx.toFixed(1)}" cy="${yD.toFixed(1)}" r="${m.isCur?5:3.5}" fill="#c0392b" stroke="#fff" stroke-width="${m.isCur?2:1.5}" style="cursor:pointer"><title>${m.lb}: ${fmtMoeda(m.dp)} pago</title></circle>`;
        conteudo += `<text x="${cx.toFixed(1)}" y="${H-10}" text-anchor="middle" font-size="9.5" fill="${m.isCur?'#1a5276':'#9ca3af'}" font-weight="${m.isCur?700:400}" font-family="DM Sans">${m.lb}</text>`;
      });
    }

    const eixoY = `<line x1="${PAD_L}" y1="${TOP}" x2="${PAD_L}" y2="${TOP+innerH}" stroke="#cbd5e0" stroke-width="1.2"/>`;
    const eixoX = `<line x1="${PAD_L}" y1="${TOP+innerH}" x2="${W-PAD_R}" y2="${TOP+innerH}" stroke="#cbd5e0" stroke-width="1.2"/>`;

    return `<svg width="100%" viewBox="0 0 ${W} ${H}" style="overflow:visible;display:block;max-height:200px">${grid}${eixoY}${eixoX}${conteudo}</svg>`;
  }

  // ── v35 · Gráfico 2: Rosca categorias (com período + drill-down) ─────
  function svgGraficoRoscaCategorias() {
    // Agrupa despesas pagas do PERÍODO selecionado por categoria
    const porCat = {};
    despBaixadasPer.forEach(d => {
      const cat = (CATEGORIAS||[]).find(c => c.id === d.categoria_id);
      const nome = cat ? cat.nome : 'Sem categoria';
      const id = d.categoria_id || '';
      if (!porCat[nome]) porCat[nome] = { valor: 0, id };
      porCat[nome].valor += parseFloat(d.valor)||0;
    });
    const entries = Object.entries(porCat).sort((a,b) => b[1].valor - a[1].valor);
    const top = entries.slice(0, 5);
    const outrosV = entries.slice(5).reduce((s,[,o]) => s+o.valor, 0);
    if (outrosV > 0) top.push(['Outros', { valor: outrosV, id: '' }]);
    const total = top.reduce((s,[,o]) => s+o.valor, 0);

    if (total === 0) {
      return `<div style="text-align:center;padding:40px 0;color:var(--text-3);font-size:12px">Sem despesas pagas no período</div>`;
    }

    const cores = ['#c0392b', '#e05c5c', '#b7770d', '#1a5276', '#5b7ae0', '#8896a8'];
    const W = 360, H = 200, cx = 90, cy = 100, r = 70, rIn = 44;

    let acumulado = 0;
    let paths = '';
    let legenda = '';
    top.forEach(([nome, dados], i) => {
      const valor = dados.valor;
      const catId = dados.id;
      const frac = valor / total;
      const a0 = (acumulado * 2 * Math.PI) - Math.PI/2;
      acumulado += frac;
      const a1 = (acumulado * 2 * Math.PI) - Math.PI/2;
      const large = frac > 0.5 ? 1 : 0;
      const x0 = cx + r * Math.cos(a0);
      const y0 = cy + r * Math.sin(a0);
      const x1 = cx + r * Math.cos(a1);
      const y1 = cy + r * Math.sin(a1);
      const xi0 = cx + rIn * Math.cos(a0);
      const yi0 = cy + rIn * Math.sin(a0);
      const xi1 = cx + rIn * Math.cos(a1);
      const yi1 = cy + rIn * Math.sin(a1);
      const cor = cores[i % cores.length];
      const onclickHandler = catId ? `goLancamentosFiltro('despesa','pago','','${catId}')` : `goLancamentosFiltro('despesa','pago')`;
      paths += `<path d="M ${x0.toFixed(2)} ${y0.toFixed(2)} A ${r} ${r} 0 ${large} 1 ${x1.toFixed(2)} ${y1.toFixed(2)} L ${xi1.toFixed(2)} ${yi1.toFixed(2)} A ${rIn} ${rIn} 0 ${large} 0 ${xi0.toFixed(2)} ${yi0.toFixed(2)} Z" fill="${cor}" style="cursor:pointer;transition:transform .15s;transform-origin:${cx}px ${cy}px" onmouseover="this.style.transform='scale(1.04)'" onmouseout="this.style.transform='scale(1)'" onclick="${onclickHandler}"><title>${escapeHtml(nome)}: ${fmtMoeda(valor)} (${(frac*100).toFixed(1)}%)\n[clique para ver lançamentos]</title></path>`;

      const truncado = nome.length > 22 ? nome.slice(0,20)+'…' : nome;
      legenda += `<g transform="translate(190, ${20 + i*22})" style="cursor:pointer" onclick="${onclickHandler}">
        <rect width="11" height="11" rx="2" fill="${cor}"/>
        <text x="18" y="9" font-size="10.5" font-family="DM Sans" fill="#4a5568">${escapeHtml(truncado)}</text>
        <text x="18" y="20" font-size="9.5" font-family="DM Mono" fill="#8896a8">${fmtMoeda(valor)} · ${(frac*100).toFixed(0)}%</text>
      </g>`;
    });

    const centroTexto = `
      <text x="${cx}" y="${cy-4}" text-anchor="middle" font-size="9.5" fill="#8896a8" font-family="DM Sans">Total</text>
      <text x="${cx}" y="${cy+12}" text-anchor="middle" font-size="13" font-weight="700" fill="#c0392b" font-family="DM Mono">${fmtMoeda(total).replace(/\s/g,' ')}</text>`;

    return `<svg width="100%" viewBox="0 0 ${W} ${H}" style="overflow:visible;display:block;max-height:220px">${paths}${centroTexto}${legenda}</svg>`;
  }

  // ── v35 · Gráfico 3: Top clientes a receber (barras horizontais) ──
  function svgGraficoTopClientes() {
    const abertas = RECEITAS.filter(r => r.status==='pendente' || r.status==='vencido');
    const porCli = {};
    abertas.forEach(r => {
      const nome = getNome(CLIENTES, r.cliente_id) || 'Sem cliente';
      if (!porCli[nome]) porCli[nome] = { valor: 0, qtd: 0, vencidos: 0, id: r.cliente_id };
      porCli[nome].valor += parseFloat(r.valor)||0;
      porCli[nome].qtd++;
      if (r.vencimento < today()) porCli[nome].vencidos++;
    });
    const top = Object.entries(porCli).sort((a,b) => b[1].valor - a[1].valor).slice(0, 5);

    if (top.length === 0) {
      return `<div style="text-align:center;padding:40px 0;color:var(--text-3);font-size:12px">Nenhum recebível em aberto 🎉</div>`;
    }

    const max = top[0][1].valor;
    const W = 380, rowH = 36, marginX = 130, padBar = 10;
    const H = top.length * rowH + 20;

    let bars = '';
    top.forEach(([nome, dados], i) => {
      const valor = dados.valor;
      const y = 10 + i * rowH;
      const wPct = max > 0 ? valor/max : 0;
      const wBar = (W - marginX - 60) * wPct;
      const truncado = nome.length > 16 ? nome.slice(0,15)+'…' : nome;
      const cor = dados.vencidos > 0 ? '#c0392b' : '#1a5276';
      const tipVencidos = dados.vencidos > 0 ? `\n${dados.vencidos} vencido(s)` : '';

      bars += `
        <g style="cursor:pointer" onclick="goLancamentosFiltro('receita','pendente')" onmouseover="this.querySelector('.bgrow').setAttribute('fill','#eef2f6')" onmouseout="this.querySelector('.bgrow').setAttribute('fill','#f7f9fa')">
          <rect class="bgrow" x="0" y="${y}" width="${W}" height="${rowH}" fill="#f7f9fa" rx="6" style="transition:fill .15s"/>
          <text x="${marginX-8}" y="${y+rowH/2+3}" text-anchor="end" font-size="11" font-family="DM Sans" fill="#1a2332" font-weight="500">${escapeHtml(truncado)}</text>
          <rect x="${marginX}" y="${y+padBar}" width="${(W-marginX-60).toFixed(0)}" height="${rowH-padBar*2}" fill="#e5e7eb" rx="4"/>
          <rect x="${marginX}" y="${y+padBar}" width="0" height="${rowH-padBar*2}" fill="${cor}" rx="4">
            <title>${escapeHtml(nome)}: ${fmtMoeda(valor)} · ${dados.qtd} lança.${tipVencidos}\n[clique para ver]</title>
            <animate attributeName="width" from="0" to="${wBar.toFixed(1)}" dur=".5s" begin="${i*.08}s" fill="freeze"/>
          </rect>
          <text x="${(W-6).toFixed(0)}" y="${y+rowH/2+4}" text-anchor="end" font-size="10.5" font-family="DM Mono" fill="${cor}" font-weight="700">${fmtMoeda(valor)}</text>
        </g>`;
    });

    return `<svg width="100%" viewBox="0 0 ${W} ${H}" style="overflow:visible;display:block">${bars}</svg>`;
  }

  // ── v35 · Gráfico 4: Saldo evolutivo (linha) 12 meses ────────────
  function svgGraficoSaldoEvolutivo() {
    // Calcula saldo "pseudo-histórico": saldo atual - movimentações futuras + movimentações passadas
    // Como não temos histórico perfeito, vamos somar receitas recebidas - despesas pagas
    // por mês, partindo do saldo atual e descontando para trás.
    const meses = [];
    const hojeData = new Date();
    for (let i = 11; i >= 0; i--) {
      const d = new Date(hojeData.getFullYear(), hojeData.getMonth() - i, 1);
      const k = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
      const lb = d.toLocaleDateString('pt-BR', { month: 'short' }).replace('.','');
      const r = RECEITAS.filter(x => x.vencimento?.startsWith(k) && x.status==='recebido')
        .reduce((s,x) => s + (parseFloat(x.valor)||0), 0);
      const dp = DESPESAS.filter(x => x.vencimento?.startsWith(k) && x.status==='pago')
        .reduce((s,x) => s + (parseFloat(x.valor)||0), 0);
      meses.push({ k, lb, fluxo: r - dp });
    }
    // Calcula saldo acumulado partindo do saldo atual
    // saldoAcc[i] = saldo no fim do mês i
    // saldoAcc[ultimo] = saldoTotal
    const saldos = new Array(meses.length).fill(0);
    saldos[meses.length - 1] = saldoTotal;
    for (let i = meses.length - 2; i >= 0; i--) {
      saldos[i] = saldos[i+1] - meses[i+1].fluxo;
    }

    if (saldos.every(s => s === 0)) {
      return `<div style="text-align:center;padding:40px 0;color:var(--text-3);font-size:12px">Sem dados suficientes</div>`;
    }

    const W = 420, H = 180, TOP = 14, BOT = 26, PAD_L = 50, PAD_R = 14;
    const innerW = W - PAD_L - PAD_R;
    const innerH = H - TOP - BOT;
    const minS = Math.min(...saldos, 0);
    const maxS = Math.max(...saldos, 1);
    const range = maxS - minS || 1;
    const sx = i => PAD_L + (i / (meses.length - 1)) * innerW;
    const sy = v => TOP + innerH - ((v - minS) / range) * innerH;

    // Grid + escala Y
    let grid = '';
    for (let i = 0; i <= 4; i++) {
      const v = minS + (range * i / 4);
      const y = sy(v);
      grid += `<line x1="${PAD_L}" y1="${y.toFixed(1)}" x2="${W-PAD_R}" y2="${y.toFixed(1)}" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="2,3"/>`;
      grid += `<text x="${PAD_L-6}" y="${(y+3).toFixed(1)}" text-anchor="end" font-size="8.5" fill="#9ca3af" font-family="DM Mono">${v>=1000?(v/1000).toFixed(0)+'k':v.toFixed(0)}</text>`;
    }

    // Área preenchida (path)
    let pathLine = `M ${sx(0).toFixed(1)} ${sy(saldos[0]).toFixed(1)}`;
    let pathArea = `M ${sx(0).toFixed(1)} ${(TOP+innerH).toFixed(1)} L ${sx(0).toFixed(1)} ${sy(saldos[0]).toFixed(1)}`;
    saldos.forEach((s, i) => {
      if (i === 0) return;
      pathLine += ` L ${sx(i).toFixed(1)} ${sy(s).toFixed(1)}`;
      pathArea += ` L ${sx(i).toFixed(1)} ${sy(s).toFixed(1)}`;
    });
    pathArea += ` L ${sx(meses.length-1).toFixed(1)} ${(TOP+innerH).toFixed(1)} Z`;

    // Pontos com hover/tooltip enriquecidos
    let pontos = '';
    saldos.forEach((s, i) => {
      const isCur = meses[i].k === mesAtual;
      const fluxo = meses[i].fluxo;
      const fluxoTxt = fluxo > 0 ? `+${fmtMoeda(fluxo)}` : fmtMoeda(fluxo);
      pontos += `<circle cx="${sx(i).toFixed(1)}" cy="${sy(s).toFixed(1)}" r="${isCur?6:3.5}" fill="${isCur?'#1a5276':'#5b7ae0'}" stroke="#fff" stroke-width="${isCur?2:1.5}" style="cursor:pointer;transition:r .15s" onmouseover="this.setAttribute('r','${isCur?7:5}')" onmouseout="this.setAttribute('r','${isCur?6:3.5}')"><title>${meses[i].lb}/${meses[i].k.slice(2,4)}: ${fmtMoeda(s)}\nFluxo do mês: ${fluxoTxt}</title></circle>`;
    });

    // Labels eixo X
    let xLabels = '';
    meses.forEach((m, i) => {
      if (i % 2 !== 0 && i !== meses.length-1) return;
      const isCur = m.k === mesAtual;
      xLabels += `<text x="${sx(i).toFixed(1)}" y="${H-8}" text-anchor="middle" font-size="9" fill="${isCur?'#1a5276':'#9ca3af'}" font-weight="${isCur?700:400}" font-family="DM Sans">${m.lb}</text>`;
    });

    // Modo barras alternativo
    if (window._dashSaldoTipo === 'barras') {
      const slotW = innerW / meses.length;
      const bW = Math.min(slotW * 0.7, 28);
      let bars = '';
      saldos.forEach((s, i) => {
        const cx = sx(i);
        const yBar = sy(Math.max(s, 0));
        const yZero = sy(0);
        const isCur = meses[i].k === mesAtual;
        const fluxo = meses[i].fluxo;
        const fluxoTxt = fluxo > 0 ? `+${fmtMoeda(fluxo)}` : fmtMoeda(fluxo);
        const cor = s >= 0 ? '#1a5276' : '#c0392b';
        const yTop = Math.min(yBar, yZero);
        const hBar = Math.abs(yBar - yZero);
        bars += `<rect x="${(cx - bW/2).toFixed(1)}" y="${yTop.toFixed(1)}" width="${bW.toFixed(1)}" height="${Math.max(hBar,1).toFixed(1)}" fill="${isCur?cor:cor+'aa'}" rx="3" style="cursor:pointer;transition:opacity .15s" onmouseover="this.style.opacity=0.75" onmouseout="this.style.opacity=1">
          <title>${meses[i].lb}/${meses[i].k.slice(2,4)}: ${fmtMoeda(s)}\nFluxo do mês: ${fluxoTxt}</title>
          <animate attributeName="height" from="0" to="${Math.max(hBar,1).toFixed(1)}" dur=".4s" begin="${i*.04}s" fill="freeze"/>
          <animate attributeName="y" from="${yZero.toFixed(1)}" to="${yTop.toFixed(1)}" dur=".4s" begin="${i*.04}s" fill="freeze"/>
        </rect>`;
      });
      return `<svg width="100%" viewBox="0 0 ${W} ${H}" style="overflow:visible;display:block;max-height:200px">
        ${grid}
        <line x1="${PAD_L}" y1="${TOP}" x2="${PAD_L}" y2="${TOP+innerH}" stroke="#cbd5e0" stroke-width="1.2"/>
        <line x1="${PAD_L}" y1="${TOP+innerH}" x2="${W-PAD_R}" y2="${TOP+innerH}" stroke="#cbd5e0" stroke-width="1.2"/>
        ${bars}
        ${xLabels}
      </svg>`;
    }

    return `<svg width="100%" viewBox="0 0 ${W} ${H}" style="overflow:visible;display:block;max-height:200px">
      ${grid}
      <line x1="${PAD_L}" y1="${TOP}" x2="${PAD_L}" y2="${TOP+innerH}" stroke="#cbd5e0" stroke-width="1.2"/>
      <line x1="${PAD_L}" y1="${TOP+innerH}" x2="${W-PAD_R}" y2="${TOP+innerH}" stroke="#cbd5e0" stroke-width="1.2"/>
      <path d="${pathArea}" fill="#5b7ae020"/>
      <path d="${pathLine}" fill="none" stroke="#1a5276" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      ${pontos}
      ${xLabels}
    </svg>`;
  }

      </div>

  $id('page-content').innerHTML = `
  <div style="display:flex;flex-direction:column;gap:16px">

  <!-- v35 · BARRA DE PERÍODO (filtro global do dashboard) -->
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;box-shadow:var(--shadow)">

      return `<button onclick="dashSetPeriodo('${p}')" style="padding:6px 12px;border-radius:8px;border:1.5px solid ${ativo?'var(--gold)':'var(--border-lt)'};background:${ativo?'var(--gold-lt)':'transparent'};color:${ativo?'var(--gold)':'var(--text-2)'};font-family:var(--font);font-size:12px;font-weight:${ativo?700:500};cursor:pointer;transition:var(--tr)">${lbl}</button>`;
    }).join('')}
    <span style="margin-left:auto;font-size:11px;color:var(--text-3);font-family:var(--mono)">${pIni === '0001-01-01' ? 'desde sempre' : fmtData(pIni)} → ${fmtData(pFim)}</span>
  </div>

  <!-- v35 · KPIs DE DESTAQUE: Receitas + Despesas + Juros (sensíveis ao período) -->
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px">
    <div onclick="goLancamentosFiltro('receita','recebido')" style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px;box-shadow:var(--shadow);position:relative;overflow:hidden;cursor:pointer;transition:transform .15s" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform='translateY(0)'">
      <div style="position:absolute;top:0;left:0;width:4px;height:100%;background:var(--green)"></div>

// ── PAGINAÇÃO ─────────────────────────────────────────────────
const _PAG = { lancamentos:1, clientes:1, fornecedores:1 };
const PAG_SIZE = 20;

function paginaBar(total, pag, pagKey, renderFn) {
  const pages = Math.ceil(total / PAG_SIZE);
  if (pages <= 1) return '';
  const start = (pag-1)*PAG_SIZE+1, end = Math.min(pag*PAG_SIZE, total);
  let btns = '';
  for (let i=1; i<=pages; i++) {
    const active = i===pag;
    btns += `<button onclick="_PAG.${pagKey}=${i};${renderFn}()" style="padding:5px 10px;border-radius:7px;border:1.5px solid ${active?'var(--gold)':'var(--border-lt)'};background:${active?'var(--gold-lt)':'transparent'};color:${active?'var(--gold)':'var(--text-2)'};font-family:var(--font);font-size:12px;font-weight:${active?700:400};cursor:pointer;min-width:32px">${i}</button>`;
  }
  return `<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-top:1px solid var(--border);background:var(--surface-2)">
    <span style="font-size:11.5px;color:var(--text-3)">${start}–${end} de ${total}</span>
    <div style="display:flex;gap:4px">
      <button onclick="_PAG.${pagKey}=Math.max(1,_PAG.${pagKey}-1);${renderFn}()" style="padding:5px 10px;border-radius:7px;border:1.5px solid var(--border-lt);background:transparent;color:var(--text-2);font-family:var(--font);font-size:12px;cursor:pointer" ${pag<=1?'disabled':''}>‹</button>
      ${btns}
      <button onclick="_PAG.${pagKey}=Math.min(${pages},_PAG.${pagKey}+1);${renderFn}()" style="padding:5px 10px;border-radius:7px;border:1.5px solid var(--border-lt);background:transparent;color:var(--text-2);font-family:var(--font);font-size:12px;cursor:pointer" ${pag>=pages?'disabled':''}>›</button>
    </div>
  </div>`;
}

// ── EXPORTAR CSV ───────────────────────────────────────────────
function exportarCSV(dados, nome) {
  if (!dados.length) { toast('Sem dados para exportar.', 'warn'); return; }
  const cols = Object.keys(dados[0]).filter(k => !['id','tenant_id','auth_id','criado_em','ativo'].includes(k));
  const header = cols.join(';');
  const rows   = dados.map(r => cols.map(c => {
    const v = r[c] ?? '';
    return String(v).includes(';') ? '"'+v+'"' : v;
  }).join(';'));
  const csv = [header, ...rows].join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = nome+'.csv'; a.click();
  URL.revokeObjectURL(url);
  toast('CSV exportado!', 'success');
}

  if (pag==='fornecedores') renderFornecedores();

function renderLancamentos() {

    ${podeCriar('pagar')   ? `<button class="btn btn-sm" style="background:var(--red-lt);color:var(--red);border:1px solid rgba(192,57,43,.25)" onclick="modalNovaDespesa()">+ Despesa</button>` : ''}`;

    ...(RECEITAS||[]).map(r => ({...r, _tipo:'receita'})),
    ...(DESPESAS||[]).map(d => ({...d, _tipo:'despesa'})),

  // Filtros
  if (f.tipo)    list = list.filter(x => x._tipo === f.tipo);
  if (f.status)  list = list.filter(x => x.status === f.status);
  if (f.busca) {
    const q = f.busca.toLowerCase();
    list = list.filter(x =>
      x.descricao?.toLowerCase().includes(q)
      || getNome(CLIENTES, x.cliente_id).toLowerCase().includes(q)
      || getNome(FORNECEDORES, x.fornecedor_id).toLowerCase().includes(q)
    );
  }
  if (f.periodo === 'mes')      list = list.filter(x => x.vencimento?.startsWith(mes));
  if (f.periodo === 'vencido')  list = list.filter(x => x.status==='pendente' && x.vencimento < hoje);
  if (f.periodo === '7d')       { const lim=new Date(); lim.setDate(lim.getDate()+7); list = list.filter(x => x.vencimento>=hoje && x.vencimento<=lim.toISOString().slice(0,10)); }
  // v35 · Filtro de categoria via drill-down do dashboard
  if (f._categoriaId)           list = list.filter(x => x.categoria_id === f._categoriaId);

  // Ordenação
  list.sort((a,b) => {
    let va = a[f.ordem]||'', vb = b[f.ordem]||'';
    if (f.ordem==='valor') { va=parseFloat(a.valor)||0; vb=parseFloat(b.valor)||0; }
    if (va < vb) return f.dir==='asc' ? -1 : 1;
    if (va > vb) return f.dir==='asc' ? 1 : -1;
    return 0;
  });

  const totalDespesas = list.filter(x=>x._tipo==='despesa').reduce((s,x)=>s+(parseFloat(x.valor)||0),0);
  const recebidos     = list.filter(x=>x._tipo==='receita' && x.status==='recebido').reduce((s,x)=>s+(parseFloat(x.valor)||0),0);
  const pagos         = list.filter(x=>x._tipo==='despesa' && x.status==='pago').reduce((s,x)=>s+(parseFloat(x.valor)||0),0);

  const temFiltro = f.busca||f.status||f.periodo||f.tipo||f._categoriaId;
  if (temFiltro) _PAG.lancamentos = 1;
  const pagAtual = _PAG.lancamentos;

      tenant_id:    APP.tenantId,
      descricao:    desc, valor, vencimento: venc,
      cliente_id:   $id('nr-cli').value   || null,
      categoria_id: $id('nr-cat').value   || null,
      conta_id:     $id('nr-conta').value || null,
      observacao:   $id('nr-obs').value   || null,
      status:       'pendente',
    }});
    closeModal(); toast('Receita cadastrada!', 'success');
    // ── Performance · Fase B ──
    // Antes: await carregarDados(); renderReceber();  (~1-2s, 19 queries)
    // Agora: upsert local + rerender da tela (instantâneo)
    if (Array.isArray(criada) && criada[0]) atualizarLocal(RECEITAS, criada[0]);
    rerenderTelaAtual();
  } catch(e) { toast('Erro: ' + e.message, 'error'); }
}

async function baixarReceita(id, e) {
  e.stopPropagation();
  const r = RECEITAS.find(x => x.id === id); if (!r) return;

  // ── v34 · Modal pergunta a data efetiva do recebimento ────────
  // Pré-preenche com a data de hoje, mas o usuário pode informar
  // qualquer data (ex: receita venceu dia 10, mas só caiu na conta dia 13).
  const dataEfetiva = await perguntarDataBaixa({
    titulo:    'Baixar Receita',
    descricao: r.descricao,
    valor:     r.valor,
    vencimento: r.vencimento,
    contaId:   r.conta_id,
    label:     'Data do recebimento',
    cor:       'green',
  });
  if (!dataEfetiva) return; // usuário cancelou

  const dataReceb = dataEfetiva.data;
  const contaId   = dataEfetiva.conta_id || r.conta_id || null;

  try {
    const atualizada = await supa('PATCH', 'fin_receitas', { params: { id: `eq.${id}` }, returning: true, body: { status: 'recebido', recebido_em: dataReceb, conta_id: contaId } });
    if (contaId) {
      await supa('POST', 'fin_movimentacoes', { body: { tenant_id: APP.tenantId, conta_id: contaId, tipo: 'entrada', valor: r.valor, data: dataReceb, descricao: r.descricao, receita_id: id } });
    }
    toast('Receita baixada!', 'success');
    // ── Performance · Fase B ──
    // Receita: atualização local. Conta: precisa recarregar pq saldo
    // é calculado server-side via trigger/view (não dá pra recalcular aqui).
    if (Array.isArray(atualizada) && atualizada[0]) atualizarLocal(RECEITAS, atualizada[0]);
    if (contaId) {
      // ── v35 · Recálculo via RPC (autoritativo) ────────────────
      await recalcularSaldoConta(contaId);
    }

    // ── v35 · Auto-criação de Juros + Multa + Desconto ──────────
    if (dataEfetiva.juros > 0 || dataEfetiva.multa > 0 || dataEfetiva.desconto > 0) {
      await criarLancamentosAjuste({
        origem:    'receita',
        origemId:  id,
        descBase:  r.descricao,
        clienteId: r.cliente_id,
        contaId,
        data:      dataReceb,
        juros:     dataEfetiva.juros    || 0,
        multa:     dataEfetiva.multa    || 0,
        desconto:  dataEfetiva.desconto || 0,
      });
    }
    rerenderTelaAtual();
  } catch(e) { toast('Erro: ' + e.message, 'error'); }
}

    <div class="kpi-card k-green"><div class="kpi-label">Maior saldo</div><div class="kpi-value" style="color:var(--green)">${CONTAS.length ? fmtMoeda(Math.max(...CONTAS.map(c=>parseFloat(c.saldo_atual)))) : '—'}</div><div class="kpi-sub">${CONTAS.length ? CONTAS.reduce((a,b)=>parseFloat(a.saldo_atual)>parseFloat(b.saldo_atual)?a:b).nome : '—'}</div></div>
    <div class="kpi-card"><div class="kpi-label">Contas ativas</div><div class="kpi-value">${CONTAS.length}</div><div class="kpi-sub">cadastradas</div></div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px">
    ${CONTAS.map(c => `
      <div class="card" style="border-left:3px solid ${c.cor||'var(--gold)'}">

            <div style="font-size:11px;color:var(--text-3);text-transform:capitalize">${c.tipo}${c.banco?' · '+c.banco:''}</div>

            <div style="display:flex;gap:5px">
              ${podeEditar('caixa_bancos') ? `<button onclick="editarConta('${c.id}')" class="btn btn-sm" style="padding:3px 9px;font-size:11px;background:var(--surface-2);color:var(--text-2);border:1px solid var(--border-lt)">✏</button>` : ''}
              ${podeExcluir('caixa_bancos') ? `<button onclick="excluirConta('${c.id}')" class="btn btn-sm" style="padding:3px 9px;font-size:11px;background:var(--red-lt);color:var(--red);border:1px solid rgba(192,57,43,.2)">✕</button>` : ''}
            </div>
          </div>
        </div>
        <div style="font-size:24px;font-weight:700;font-family:var(--mono);color:${parseFloat(c.saldo_atual)>=0?'var(--green)':'var(--red)'}">${fmtMoeda(c.saldo_atual)}</div>
      </div>`).join('')}
    ${CONTAS.length === 0 ? `<div class="empty-state"><div class="empty-icon">🏦</div><h3>Nenhuma conta cadastrada</h3></div>` : ''}
  </div>`;
}

async function salvarConta() {
  const nome = $id('nc-nome').value.trim();
  if (!nome) { toast('Informe o nome.', 'error'); return; }
  const saldo = parseFloat($id('nc-saldo').value) || 0;
  try {
    const criada = await supa('POST', 'fin_contas', { returning: true, body: {
      tenant_id: APP.tenantId, nome,
      tipo:      $id('nc-tipo').value,
      banco:     $id('nc-banco').value || null,
      saldo_inicial: saldo, saldo_atual: saldo,
    }});
    closeModal(); toast('Conta criada!', 'success');
    // ── Performance · Fase B ──
    if (Array.isArray(criada) && criada[0]) atualizarLocal(CONTAS, criada[0]);
    rerenderTelaAtual();
  } catch(e) { toast('Erro: ' + e.message, 'error'); }
}

function editarConta(id) {
  const c = CONTAS.find(x => x.id === id); if (!c) return;
  openModal('Editar Conta', `
    <div class="form-grid">
      <div class="form-field full"><label class="form-label">Nome *</label><input class="form-input" id="ect-nome" value="${c.nome||''}"></div>
      <div class="form-field"><label class="form-label">Tipo</label><select class="form-select" id="ect-tipo">
        <option value="corrente" ${c.tipo==='corrente'?'selected':''}>Conta corrente</option>
        <option value="poupanca" ${c.tipo==='poupanca'?'selected':''}>Poupança</option>
        <option value="caixa"    ${c.tipo==='caixa'?'selected':''}>Caixa físico</option>
        <option value="cartao"   ${c.tipo==='cartao'?'selected':''}>Cartão</option>
        <option value="investimento" ${c.tipo==='investimento'?'selected':''}>Investimento</option>
        <option value="outro"    ${c.tipo==='outro'?'selected':''}>Outro</option>
      </select></div>
      <div class="form-field"><label class="form-label">Banco</label><input class="form-input" id="ect-banco" value="${c.banco||''}"></div>
      <div class="form-field"><label class="form-label">Saldo atual (R$)</label><input class="form-input" type="number" id="ect-saldo" value="${c.saldo_atual||0}" step="0.01"></div>

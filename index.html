// ── RECORRÊNCIAS ──────────────────────────────────────────────
/*
  SQL para criar a tabela (rodar no Supabase SQL Editor):

  CREATE TABLE IF NOT EXISTS fin_recorrencias (
    id            uuid PRIMARY KEY DEFAULT gen_random_uuid(),
    tenant_id     uuid NOT NULL,
    descricao     text NOT NULL,
    tipo          text NOT NULL CHECK (tipo IN ('receita','despesa')),
    valor         numeric(14,2) NOT NULL,
    frequencia    text NOT NULL CHECK (frequencia IN ('mensal','quinzenal','semanal','anual')),
    dia_venc      int,
    data_inicio   date NOT NULL,
    data_fim      date,
    categoria_id  uuid,
    cliente_id    uuid,
    fornecedor_id uuid,
    conta_id      uuid,
    observacao    text,
    ativo         boolean DEFAULT true,
    ultima_geracao date,
    criado_em     timestamptz DEFAULT now()
  );
  ALTER TABLE fin_recorrencias ENABLE ROW LEVEL SECURITY;
  CREATE POLICY "tenant_iso" ON fin_recorrencias USING (true);
*/

const FREQ_LABEL = { mensal:'Mensal', quinzenal:'Quinzenal', semanal:'Semanal', anual:'Anual' };

// Calcula as datas de vencimento que deveriam existir até hoje
function datasRecorrencia(rec) {
  const datas = [];
  if (!rec.data_inicio) return datas;
  const inicio = new Date(rec.data_inicio + 'T12:00:00');
  if (isNaN(inicio.getTime())) return datas;
  const fim    = rec.data_fim ? new Date(rec.data_fim + 'T12:00:00') : null;
  const hoje   = new Date(today() + 'T12:00:00');
  let cur      = new Date(inicio);

  // Aplica o dia_venc se mensal/anual
  if (rec.frequencia === 'mensal' || rec.frequencia === 'anual') {
    if (rec.dia_venc) cur.setDate(Math.min(rec.dia_venc, new Date(cur.getFullYear(), cur.getMonth()+1, 0).getDate()));
  }

  let limite = 0;
  while (cur <= hoje && limite < 120) {
    limite++;
    if (!fim || cur <= fim) {
      datas.push(cur.toISOString().slice(0,10));
    }
    // Avança conforme frequência
    const prox = new Date(cur);
    if (rec.frequencia === 'mensal')    { prox.setMonth(prox.getMonth()+1); if (rec.dia_venc) prox.setDate(Math.min(rec.dia_venc, new Date(prox.getFullYear(),prox.getMonth()+1,0).getDate())); }
    if (rec.frequencia === 'quinzenal') { prox.setDate(prox.getDate()+15); }
    if (rec.frequencia === 'semanal')   { prox.setDate(prox.getDate()+7); }
    if (rec.frequencia === 'anual')     { prox.setFullYear(prox.getFullYear()+1); if (rec.dia_venc) prox.setDate(Math.min(rec.dia_venc, new Date(prox.getFullYear(),prox.getMonth()+1,0).getDate())); }
    cur = prox;
  }
  return datas;
}

// Próxima data de vencimento (futura)
function proximaData(rec) {
  const hoje = new Date(today() + 'T12:00:00');
  const fim  = rec.data_fim ? new Date(rec.data_fim + 'T12:00:00') : null;
  let cur    = new Date(rec.ultima_geracao ? rec.ultima_geracao + 'T12:00:00' : rec.data_inicio + 'T12:00:00');

  // Avança uma vez a partir da última geração
  const prox = new Date(cur);
  if (rec.frequencia === 'mensal')    { prox.setMonth(prox.getMonth()+1); if (rec.dia_venc) prox.setDate(Math.min(rec.dia_venc, new Date(prox.getFullYear(),prox.getMonth()+1,0).getDate())); }
  if (rec.frequencia === 'quinzenal') { prox.setDate(prox.getDate()+15); }
  if (rec.frequencia === 'semanal')   { prox.setDate(prox.getDate()+7); }
  if (rec.frequencia === 'anual')     { prox.setFullYear(prox.getFullYear()+1); }

  if (fim && prox > fim) return null;
  return prox.toISOString().slice(0,10);
}

// Geração automática silenciosa ao entrar no app
async function gerarRecorrenciasPendentes() {
  if (!RECORRENCIAS.length) return;
  const tid  = APP.user.tenant_id;
  const hoje = today();
  let gerou  = false;

  for (const rec of RECORRENCIAS) {
    if (!rec.ativo) continue;
    const datas = datasRecorrencia(rec);
    if (!datas.length) continue;

    // Filtra datas que ainda não foram geradas
    const ultima  = rec.ultima_geracao || '0000-00-00';
    const novas   = datas.filter(d => d > ultima);
    if (!novas.length) continue;

    for (const data of novas) {
      try {
        const body = {
          tenant_id:   tid,
          descricao:   rec.descricao,
          valor:       rec.valor,
          vencimento:  data,
          status:      'pendente',
          categoria_id: rec.categoria_id || null,
          conta_id:    rec.conta_id || null,
          observacao:  `Recorrência automática · ${FREQ_LABEL[rec.frequencia]}`,
        };
        if (rec.tipo === 'receita') {
          body.cliente_id = rec.cliente_id || null;
          await supa('POST', 'fin_receitas', { body });
        } else {
          body.fornecedor_id = rec.fornecedor_id || null;
          await supa('POST', 'fin_despesas', { body });
        }
        gerou = true;
      } catch(_) {}
    }

    // Atualiza ultima_geracao
    const maxData = novas[novas.length - 1];
    await supa('PATCH', 'fin_recorrencias', {
      params: { id: `eq.${rec.id}` },
      body:   { ultima_geracao: maxData }
    }).catch(()=>{});
  }

  if (gerou) {

    if (APP.page === 'receber' || APP.page === 'pagar') go(APP.page);

}

function atualizarCamposRecorrencia() {
  const tipo  = ($id('rc-tipo')||{}).value;
  const freq  = ($id('rc-freq')||{}).value;
  const cliW  = $id('rc-cli-wrap');
  const forW  = $id('rc-for-wrap');
  const diaW  = $id('rc-dia-wrap');
  if (cliW) cliW.style.display = tipo==='receita' ? '' : 'none';
  if (forW) forW.style.display = tipo==='despesa' ? '' : 'none';
  if (diaW) diaW.style.display = (freq==='mensal'||freq==='anual') ? '' : 'none';
}

async function salvarRecorrencia() {
  const desc  = $id('rc-desc').value.trim();
  const valor = parseFloat($id('rc-valor').value);
  const inicio = $id('rc-inicio').value;
  const tipo  = $id('rc-tipo').value;
  const freq  = $id('rc-freq').value;
  if (!desc || !valor || !inicio) { toast('Preencha os campos obrigatórios.', 'error'); return; }
  try {
    await supa('POST', 'fin_recorrencias', { body: {
      tenant_id:    APP.user.tenant_id,
      descricao:    desc, valor, tipo,
      frequencia:   freq,
      dia_venc:     parseInt($id('rc-dia')?.value) || null,
      data_inicio:  inicio,
      data_fim:     $id('rc-fim').value || null,
      categoria_id: $id('rc-cat').value  || null,
      conta_id:     $id('rc-conta').value|| null,
      cliente_id:   tipo==='receita' ? ($id('rc-cli').value||null) : null,
      fornecedor_id:tipo==='despesa' ? ($id('rc-for').value||null) : null,
      observacao:   $id('rc-obs').value  || null,
    }});
    closeModal();
    toast('Recorrência criada!', 'success');
    await carregarDados();
    // Gera lançamentos imediatamente
    await gerarRecorrenciasPendentes();
    await carregarDados();
    renderRecorrencias();
  } catch(e) { toast('Erro: ' + e.message + ' (verifique se a tabela fin_recorrencias foi criada)', 'error'); }
}

async function toggleRecorrencia(id, novoStatus) {
  try {
    await supa('PATCH', 'fin_recorrencias', { params: { id: `eq.${id}` }, body: { ativo: novoStatus } });
    toast(novoStatus ? 'Recorrência reativada!' : 'Recorrência pausada.', 'success');
    await carregarDados(); renderRecorrencias();
  } catch(e) { toast('Erro: ' + e.message, 'error'); }
}

async function excluirRecorrencia(id) {
  if (!confirm('Excluir esta recorrência? Os lançamentos já gerados não serão removidos.')) return;
  try {
    await supa('DELETE', 'fin_recorrencias', { params: { id: `eq.${id}` } });
    toast('Recorrência excluída.', 'success');
    await carregarDados(); renderRecorrencias();
  } catch(e) { toast('Erro: ' + e.message, 'error'); }
}

// ── IMPOSTOS ──────────────────────────────────────────────────
/*
  SQL (rodar no Supabase SQL Editor):

  CREATE TABLE IF NOT EXISTS fin_impostos (
    id          uuid PRIMARY KEY DEFAULT gen_random_uuid(),
    tenant_id   uuid NOT NULL,
    tipo        text NOT NULL,
    competencia text NOT NULL,
    vencimento  date NOT NULL,
    valor       numeric(14,2) NOT NULL,
    status      text DEFAULT 'pendente' CHECK (status IN ('pendente','pago','cancelado')),
    codigo_barras text,
    observacao  text,
    pago_em     date,
    criado_em   timestamptz DEFAULT now()
  );
  ALTER TABLE fin_impostos ENABLE ROW LEVEL SECURITY;
  CREATE POLICY "tenant_iso" ON fin_impostos USING (true);
*/

const TIPOS_IMPOSTO = [
  'DAS - Simples Nacional',
  'DARF - IRPJ',
  'DARF - CSLL',
  'DARF - PIS',
  'DARF - COFINS',
  'DARF - IRRF',
  'GPS - INSS',
  'ISS',
  'IPTU',
  'IPVA',
  'Outro',
];

// Tabelas DAS Simples Nacional 2024 (Anexo III - Serviços contábeis)
const FAIXAS_DAS = [
  { ate: 180000,   aliq: 0.06,  ded: 0 },
  { ate: 360000,   aliq: 0.112, ded: 9360 },
  { ate: 720000,   aliq: 0.135, ded: 17640 },
  { ate: 1800000,  aliq: 0.16,  ded: 35640 },
  { ate: 3600000,  aliq: 0.21,  ded: 125640 },
  { ate: 4800000,  aliq: 0.33,  ded: 648000 },
];

function calcularDAS(receitaAnual) {
  const faixa = FAIXAS_DAS.find(f => receitaAnual <= f.ate);
  if (!faixa) return 0;
  return Math.max(0, (receitaAnual * faixa.aliq - faixa.ded) / 12);
}

function renderImpostos() {
  const hoje     = today();

  const periodoSel = window._impostosPeriodo || '12m';

  if (periodoSel === '3m') {
    const lim = new Date(); lim.setMonth(lim.getMonth()-3);
    lista = lista.filter(i => i.vencimento >= lim.toISOString().slice(0,10));
  }
  if (periodoSel === '12m') {
    const lim = new Date(); lim.setMonth(lim.getMonth()-12);
    lista = lista.filter(i => i.vencimento >= lim.toISOString().slice(0,10));

  lista.sort((a,b) => b.vencimento.localeCompare(a.vencimento));

  const pendentes  = IMPOSTOS.filter(i => i.status==='pendente');

  const totalPago  = IMPOSTOS.filter(i=>i.status==='pago').reduce((s,i)=>s+(parseFloat(i.valor)||0),0);

  // Simulador DAS: receita dos últimos 12 meses
  const rec12 = RECEITAS
    .filter(r => r.status==='recebido' && r.vencimento >= (() => { const d=new Date(); d.setFullYear(d.getFullYear()-1); return d.toISOString().slice(0,10); })())

    <div class="kpi-card k-gold"><div class="kpi-label">DAS Estimado/mês</div><div class="kpi-value" style="color:var(--gold)">${fmtMoeda(dasSimulado)}</div><div class="kpi-sub">base: receita 12m · Anexo III</div></div>

  <!-- Simulador DAS -->

async function salvarImposto() {
  const tipo  = $id('ni-tipo').value;
  const comp  = $id('ni-comp').value.trim();
  const venc  = $id('ni-venc').value;
  const valor = parseFloat($id('ni-valor').value);
  if (!comp || !venc || !valor) { toast('Preencha os campos obrigatórios.', 'error'); return; }
  try {
    await supa('POST', 'fin_impostos', { body: {
      tenant_id:    APP.user.tenant_id,
      tipo, competencia: comp, vencimento: venc, valor,
      status:       $id('ni-status').value,
      pago_em:      $id('ni-pago-em').value || null,
      codigo_barras:$id('ni-cod').value     || null,
      observacao:   $id('ni-obs').value     || null,
    }});
    closeModal(); toast('Imposto registrado!', 'success');
    await carregarDados(); renderImpostos();
  } catch(e) { toast('Erro: ' + e.message + ' (verifique se a tabela fin_impostos foi criada)', 'error'); }
}

async function pagarImposto(id, e) {
  e.stopPropagation();
  try {
    await supa('PATCH', 'fin_impostos', { params: { id: `eq.${id}` }, body: { status: 'pago', pago_em: today() } });
    toast('Imposto marcado como pago!', 'success');
    await carregarDados(); renderImpostos();
  } catch(e) { toast('Erro: ' + e.message, 'error'); }
}

async function excluirImposto(id, e) {
  e.stopPropagation();
  if (!confirm('Excluir este registro?')) return;
  try {
    await supa('DELETE', 'fin_impostos', { params: { id: `eq.${id}` } });
    toast('Registro excluído.', 'success');
    await carregarDados(); renderImpostos();
  } catch(e) { toast('Erro: ' + e.message, 'error'); }
}

// ── CONCILIAÇÃO BANCÁRIA ───────────────────────────────────────
// Conciliação 100% client-side — importa CSV, cruza com lançamentos em memória
// Não requer tabela adicional no Supabase

let _concItems = []; // itens do extrato importado
let _concMes   = today().slice(0,7);

function renderConciliacao() {
  $id('topbar-actions').innerHTML = '';
  const mes = _concMes;

  // Lançamentos do mês selecionado
  const recsM = RECEITAS.filter(r => r.vencimento?.startsWith(mes));
  const despM = DESPESAS.filter(d => d.vencimento?.startsWith(mes));
  const todos  = [
    ...recsM.map(r => ({ ...r, _t:'rec', _valor: parseFloat(r.valor)||0 })),
    ...despM.map(d => ({ ...d, _t:'dep', _valor: -(parseFloat(d.valor)||0) })),
  ].sort((a,b) => a.vencimento.localeCompare(b.vencimento));

  // Matching com extrato importado
  function matchItem(ext) {
    const delta = 2; // tolerância R$2
    const match = todos.find(l =>
      Math.abs(Math.abs(l._valor) - Math.abs(ext.valor)) <= delta &&
      Math.abs(new Date(l.vencimento+' 12:00:00') - new Date(ext.data+' 12:00:00')) <= 3*86400000
    );
    return match || null;
  }

  const conciliados  = _concItems.filter(i => matchItem(i));
  const semMatch     = _concItems.filter(i => !matchItem(i));
  const naoExtrato   = todos.filter(l => !_concItems.some(i => {
    const delta=2;
    return Math.abs(Math.abs(l._valor)-Math.abs(i.valor))<=delta &&
           Math.abs(new Date(l.vencimento+' 12:00:00')-new Date(i.data+' 12:00:00'))<=3*86400000;
  }));

  const saldoExtrato = _concItems.reduce((s,i)=>s+i.valor,0);
  const saldoSist    = todos.reduce((s,l)=>s+l._valor,0);

  $id('page-content').innerHTML = `
  <div style="display:flex;flex-direction:column;gap:16px">

  <!-- Seletor de mês + importar -->
  <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
    <div style="display:flex;align-items:center;gap:8px">
      <label style="font-size:12px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em">Competência</label>
      <input type="month" value="${mes}" onchange="_concMes=this.value;_concItems=[];renderConciliacao()"
        style="padding:7px 12px;border:1.5px solid var(--border-lt);border-radius:8px;font-family:var(--font);font-size:13px;background:var(--bg-2);color:var(--text);outline:none">
    </div>
    <label class="btn btn-sm" style="cursor:pointer;background:var(--surface-2);color:var(--text-2);border:1px solid var(--border-lt)">
      📂 Importar CSV
      <input type="file" accept=".csv,.txt,.ofx" style="display:none" onchange="importarExtrato(this)">
    </label>
    ${_concItems.length ? `<button onclick="_concItems=[];renderConciliacao()" class="btn btn-sm" style="background:var(--red-lt);color:var(--red);border:1px solid rgba(224,92,92,.2)">✕ Limpar extrato</button>` : ''}
    <span style="font-size:11px;color:var(--text-3)">${_concItems.length} item(ns) no extrato</span>
  </div>

  <!-- KPIs -->
  <div class="kpi-grid" style="grid-template-columns:repeat(4,1fr)">
    <div class="kpi-card k-green"><div class="kpi-label">Conciliados</div><div class="kpi-value" style="color:var(--green)">${conciliados.length}</div><div class="kpi-sub">de ${_concItems.length} no extrato</div></div>
    <div class="kpi-card k-red"><div class="kpi-label">Sem correspondência</div><div class="kpi-value" style="color:var(--red)">${semMatch.length}</div><div class="kpi-sub">só no extrato</div></div>
    <div class="kpi-card k-amber"><div class="kpi-label">Não conciliados</div><div class="kpi-value" style="color:var(--amber)">${naoExtrato.length}</div><div class="kpi-sub">só no sistema</div></div>
    <div class="kpi-card ${Math.abs(saldoExtrato-saldoSist)<1?'k-green':'k-red'}"><div class="kpi-label">Diferença</div><div class="kpi-value" style="color:${Math.abs(saldoExtrato-saldoSist)<1?'var(--green)':'var(--red)'}">${fmtMoeda(saldoExtrato-saldoSist)}</div><div class="kpi-sub">extrato vs sistema</div></div>
  </div>

  ${_concItems.length===0 ? `
  <!-- Instrução importar -->
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:32px;text-align:center;box-shadow:var(--shadow)">
    <div style="font-size:36px;margin-bottom:12px;opacity:.4">🏦</div>
    <div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:8px">Importe o extrato bancário</div>
    <div style="font-size:12.5px;color:var(--text-3);line-height:1.7;max-width:420px;margin:0 auto">
      Exporte o extrato do seu banco em <strong style="color:var(--text-2)">CSV</strong> e importe aqui.
      O sistema cruza automaticamente com os lançamentos cadastrados pelo valor e data (tolerância ±2 dias, ±R$2).
      <br><br>
      <strong style="color:var(--text-2)">Formato esperado do CSV:</strong><br>
      <code style="background:var(--surface-2);padding:4px 10px;border-radius:6px;font-family:var(--mono);font-size:11px">data;descricao;valor</code><br>
      <span style="font-size:11px">Ex: <code style="background:var(--surface-2);padding:2px 8px;border-radius:4px;font-family:var(--mono)">2025-04-10;Honorário cliente A;5000.00</code></span>
    </div>
  </div>` : `

  <!-- Tabela de conciliação -->
  <div class="card" style="padding:0;overflow:hidden">
    <div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px">
      <span style="font-size:11px;font-weight:700;color:var(--text)">Resultado da Conciliação · ${mes}</span>
    </div>
    <table>
      <thead><tr>
        <th>Data Extrato</th><th>Descrição Extrato</th>
        <th style="text-align:right">Valor Extrato</th>
        <th>Lançamento Sistema</th>
        <th style="text-align:right">Valor Sistema</th>
        <th>Status</th>
      </tr></thead>
      <tbody>
        ${_concItems.map(ext => {
          const match = matchItem(ext);
          const status = match ? 'conciliado' : 'sem_match';
          return `<tr style="${status==='sem_match'?'background:rgba(224,92,92,.04)':''}">
            <td style="font-family:var(--mono);font-size:11px;color:var(--text-2)">${ext.data}</td>
            <td style="color:var(--text);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${ext.descricao}</td>
            <td style="text-align:right;font-family:var(--mono);font-weight:700;color:${ext.valor>=0?'var(--green)':'var(--red)'}">${fmtMoeda(ext.valor)}</td>
            <td style="color:${match?'var(--text-2)':'var(--text-3)'};max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${match?match.descricao:'—'}</td>
            <td style="text-align:right;font-family:var(--mono);font-weight:700;color:${match?(match._valor>=0?'var(--green)':'var(--red)'):'var(--text-3)'}">${match?fmtMoeda(Math.abs(match._valor)):'—'}</td>
            <td><span class="badge ${status==='conciliado'?'badge-green':'badge-red'}">${status==='conciliado'?'Conciliado':'Sem match'}</span></td>
          </tr>`;
        }).join('')}
        ${naoExtrato.map(l => `
          <tr style="background:rgba(224,154,58,.04)">
            <td style="font-family:var(--mono);font-size:11px;color:var(--text-3)">—</td>
            <td style="color:var(--text-3)">Só no sistema</td>
            <td style="text-align:right;color:var(--text-3)">—</td>
            <td style="color:var(--text);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.descricao}</td>
            <td style="text-align:right;font-family:var(--mono);font-weight:700;color:${l._valor>=0?'var(--green)':'var(--red)'}">${fmtMoeda(Math.abs(l._valor))}</td>

  <!-- Resumo saldos -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">

      <div style="font-size:11px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">Saldo do Extrato</div>
      <div style="font-size:20px;font-weight:700;font-family:var(--mono);color:${saldoExtrato>=0?'var(--green)':'var(--red)'}">${fmtMoeda(saldoExtrato)}</div>
      <div style="font-size:11px;color:var(--text-3);margin-top:4px">${_concItems.length} movimentações importadas</div>
    </div>
    <div class="card">
      <div style="font-size:11px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">Saldo do Sistema</div>
      <div style="font-size:20px;font-weight:700;font-family:var(--mono);color:${saldoSist>=0?'var(--green)':'var(--red)'}">${fmtMoeda(saldoSist)}</div>
      <div style="font-size:11px;color:var(--text-3);margin-top:4px">${todos.length} lançamentos no mês</div>
    </div>
  </div>

  </div>`;
}

function importarExtrato(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const text = e.target.result;
    const linhas = text.split('\n').map(l => l.trim()).filter(Boolean);
    const items = [];
    for (const linha of linhas) {
      // Suporta ; e , como separador
      const sep = linha.includes(';') ? ';' : ',';
      const cols = linha.split(sep).map(c => c.replace(/"/g,'').trim());
      if (cols.length < 3) continue;
      const [col0, col1, col2] = cols;
      // Ignora cabeçalho
      if (isNaN(parseFloat(col2.replace(',','.'))) ) continue;
      const data = col0.length===10 ? col0 : null;
      if (!data) continue;
      items.push({
        data,
        descricao: col1 || '—',
        valor: parseFloat(col2.replace(',','.')) || 0,
      });
    }
    if (!items.length) { toast('Nenhum item encontrado no CSV. Verifique o formato.', 'error'); return; }
    _concItems = items;
    toast(`${items.length} itens importados!`, 'success');
    renderConciliacao();
  };
  reader.readAsText(file, 'UTF-8');
  input.value = '';
}

// ── PDF: DRE ──────────────────────────────────────────────────
function gerarPdfDRE() {
  const periodoSel = window._drePeriodo || 'mes';
  const hoje  = new Date();
  const ano   = hoje.getFullYear();
  const mes   = String(hoje.getMonth()+1).padStart(2,'0');
  const mesStr = `${ano}-${mes}`;

  function filtrar(arr) {
    return arr.filter(l => {
      const m = l.vencimento?.slice(0,7);
      if (periodoSel==='mes') return m===mesStr;
      if (periodoSel==='ano') return m?.startsWith(String(ano));
      return true;
    });
  }

  const recFilt  = filtrar(RECEITAS).filter(r=>r.status==='recebido');
  const despFilt = filtrar(DESPESAS).filter(d=>d.status==='pago');

  const catRec={}, catDesp={};
  recFilt.forEach(r  => { const c=getNome(CATEGORIAS,r.categoria_id);  catRec[c]  =(catRec[c]||0) +(parseFloat(r.valor)||0); });
  despFilt.forEach(d => { const c=getNome(CATEGORIAS,d.categoria_id);  catDesp[c] =(catDesp[c]||0)+(parseFloat(d.valor)||0); });

  const totalRec  = Object.values(catRec).reduce((s,v)=>s+v,0);
  const totalDesp = Object.values(catDesp).reduce((s,v)=>s+v,0);
  const resultado = totalRec - totalDesp;
  const margem    = totalRec>0 ? Math.round((resultado/totalRec)*100) : 0;

  const periodoLabel = periodoSel==='mes' ? `${mes}/${ano}` : periodoSel==='ano' ? `Ano ${ano}` : 'Todo o período';

  const html = `
    ${pdfHeader('Demonstrativo de Resultado (DRE)', periodoLabel)}

    <div class="rpt-period">${periodoLabel} · Valores realizados</div>

    <div class="kpi-row" style="grid-template-columns:1fr 1fr 1fr 1fr">
      <div class="kpi-cell"><div class="lbl">Receitas</div><div class="val" style="color:#16804a">${fmtMoeda(totalRec)}</div></div>
      <div class="kpi-cell"><div class="lbl">Despesas</div><div class="val" style="color:#c0392b">${fmtMoeda(totalDesp)}</div></div>
      <div class="kpi-cell"><div class="lbl">Resultado</div><div class="val" style="color:${resultado>=0?'#16804a':'#c0392b'}">${fmtMoeda(resultado)}</div></div>
      <div class="kpi-cell"><div class="lbl">Margem</div><div class="val" style="color:${margem>=0?'#16804a':'#c0392b'}">${margem}%</div></div>
    </div>

    <div class="section-title">Receitas por Categoria</div>
    <table>
      <thead><tr><th>Categoria</th><th style="text-align:right">Valor</th><th style="text-align:right">% da Receita</th></tr></thead>
      <tbody>
        ${Object.entries(catRec).sort((a,b)=>b[1]-a[1]).map(([c,v])=>`
          <tr class="sub-row"><td>${c}</td><td style="text-align:right;font-family:'DM Mono';color:#16804a">${fmtMoeda(v)}</td><td style="text-align:right;color:#888">${Math.round(v/totalRec*100)}%</td></tr>
        `).join('')}
        <tr class="total-row highlight-green"><td>Total Receitas</td><td style="text-align:right;font-family:'DM Mono'">${fmtMoeda(totalRec)}</td><td style="text-align:right">100%</td></tr>
      </tbody>
    </table>

// ── PDF: FLUXO DE CAIXA ───────────────────────────────────────
function gerarPdfFluxo() {
  const periodoSel = window._fluxoPeriodo || '6m';
  const hoje   = new Date();
  const ano    = hoje.getFullYear();
  const mesAtual = String(hoje.getMonth()+1).padStart(2,'0');
  const meses  = {};

  const filtrar = (l, tipo) => {
    const m = l.vencimento?.slice(0,7); if (!m) return;
    if (periodoSel==='ano' && !m.startsWith(String(ano))) return;
    if (periodoSel==='6m') {
      const lim = new Date(); lim.setMonth(lim.getMonth()-5);
      const limStr = lim.getFullYear()+'-'+String(lim.getMonth()+1).padStart(2,'0');
      if (m<limStr) return;
    }
    if (!meses[m]) meses[m]={rec:0,desp:0,recReal:0,despReal:0};
    if (tipo==='rec') { meses[m].rec+=parseFloat(l.valor)||0; if(l.status==='recebido') meses[m].recReal+=parseFloat(l.valor)||0; }
    else              { meses[m].desp+=parseFloat(l.valor)||0; if(l.status==='pago')     meses[m].despReal+=parseFloat(l.valor)||0; }
  };
  RECEITAS.forEach(r=>filtrar(r,'rec'));
  DESPESAS.forEach(d=>filtrar(d,'desp'));

  const lista      = Object.keys(meses).sort();
  const totalRec   = lista.reduce((s,m)=>s+meses[m].rec,0);
  const totalDesp  = lista.reduce((s,m)=>s+meses[m].desp,0);
  const totalRes   = totalRec - totalDesp;
  const periodoLabel = periodoSel==='6m' ? 'Últimos 6 meses' : periodoSel==='ano' ? `Ano ${ano}` : 'Todo o período';

  const html = `
    ${pdfHeader('Fluxo de Caixa', periodoLabel)}
    <div class="rpt-title">Fluxo de Caixa</div>
    <div class="rpt-period">${periodoLabel}</div>

    <div class="kpi-row" style="grid-template-columns:1fr 1fr 1fr">
      <div class="kpi-cell"><div class="lbl">Total Entradas</div><div class="val" style="color:#16804a">${fmtMoeda(totalRec)}</div><div class="sub">previsto</div></div>
      <div class="kpi-cell"><div class="lbl">Total Saídas</div><div class="val" style="color:#c0392b">${fmtMoeda(totalDesp)}</div><div class="sub">previsto</div></div>
      <div class="kpi-cell"><div class="lbl">Resultado</div><div class="val" style="color:${totalRes>=0?'#16804a':'#c0392b'}">${fmtMoeda(totalRes)}</div><div class="sub">${totalRes>=0?'positivo':'negativo'}</div></div>
    </div>

    <div class="section-title">Detalhamento Mensal</div>
    <table>
      <thead><tr><th>Mês</th><th style="text-align:right">Entradas Prev.</th><th style="text-align:right">Saídas Prev.</th><th style="text-align:right">Resultado</th><th style="text-align:right">Realizado</th></tr></thead>
      <tbody>
        ${lista.map(m=>{
          const res  = meses[m].rec - meses[m].desp;
          const real = meses[m].recReal - meses[m].despReal;
          const [y,mo]=m.split('-');
          const isFut = m > `${ano}-${mesAtual}`;
          return `<tr style="${isFut?'opacity:.55':''}">
            <td style="font-weight:600">${mo}/${y}${isFut?' <em style="font-size:9px;color:#aaa">(proj.)</em>':''}</td>
            <td style="text-align:right;font-family:'DM Mono';color:#16804a">${fmtMoeda(meses[m].rec)}</td>
            <td style="text-align:right;font-family:'DM Mono';color:#c0392b">${fmtMoeda(meses[m].desp)}</td>
            <td style="text-align:right;font-family:'DM Mono';font-weight:700;color:${res>=0?'#16804a':'#c0392b'}">${fmtMoeda(res)}</td>
            <td style="text-align:right;font-family:'DM Mono';color:${real>=0?'#16804a':'#c0392b'}">${fmtMoeda(real)}</td>
          </tr>`;
        }).join('')}
        <tr class="total-row">
          <td>TOTAL</td>
          <td style="text-align:right;font-family:'DM Mono';color:#16804a">${fmtMoeda(totalRec)}</td>
          <td style="text-align:right;font-family:'DM Mono';color:#c0392b">${fmtMoeda(totalDesp)}</td>
          <td style="text-align:right;font-family:'DM Mono';color:${totalRes>=0?'#16804a':'#c0392b'}">${fmtMoeda(totalRes)}</td>
          <td></td>
        </tr>
      </tbody>
    </table>`;

  abrirPDF(`Fluxo de Caixa · ${periodoLabel}`, html);
}

// ── PDF: METAS ────────────────────────────────────────────────
function gerarPdfMetas() {
  const ativas = METAS.filter(m=>m.ativo!==false);
  const hoje   = today();

  const html = `
    ${pdfHeader('Relatório de Metas Financeiras', hoje)}
    <div class="rpt-title">Metas Financeiras</div>
    <div class="rpt-period">Posição em ${new Date().toLocaleDateString('pt-BR')}</div>

    <div class="kpi-row" style="grid-template-columns:1fr 1fr 1fr 1fr">
      ${[
        {l:'Total de Metas', v:ativas.length+'', s:'ativas'},
        {l:'Atingidas',  v:ativas.filter(m=>calcularProgressoMeta(m)>=parseFloat(m.valor_alvo)).length+'', s:''},
        {l:'Em Progresso', v:ativas.filter(m=>{ const p=calcularProgressoMeta(m)/parseFloat(m.valor_alvo)*100; return p>=10&&p<100; }).length+'', s:''},
        {l:'Em Risco', v:ativas.filter(m=>{ const p=calcularProgressoMeta(m)/parseFloat(m.valor_alvo)*100; return p<40&&m.prazo&&m.prazo>hoje; }).length+'', s:''},
      ].map(k=>`<div class="kpi-cell"><div class="lbl">${k.l}</div><div class="val">${k.v}</div><div class="sub">${k.s}</div></div>`).join('')}
    </div>

    <div class="section-title">Progresso das Metas</div>

    ${ativas.length===0
      ? `<p style="color:#aaa;font-size:11px;text-align:center;padding:20px">Nenhuma meta cadastrada</p>`
      : ativas.map(m=>{
          const atual = calcularProgressoMeta(m);
          const alvo  = parseFloat(m.valor_alvo);
          const pct   = Math.min(100, alvo>0 ? Math.round((atual/alvo)*100) : 0);
          const st    = statusMeta(m, atual);
          const diasR = m.prazo ? Math.ceil((new Date(m.prazo+' 12:00:00')-new Date())/86400000) : null;
          const corHex = m.cor || '#c9a84c';
          return `
          <div class="prog-wrap" style="background:#fafaf8;border:1px solid #e8e6e0;border-radius:8px;padding:14px;margin-bottom:10px;border-left:3px solid ${corHex}">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">

                <div style="font-size:12px;font-weight:700;color:#1a1a1a">${m.nome}</div>
                <div style="font-size:9.5px;color:#888;margin-top:1px">${TIPO_META_LABEL[m.tipo]||m.tipo}</div>
              </div>
              <span style="font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;background:${pct>=100?'#dcfce7':pct>=75?'#fef3c7':pct>=40?'#fff7ed':'#fef2f2'};color:${pct>=100?'#16804a':pct>=75?'#92400e':pct>=40?'#c2410c':'#991b1b'}">${st.label}</span>
            </div>
            <div class="prog-bar" style="margin-bottom:6px"><div class="prog-fill" style="width:${pct}%;background:${corHex}"></div></div>
            <div style="display:flex;justify-content:space-between;font-family:'DM Mono';font-size:10px">
              <span style="color:${corHex};font-weight:700">${pct}% · ${fmtMoeda(atual)}</span>
              <span style="color:#888">Alvo: ${fmtMoeda(alvo)}${diasR!==null?' · '+Math.abs(diasR)+(diasR>0?' dias restantes':' dias atrás'):''}${m.prazo?' · Prazo: '+fmtData(m.prazo):''}</span>
            </div>
          </div>`;
        }).join('')}`;

  abrirPDF('Metas Financeiras', html);
}

// ── NOTIFICAÇÕES ──────────────────────────────────────────────
const NOTIF_KEY = () => `artecon_notif_${APP.user?.tenant_id||'guest'}`;

function gerarNotificacoes() {
  if (!APP.user) return [];
  const hoje  = today();
  const em3   = new Date(); em3.setDate(em3.getDate()+3);
  const em3s  = em3.toISOString().slice(0,10);
  const notifs = [];

  // Vencidos
  (RECEITAS||[]).filter(r=>r.status==='pendente'&&r.vencimento<hoje).forEach(r=>
    notifs.push({ id:`rv_${r.id}`, tipo:'red', ico:'📥', txt:`Receita vencida: ${r.descricao}`, valor:fmtMoeda(r.valor), data:r.vencimento, acao:"go('receber')" }));
  (DESPESAS||[]).filter(d=>d.status==='pendente'&&d.vencimento<hoje).forEach(d=>
    notifs.push({ id:`dv_${d.id}`, tipo:'red', ico:'📤', txt:`Despesa vencida: ${d.descricao}`, valor:fmtMoeda(d.valor), data:d.vencimento, acao:"go('pagar')" }));
  (IMPOSTOS||[]).filter(i=>i.status==='pendente'&&i.vencimento<hoje).forEach(i=>
    notifs.push({ id:`iv_${i.id}`, tipo:'red', ico:'📋', txt:`Imposto vencido: ${i.tipo}`, valor:fmtMoeda(i.valor), data:i.vencimento, acao:"go('impostos')" }));

  // Vencem em 3 dias
  (RECEITAS||[]).filter(r=>r.status==='pendente'&&r.vencimento>=hoje&&r.vencimento<=em3s).forEach(r=>
    notifs.push({ id:`r3_${r.id}`, tipo:'amber', ico:'⏰', txt:`Receita vence em breve: ${r.descricao}`, valor:fmtMoeda(r.valor), data:r.vencimento, acao:"go('receber')" }));
  (DESPESAS||[]).filter(d=>d.status==='pendente'&&d.vencimento>=hoje&&d.vencimento<=em3s).forEach(d=>
    notifs.push({ id:`d3_${d.id}`, tipo:'amber', ico:'⏰', txt:`Despesa vence em breve: ${d.descricao}`, valor:fmtMoeda(d.valor), data:d.vencimento, acao:"go('pagar')" }));
  (IMPOSTOS||[]).filter(i=>i.status==='pendente'&&i.vencimento>=hoje&&i.vencimento<=em3s).forEach(i=>
    notifs.push({ id:`i3_${i.id}`, tipo:'amber', ico:'📋', txt:`Imposto vence em breve: ${i.tipo}`, valor:fmtMoeda(i.valor), data:i.vencimento, acao:"go('impostos')" }));

  return notifs.slice(0, 20);
}

function atualizarBadgeNotif() {
  if (!APP.user) return;
  const notifs = gerarNotificacoes();
  const lidas  = JSON.parse(localStorage.getItem(NOTIF_KEY())||'[]');
  const novas  = notifs.filter(n => !lidas.includes(n.id));
  const badge  = $id('notif-badge');
  if (badge) badge.style.display = novas.length ? 'block' : 'none';
}

function toggleNotifPanel() {
  if (!APP.user) return;
  const panel = $id('notif-panel');
  if (!panel) return;
  const aberto = panel.style.display !== 'none';
  panel.style.display = aberto ? 'none' : 'block';
  if (!aberto) renderNotifPanel();
}

function renderNotifPanel() {
  const notifs = gerarNotificacoes();
  const lidas  = JSON.parse(localStorage.getItem(NOTIF_KEY())||'[]');
  const list   = $id('notif-list');
  if (!list) return;

  if (!notifs.length) {
    list.innerHTML = `<div style="padding:24px;text-align:center;color:var(--text-3);font-size:12px">Nenhuma notificação pendente ✓</div>`;
    return;
  }

  list.innerHTML = notifs.map(n => {
    const lida = lidas.includes(n.id);
    return `<div onclick="marcarLida('${n.id}');${n.acao};toggleNotifPanel()"
      style="padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;background:${lida?'transparent':n.tipo==='red'?'rgba(224,92,92,.05)':'rgba(224,154,58,.05)'};transition:var(--tr)"
      onmouseover="this.style.background='var(--surface-2)'" onmouseout="this.style.background='${lida?'transparent':n.tipo==='red'?'rgba(224,92,92,.05)':'rgba(224,154,58,.05)'}'">
      <div style="display:flex;align-items:flex-start;gap:10px">
        <span style="font-size:16px;flex-shrink:0">${n.ico}</span>
        <div style="flex:1;min-width:0">
          <div style="font-size:12px;color:var(--text);line-height:1.4;${lida?'':'font-weight:500'}">${n.txt}</div>
          <div style="display:flex;justify-content:space-between;margin-top:3px">
            <span style="font-size:10.5px;font-family:var(--mono);color:${n.tipo==='red'?'var(--red)':'var(--amber)'};font-weight:700">${n.valor}</span>
            <span style="font-size:10px;color:var(--text-3)">${fmtData(n.data)}</span>
          </div>
        </div>
        ${!lida?`<span style="width:7px;height:7px;border-radius:50%;background:${n.tipo==='red'?'var(--red)':'var(--amber)'};flex-shrink:0;margin-top:3px"></span>`:''}
      </div>
    </div>`;
  }).join('');

  // Marca todas como lidas após visualizar
  const ids = notifs.map(n=>n.id);
  localStorage.setItem(NOTIF_KEY(), JSON.stringify(ids));
  if ($id('notif-badge')) $id('notif-badge').style.display = 'none';
}

function marcarLida(id) {
  const lidas = JSON.parse(localStorage.getItem(NOTIF_KEY())||'[]');
  if (!lidas.includes(id)) lidas.push(id);
  localStorage.setItem(NOTIF_KEY(), JSON.stringify(lidas));
}

function limparNotificacoes() {
  const notifs = gerarNotificacoes();
  localStorage.setItem(NOTIF_KEY(), JSON.stringify(notifs.map(n=>n.id)));
  if ($id('notif-badge')) $id('notif-badge').style.display = 'none';
  renderNotifPanel();
}

// Fecha painel ao clicar fora
document.addEventListener('click', e => {
  const btn   = $id('notif-btn');
  const panel = $id('notif-panel');
  if (panel && btn && !btn.contains(e.target) && !panel.contains(e.target)) {
    panel.style.display = 'none';
  }
});

// ── PERFIL: GUARD ─────────────────────────────────────────────
function isAdmin() { return APP.user?.perfil === 'admin'; }

function guardAdmin(fn) {
  return function(...args) {
    if (!isAdmin()) { toast('Acesso restrito a administradores.', 'error'); return; }
    return fn(...args);
  };
}

// ── USUÁRIOS ──────────────────────────────────────────────────
let _usuarios = [];

async function carregarUsuarios() {
  try {
    _usuarios = await supa('GET', 'fin_usuarios', {
      params: { tenant_id: `eq.${APP.user.tenant_id}`, select: '*', order: 'criado_em.asc' }
    });
  } catch(_) { _usuarios = [APP.user]; }
}

async function renderUsuarios() {
  if (!isAdmin()) {
    $id('page-content').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🔒</div>
        <h3>Acesso restrito</h3>
        <p style="font-size:13px;color:var(--text-3);margin-top:6px">Somente administradores podem gerenciar usuários.</p>
      </div>`;
    return;
  }

  $id('topbar-actions').innerHTML = `<button class="btn btn-gold btn-sm" onclick="modalConvidarUsuario()">+ Convidar usuário</button>`;
  await carregarUsuarios();

  const admins  = _usuarios.filter(u=>u.perfil==='admin');
  const viewers = _usuarios.filter(u=>u.perfil==='viewer'||u.perfil==='visualizador');

  $id('page-content').innerHTML = `
  <div style="display:flex;flex-direction:column;gap:16px;max-width:720px">

  <!-- KPIs -->
  <div class="kpi-grid" style="grid-template-columns:repeat(3,1fr)">
    <div class="kpi-card k-gold"><div class="kpi-label">Total de Usuários</div><div class="kpi-value" style="color:var(--gold)">${_usuarios.length}</div></div>
    <div class="kpi-card k-green"><div class="kpi-label">Administradores</div><div class="kpi-value" style="color:var(--green)">${admins.length}</div></div>
    <div class="kpi-card"><div class="kpi-label">Visualizadores</div><div class="kpi-value">${viewers.length}</div></div>
  </div>

  <!-- Como funciona -->
  <div style="background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.2);border-radius:10px;padding:13px 16px;font-size:12px;color:var(--text-2);line-height:1.7">
    <strong style="color:var(--gold)">Como funciona:</strong>
    Novos usuários precisam criar uma conta em <strong style="color:var(--text)">"Criar conta"</strong> na tela de login usando o e-mail convidado.
    Após o cadastro, um admin deve alterar o perfil deles aqui.
    <br><strong style="color:var(--text-2)">Admin:</strong> acesso total. <strong style="color:var(--text-2)">Viewer:</strong> somente leitura — não pode criar, editar ou excluir.
  </div>

  <!-- Tabela de usuários -->
  <div class="card" style="padding:0;overflow:hidden">
    <table>
      <thead><tr>
        <th>Usuário</th><th>E-mail</th><th>Perfil</th><th>Desde</th><th></th>
      </tr></thead>
      <tbody>
        ${_usuarios.map(u => {
          const isMe = u.id === APP.user.id;
          return `<tr>
            <td>
              <div style="display:flex;align-items:center;gap:10px">
                <div style="width:32px;height:32px;border-radius:50%;background:${u.perfil==='admin'?'linear-gradient(135deg,var(--gold-dim),var(--gold))':'var(--surface-2)'};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:${u.perfil==='admin'?'#ffffff':'var(--text-2)'}">
                  ${(u.nome||'U')[0].toUpperCase()}
                </div>
                <div>
                  <div style="font-size:13px;font-weight:600;color:var(--text)">${u.nome||'—'}${isMe?' <span style="font-size:10px;color:var(--text-3)">(você)</span>':''}</div>
                </div>
              </div>
            </td>
            <td style="color:var(--text-2);font-size:12.5px">${u.email||'—'}</td>
            <td>
              ${isMe
                ? `<span class="badge badge-gold">${u.perfil||'admin'}</span>`
                : `<select onchange="alterarPerfil('${u.id}',this.value)"
                    style="padding:5px 10px;border:1.5px solid var(--border-lt);border-radius:7px;font-family:var(--font);font-size:12px;background:var(--bg-2);color:var(--text);outline:none;cursor:pointer">
                    <option value="admin"      ${u.perfil==='admin'?'selected':''}>Admin</option>
                    <option value="viewer"     ${u.perfil==='viewer'||u.perfil==='visualizador'?'selected':''}>Viewer</option>
                  </select>`}
            </td>
            <td style="font-family:var(--mono);font-size:11px;color:var(--text-3)">${u.criado_em?new Date(u.criado_em).toLocaleDateString('pt-BR'):'—'}</td>
            <td>
              ${!isMe ? `<button onclick="removerUsuario('${u.id}')" class="btn btn-sm" style="padding:4px 10px;font-size:11px;background:var(--red-lt);color:var(--red);border:1px solid rgba(224,92,92,.2)">Remover</button>` : ''}
            </td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>

  <!-- Diferença de permissões -->
  <div class="card">
    <div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:14px">Permissões por perfil</div>
    <table>
      <thead><tr><th>Funcionalidade</th><th style="text-align:center">Admin</th><th style="text-align:center">Viewer</th></tr></thead>
      <tbody>
        ${[
          ['Visualizar dados e relatórios', true, true],
          ['Criar receitas e despesas', true, false],
          ['Editar lançamentos', true, false],
          ['Excluir lançamentos', true, false],
          ['Gerenciar metas e recorrências', true, false],
          ['Gerenciar impostos', true, false],
          ['Cadastrar clientes e fornecedores', true, false],
          ['Gerenciar usuários', true, false],
        ].map(([f, adm, view]) => `
          <tr>
            <td style="color:var(--text-2)">${f}</td>
            <td style="text-align:center"><span style="color:var(--green);font-size:14px">${adm?'✓':'—'}</span></td>
            <td style="text-align:center"><span style="color:${view?'var(--green)':'var(--text-3)'};font-size:14px">${view?'✓':'✗'}</span></td>
          </tr>`).join('')}
      </tbody>
    </table>
  </div>

  </div>`;
}

function modalConvidarUsuario() {
  openModal('Convidar Usuário', `
    <div style="font-size:12.5px;color:var(--text-2);margin-bottom:16px;line-height:1.6;background:var(--bg-2);padding:12px;border-radius:9px;border:1px solid var(--border)">
      Compartilhe o link do sistema com o usuário. Após criar a conta, altere o perfil dele nesta página.
      <br><strong style="color:var(--gold)">URL:</strong>
      <span style="font-family:var(--mono);font-size:11px;color:var(--text-3)">${window.location.origin+window.location.pathname}</span>
    </div>
    <div class="form-grid">
      <div class="form-field full"><label class="form-label">Nome do usuário</label><input class="form-input" id="inv-nome" placeholder="Nome completo"></div>
      <div class="form-field full"><label class="form-label">E-mail</label><input class="form-input" type="email" id="inv-email" placeholder="email@exemplo.com"></div>
      <div class="form-field full"><label class="form-label">Perfil inicial</label>
        <select class="form-select" id="inv-perfil">
          <option value="viewer">Viewer (somente leitura)</option>
          <option value="admin">Admin (acesso total)</option>
        </select>
      </div>
    </div>
    <div style="margin-top:12px;font-size:11.5px;color:var(--text-3);line-height:1.6">
      Copie e envie o link acima para o novo usuário. Após criarem a conta, eles aparecerão aqui e você pode ajustar o perfil.
    </div>`,
    `<button class="btn btn-outline" onclick="closeModal()">Fechar</button>
     <button class="btn btn-gold" onclick="copiarLinkConvite()">Copiar link</button>`
  );
}

function copiarLinkConvite() {
  const url = window.location.origin + window.location.pathname;
  navigator.clipboard.writeText(url).then(() => {
    toast('Link copiado!', 'success');
    closeModal();
  }).catch(() => toast('Copie manualmente: ' + url, 'warn'));
}

async function alterarPerfil(id, perfil) {
  try {
    await supa('PATCH', 'fin_usuarios', { params: { id: `eq.${id}` }, body: { perfil } });
    toast(`Perfil alterado para ${perfil}!`, 'success');
    await carregarUsuarios();
    renderUsuarios();
  } catch(e) { toast('Erro: ' + e.message, 'error'); }
}

async function removerUsuario(id) {
  if (!confirm('Remover este usuário do sistema? O acesso será revogado.')) return;
  try {
    await supa('DELETE', 'fin_usuarios', { params: { id: `eq.${id}` } });
    toast('Usuário removido.', 'success');
    await carregarUsuarios();
    renderUsuarios();
  } catch(e) { toast('Erro: ' + e.message, 'error'); }
}

// Aplica guard de perfil às funções destrutivas
const _guardedFns = ['salvarReceita','baixarReceita','editarReceita','salvarEdicaoReceita','excluirReceita',
  'salvarDespesa','baixarDespesa','editarDespesa','salvarEdicaoDespesa','excluirDespesa',
  'salvarConta','salvarCliente','salvarFornecedor','salvarCategoria',
  'salvarMeta','excluirMeta','salvarRecorrencia','toggleRecorrencia','excluirRecorrencia',
  'salvarImposto','pagarImposto','excluirImposto',
  'modalNovaReceita','modalNovaDespesa','modalNovaConta','modalNovoCliente',
  'modalNovoFornecedor','modalNovaCategoria','modalNovaMeta','modalNovaRecorrencia','modalNovoImposto'];

// ── MOBILE MENU ────────────────────────────────────────────────
function updateMobMenu() {
  const isMob = window.innerWidth <= 900;
  document.getElementById('mob-menu').style.display = isMob ? 'block' : 'none';
  if (!isMob) closeSidebar();
}
updateMobMenu();
window.addEventListener('resize', updateMobMenu);

// ── INIT ──────────────────────────────────────────────────────
window.addEventListener('load', () => {
  // Aplica guard de perfil nas funções destrutivas (viewer = só leitura)
  _guardedFns.forEach(fn => {
    if (typeof window[fn] === 'function') window[fn] = guardAdmin(window[fn]);
  });
  $id('auth-screen').classList.add('visible');
});
</script>
</body>
</html>

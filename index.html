  const origemId = $id('pg-origem')?.value;
  if (!origemId) { toast('Selecione a empresa de origem.', 'error'); return; }
  const migFin  = !!$id('pg-mig-fin')?.checked;
  const migCont = !!$id('pg-mig-cont')?.checked;
  const migDep  = !!$id('pg-mig-dep')?.checked;
  if (!migFin && !migCont && !migDep) { toast('Selecione ao menos um item.', 'error'); return; }
  if (migDep && (!migFin || !migCont)) {
    toast('Para migrar De-Para, marque também Financeiro e Contábil.', 'error'); return;
  }
  const status = $id('pg-mig-status'); status.textContent = 'Carregando...';
  const preview = $id('pg-mig-preview');
  try {
    const origem = await _planosFetchTenant(origemId);
    // PLANOS_STATE.financeiro/contabil já tem o atual carregado
    const atualFin  = new Set(PLANOS_STATE.financeiro.contas.map(c => c.codigo));
    const atualCont = new Set(PLANOS_STATE.contabil.contas.map(c => c.codigo));
    const stats = {
      fin:  { total: origem.financeiro.length, novos: 0, conflito: 0 },
      cont: { total: origem.contabil.length,   novos: 0, conflito: 0 },
      dep:  { total: origem.depara.length },
    };
    origem.financeiro.forEach(c => atualFin.has(c.codigo)  ? stats.fin.conflito++  : stats.fin.novos++);
    origem.contabil.forEach(c   => atualCont.has(c.codigo) ? stats.cont.conflito++ : stats.cont.novos++);

    const linha = (label, s) => `
      <div style="display:flex;justify-content:space-between;padding:6px 10px;border-bottom:1px solid var(--border);font-size:12px">
        <span style="color:var(--text-2)">${label}</span>
        <span><strong style="color:var(--green)">+${s.novos||0} novos</strong>${s.conflito ? ` · <span style="color:var(--amber)">${s.conflito} conflito${s.conflito>1?'s':''}</span>` : ''} <span style="color:var(--text-3)">de ${s.total} na origem</span></span>
      </div>`;
    preview.style.display = 'block';
    preview.innerHTML = `
      <div style="background:var(--bg-2);border:1px solid var(--border);border-radius:9px;overflow:hidden">
        ${migFin  ? linha('Financeiro', stats.fin)  : ''}
        ${migCont ? linha('Contábil',   stats.cont) : ''}
        ${migDep  ? `<div style="display:flex;justify-content:space-between;padding:6px 10px;font-size:12px"><span style="color:var(--text-2)">De-Para</span><span style="color:var(--text-3)">${stats.dep.total} vínculos na origem</span></div>` : ''}
      </div>
      <div style="margin-top:10px;display:flex;gap:8px;align-items:center">
        <button class="btn btn-gold btn-sm" onclick="planosExecutarMigracao('${origemId}')">Confirmar e migrar</button>
        <span style="font-size:11px;color:var(--text-3)">Pode demorar alguns segundos.</span>
      </div>
    `;
    status.textContent = '';
  } catch(e) {
    status.textContent = '';
    toast('Erro ao carregar origem: ' + e.message, 'error');
  }
}

// Executa migração de fato. Faz mapeamento código→novo_id pra ajustar
// conta_pai_id (a hierarquia interna) e fin_plano_depara (referências cruzadas).
async function planosExecutarMigracao(origemId) {
  const migFin  = !!$id('pg-mig-fin')?.checked;
  const migCont = !!$id('pg-mig-cont')?.checked;
  const migDep  = !!$id('pg-mig-dep')?.checked;
  const modo    = $id('pg-modo')?.value || 'mesclar';
  const status  = $id('pg-mig-status');
  status.textContent = 'Migrando... ';
  try {
    const origem = await _planosFetchTenant(origemId);

    // ── 1) Modo "substituir": apaga atual antes de copiar ────────────
    if (modo === 'substituir') {
      if (migDep) {
        await supa('DELETE', 'fin_plano_depara',   { params: { tenant_id: `eq.${APP.tenantId}` } });
      }
      if (migFin) {
        // Precisa apagar de-para primeiro pra liberar FKs (mesmo que migDep=false, FK pode existir)
        if (!migDep) await supa('DELETE', 'fin_plano_depara', { params: { tenant_id: `eq.${APP.tenantId}` } });
        await supa('DELETE', 'fin_plano_financeiro', { params: { tenant_id: `eq.${APP.tenantId}` } });
      }
      if (migCont) {
        if (!migDep && !migFin) await supa('DELETE', 'fin_plano_depara', { params: { tenant_id: `eq.${APP.tenantId}` } });
        await supa('DELETE', 'fin_plano_contabil', { params: { tenant_id: `eq.${APP.tenantId}` } });
      }
    }

    // ── 2) Recarrega estado atual (após possíveis deletes) ───────────
    const atualFin  = (modo === 'substituir' && migFin)  ? [] : PLANOS_STATE.financeiro.contas.slice();
    const atualCont = (modo === 'substituir' && migCont) ? [] : PLANOS_STATE.contabil.contas.slice();
    const idxFinPorCod  = new Map(atualFin.map(c => [c.codigo, c.id]));
    const idxContPorCod = new Map(atualCont.map(c => [c.codigo, c.id]));

    // ── 3) Migra Financeiro ─────────────────────────────────────────
    // Bulk insert por nível: contas do mesmo nível não dependem entre si,
    // apenas de níveis menores já presentes em idxFinPorCod. Ordena ASC,
    // batches de 200 por POST. ~70x mais rápido que inserts sequenciais.
    let inseridosFin = 0, ignoradosFin = 0;
    const mapFinOrigemParaDestino = new Map(); // origem.id → destino.id (pra usar em depara)
    if (migFin) {
      const origemIdPorCod = new Map(origem.financeiro.map(c => [c.id, c.codigo]));
      // Agrupa por nível
      const porNivel = new Map();
      for (const c of origem.financeiro) {
        if (!porNivel.has(c.nivel)) porNivel.set(c.nivel, []);
        porNivel.get(c.nivel).push(c);
      }
      const niveis = [...porNivel.keys()].sort((a,b) => a - b);
      for (const nivel of niveis) {
        const lote = porNivel.get(nivel);
        const aInserir = [];
        const refsOrigem = []; // mantém referência à conta original na mesma posição
        for (const c of lote) {
          if (idxFinPorCod.has(c.codigo)) {
            mapFinOrigemParaDestino.set(c.id, idxFinPorCod.get(c.codigo));
            ignoradosFin++;
            continue;
          }
          const codigoPai = c.conta_pai_id ? origemIdPorCod.get(c.conta_pai_id) : null;
          const novoPaiId = codigoPai ? idxFinPorCod.get(codigoPai) : null;
          aInserir.push({
            tenant_id: APP.tenantId,
            codigo: c.codigo, descricao: c.descricao,
            nivel: c.nivel, ordem: c.ordem,
            conta_pai_id: novoPaiId,
            tipo: c.tipo, grupo: c.grupo,
            ativo: true,
          });
          refsOrigem.push(c);
        }
        // Envia em batches de 200 (Postgres aceita array no body)
        const BATCH = 200;
        for (let i = 0; i < aInserir.length; i += BATCH) {
          const slice  = aInserir.slice(i, i + BATCH);
          const refs   = refsOrigem.slice(i, i + BATCH);
          const r = await supa('POST', 'fin_plano_financeiro', { returning: true, body: slice });
          if (Array.isArray(r)) {
            // O backend pode reordenar — casa por código (único por tenant)
            const porCodNovo = new Map(r.map(x => [x.codigo, x.id]));
            refs.forEach(orig => {
              const novoId = porCodNovo.get(orig.codigo);
              if (novoId) {
                idxFinPorCod.set(orig.codigo, novoId);
                mapFinOrigemParaDestino.set(orig.id, novoId);
                inseridosFin++;
              }
            });
          }
          status.textContent = `Migrando financeiro... ${inseridosFin}`;
        }
      }
    }

    // ── 4) Migra Contábil (mesmo padrão por nível) ───────────────────
    let inseridosCont = 0, ignoradosCont = 0;
    const mapContOrigemParaDestino = new Map();
    if (migCont) {
      const origemIdPorCod = new Map(origem.contabil.map(c => [c.id, c.codigo]));
      const porNivel = new Map();
      for (const c of origem.contabil) {
        if (!porNivel.has(c.nivel)) porNivel.set(c.nivel, []);
        porNivel.get(c.nivel).push(c);
      }
      const niveis = [...porNivel.keys()].sort((a,b) => a - b);
      for (const nivel of niveis) {
        const lote = porNivel.get(nivel);
        const aInserir = [];
        const refsOrigem = [];
        for (const c of lote) {
          if (idxContPorCod.has(c.codigo)) {
            mapContOrigemParaDestino.set(c.id, idxContPorCod.get(c.codigo));
            ignoradosCont++;
            continue;
          }
          const codigoPai = c.conta_pai_id ? origemIdPorCod.get(c.conta_pai_id) : null;
          const novoPaiId = codigoPai ? idxContPorCod.get(codigoPai) : null;
          aInserir.push({
            tenant_id: APP.tenantId,
            codigo: c.codigo, descricao: c.descricao,
            nivel: c.nivel, ordem: c.ordem,
            conta_pai_id: novoPaiId,
            sintetica: c.sintetica, apelido: c.apelido,
            natureza: c.natureza, entra_balanco: c.entra_balanco,
            ativo: true,
          });
          refsOrigem.push(c);
        }
        const BATCH = 200;
        for (let i = 0; i < aInserir.length; i += BATCH) {
          const slice  = aInserir.slice(i, i + BATCH);
          const refs   = refsOrigem.slice(i, i + BATCH);
          const r = await supa('POST', 'fin_plano_contabil', { returning: true, body: slice });
          if (Array.isArray(r)) {
            const porCodNovo = new Map(r.map(x => [x.codigo, x.id]));
            refs.forEach(orig => {
              const novoId = porCodNovo.get(orig.codigo);
              if (novoId) {
                idxContPorCod.set(orig.codigo, novoId);
                mapContOrigemParaDestino.set(orig.id, novoId);
                inseridosCont++;
              }
            });
          }
          status.textContent = `Migrando contábil... ${inseridosCont}`;
        }
      }
    }

    // ── 5) Migra De-Para (bulk de 200) ───────────────────────────────
    let inseridosDep = 0, ignoradosDep = 0;
    if (migDep) {
      const ensureFinMap = mapFinOrigemParaDestino.size ? mapFinOrigemParaDestino
        : new Map(origem.financeiro
            .filter(c => idxFinPorCod.has(c.codigo))
            .map(c => [c.id, idxFinPorCod.get(c.codigo)]));
      const ensureContMap = mapContOrigemParaDestino.size ? mapContOrigemParaDestino
        : new Map(origem.contabil
            .filter(c => idxContPorCod.has(c.codigo))
            .map(c => [c.id, idxContPorCod.get(c.codigo)]));
      const atuais = new Set(PLANOS_STATE.depara.vinculos.map(v => `${v.conta_financeira_id}|${v.conta_contabil_id}`));
      const aInserirDep = [];
      for (const v of origem.depara) {
        const novoFin  = ensureFinMap.get(v.conta_financeira_id);
        const novoCont = ensureContMap.get(v.conta_contabil_id);
        if (!novoFin || !novoCont) { ignoradosDep++; continue; }
        const k = `${novoFin}|${novoCont}`;
        if (atuais.has(k)) { ignoradosDep++; continue; }
        atuais.add(k); // evita duplicatas dentro do próprio batch também
        aInserirDep.push({ tenant_id: APP.tenantId, conta_financeira_id: novoFin, conta_contabil_id: novoCont });
      }
      const BATCH = 200;
      for (let i = 0; i < aInserirDep.length; i += BATCH) {
        const slice = aInserirDep.slice(i, i + BATCH);
        try {
          await supa('POST', 'fin_plano_depara', { returning: false, body: slice });
          inseridosDep += slice.length;
        } catch(_) { ignoradosDep += slice.length; }
        status.textContent = `Migrando de-para... ${inseridosDep}`;
      }
    }

    // ── 6) Auditoria ─────────────────────────────────────────────────
    try {
      await supaRpc('fin_registrar_autorizacao', {
        p_tabela: 'fin_plano_*',
        p_acao: 'MIGRAR_PLANO',
        p_motivo: `Migração de ${origemId} → atual. Modo: ${modo}. Fin: ${inseridosFin}+/${ignoradosFin}=. Cont: ${inseridosCont}+/${ignoradosCont}=. Dep: ${inseridosDep}+/${ignoradosDep}=.`
      });
    } catch(_) { /* auditoria opcional */ }

    closeModal();
    toast(`Migração concluída! Fin: +${inseridosFin}, Cont: +${inseridosCont}, Dep: +${inseridosDep}`, 'success');
    // Recarrega tela
    PLANOS_STATE.carregado = false;
    await planosCarregarDados();
    planosShowTab(PLANOS_STATE.tabAtual);
  } catch(e) {
    status.textContent = '';
    toast('Erro na migração: ' + e.message, 'error');
  }
}

// Confirmação digitada antes de excluir (segurança)
async function planosConfirmarExclusao() {
  const delFin  = !!$id('pg-del-fin')?.checked;
  const delCont = !!$id('pg-del-cont')?.checked;
  const delDep  = !!$id('pg-del-dep')?.checked;
  if (!delFin && !delCont && !delDep) { toast('Selecione ao menos um item.', 'error'); return; }

  const totFin  = PLANOS_STATE.financeiro.contas.length;
  const totCont = PLANOS_STATE.contabil.contas.length;
  const totDep  = PLANOS_STATE.depara.vinculos.length;
  const itens = [];
  if (delFin)  itens.push(`Plano Financeiro (${totFin} conta${totFin!==1?'s':''})`);
  if (delCont) itens.push(`Plano Contábil (${totCont} conta${totCont!==1?'s':''})`);
  if (delDep)  itens.push(`De-Para (${totDep} vínculo${totDep!==1?'s':''})`);

  // Modal de confirmação dobrada
  openModal('Confirmar exclusão', `
    <div style="display:flex;flex-direction:column;gap:12px">
      <div style="background:rgba(192,57,43,.06);border:1px solid rgba(192,57,43,.25);border-radius:10px;padding:13px 16px;font-size:12.5px;color:var(--text-2);line-height:1.7">
        <strong style="color:var(--red);font-size:13px">⚠️ Você está prestes a excluir:</strong>
        <ul style="margin:8px 0 0 18px;padding:0">
          ${itens.map(i => `<li>${i}</li>`).join('')}
        </ul>
        <div style="margin-top:10px;font-size:11.5px;color:var(--text-3)">
          Esta ação <strong>não pode ser desfeita</strong>. Lançamentos que apontam pra contas removidas terão a referência limpa.
        </div>
      </div>
      <div class="form-field">
        <label class="form-label">Para confirmar, digite <code style="background:var(--surface-2);padding:2px 6px;border-radius:4px">EXCLUIR</code> abaixo *</label>
        <input class="form-input" id="pg-del-confirm" autocomplete="off" placeholder="EXCLUIR">
      </div>
    </div>
  `, `
    <button class="btn" onclick="modalPlanosGerenciar()">Voltar</button>
    <button class="btn btn-sm" onclick="planosExecutarExclusao(${delFin}, ${delCont}, ${delDep})" style="background:var(--red);color:#fff">Excluir definitivamente</button>
  `);
}

async function planosExecutarExclusao(delFin, delCont, delDep) {
  const txt = ($id('pg-del-confirm')?.value || '').trim();
  if (txt !== 'EXCLUIR') { toast('Digite "EXCLUIR" exatamente para confirmar.', 'error'); return; }
  const tid = APP.tenantId;
  try {
    // De-Para precisa ir primeiro pra liberar FKs (caso existam)
    if (delDep || delFin || delCont) {
      // Mesmo se delDep=false, se vamos apagar plano fin/cont, é necessário limpar de-para antes
      await supa('DELETE', 'fin_plano_depara', { params: { tenant_id: `eq.${tid}` } });
    }
    if (delFin) {
      await supa('DELETE', 'fin_plano_financeiro', { params: { tenant_id: `eq.${tid}` } });
    }
    if (delCont) {
      await supa('DELETE', 'fin_plano_contabil', { params: { tenant_id: `eq.${tid}` } });
    }

    // Auditoria
    try {
      await supaRpc('fin_registrar_autorizacao', {
        p_tabela: 'fin_plano_*',
        p_acao: 'EXCLUIR_PLANO_COMPLETO',
        p_motivo: `Exclusão completa. Fin:${delFin?'sim':'não'} Cont:${delCont?'sim':'não'} Dep:${delDep||delFin||delCont?'sim':'não'}`
      });
    } catch(_) {}

    closeModal();
    toast('Plano(s) excluído(s) com sucesso.', 'success');
    PLANOS_STATE.carregado = false;
    await planosCarregarDados();
    planosShowTab(PLANOS_STATE.tabAtual);
  } catch(e) {
    toast('Erro: ' + e.message, 'error');
  }
}


// ── DE-PARA ──────────────────────────────────────────────────────
function renderDePara() {
  const D = PLANOS_STATE.depara;
  const s = D.stats || {};

  // Listas de analíticas
  const finList = PLANOS_STATE.financeiro.contas
    .filter(c => c.tipo === 'A' && c.ativo !== false)
    .sort((a,b) => (a.codigo||'').localeCompare(b.codigo||''));
  const contList = PLANOS_STATE.contabil.contas
    .filter(c => !c.sintetica && c.ativo !== false)
    .sort((a,b) => (a.codigo||'').localeCompare(b.codigo||''));

  const idsLinkedFin  = new Set(D.vinculos.map(v => v.conta_financeira_id));
  const idsLinkedCont = new Set(D.vinculos.map(v => v.conta_contabil_id));

  const filFin  = (D.filtroFin  || '').toLowerCase();
  const filCont = (D.filtroCont || '').toLowerCase();

  const finItems = finList
    .filter(c => !filFin || (c.codigo||'').toLowerCase().includes(filFin) || (c.descricao||'').toLowerCase().includes(filFin))
    .map(c => `
      <div class="depara-item ${idsLinkedFin.has(c.id)?'linked':''} ${D.selFin===c.id?'selected':''}"
           onclick="deparaSelecionar('fin','${c.id}')">
        <span class="codigo">${c.codigo}</span>
        <span class="descricao">${c.descricao||''}</span>
      </div>
    `).join('') || '<div class="empty-state-mini">Sem contas analíticas.</div>';

  const contItems = contList
    .filter(c => !filCont || (c.codigo||'').toLowerCase().includes(filCont) || (c.descricao||'').toLowerCase().includes(filCont) || (c.apelido||'').toLowerCase().includes(filCont))
    .map(c => `
      <div class="depara-item ${idsLinkedCont.has(c.id)?'linked':''} ${D.selCont===c.id?'selected':''}"
           onclick="deparaSelecionar('cont','${c.id}')">
        <span class="codigo">${c.codigo}${c.apelido?' · '+c.apelido:''}</span>
        <span class="descricao">${c.descricao||''}</span>
      </div>
    `).join('') || '<div class="empty-state-mini">Sem contas analíticas.</div>';

  // Lista de vínculos existentes
  const finById  = new Map(PLANOS_STATE.financeiro.contas.map(c => [c.id, c]));
  const contById = new Map(PLANOS_STATE.contabil.contas.map(c => [c.id, c]));
  const vincsHtml = D.vinculos.map(v => {
    const f = finById.get(v.conta_financeira_id);
    const c = contById.get(v.conta_contabil_id);
    if (!f || !c) return '';
    const removeBtn = podeEditarDePara() ? `<button class="btn-mini" onclick="deparaRemoverVinculo('${v.id}')" title="Remover">🗑</button>` : '';
    return `
      <div class="vinculo-row">
        <span><span class="codigo-mono">${f.codigo}</span> ${f.descricao||''}</span>
        <span class="arrow">→</span>
        <span><span class="codigo-mono">${c.codigo}</span> ${c.descricao||''}</span>
        <span style="text-align:right;font-family:var(--mono);color:var(--text-2)">${v.percentual||100}%</span>
        <span style="text-align:right">${removeBtn}</span>
      </div>`;
  }).join('') || '<div class="empty-state-mini">Nenhum vínculo cadastrado ainda. Selecione uma conta de cada lado e clique em <strong>Vincular →</strong>.</div>';

  const podeVincular = podeEditarDePara() && D.selFin && D.selCont;
  const btnVinc = podeEditarDePara() ? `
    <button class="btn btn-gold" id="btn-vincular" onclick="deparaVincular()" ${podeVincular?'':'disabled'}>Vincular →</button>
    <button class="btn btn-outline" onclick="deparaLimparSelecao()">Limpar</button>
  ` : '<div style="font-size:11.5px;color:var(--text-3);text-align:center;padding:10px">Você não tem permissão para editar vínculos.</div>';

  $id('planos-tab-body').innerHTML = `
    <div class="depara-stats">
      <div class="depara-stat-card"><div class="num">${s.total_financeiras||0}</div><div class="label">Contas Financeiras</div></div>
      <div class="depara-stat-card"><div class="num">${s.total_contabeis||0}</div><div class="label">Contas Contábeis</div></div>
      <div class="depara-stat-card"><div class="num">${s.total_vinculos||0}</div><div class="label">Vínculos Criados</div></div>
      <div class="depara-stat-card"><div class="num">${s.financeiras_vinculadas||0}</div><div class="label">Financeiras Vinculadas</div></div>
      <div class="depara-stat-card"><div class="num ${(s.financeiras_pendentes||0)>0?'alert':''}">${s.financeiras_pendentes||0}</div><div class="label">Pendentes</div></div>
    </div>

    <p style="color:var(--text-3);font-size:12.5px;margin-bottom:14px">
      Selecione uma conta financeira (esquerda) e uma conta contábil (direita) e clique em <strong>Vincular →</strong>.
      ${podeEditarDePara() ? '' : 'Modo somente leitura.'}
    </p>

    <div class="depara-grid">
      <div class="depara-col">
        <header>Plano Financeiro (analíticas)</header>
        <input type="search" id="busca-depara-fin" placeholder="Buscar..." value="${D.filtroFin||''}" oninput="deparaFiltrar('fin', this.value)">
        <div class="depara-list">${finItems}</div>
      </div>
      <div class="depara-action">${btnVinc}</div>
      <div class="depara-col">
        <header>Plano Contábil (analíticas)</header>
        <input type="search" id="busca-depara-cont" placeholder="Buscar..." value="${D.filtroCont||''}" oninput="deparaFiltrar('cont', this.value)">
        <div class="depara-list">${contItems}</div>
      </div>
    </div>

    <h3 style="margin-top:24px;margin-bottom:10px;font-size:14px;color:var(--text)">Vínculos atuais</h3>
    <div class="vinculos-existentes">${vincsHtml}</div>
  `;
}

function deparaSelecionar(lado, id) {
  if (lado === 'fin')  PLANOS_STATE.depara.selFin  = (PLANOS_STATE.depara.selFin  === id ? null : id);
  if (lado === 'cont') PLANOS_STATE.depara.selCont = (PLANOS_STATE.depara.selCont === id ? null : id);
  renderDePara();
}

function deparaLimparSelecao() {
  PLANOS_STATE.depara.selFin = null;
  PLANOS_STATE.depara.selCont = null;
  renderDePara();
}

function deparaFiltrar(lado, val) {
  if (lado === 'fin')  PLANOS_STATE.depara.filtroFin  = val;
  if (lado === 'cont') PLANOS_STATE.depara.filtroCont = val;
  renderDePara();
  // Reposicionar foco no input que disparou
  const id = lado === 'fin' ? 'busca-depara-fin' : 'busca-depara-cont';
  const inp = $id(id);
  if (inp) { inp.focus(); inp.setSelectionRange(val.length, val.length); }
}

async function deparaVincular() {
  if (!podeEditarDePara()) { toast('Sem permissão para criar vínculos.', 'error'); return; }
  const D = PLANOS_STATE.depara;
  if (!D.selFin || !D.selCont) return;

  // Já existe?
  if (D.vinculos.find(v => v.conta_financeira_id === D.selFin && v.conta_contabil_id === D.selCont)) {
    toast('Este vínculo já existe.', 'error'); return;
  }

  // Modal de percentual
  openModal('Confirmar Vínculo', `
    <div class="form-grid">
      <div class="form-field full" style="font-size:13px;color:var(--text-2)">
        Percentual de rateio (1–100). Use 100 quando 100% do valor da conta financeira deve ir para esta conta contábil.
      </div>
      <div class="form-field"><label class="form-label">Percentual</label><input class="form-input" id="dp-perc" type="number" min="0.01" max="100" step="0.01" value="100"></div>
      <div class="form-field full"><label class="form-label">Observação (opcional)</label><input class="form-input" id="dp-obs" placeholder=""></div>
    </div>
  `, `
    <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-gold" onclick="deparaConfirmarVinculo()">Vincular</button>
  `);
}

async function deparaConfirmarVinculo() {
  const D = PLANOS_STATE.depara;
  const perc = parseFloat($id('dp-perc').value);
  const obs  = $id('dp-obs').value.trim() || null;
  if (isNaN(perc) || perc <= 0 || perc > 100) { toast('Percentual inválido.', 'error'); return; }
  try {
    const criado = await supa('POST', 'fin_plano_depara', {
      returning: true,
      body: {
        tenant_id: APP.tenantId,
        conta_financeira_id: D.selFin,
        conta_contabil_id:   D.selCont,
        percentual: perc,
        observacao: obs,
      }
    });
    closeModal();
    if (Array.isArray(criado) && criado[0]) D.vinculos.push(criado[0]);
    D.selFin = null; D.selCont = null;
    // Atualizar stats locais
    if (D.stats) {
      D.stats.total_vinculos = (D.stats.total_vinculos||0) + 1;
    }
    toast('Vínculo criado!', 'success');
    renderDePara();
  } catch(e) { toast('Erro: ' + e.message, 'error'); }
}

async function deparaRemoverVinculo(id) {
  if (!podeEditarDePara()) { toast('Sem permissão para remover.', 'error'); return; }
  if (!await confirmarAcao('Remover vínculo?', 'Esta ação removerá o vínculo de-para.', { labelOk:'Remover' })) return;
  try {
    await supa('DELETE', 'fin_plano_depara', { params: { id: 'eq.' + id } });
    const D = PLANOS_STATE.depara;
    D.vinculos = D.vinculos.filter(v => v.id !== id);
    if (D.stats) D.stats.total_vinculos = Math.max(0, (D.stats.total_vinculos||1) - 1);
    toast('Vínculo removido.', 'success');
    renderDePara();
  } catch(e) { toast('Erro: ' + e.message, 'error'); }
}

  // Lê direto do banco (não usa _REGRAS_CATEG porque queremos ver inativas também)
  let regras = [];
  try {
    regras = await supa('GET', 'fin_regras_categorizacao', {
      params: {
        tenant_id: `eq.${APP.tenantId}`,
        select:    'id,nome,tipo,padroes,prioridade,ativo,is_default,atualizado_em',
        order:     'prioridade.asc,nome.asc'
      }
    }) || [];
  } catch(e) {
    el.innerHTML = `<div style="padding:10px;color:var(--red);font-size:12px">

  const podeExcluirConfig = isAdmin() || podeExcluir('configuracoes');

  };
  el.innerHTML = `
    <div style="font-size:11px;color:var(--text-3);margin-bottom:10px;line-height:1.6">
      Regras avaliadas em ordem de prioridade (menor = primeiro). Padrões usam expressões regulares (regex).
      Regras marcadas com <span style="color:var(--gold)">★</span> são padrão do sistema — você pode editar ou desativar.
    </div>
    <div style="display:flex;flex-direction:column;gap:8px">
      ${regras.map(r => {
        const padroesPrev = (Array.isArray(r.padroes) ? r.padroes : []).slice(0,3).join(' · ');
        const extra = (Array.isArray(r.padroes) && r.padroes.length > 3) ? ` (+${r.padroes.length-3})` : '';

            ${tipoBadge(r.tipo)}
            <span style="font-size:11px;color:var(--text-3)">prioridade ${r.prioridade}</span>
            ${!r.ativo ? '<span class="badge" style="background:var(--surface-2);color:var(--text-3)">inativa</span>' : ''}
            <div style="margin-left:auto;display:flex;gap:6px">
              ${podeEditarConfig ? `
                <button onclick="toggleRegraCategAtiva('${r.id}', ${!r.ativo})" class="btn btn-sm" style="padding:3px 9px;font-size:10.5px;background:var(--surface-2);color:var(--text-2);border:1px solid var(--border)">${r.ativo?'Desativar':'Ativar'}</button>
                <button onclick="modalRegraCateg('${r.id}')" class="btn btn-sm" style="padding:3px 9px;font-size:10.5px;background:var(--surface-2);color:var(--text-2);border:1px solid var(--border)">Editar</button>

            </div>
          </div>
          <div style="font-family:var(--mono);font-size:11px;color:var(--text-2);background:var(--bg);padding:6px 8px;border-radius:5px;border:1px solid var(--border);overflow-x:auto;white-space:nowrap">
            ${escapeHtml(padroesPrev)}${extra}
          </div>
        </div>`;
      }).join('')}
    </div>
  `;
}

// Util pra escapar HTML em campos vindos do DB
function escapeHtml(s) {
  return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// Modal de criar/editar regra. Se id passado, busca no banco e preenche; senão cria nova.

        </div>
      </div>
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer">
        <input type="checkbox" id="rc-ativo" ${r.ativo?'checked':''} style="width:16px;height:16px;accent-color:var(--gold)">
        <span>Regra ativa</span>
      </label>
      <div id="rc-erro" style="display:none;color:var(--red);font-size:12px;background:var(--red-lt);padding:8px 10px;border-radius:6px"></div>
    </div>

    <button class="btn" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-gold" onclick="salvarRegraCateg('${id||''}')">Salvar</button>

async function salvarRegraCateg(id) {
  const nome = ($id('rc-nome').value||'').trim();
  const tipo = $id('rc-tipo').value;
  const prio = parseInt($id('rc-prio').value, 10) || 100;
  const ativo = !!$id('rc-ativo').checked;
  const padroesRaw = ($id('rc-padroes').value||'').split('\n')
    .map(s => s.trim()).filter(Boolean);
  const erro = (msg) => {
    const e = $id('rc-erro'); if (!e) return;
    e.style.display = 'block'; e.textContent = msg;
  };
  if (!nome) return erro('Nome é obrigatório.');
  if (!padroesRaw.length) return erro('Adicione pelo menos um padrão.');
  // Valida cada regex
  for (const p of padroesRaw) {
    try { new RegExp(p, 'i'); }
    catch(e) { return erro(`Regex inválida: "${p}" → ${e.message}`); }
  }
  const body = {
    tenant_id: APP.tenantId,
    nome, tipo,
    padroes: padroesRaw, // jsonb array
    prioridade: prio,
    ativo,
  };
  try {
    if (id) {
      await supa('PATCH', 'fin_regras_categorizacao', {
        params: { id: `eq.${id}` }, body
      });
    } else {
      await supa('POST', 'fin_regras_categorizacao', { body, returning: false });
    }
    closeModal();
    toast(id ? 'Regra atualizada!' : 'Regra criada!', 'success');
    // Recarrega cache em memória pra próximas detecções
    await carregarRegrasCategorizacao();
    _renderListaRegrasCateg();
  } catch(e) { erro('Erro ao salvar: ' + e.message); }
}

async function toggleRegraCategAtiva(id, ativo) {
  try {
    await supa('PATCH', 'fin_regras_categorizacao', {
      params: { id: `eq.${id}` }, body: { ativo }
    });
    toast(ativo ? 'Regra ativada' : 'Regra desativada', 'success');
    await carregarRegrasCategorizacao();
    _renderListaRegrasCateg();
  } catch(e) { toast('Erro: ' + e.message, 'error'); }
}

async function excluirRegraCateg(id) {
  if (!await confirmarAcao('Excluir regra?', 'A ação não pode ser desfeita.')) return;
  try {
    await supa('DELETE', 'fin_regras_categorizacao', { params: { id: `eq.${id}` } });
    toast('Regra excluída', 'success');
    await carregarRegrasCategorizacao();
    _renderListaRegrasCateg();
  } catch(e) { toast('Erro: ' + e.message, 'error'); }
}

/*
  SQL para criar a tabela (rodar no Supabase SQL Editor):

  CREATE TABLE IF NOT EXISTS fin_metas (
    id          uuid PRIMARY KEY DEFAULT gen_random_uuid(),
    tenant_id   uuid NOT NULL,
    nome        text NOT NULL,
    tipo        text NOT NULL CHECK (tipo IN ('receita_mes','despesa_mes','saldo','receita_acum','economia')),
    valor_alvo  numeric(14,2) NOT NULL,
    prazo       date,
    cor         text DEFAULT '#c9a84c',
    ativo       boolean DEFAULT true,
    criado_em   timestamptz DEFAULT now()
  );
  ALTER TABLE fin_metas ENABLE ROW LEVEL SECURITY;
  CREATE POLICY "tenant_iso" ON fin_metas USING (tenant_id::text = current_setting('request.jwt.claims', true)::json->>'sub' OR true);
*/

// Calcula o valor atual de uma meta com base nos dados em memória
function calcularProgressoMeta(meta) {
  const hoje = today();
  const mes  = hoje.slice(0,7);
  let atual = 0;

  switch (meta.tipo) {
    case 'receita_mes':
      atual = RECEITAS.filter(r => r.status==='recebido' && r.vencimento?.startsWith(mes))
                      .reduce((s,r) => s+(parseFloat(r.valor)||0), 0);
      break;
    case 'despesa_mes':
      // meta de controle: quanto MENOS gastou, melhor — inverte lógica
      atual = DESPESAS.filter(d => d.status==='pago' && d.vencimento?.startsWith(mes))
                      .reduce((s,d) => s+(parseFloat(d.valor)||0), 0);
      break;
    case 'saldo':
      atual = CONTAS.reduce((s,c) => s+(parseFloat(c.saldo_atual)||0), 0);
      break;
    case 'receita_acum':
      atual = RECEITAS.filter(r => r.status==='recebido')
                      .reduce((s,r) => s+(parseFloat(r.valor)||0), 0);
      break;
    case 'economia':
      // Resultado acumulado (receitas - despesas realizadas)
      const recTotal  = RECEITAS.filter(r=>r.status==='recebido').reduce((s,r)=>s+(parseFloat(r.valor)||0),0);
      const despTotal = DESPESAS.filter(d=>d.status==='pago').reduce((s,d)=>s+(parseFloat(d.valor)||0),0);
      atual = recTotal - despTotal;
      break;
  }
  return Math.max(0, atual);
}

function statusMeta(meta, atual) {
  const alvo   = parseFloat(meta.valor_alvo);
  const pct    = alvo > 0 ? (atual / alvo) * 100 : 0;
  const hoje   = today();
  const vencida = meta.prazo && meta.prazo < hoje && pct < 100;

  if (pct >= 100)  return { label: 'Atingida',   cor: 'var(--green)', badge: 'badge-green' };
  if (vencida)     return { label: 'Vencida',     cor: 'var(--red)',   badge: 'badge-red'   };
  if (pct >= 75)   return { label: 'Quase lá',    cor: 'var(--gold)',  badge: 'badge-gold'  };
  if (pct >= 40)   return { label: 'Em progresso',cor: 'var(--amber)', badge: 'badge-amber' };
  return             { label: 'Iniciada',          cor: 'var(--text-3)',badge: 'badge-gray'  };
}

const TIPO_META_LABEL = {
  receita_mes:  'Receita do mês',

  const atingidas   = ativas.filter(m => { const a=calcularProgressoMeta(m); return a >= parseFloat(m.valor_alvo); });
  const emRisco     = ativas.filter(m => { const a=calcularProgressoMeta(m); const p=(a/parseFloat(m.valor_alvo))*100; return p<40 && m.prazo && m.prazo > hoje; });

  $id('page-content').innerHTML = `

    <div class="kpi-card k-green"><div class="kpi-label">Atingidas</div><div class="kpi-value" style="color:var(--green)">${atingidas.length}</div><div class="kpi-sub">${ativas.length>0?Math.round(atingidas.length/ativas.length*100):0}% do total</div></div>

  </div>

    : `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px">
        ${ativas.map(m => {
          const atual = calcularProgressoMeta(m);

          const st    = statusMeta(m, atual);

          return `

        }).join('')}

// ── RECORRÊNCIAS ──────────────────────────────────────────────
/*
  SQL para criar a tabela (rodar no Supabase SQL Editor):

  CREATE TABLE IF NOT EXISTS fin_recorrencias (
    id            uuid PRIMARY KEY DEFAULT gen_random_uuid(),
    tenant_id     uuid NOT NULL,
    descricao     text NOT NULL,
    tipo          text NOT NULL CHECK (tipo IN ('receita','despesa')),
    valor         numeric(14,2) NOT NULL,
    frequencia    text NOT NULL CHECK (frequencia IN ('mensal','quinzenal','semanal','anual')),
    dia_venc      int,
    data_inicio   date NOT NULL,
    data_fim      date,
    categoria_id  uuid,
    cliente_id    uuid,
    fornecedor_id uuid,
    conta_id      uuid,
    observacao    text,
    ativo         boolean DEFAULT true,
    ultima_geracao date,
    criado_em     timestamptz DEFAULT now()
  );
  ALTER TABLE fin_recorrencias ENABLE ROW LEVEL SECURITY;
  CREATE POLICY "tenant_iso" ON fin_recorrencias USING (true);
*/

const FREQ_LABEL = { mensal:'Mensal', quinzenal:'Quinzenal', semanal:'Semanal', anual:'Anual' };

// Calcula as datas de vencimento que deveriam existir até hoje
function datasRecorrencia(rec) {
  const datas = [];
  if (!rec.data_inicio) return datas;
  const inicio = new Date(rec.data_inicio + 'T12:00:00');
  if (isNaN(inicio.getTime())) return datas;
  const fim    = rec.data_fim ? new Date(rec.data_fim + 'T12:00:00') : null;
  const hoje   = new Date(today() + 'T12:00:00');
  let cur      = new Date(inicio);

  // Aplica o dia_venc se mensal/anual
  if (rec.frequencia === 'mensal' || rec.frequencia === 'anual') {
    if (rec.dia_venc) cur.setDate(Math.min(rec.dia_venc, new Date(cur.getFullYear(), cur.getMonth()+1, 0).getDate()));
  }

  let limite = 0;
  while (cur <= hoje && limite < 120) {
    limite++;
    if (!fim || cur <= fim) {
      datas.push(cur.toISOString().slice(0,10));
    }
    // Avança conforme frequência
    const prox = new Date(cur);
    if (rec.frequencia === 'mensal')    { prox.setMonth(prox.getMonth()+1); if (rec.dia_venc) prox.setDate(Math.min(rec.dia_venc, new Date(prox.getFullYear(),prox.getMonth()+1,0).getDate())); }
    if (rec.frequencia === 'quinzenal') { prox.setDate(prox.getDate()+15); }
    if (rec.frequencia === 'semanal')   { prox.setDate(prox.getDate()+7); }
    if (rec.frequencia === 'anual')     { prox.setFullYear(prox.getFullYear()+1); if (rec.dia_venc) prox.setDate(Math.min(rec.dia_venc, new Date(prox.getFullYear(),prox.getMonth()+1,0).getDate())); }
    cur = prox;
  }
  return datas;
}

// Próxima data de vencimento (futura)
function proximaData(rec) {
  const hoje = new Date(today() + 'T12:00:00');
  const fim  = rec.data_fim ? new Date(rec.data_fim + 'T12:00:00') : null;
  let cur    = new Date(rec.ultima_geracao ? rec.ultima_geracao + 'T12:00:00' : rec.data_inicio + 'T12:00:00');

  // Avança uma vez a partir da última geração
  const prox = new Date(cur);
  if (rec.frequencia === 'mensal')    { prox.setMonth(prox.getMonth()+1); if (rec.dia_venc) prox.setDate(Math.min(rec.dia_venc, new Date(prox.getFullYear(),prox.getMonth()+1,0).getDate())); }
  if (rec.frequencia === 'quinzenal') { prox.setDate(prox.getDate()+15); }
  if (rec.frequencia === 'semanal')   { prox.setDate(prox.getDate()+7); }
  if (rec.frequencia === 'anual')     { prox.setFullYear(prox.getFullYear()+1); }

  if (fim && prox > fim) return null;
  return prox.toISOString().slice(0,10);
}

// Geração automática silenciosa ao entrar no app
async function gerarRecorrenciasPendentes() {
  if (!RECORRENCIAS.length) return;
  const tid  = APP.tenantId;
  const hoje = today();
  let gerou  = false;

  for (const rec of RECORRENCIAS) {
    if (!rec.ativo) continue;
    const datas = datasRecorrencia(rec);
    if (!datas.length) continue;

    // Filtra datas que ainda não foram geradas
    const ultima  = rec.ultima_geracao || '0000-00-00';
    const novas   = datas.filter(d => d > ultima);
    if (!novas.length) continue;

    for (const data of novas) {
      try {
        const body = {
          tenant_id:   tid,
          descricao:   rec.descricao,
          valor:       rec.valor,
          vencimento:  data,
          status:      'pendente',
          categoria_id: rec.categoria_id || null,
          conta_id:    rec.conta_id || null,
          observacao:  `Recorrência automática · ${FREQ_LABEL[rec.frequencia]}`,
        };
        if (rec.tipo === 'receita') {
          body.cliente_id = rec.cliente_id || null;
          await supa('POST', 'fin_receitas', { body });
        } else {
          body.fornecedor_id = rec.fornecedor_id || null;
          await supa('POST', 'fin_despesas', { body });
        }
        gerou = true;
      } catch(_) {}
    }

    // Atualiza ultima_geracao
    const maxData = novas[novas.length - 1];
    await supa('PATCH', 'fin_recorrencias', {
      params: { id: `eq.${rec.id}` },
      body:   { ultima_geracao: maxData }
    }).catch(()=>{});
  }

  if (gerou) {
    // Performance: só recarrega receitas e despesas (não as 8 tabelas)
    await Promise.all([
      recarregarApenas('fin_receitas'),
      recarregarApenas('fin_despesas'),
    ]);
    if (APP.page === 'receber' || APP.page === 'pagar') go(APP.page);
    toast('Lançamentos recorrentes gerados!', 'success');
  }
}

/*
  SQL (rodar no Supabase SQL Editor):

  CREATE TABLE IF NOT EXISTS fin_impostos (
    id          uuid PRIMARY KEY DEFAULT gen_random_uuid(),
    tenant_id   uuid NOT NULL,
    tipo        text NOT NULL,
    competencia text NOT NULL,
    vencimento  date NOT NULL,
    valor       numeric(14,2) NOT NULL,
    status      text DEFAULT 'pendente' CHECK (status IN ('pendente','pago','cancelado')),
    codigo_barras text,
    observacao  text,
    pago_em     date,
    criado_em   timestamptz DEFAULT now()
  );
  ALTER TABLE fin_impostos ENABLE ROW LEVEL SECURITY;
  CREATE POLICY "tenant_iso" ON fin_impostos USING (true);
*/

const TIPOS_IMPOSTO = [
  'DAS - Simples Nacional',
  'DARF - IRPJ',
  'DARF - CSLL',
  'DARF - PIS',
  'DARF - COFINS',
  'DARF - IRRF',
  'GPS - INSS',
  'ISS',
  'IPTU',
  'IPVA',
  'Outro',
];

// Tabelas DAS Simples Nacional 2024 (Anexo III - Serviços contábeis)
const FAIXAS_DAS = [
  { ate: 180000,   aliq: 0.06,  ded: 0 },
  { ate: 360000,   aliq: 0.112, ded: 9360 },
  { ate: 720000,   aliq: 0.135, ded: 17640 },
  { ate: 1800000,  aliq: 0.16,  ded: 35640 },
  { ate: 3600000,  aliq: 0.21,  ded: 125640 },
  { ate: 4800000,  aliq: 0.33,  ded: 648000 },
];

function calcularDAS(receitaAnual) {
  const faixa = FAIXAS_DAS.find(f => receitaAnual <= f.ate);
  if (!faixa) return 0;
  return Math.max(0, (receitaAnual * faixa.aliq - faixa.ded) / 12);
}

function renderImpostos() {

  }
  if (periodoSel === '12m') {
    const lim = new Date(); lim.setMonth(lim.getMonth()-12);
    lista = lista.filter(i => i.vencimento >= lim.toISOString().slice(0,10));

  lista.sort((a,b) => b.vencimento.localeCompare(a.vencimento));

  const totalPago  = IMPOSTOS.filter(i=>i.status==='pago').reduce((s,i)=>s+(parseFloat(i.valor)||0),0);

  // Simulador DAS: receita dos últimos 12 meses
  const rec12 = RECEITAS
    .filter(r => r.status==='recebido' && r.vencimento >= (() => { const d=new Date(); d.setFullYear(d.getFullYear()-1); return d.toISOString().slice(0,10); })())

  }

  $id('topbar-actions').innerHTML = `<button class="btn btn-gold btn-sm" onclick="modalNovoImposto()">+ Novo Imposto</button>`;

  $id('page-content').innerHTML = `
  <div style="display:flex;flex-direction:column;gap:16px">

  <!-- SQL helper -->
  <div style="background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.2);border-radius:10px;padding:12px 16px;font-size:12px;color:var(--text-2);line-height:1.6">
    <strong style="color:var(--gold)">Configuração:</strong> Crie a tabela <code style="background:var(--surface-2);padding:1px 6px;border-radius:4px;font-family:var(--mono);font-size:11px">fin_impostos</code> no Supabase SQL Editor antes de usar. Script no código-fonte.
  </div>

  <!-- KPIs -->
  <div class="kpi-grid" style="grid-template-columns:repeat(4,1fr)">

                <td style="font-family:var(--mono);font-size:12px;color:${venc?'var(--red)':'var(--text-2)'};font-weight:${venc?700:400}">${fmtData(i.vencimento)}${venc?' ⚠':''}</td>
                <td style="text-align:right;font-family:var(--mono);font-weight:700;color:${i.status==='pago'?'var(--green)':'var(--red)'}">${fmtMoeda(i.valor)}</td>

                    <button onclick="excluirImposto('${i.id}',event)" class="btn btn-sm" style="padding:4px 10px;font-size:11px;background:var(--red-lt);color:var(--red);border:1px solid rgba(224,92,92,.2)">✕</button>

  openModal('Novo Imposto / Guia', `
    <div class="form-grid">
      <div class="form-field full">
        <label class="form-label">Tipo *</label>
        <select class="form-select" id="ni-tipo">
          ${TIPOS_IMPOSTO.map(t=>`<option value="${t}">${t}</option>`).join('')}
        </select>
      </div>
      <div class="form-field"><label class="form-label">Competência *</label><input class="form-input" id="ni-comp" placeholder="Ex: 2025-03" value="${mes}"></div>
      <div class="form-field"><label class="form-label">Vencimento *</label><input class="form-input" type="date" id="ni-venc" value="${today()}"></div>
      <div class="form-field"><label class="form-label">Valor (R$) *</label><input class="form-input" type="number" id="ni-valor" placeholder="0,00" step="0.01" min="0"></div>
      <div class="form-field"><label class="form-label">Status</label>
        <select class="form-select" id="ni-status">
          <option value="pendente">Pendente</option>
          <option value="pago">Pago</option>
        </select>
      </div>
      <div class="form-field"><label class="form-label">Data do pagamento</label><input class="form-input" type="date" id="ni-pago-em"></div>
      <div class="form-field full"><label class="form-label">Código de barras</label><input class="form-input" id="ni-cod" placeholder="Opcional"></div>
      <div class="form-field full"><label class="form-label">Observação</label><input class="form-input" id="ni-obs" placeholder="Opcional"></div>
    </div>`,
    `<button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
     <button class="btn btn-gold" onclick="salvarImposto()">Salvar</button>`
  );
}

async function salvarImposto() {
  const tipo  = $id('ni-tipo').value;
  const comp  = $id('ni-comp').value.trim();
  const venc  = $id('ni-venc').value;
  const valor = parseFloat($id('ni-valor').value);
  if (!comp || !venc || !valor) { toast('Preencha os campos obrigatórios.', 'error'); return; }
  try {
    await supa('POST', 'fin_impostos', { body: {
      tenant_id:    APP.tenantId,
      tipo, competencia: comp, vencimento: venc, valor,
      status:       $id('ni-status').value,
      pago_em:      $id('ni-pago-em').value || null,
      codigo_barras:$id('ni-cod').value     || null,
      observacao:   $id('ni-obs').value     || null,
    }});
    closeModal(); toast('Imposto registrado!', 'success');
    await recarregarApenas('fin_impostos'); renderImpostos();
  } catch(e) { toast('Erro: ' + e.message + ' (verifique se a tabela fin_impostos foi criada)', 'error'); }
}

async function pagarImposto(id, e) {
  e.stopPropagation();
  try {
    await supa('PATCH', 'fin_impostos', { params: { id: `eq.${id}` }, body: { status: 'pago', pago_em: today() } });
    const imp = IMPOSTOS.find(x => x.id === id);
    if (imp) { imp.status = 'pago'; imp.pago_em = today(); atualizarLocal(IMPOSTOS, imp); }
    toast('Imposto marcado como pago!', 'success');
    renderImpostos();
  } catch(e) { toast('Erro: ' + e.message, 'error'); }
}

async function excluirImposto(id, e) {
  e.stopPropagation();
  if (!await confirmarAcao('Excluir registro?', 'Esta ação não pode ser desfeita.')) return;
  try {
    await supa('DELETE', 'fin_impostos', { params: { id: `eq.${id}` } });
    removerLocal(IMPOSTOS, id);
    toast('Registro excluído.', 'success');
    renderImpostos();
  } catch(e) { toast('Erro: ' + e.message, 'error'); }
}

// ── CONCILIAÇÃO BANCÁRIA ───────────────────────────────────────
// Conciliação 100% client-side — importa CSV, cruza com lançamentos em memória
// Não requer tabela adicional no Supabase

let _concItems = []; // itens do extrato importado
let _concMes   = today().slice(0,7);
let _concContaId = null; // v35 · conta selecionada para a importação

function renderConciliacao() {
  $id('topbar-actions').innerHTML = '';
  const mes = _concMes;

  // Lançamentos do mês selecionado
  const recsM = RECEITAS.filter(r => r.vencimento?.startsWith(mes));
  const despM = DESPESAS.filter(d => d.vencimento?.startsWith(mes));
  const todos  = [
    ...recsM.map(r => ({ ...r, _t:'rec', _valor: parseFloat(r.valor)||0 })),
    ...despM.map(d => ({ ...d, _t:'dep', _valor: -(parseFloat(d.valor)||0) })),
  ].sort((a,b) => a.vencimento.localeCompare(b.vencimento));

  // v35 · Match com tolerância configurável
  // Match exato: mesma data + mesmo valor → grava conferido automático
  // Match próximo: ±2 dias + ±R$2 → grava como pendente de revisão
  function matchItem(ext) {
    const exato = todos.find(l =>
      Math.abs(Math.abs(l._valor) - Math.abs(ext.valor)) < 0.01 &&
      l.vencimento === ext.data
    );
    if (exato) return { lanc: exato, exato: true };
    const proximo = todos.find(l =>
      Math.abs(Math.abs(l._valor) - Math.abs(ext.valor)) <= 2 &&
      Math.abs(new Date(l.vencimento+'T12:00:00') - new Date(ext.data+'T12:00:00')) <= 3*86400000
    );
    return proximo ? { lanc: proximo, exato: false } : null;
  }

  const itensComMatch = _concItems.map(i => ({ ...i, _match: matchItem(i) }));
  const conciliados   = itensComMatch.filter(i => i._match);
  const matchExatos   = itensComMatch.filter(i => i._match?.exato);
  const matchProx     = itensComMatch.filter(i => i._match && !i._match.exato);
  const semMatch      = itensComMatch.filter(i => !i._match);
  const naoExtrato    = todos.filter(l => !_concItems.some(i => {
    return Math.abs(Math.abs(l._valor)-Math.abs(i.valor))<=2 &&
           Math.abs(new Date(l.vencimento+'T12:00:00')-new Date(i.data+'T12:00:00'))<=3*86400000;
  }));

  const saldoExtrato = _concItems.reduce((s,i)=>s+i.valor,0);
  const saldoSist    = todos.reduce((s,l)=>s+l._valor,0);

  // Conta selecionada (default: primeira conta ativa)
  if (!_concContaId && CONTAS.length > 0) _concContaId = CONTAS[0].id;
  const contaSel = (CONTAS||[]).find(c => c.id === _concContaId);

  $id('page-content').innerHTML = `
  <div style="display:flex;flex-direction:column;gap:16px">

  <!-- Seletor de mês + conta + importar -->
  <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:var(--surface-2);padding:10px 14px;border-radius:10px;border:1px solid var(--border)">
    <div style="display:flex;align-items:center;gap:8px">
      <label style="font-size:11px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em">Competência</label>
      <input type="month" value="${mes}" onchange="_concMes=this.value;_concItems=[];renderConciliacao()"
        style="padding:6px 10px;border:1.5px solid var(--border-lt);border-radius:8px;font-family:var(--font);font-size:12.5px;background:var(--bg-2);color:var(--text);outline:none">
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <label style="font-size:11px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em">Conta</label>
      <select onchange="_concContaId=this.value;renderConciliacao()"
        style="padding:6px 10px;border:1.5px solid var(--border-lt);border-radius:8px;font-family:var(--font);font-size:12.5px;background:var(--bg-2);color:var(--text);outline:none">
        ${(CONTAS||[]).map(c => `<option value="${c.id}" ${c.id===_concContaId?'selected':''}>${escapeHtml(c.nome)}</option>`).join('')}
      </select>
    </div>
    <label class="btn btn-sm" style="cursor:pointer;background:var(--gold);color:#fff;border:none">
      📂 Importar CSV
      <input type="file" accept=".csv,.txt,.ofx" style="display:none" onchange="importarExtrato(this)">
    </label>
    ${_concItems.length ? `<button onclick="_concItems=[];renderConciliacao()" class="btn btn-sm" style="background:var(--red-lt);color:var(--red);border:1px solid rgba(224,92,92,.2)">✕ Limpar extrato</button>` : ''}
    <span style="font-size:11px;color:var(--text-3);margin-left:auto">${_concItems.length} item(ns) no extrato</span>
  </div>

  <!-- KPIs -->
  <div class="kpi-grid" style="grid-template-columns:repeat(4,1fr)">
    <div class="kpi-card k-green"><div class="kpi-label">Match exato</div><div class="kpi-value" style="color:var(--green)">${matchExatos.length}</div><div class="kpi-sub">grava conferido auto</div></div>
    <div class="kpi-card k-amber"><div class="kpi-label">Match aproximado</div><div class="kpi-value" style="color:var(--amber)">${matchProx.length}</div><div class="kpi-sub">precisa confirmar</div></div>
    <div class="kpi-card k-red"><div class="kpi-label">Sem match</div><div class="kpi-value" style="color:var(--red)">${semMatch.length}</div><div class="kpi-sub">criar manualmente</div></div>
    <div class="kpi-card ${Math.abs(saldoExtrato-saldoSist)<1?'k-green':'k-red'}"><div class="kpi-label">Diferença</div><div class="kpi-value" style="color:${Math.abs(saldoExtrato-saldoSist)<1?'var(--green)':'var(--red)'}">${fmtMoeda(saldoExtrato-saldoSist)}</div><div class="kpi-sub">extrato vs sistema</div></div>
  </div>

  ${_concItems.length===0 ? `
  <!-- Instrução importar -->
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:32px;text-align:center;box-shadow:var(--shadow)">
    <div style="font-size:36px;margin-bottom:12px;opacity:.4">🏦</div>
    <div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:8px">Importe o extrato bancário</div>
    <div style="font-size:12.5px;color:var(--text-3);line-height:1.7;max-width:480px;margin:0 auto">
      Exporte o extrato em <strong style="color:var(--text-2)">CSV</strong> e importe aqui.
      O sistema cruza automaticamente com os lançamentos existentes:<br>
      • <strong style="color:var(--green)">Match exato</strong> (data + valor): gravado como <strong>conferido</strong> automaticamente<br>
      • <strong style="color:var(--amber)">Match aproximado</strong> (±2 dias, ±R$2): aguarda sua confirmação<br>
      • <strong style="color:var(--red)">Sem match</strong>: você cria o lançamento manualmente
      <br><br>
      <strong style="color:var(--text-2)">Formato esperado do CSV:</strong><br>
      <code style="background:var(--surface-2);padding:4px 10px;border-radius:6px;font-family:var(--mono);font-size:11px">data;descricao;valor</code><br>
      <span style="font-size:11px">Ex: <code style="background:var(--surface-2);padding:2px 8px;border-radius:4px;font-family:var(--mono)">2025-04-10;Honorário cliente A;5000.00</code></span>
    </div>
  </div>` : `

  <!-- Ações em massa -->
  ${(matchExatos.length > 0 || matchProx.length > 0) && _concContaId ? `
  <div style="display:flex;gap:10px;flex-wrap:wrap;background:var(--gold-lt);border:1px solid rgba(26,82,118,.2);border-radius:10px;padding:12px 14px">
    <div style="font-size:12px;color:var(--text-2);flex:1;min-width:200px">
      <strong style="color:var(--gold)">Pronto para gravar:</strong>
      ${matchExatos.length > 0 ? `${matchExatos.length} movimentação(ões) com match exato serão gravadas como conferidas. ` : ''}
      ${matchProx.length > 0 ? `${matchProx.length} aproximadas ficam pendentes.` : ''}
    </div>
    <button class="btn btn-sm btn-gold" onclick="processarExtrato()">⚡ Processar e gravar</button>
  </div>` : ''}
  ${!_concContaId ? `<div style="background:var(--red-lt);border:1px solid rgba(224,92,92,.2);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--red)">⚠ Selecione uma conta acima antes de processar.</div>` : ''}

  <!-- Tabela de conciliação -->
  <div class="card" style="padding:0;overflow:hidden">
    <div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px">
      <span style="font-size:11px;font-weight:700;color:var(--text)">Resultado da Conciliação · ${mes}</span>
    </div>
    <div class="table-wrap">
    <table>
      <thead><tr>
        <th>Data Extrato</th><th>Descrição Extrato</th>
        <th style="text-align:right">Valor</th>
        <th>Lançamento Sistema</th>
        <th>Status</th>
        <th></th>
      </tr></thead>
      <tbody>
        ${itensComMatch.map((ext, idx) => {
          const status = ext._match ? (ext._match.exato ? 'exato' : 'proximo') : 'sem_match';
          const corBg = status==='exato'?'rgba(30,132,73,.04)':status==='sem_match'?'rgba(224,92,92,.04)':'rgba(183,119,13,.04)';
          const lanc = ext._match?.lanc;
          const badge = status==='exato'?'<span class="badge badge-green">✓ Exato</span>':
                        status==='proximo'?'<span class="badge badge-amber">~ Aproximado</span>':
                        '<span class="badge badge-red">✕ Sem match</span>';
          return `<tr style="background:${corBg}">
            <td style="font-family:var(--mono);font-size:11px;color:var(--text-2)">${ext.data}</td>
            <td style="color:var(--text);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(ext.descricao)}</td>
            <td style="text-align:right;font-family:var(--mono);font-weight:700;color:${ext.valor>=0?'var(--green)':'var(--red)'}">${fmtMoeda(ext.valor)}</td>
            <td style="color:${lanc?'var(--text-2)':'var(--text-3)'};max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${lanc?escapeHtml(lanc.descricao):'—'}</td>
            <td>${badge}</td>
            <td style="text-align:right;white-space:nowrap">
              ${status==='sem_match' && _concContaId ? `<button class="btn btn-sm btn-gold" onclick="criarLancDoExtrato(${idx})" style="font-size:10.5px;padding:4px 10px">+ Criar</button>` : ''}
              ${status==='proximo' && _concContaId ? `<button class="btn btn-sm" onclick="confirmarMatchAproximado(${idx})" style="font-size:10.5px;padding:4px 10px;background:var(--green);color:#fff;border:none">✓ Confirmar</button>` : ''}
            </td>
          </tr>`;
        }).join('')}
        ${naoExtrato.map(l => `
          <tr style="background:rgba(224,154,58,.04)">
            <td style="font-family:var(--mono);font-size:11px;color:var(--text-3)">${fmtData(l.vencimento)}</td>
            <td style="color:var(--text-3)">Só no sistema</td>
            <td style="text-align:right;font-family:var(--mono);font-weight:700;color:${l._valor>=0?'var(--green)':'var(--red)'}">${fmtMoeda(Math.abs(l._valor))}</td>
            <td style="color:var(--text);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(l.descricao)}</td>
            <td><span class="badge badge-amber">Só sistema</span></td>
            <td></td>
          </tr>`).join('')}

    </table>
    </div>
  </div>`}

  <!-- Resumo saldos -->

    </div>
    <div class="card">
      <div style="font-size:11px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">Saldo do Sistema</div>
      <div style="font-size:20px;font-weight:700;font-family:var(--mono);color:${saldoSist>=0?'var(--green)':'var(--red)'}">${fmtMoeda(saldoSist)}</div>
      <div style="font-size:11px;color:var(--text-3);margin-top:4px">${todos.length} lançamentos no mês</div>
    </div>
  </div>

  </div>`;
}

// ── v35 · Processa extrato gravando matches automaticamente ───────
// Para cada item com match exato, marca o lançamento sistema como
// recebido/pago e cria movimentação conferida na conta selecionada.
async function processarExtrato() {
  if (!_concContaId) { toast('Selecione uma conta primeiro.', 'error'); return; }

  const recsM = RECEITAS.filter(r => r.vencimento?.startsWith(_concMes));
  const despM = DESPESAS.filter(d => d.vencimento?.startsWith(_concMes));
  const todos  = [
    ...recsM.map(r => ({ ...r, _t:'rec', _valor: parseFloat(r.valor)||0 })),
    ...despM.map(d => ({ ...d, _t:'dep', _valor: -(parseFloat(d.valor)||0) })),
  ];

  // Reidentifica matches exatos para gravar
  const exatos = [];
  for (const ext of _concItems) {
    const m = todos.find(l =>
      Math.abs(Math.abs(l._valor) - Math.abs(ext.valor)) < 0.01 &&
      l.vencimento === ext.data &&
      l.status !== 'recebido' && l.status !== 'pago' // não reprocessa
    );
    if (m) exatos.push({ ext, lanc: m });
  }

  if (exatos.length === 0) {
    toast('Nada novo para gravar (todos já estão baixados ou não há match exato).', 'info');
    return;
  }

  if (!await confirmarAcao(
    `Processar ${exatos.length} matche(s) exato(s)?`,
    `Os lançamentos serão marcados como ${exatos.some(e=>e.lanc._t==='rec')?'recebidos/':''}pagos e gravados como conferidos na conta selecionada.`,
    { tipo:'gold', labelOk:'Processar' }
  )) return;

  let ok = 0, erro = 0;
  for (const { ext, lanc } of exatos) {
    try {
      const tabela = lanc._t === 'rec' ? 'fin_receitas' : 'fin_despesas';
      const novoStatus = lanc._t === 'rec' ? 'recebido' : 'pago';
      const campoData = lanc._t === 'rec' ? 'recebido_em' : 'pago_em';
      // 1) Marca lançamento como baixado
      await supa('PATCH', tabela, {
        params: { id: `eq.${lanc.id}` },
        body: { status: novoStatus, [campoData]: ext.data, conta_id: _concContaId },
      });
      // 2) Cria movimentação JÁ conferida
      const mov = {
        tenant_id: APP.tenantId,
        conta_id:  _concContaId,
        tipo:      lanc._t === 'rec' ? 'entrada' : 'saida',
        valor:     Math.abs(parseFloat(lanc.valor)||0),
        data:      ext.data,
        descricao: lanc.descricao || ext.descricao,
        origem:    'importacao_extrato',
        conferido: true,
        conferido_em: new Date().toISOString(),
      };
      if (lanc._t === 'rec') mov.receita_id = lanc.id;
      else                   mov.despesa_id = lanc.id;
      await supa('POST', 'fin_movimentacoes', { body: mov });
      ok++;
    } catch(e) {
      console.error('Erro processando match:', e.message);
      erro++;
    }
  }

  toast(`${ok} lançamento(s) gravado(s) e conferido(s)${erro?` · ${erro} erro(s)`:''}.`, ok?'success':'error');
  // Recarrega tudo afetado
  await Promise.all([
    recarregarApenas('fin_receitas'),
    recarregarApenas('fin_despesas'),
    recarregarApenas('fin_contas'),
  ]);
  renderConciliacao();
}

// ── v35 · Confirma um match aproximado (cliente confirma) ─────────
async function confirmarMatchAproximado(idx) {
  const ext = _concItems[idx]; if (!ext) return;
  if (!_concContaId) { toast('Selecione uma conta primeiro.', 'error'); return; }

  // Refaz o match
  const recsM = RECEITAS.filter(r => r.vencimento?.startsWith(_concMes));
  const despM = DESPESAS.filter(d => d.vencimento?.startsWith(_concMes));
  const todos  = [
    ...recsM.map(r => ({ ...r, _t:'rec', _valor: parseFloat(r.valor)||0 })),
    ...despM.map(d => ({ ...d, _t:'dep', _valor: -(parseFloat(d.valor)||0) })),
  ];
  const lanc = todos.find(l =>
    Math.abs(Math.abs(l._valor) - Math.abs(ext.valor)) <= 2 &&
    Math.abs(new Date(l.vencimento+'T12:00:00') - new Date(ext.data+'T12:00:00')) <= 3*86400000
  );
  if (!lanc) { toast('Match não encontrado.', 'error'); return; }

  if (!await confirmarAcao(
    'Confirmar match aproximado?',
    `Sistema: ${lanc.descricao} · ${fmtMoeda(Math.abs(lanc._valor))} em ${fmtData(lanc.vencimento)}\nExtrato: ${ext.descricao} · ${fmtMoeda(ext.valor)} em ${ext.data}`,
    { tipo:'gold', labelOk:'Confirmar' }
  )) return;

  try {
    const tabela = lanc._t === 'rec' ? 'fin_receitas' : 'fin_despesas';
    const novoStatus = lanc._t === 'rec' ? 'recebido' : 'pago';
    const campoData = lanc._t === 'rec' ? 'recebido_em' : 'pago_em';
    await supa('PATCH', tabela, {
      params: { id: `eq.${lanc.id}` },
      body: { status: novoStatus, [campoData]: ext.data, conta_id: _concContaId },
    });
    const mov = {
      tenant_id: APP.tenantId,
      conta_id:  _concContaId,
      tipo:      lanc._t === 'rec' ? 'entrada' : 'saida',
      valor:     Math.abs(parseFloat(lanc.valor)||0),
      data:      ext.data,
      descricao: lanc.descricao,
      origem:    'importacao_extrato',
      conferido: true,
      conferido_em: new Date().toISOString(),
    };
    if (lanc._t === 'rec') mov.receita_id = lanc.id;
    else                   mov.despesa_id = lanc.id;
    await supa('POST', 'fin_movimentacoes', { body: mov });

    toast('Conciliado!', 'success');
    await Promise.all([
      recarregarApenas('fin_receitas'),
      recarregarApenas('fin_despesas'),
      recarregarApenas('fin_contas'),
    ]);
    renderConciliacao();
  } catch(e) { toast('Erro: ' + e.message, 'error'); }
}

// ── v35 · Cria lançamento avulso a partir de item de extrato ──────
async function criarLancDoExtrato(idx) {
  const ext = _concItems[idx]; if (!ext) return;
  if (!_concContaId) { toast('Selecione uma conta primeiro.', 'error'); return; }
  const ehReceita = ext.valor >= 0;
  const valor = Math.abs(ext.valor);

  if (!await confirmarAcao(
    `Criar ${ehReceita?'receita':'despesa'} a partir do extrato?`,
    `${ext.descricao} · ${fmtMoeda(ext.valor)} em ${ext.data}\n\nO lançamento será criado já como ${ehReceita?'recebido':'pago'} e conferido.`,
    { tipo:'gold', labelOk:'Criar' }
  )) return;

  try {
    const tabela = ehReceita ? 'fin_receitas' : 'fin_despesas';
    const body = {
      tenant_id:   APP.tenantId,
      descricao:   ext.descricao,
      valor,
      vencimento:  ext.data,
      conta_id:    _concContaId,
      status:      ehReceita ? 'recebido' : 'pago',
    };
    if (ehReceita) body.recebido_em = ext.data;
    else           body.pago_em = ext.data;

    const criado = await supa('POST', tabela, { returning: true, body });
    const reg = Array.isArray(criado) ? criado[0] : null;

    if (reg) {
      const mov = {
        tenant_id: APP.tenantId,
        conta_id:  _concContaId,
        tipo:      ehReceita ? 'entrada' : 'saida',
        valor,
        data:      ext.data,
        descricao: ext.descricao,
        origem:    'importacao_extrato',
        conferido: true,
        conferido_em: new Date().toISOString(),
      };
      if (ehReceita) mov.receita_id = reg.id;
      else           mov.despesa_id = reg.id;
      await supa('POST', 'fin_movimentacoes', { body: mov });
    }

    toast('Lançamento criado e conferido!', 'success');
    await Promise.all([
      recarregarApenas('fin_receitas'),
      recarregarApenas('fin_despesas'),
      recarregarApenas('fin_contas'),
    ]);
    renderConciliacao();
  } catch(e) { toast('Erro: ' + e.message, 'error'); }
}

function importarExtrato(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = async e => {
    const text = e.target.result;
    const linhas = text.split('\n').map(l => l.trim()).filter(Boolean);
    const items = [];
    for (const linha of linhas) {
      const sep = linha.includes(';') ? ';' : ',';
      const cols = linha.split(sep).map(c => c.replace(/"/g,'').trim());
      if (cols.length < 3) continue;
      const [col0, col1, col2] = cols;
      if (isNaN(parseFloat(col2.replace(',','.'))) ) continue;
      const data = col0.length===10 ? col0 : null;
      if (!data) continue;
      items.push({
        data,
        descricao: col1 || '—',
        valor: parseFloat(col2.replace(',','.')) || 0,
      });
    }
    if (!items.length) { toast('Nenhum item encontrado no CSV. Verifique o formato.', 'error'); return; }
    _concItems = items;

    // ── v35 · Auto-gravação de match exato sem clique adicional ─────
    // Conta o número de matches exatos com lançamentos ainda não baixados
    if (_concContaId && CONTAS.length > 0) {
      const recsM = (RECEITAS||[]).filter(r => r.vencimento?.startsWith(_concMes));
      const despM = (DESPESAS||[]).filter(d => d.vencimento?.startsWith(_concMes));
      const todos = [
        ...recsM.map(r => ({ ...r, _t:'rec', _valor: parseFloat(r.valor)||0 })),
        ...despM.map(d => ({ ...d, _t:'dep', _valor: -(parseFloat(d.valor)||0) })),
      ];
      const exatosNovos = items.filter(ext =>
        todos.some(l =>
          Math.abs(Math.abs(l._valor) - Math.abs(ext.valor)) < 0.01
          && l.vencimento === ext.data
          && l.status !== 'recebido' && l.status !== 'pago'
        )
      ).length;

      if (exatosNovos > 0) {
        toast(`${items.length} itens importados · ${exatosNovos} match(es) exato(s) → gravando como conferido…`, 'success');
        // Renderiza primeiro para o usuário ver os matches
        renderConciliacao();
        // Depois processa os matches exatos automaticamente, sem confirmação
        await processarExtratoAuto();
        return;
      }
    }

    toast(`${items.length} itens importados! Revise os matches abaixo.`, 'success');
    renderConciliacao();
  };
  reader.readAsText(file, 'UTF-8');
  input.value = '';
}

// ── v35 · Versão silenciosa de processarExtrato (sem confirmação) ──
// Usada após importação de CSV: grava matches exatos automaticamente
// e os não-match seguem como pendente de revisão manual.
async function processarExtratoAuto() {
  if (!_concContaId || !_concItems.length) return;

  const recsM = (RECEITAS||[]).filter(r => r.vencimento?.startsWith(_concMes));
  const despM = (DESPESAS||[]).filter(d => d.vencimento?.startsWith(_concMes));
  const todos = [
    ...recsM.map(r => ({ ...r, _t:'rec', _valor: parseFloat(r.valor)||0 })),
    ...despM.map(d => ({ ...d, _t:'dep', _valor: -(parseFloat(d.valor)||0) })),
  ];

  const exatos = [];
  const usados = new Set();
  for (const ext of _concItems) {
    const m = todos.find(l =>
      !usados.has(l.id) &&
      Math.abs(Math.abs(l._valor) - Math.abs(ext.valor)) < 0.01 &&
      l.vencimento === ext.data &&
      l.status !== 'recebido' && l.status !== 'pago'
    );
    if (m) { exatos.push({ ext, lanc: m }); usados.add(m.id); }
  }

  if (exatos.length === 0) return;

  let ok = 0, erro = 0;
  for (const { ext, lanc } of exatos) {
    try {
      const tabela     = lanc._t === 'rec' ? 'fin_receitas' : 'fin_despesas';
      const novoStatus = lanc._t === 'rec' ? 'recebido' : 'pago';
      const campoData  = lanc._t === 'rec' ? 'recebido_em' : 'pago_em';
      await supa('PATCH', tabela, {
        params: { id: `eq.${lanc.id}` },
        body: { status: novoStatus, [campoData]: ext.data, conta_id: _concContaId },
      });
      const mov = {
        tenant_id: APP.tenantId,
        conta_id:  _concContaId,
        tipo:      lanc._t === 'rec' ? 'entrada' : 'saida',
        valor:     Math.abs(parseFloat(lanc.valor)||0),
        data:      ext.data,
        descricao: lanc.descricao || ext.descricao,
        origem:    'importacao_extrato',
        conferido: true,
        conferido_em: new Date().toISOString(),
      };
      if (lanc._t === 'rec') mov.receita_id = lanc.id;
      else                   mov.despesa_id = lanc.id;
      await supa('POST', 'fin_movimentacoes', { body: mov });
      ok++;
    } catch(e) {
      console.error('Erro processando match auto:', e.message);
      erro++;
    }
  }

  // Remove os items processados do _concItems para não exibirem mais
  const dataValorProcessados = new Set(exatos.map(x => `${x.ext.data}|${x.ext.valor}`));
  _concItems = _concItems.filter(i => !dataValorProcessados.has(`${i.data}|${i.valor}`));

  toast(`${ok} lançamento(s) gravado(s) automaticamente como conferido(s)${erro?` · ${erro} erro(s)`:''}.`, ok?'success':'error');
  await Promise.all([
    recarregarApenas('fin_receitas'),
    recarregarApenas('fin_despesas'),
    recarregarApenas('fin_contas'),
  ]);
  // Recalcula saldo da conta usada
  if (_concContaId) await recalcularSaldoConta(_concContaId);
  renderConciliacao();
}

// ── Storage helpers ───────────────────────────────────────────
async function uploadStorage(path, file) {
  const res = await fetch(`${SUPA_URL}/storage/v1/object/fin-documentos/${path}`, {
    method: 'POST',
    headers: {
      'apikey': SUPA_KEY,
      'Authorization': `Bearer ${APP.token}`,
      'Content-Type': file.type || 'application/octet-stream',
      'x-upsert': 'true',
    },
    body: file,
  });
  if (!res.ok) { const e = await res.text(); throw new Error(e); }
  return path;
}

async function getStorageUrl(path) {
  // URL pré-assinada válida por 1 hora
  const res = await fetch(`${SUPA_URL}/storage/v1/object/sign/fin-documentos/${path}`, {
    method: 'POST',
    headers: {
      'apikey': SUPA_KEY,
      'Authorization': `Bearer ${APP.token}`,
      'Content-Type': 'application/json',
    },
    body: JSON.stringify({ expiresIn: 3600 }),
  });
  if (!res.ok) throw new Error('Erro ao gerar URL');
  const data = await res.json();
  return `${SUPA_URL}/storage/v1${data.signedURL}`;
}

async function deleteStorage(path) {
  await fetch(`${SUPA_URL}/storage/v1/object/fin-documentos/${path}`, {
    method: 'DELETE',
    headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${APP.token}` },
  });
}

// ── Upload de anexo a um lançamento ───────────────────────────
async function anexarDocumento(tipoRef, refId, file) {
  const ext  = file.name.split('.').pop();
  const path = `${APP.tenantId}/${tipoRef}/${refId}/${Date.now()}_${file.name.replace(/[^a-zA-Z0-9._-]/g,'_')}`;
  await uploadStorage(path, file);
  await supa('POST', 'fin_anexos', { body: {
    tenant_id:    APP.tenantId,
    tipo_ref:     tipoRef,
    ref_id:       refId,
    nome:         file.name,
    tipo_arquivo: file.type,
    storage_path: path,
    tamanho:      file.size,
  }});
  await recarregarApenas('fin_anexos');
  toast(`Documento "${file.name}" anexado!`, 'success');
}

async function verAnexo(path) {
  try {
    const url = await getStorageUrl(path);
    window.open(url, '_blank');
  } catch(e) { toast('Erro ao abrir documento: ' + e.message, 'error'); }
}

async function excluirAnexo(id, path) {
  if (!await confirmarAcao('Excluir documento?', 'O arquivo será removido permanentemente.')) return;
  try {
    await supa('DELETE', 'fin_anexos', { params: { id: `eq.${id}` } });
    await deleteStorage(path);
    removerLocal(ANEXOS, id);
    toast('Documento excluído.', 'success');
    renderDocumentos();
  } catch(e) { toast('Erro: ' + e.message, 'error'); }
}

function fmtTamanho(bytes) {
  if (!bytes) return '—';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/1024/1024).toFixed(1) + ' MB';
}

function iconeArquivo(tipo) {
  if (!tipo) return '📄';
  if (tipo.includes('pdf'))   return '📕';
  if (tipo.includes('image')) return '🖼️';
  if (tipo.includes('xml'))   return '📋';
  if (tipo.includes('sheet') || tipo.includes('excel') || tipo.includes('csv')) return '📊';
  if (tipo.includes('word') || tipo.includes('document')) return '📝';
  return '📄';
}

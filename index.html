<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artecon · Financeiro Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root {
  /* ── Artecon IRRF Palette ── */
  --bg:          #f4f6f9;
  --bg-2:        #ffffff;
  --surface:     #ffffff;
  --surface-2:   #f0f2f5;
  --border:      rgba(0,0,0,0.08);
  --border-lt:   rgba(0,0,0,0.14);
  --text:        #1a2332;
  --text-2:      #4a5568;
  --text-3:      #8896a8;
  --gold:        #1a5276;
  --gold-lt:     #d6e4f0;
  --gold-dim:    #154360;
  --green:       #1e8449;
  --green-lt:    #eafaf1;
  --red:         #c0392b;
  --red-lt:      #fdedec;
  --amber:       #b7770d;
  --amber-lt:    #fef9e7;
  --sidebar-w:   200px;
  --radius:      12px;
  --shadow:      0 2px 12px rgba(0,0,0,0.08);
  --shadow-lg:   0 8px 32px rgba(0,0,0,0.14);
  --font:        'DM Sans', sans-serif;
  --mono:        'DM Mono', monospace;
  --tr:          160ms cubic-bezier(.4,0,.2,1);
  --gold-glow:   0 0 20px rgba(26,82,118,.15);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  font-size: 13.5px;
  line-height: 1.55;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── SCROLLBAR ─────────────────────────────────────────────── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-lt); border-radius: 99px; }

/* ── AUTH ─────────────────────────────────────────────────── */
#auth-screen { display: none; min-height: 100vh; align-items: center; justify-content: center; background: linear-gradient(135deg,#1a3a5c 0%,#1a5276 50%,#2e86c1 100%); position: relative; overflow: hidden; }
#auth-screen::before {
  content: '';
  position: absolute;
  top: -200px; left: 50%; transform: translateX(-50%);
  width: 800px; height: 800px;
  background: radial-gradient(circle, rgba(26,82,118,.06) 0%, transparent 70%);
  pointer-events: none;
}
#auth-screen.visible { display: flex; }

.auth-wrap { width: 400px; position: relative; z-index: 1; }

.auth-brand {
  display: flex; align-items: center; gap: 14px; margin-bottom: 36px; justify-content: center;
}
.auth-brand-mark {
  width: 48px; height: 48px;
  background: linear-gradient(135deg, var(--gold-dim), var(--gold));
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: 700; color: #ffffff;
  letter-spacing: -1px; font-family: var(--mono);
  box-shadow: 0 4px 20px rgba(26,82,118,.3);
}
.auth-brand-text h1 { font-size: 20px; font-weight: 700; letter-spacing: -.4px; color: #ffffff; }
.auth-brand-text span { font-size: 11px; color: rgba(255,255,255,.7); letter-spacing: .04em; text-transform: uppercase; }

.auth-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 32px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.35);
}

.auth-tabs { display: flex; gap: 3px; background: var(--bg); border-radius: 9px; padding: 3px; margin-bottom: 26px; }
.auth-tab {
  flex: 1; padding: 8px; border: none; border-radius: 7px;
  background: transparent; font-family: var(--font); font-size: 12.5px; font-weight: 500;
  color: var(--text-3); cursor: pointer; transition: var(--tr);
}
.auth-tab.active { background: var(--surface-2); color: var(--text); }

.field { margin-bottom: 14px; }
.field label { display: block; font-size: 10.5px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 6px; }
.field input, .field select {
  width: 100%; padding: 10px 14px;
  border: 1.5px solid var(--border);
  border-radius: 9px;
  font-family: var(--font); font-size: 13.5px;
  background: var(--bg-2); color: var(--text); outline: none;
  transition: var(--tr);
}
.field input:focus, .field select:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,.1); }

.btn-primary {
  width: 100%; padding: 11px;
  background: linear-gradient(135deg, var(--gold-dim), var(--gold));
  color: #ffffff; border: none; border-radius: 9px;
  font-family: var(--font); font-size: 13.5px; font-weight: 700;
  cursor: pointer; transition: var(--tr); margin-top: 8px;
  letter-spacing: .01em;
}
.btn-primary:hover { filter: brightness(1.1); box-shadow: 0 4px 20px rgba(201,168,76,.3); }
.btn-primary:disabled { opacity: .5; cursor: not-allowed; }
.auth-err { color: var(--red); font-size: 12px; margin-top: 10px; text-align: center; min-height: 18px; }

/* ── ONBOARDING ───────────────────────────────────────────── */
#onboard-screen { display: none; min-height: 100vh; align-items: center; justify-content: center; background: var(--bg); }
#onboard-screen.visible { display: flex; }
.onboard-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; padding: 44px 40px; width: 480px;
  box-shadow: var(--shadow-lg);
}
.onboard-step-bar { display: flex; gap: 6px; margin-bottom: 32px; }
.onboard-step-dot { flex: 1; height: 3px; border-radius: 2px; background: var(--border-lt); transition: background .3s; }
.onboard-step-dot.done  { background: var(--gold); }
.onboard-step-dot.active { background: var(--gold-dim); }
.onboard-title { font-size: 21px; font-weight: 700; letter-spacing: -.4px; margin-bottom: 8px; }
.onboard-sub { font-size: 13px; color: var(--text-2); margin-bottom: 26px; line-height: 1.6; }
.onboard-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 26px; gap: 12px; }

.btn-outline {
  padding: 10px 20px; border: 1.5px solid var(--border-lt); border-radius: 9px;
  background: transparent; font-family: var(--font); font-size: 13px; font-weight: 500;
  color: var(--text-2); cursor: pointer; transition: var(--tr);
}
.btn-outline:hover { border-color: var(--text-3); color: var(--text); }

.btn-accent {
  padding: 10px 24px;
  background: linear-gradient(135deg, var(--gold-dim), var(--gold));
  color: #ffffff; border: none; border-radius: 9px;
  font-family: var(--font); font-size: 13px; font-weight: 700;
  cursor: pointer; transition: var(--tr);
}
.btn-accent:hover { filter: brightness(1.1); }
.btn-accent:disabled { opacity: .5; cursor: not-allowed; }

.categoria-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.categoria-chip {
  display: flex; align-items: center; gap: 8px; padding: 10px 12px;
  border: 1.5px solid var(--border-lt); border-radius: 9px; cursor: pointer;
  transition: var(--tr); font-size: 13px; color: var(--text-2);
}
.categoria-chip.selected { border-color: var(--gold); background: var(--gold-lt); color: var(--gold); }
.categoria-chip:hover:not(.selected) { border-color: var(--border-lt); color: var(--text); background: var(--surface-2); }

/* ── APP SHELL ────────────────────────────────────────────── */
#app { display: none; min-height: 100vh; }
#app.visible { display: flex; }

/* ── SUPERADMIN MODE ─────────────────────────────────────── */
/* Quando o painel Superadmin está ativo (body.sa-mode), garantir que
   nenhum elemento residual do app principal (sidebar fixa, overlays, etc.)
   intercepte cliques. Necessário porque .sidebar tem position:fixed +
   z-index:100, e display:none no #app não cascateia 100% confiavelmente
   em todas as combinações de browser/responsivo. */
body.sa-mode #app,
body.sa-mode .sidebar,
body.sa-mode .sidebar-overlay,
body.sa-mode #app * {
  display: none !important;
  pointer-events: none !important;
}
body.sa-mode #superadmin-screen { display: flex !important; }

/* ── SIDEBAR ─────────────────────────────────────────────── */
.sidebar {
  width: var(--sidebar-w); height: 100vh;
  background: var(--bg-2);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  position: fixed; top: 0; left: 0; z-index: 100;
  overflow: hidden; /* a rolagem fica no .sidebar-nav, não na sidebar inteira */
}

.sidebar-brand {
  padding: 22px 18px 16px;
  display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid var(--border);
}
.brand-mark {
  width: 34px; height: 34px;
  background: linear-gradient(135deg, var(--gold-dim), var(--gold));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: #ffffff;
  font-family: var(--mono); letter-spacing: -1px;
  flex-shrink: 0;
}
.brand-text { }
.brand-name { font-size: 13.5px; font-weight: 700; letter-spacing: -.2px; color: var(--text); }
.brand-sub  { font-size: 10px; color: var(--text-3); letter-spacing: .04em; text-transform: uppercase; }

.tenant-badge {
  margin: 12px 12px 4px;
  padding: 10px 13px;
  background: var(--bg); border-radius: 10px; border: 1px solid var(--border);
}
.tenant-name { font-size: 11.5px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tenant-setor { font-size: 10.5px; color: var(--text-3); margin-top: 1px; }

.sidebar-nav { flex: 1; padding: 8px 10px; overflow-y: auto; min-height: 0; }
/* v31: scrollbar discreta na sidebar (Webkit + Firefox).
   min-height:0 acima é necessário pro flex-child rolar corretamente. */
.sidebar-nav::-webkit-scrollbar { width: 6px; }
.sidebar-nav::-webkit-scrollbar-track { background: transparent; }
.sidebar-nav::-webkit-scrollbar-thumb { background: var(--border-lt); border-radius: 3px; }
.sidebar-nav::-webkit-scrollbar-thumb:hover { background: var(--text-3); }
.sidebar-nav { scrollbar-width: thin; scrollbar-color: var(--border-lt) transparent; }
.nav-section {
  font-size: 9.5px; font-weight: 700; color: var(--text-3);
  text-transform: uppercase; letter-spacing: .1em;
  padding: 14px 10px 5px;
}

.nav-item {
  display: flex; align-items: center; gap: 9px;
  padding: 8px 11px; border-radius: 9px;
  color: var(--text-3); font-size: 13px; font-weight: 500;
  cursor: pointer; transition: var(--tr); margin-bottom: 1px;
  border: none; background: none; width: 100%; text-align: left;
}
.nav-item:hover { background: var(--bg); color: var(--text-2); }
.nav-item.active { background: var(--gold-lt); color: var(--gold); font-weight: 600; }
.nav-item svg { width: 15px; height: 15px; flex-shrink: 0; }

.sidebar-footer {
  padding: 12px 14px; border-top: 1px solid var(--border);
}
.user-row { display: flex; align-items: center; gap: 10px; }
.user-avatar {
  width: 30px; height: 30px;
  background: linear-gradient(135deg, var(--gold-dim), var(--gold));
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: #ffffff; flex-shrink: 0;
}
.user-name { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; color: var(--text); }
.btn-logout {
  padding: 4px 9px; border: 1px solid var(--border-lt); border-radius: 6px;
  background: none; font-size: 10.5px; color: var(--text-3); cursor: pointer;
  font-family: var(--font); transition: var(--tr);
}
.btn-logout:hover { border-color: var(--red); color: var(--red); }

/* ── MAIN ────────────────────────────────────────────────── */
.main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }

.topbar {
  background: var(--bg-2); border-bottom: 1px solid var(--border);
  padding: 0 28px; height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 50;
}
.page-title { font-size: 15px; font-weight: 700; letter-spacing: -.2px; color: var(--text); }
.topbar-actions { display: flex; gap: 8px; align-items: center; }
.content { padding: 24px 28px; flex: 1; }

/* ── BUTTONS ─────────────────────────────────────────────── */
.btn {
  padding: 8px 16px; border-radius: 9px; font-family: var(--font); font-size: 13px; font-weight: 500;
  cursor: pointer; transition: var(--tr); display: inline-flex; align-items: center; gap: 6px; border: none;
}
.btn-sm { padding: 6px 13px; font-size: 12px; border-radius: 8px; }
.btn svg { width: 14px; height: 14px; }
.btn-green { background: var(--green-lt); color: var(--green); border: 1px solid rgba(82,184,130,.2); }
.btn-green:hover { background: var(--green); color: #ffffff; }
.btn-red { background: var(--red-lt); color: var(--red); border: 1px solid rgba(224,92,92,.2); }
.btn-red:hover { background: var(--red); color: #fff; }
.btn-gold { background: linear-gradient(135deg, var(--gold-dim), var(--gold)); color: #ffffff; font-weight: 700; }
.btn-gold:hover { filter: brightness(1.08); box-shadow: 0 4px 16px rgba(201,168,76,.25); }

/* ── CARDS ───────────────────────────────────────────────── */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px;
  box-shadow: var(--shadow);
}
.card-gold-line { border-top: 2px solid var(--gold); }

/* ── KPI GRID ────────────────────────────────────────────── */
.kpi-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 22px; }
.kpi-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 18px 20px; box-shadow: var(--shadow);
}
.kpi-label { font-size: 10.5px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 7px; }
.kpi-value { font-size: 24px; font-weight: 700; letter-spacing: -1px; font-family: var(--mono); }
.kpi-sub { font-size: 11px; color: var(--text-3); margin-top: 5px; }
.kpi-card.k-green { border-left: 3px solid var(--green); }
.kpi-card.k-red   { border-left: 3px solid var(--red); }
.kpi-card.k-amber { border-left: 3px solid var(--amber); }
.kpi-card.k-gold  { border-left: 3px solid var(--gold); }

/* ── TABLES ──────────────────────────────────────────────── */
table { width: 100%; border-collapse: collapse; }
thead th {
  text-align: left; padding: 10px 16px;
  font-size: 10.5px; font-weight: 700; color: var(--text-3);
  text-transform: uppercase; letter-spacing: .06em;
  border-bottom: 1px solid var(--border); background: var(--bg-2);
}
tbody tr { border-bottom: 1px solid var(--border); transition: var(--tr); cursor: pointer; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--bg); }
tbody td { padding: 11px 16px; font-size: 13px; }

/* ── BADGES ──────────────────────────────────────────────── */
.badge { display: inline-flex; align-items: center; padding: 2px 9px; border-radius: 20px; font-size: 10.5px; font-weight: 600; }
.badge-green  { background: var(--green-lt);  color: var(--green); }
.badge-red    { background: var(--red-lt);    color: var(--red); }
.badge-amber  { background: var(--amber-lt);  color: var(--amber); }
.badge-gold   { background: var(--gold-lt);   color: var(--gold); }
.badge-gray   { background: var(--surface-2); color: var(--text-3); }

/* ── MODAL ───────────────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.65); backdrop-filter: blur(6px);
  z-index: 9999; display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity .2s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--surface); border: 1px solid var(--border-lt);
  border-radius: 16px; width: 480px; max-height: 90vh; overflow-y: auto;
  box-shadow: var(--shadow-lg); transform: translateY(10px); transition: transform .22s;
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-header { padding: 22px 26px 0; display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
.modal-title { font-size: 15px; font-weight: 700; color: var(--text); }
.modal-close {
  width: 28px; height: 28px; border-radius: 7px; border: none;
  background: var(--surface-2); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; color: var(--text-2); transition: var(--tr);
}
.modal-close:hover { background: var(--border-lt); color: var(--text); }
.modal-body { padding: 0 26px 24px; }
.modal-footer { padding: 14px 26px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }

/* ── FORMS ───────────────────────────────────────────────── */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 13px; }
.form-grid .full { grid-column: 1 / -1; }
.form-label { font-size: 10.5px; font-weight: 700; color: var(--text-3); display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: .06em; }
.form-input, .form-select {
  width: 100%; padding: 9px 13px;
  border: 1.5px solid var(--border-lt); border-radius: 9px;
  font-family: var(--font); font-size: 13px;
  background: var(--bg-2); color: var(--text); outline: none; transition: var(--tr);
}
.form-input:focus, .form-select:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,.08); }
.form-field { display: flex; flex-direction: column; }

/* ── TOAST ───────────────────────────────────────────────── */
.toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 999; display: flex; flex-direction: column; gap: 8px; }
.toast {
  background: var(--surface-2); color: var(--text);
  padding: 11px 18px; border-radius: 10px; font-size: 13px; font-weight: 500;
  box-shadow: var(--shadow-lg); animation: slideUp .2s ease;
  border: 1px solid var(--border-lt);
}
.toast.success { background: var(--green); color: #ffffff; border-color: transparent; }
.toast.error   { background: var(--red);   color: #fff; border-color: transparent; }
.toast.warn    { background: var(--amber); color: #ffffff; border-color: transparent; }

@keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── MISC ────────────────────────────────────────────────── */
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-3); }
.empty-icon  { font-size: 36px; margin-bottom: 12px; opacity: .5; }
.empty-state h3 { font-size: 15px; font-weight: 600; color: var(--text-2); margin-bottom: 6px; }
.table-wrap { overflow-x: auto; }

.saldo-bar { height: 4px; background: var(--surface-2); border-radius: 3px; overflow: hidden; margin-top: 6px; }
.saldo-fill { height: 100%; border-radius: 3px; }

/* ── TUTORIAL BANNER ─────────────────────────────────────── */
.tutorial-card {
  background: linear-gradient(135deg, var(--gold-lt), rgba(201,168,76,.05));
  border: 1px solid rgba(201,168,76,.25); border-radius: 12px;
  padding: 18px 22px; margin-bottom: 22px;
  display: flex; align-items: center; gap: 18px;
}
.tutorial-icon { font-size: 28px; flex-shrink: 0; }
.tutorial-title { font-size: 13.5px; font-weight: 700; margin-bottom: 4px; color: var(--gold); }
.tutorial-steps { display: flex; gap: 12px; margin-top: 10px; flex-wrap: wrap; }
.tutorial-step { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-2); }
.tutorial-step-num { width: 18px; height: 18px; border-radius: 50%; background: var(--gold); color: #ffffff; font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.tutorial-step.done .tutorial-step-num { background: var(--green); color: #ffffff; }

/* ── DASHBOARD ANIMATIONS ────────────────────────────────── */
@keyframes fadeUp   { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
@keyframes countUp  { from { opacity: 0; transform: scale(.93); }       to { opacity: 1; transform: scale(1); } }

.dash-fade { animation: fadeUp .38s ease both; }
.dash-fade:nth-child(1) { animation-delay: .04s; }
.dash-fade:nth-child(2) { animation-delay: .09s; }
.dash-fade:nth-child(3) { animation-delay: .14s; }
.dash-fade:nth-child(4) { animation-delay: .19s; }

/* ── KPI PRO ─────────────────────────────────────────────── */
.kpi-pro {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 20px 22px;
  box-shadow: var(--shadow); position: relative; overflow: hidden;
  transition: transform .18s, box-shadow .18s; cursor: pointer;
}
.kpi-pro:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,.4); }
.kpi-pro::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--kpi-c1), var(--kpi-c2));
}
.kpi-pro-label { font-size: 10.5px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
.kpi-pro-value { font-size: 26px; font-weight: 700; letter-spacing: -1.5px; font-family: var(--mono); animation: countUp .45s ease both; }
.kpi-pro-sub   { font-size: 11px; color: var(--text-3); margin-top: 6px; display: flex; align-items: center; gap: 5px; }
.kpi-pro-icon  { position: absolute; top: 18px; right: 18px; font-size: 22px; opacity: .08; }

.dash-section-title {
  font-size: 10.5px; font-weight: 700; color: var(--text-3);
  text-transform: uppercase; letter-spacing: .1em;
  margin-bottom: 13px; display: flex; align-items: center; gap: 8px;
}
.dash-section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* ── UPCOMING ITEMS ──────────────────────────────────────── */
.venc-row {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 0; border-bottom: 1px solid var(--border);
}
.venc-row:last-child { border-bottom: none; }
.venc-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.venc-info { flex: 1; min-width: 0; }
.venc-name { font-size: 12.5px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
.venc-date { font-size: 11px; color: var(--text-3); font-family: var(--mono); }
.venc-val  { font-size: 12px; font-weight: 700; font-family: var(--mono); flex-shrink: 0; }

.tag-pill {
  display: inline-flex; align-items: center; gap: 4px; padding: 2px 9px;
  border-radius: 20px; font-size: 10.5px; font-weight: 600;
}

/* ── DIVIDER LINE ────────────────────────────────────────── */
.divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

/* ── RESPONSIVE ──────────────────────────────────────────── */
/* ── MEDIUM SCREENS (900–1400px) ─────────────────────────────── */
@media (min-width: 901px) and (max-width: 1400px) {
  /* Sidebar compacta */
  .sidebar { width: 190px; }
  .main    { margin-left: 190px; }
  .brand-name { font-size: 12.5px; }
  .nav-item   { font-size: 12px; padding: 7px 9px; }
  .nav-section { font-size: 9px; }
  .content { padding: 16px 18px; }

  /* KPIs */
  .kpi-value { font-size: 20px; }
  .kpi-label { font-size: 10px; }

  /* Dashboard: KPI row 5 cols → scroll horizontal em telas muito estreitas */
  #page-content [style*="grid-template-columns:repeat(5,1fr)"] {
    overflow-x: auto;
  }

  /* Dashboard ROW 2: Saúde + Projeção + Sugestões */
  #page-content [style*="grid-template-columns:200px 1fr 1fr"] {
    grid-template-columns: 180px 1fr 1fr !important;
  }

  /* Dashboard ROW 3: Chart + Lançamentos */
  #page-content [style*="grid-template-columns:360px 1fr"] {
    grid-template-columns: 300px 1fr !important;
  }

  /* Dashboard ROW 4: 4 colunas → 2+2 */
  #page-content [style*="grid-template-columns:1fr 1fr 1fr 200px"] {
    grid-template-columns: 1fr 1fr !important;
  }

  /* KPI grids 4 cols → 2 cols em telas menores */
  @media (max-width: 1200px) {
    .kpi-grid { grid-template-columns: 1fr 1fr !important; }
  }
}

/* ── SIDEBAR OVERLAY (mobile) ─────────────────────────────── */
.sidebar-overlay {
  display: none; position: fixed; inset: 0; z-index: 199;
  background: rgba(0,0,0,.55); backdrop-filter: blur(2px);
}
.sidebar-overlay.visible { display: block; }

@media (max-width: 900px) {
  /* Sidebar: drawer */
  .sidebar { transform: translateX(-100%); transition: transform .25s cubic-bezier(.4,0,.2,1); z-index: 200; }
  .sidebar.open { transform: translateX(0); box-shadow: 0 0 60px rgba(0,0,0,.6); }

  /* Main */
  .main { margin-left: 0; }
  .content { padding: 14px 14px 80px; }

  /* Topbar */
  .topbar { padding: 0 14px; }
  .page-title { font-size: 14px; }

  /* KPI grids */
  .kpi-grid { grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .kpi-value { font-size: 20px; }

  /* Cards */
  .card { padding: 14px; }

  /* Modal */
  .modal { width: calc(100vw - 24px); max-width: 480px; }
  .form-grid { grid-template-columns: 1fr !important; }
  .form-grid .full { grid-column: 1; }

  /* Auth */
  .auth-wrap { width: calc(100vw - 32px); max-width: 400px; }
  .auth-card { padding: 22px 18px; }
  .onboard-card { width: calc(100vw - 32px); padding: 28px 20px; }

  /* Table: horizontal scroll */
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table { min-width: 560px; }

  /* Dashboard grids → single column */
  #page-content [style*="grid-template-columns:360px"],
  #page-content [style*="grid-template-columns:200px"],
  #page-content [style*="grid-template-columns:1fr 1fr 1fr 200px"],
  #page-content [style*="grid-template-columns:1fr 1fr 1fr;"],
  #page-content [style*="grid-template-columns:repeat(5,1fr)"],
  #page-content [style*="grid-template-columns:repeat(4,1fr)"],
  #page-content [style*="grid-template-columns:1fr 1fr;"] {
    grid-template-columns: 1fr !important;
  }

  /* KPI row (5 cols inline) */
  #page-content [style*="grid-template-columns:repeat(5,1fr)"] > div {
    border-left: none !important;
    border-top: 1px solid var(--border);
    padding: 10px 14px !important;
  }
  #page-content [style*="grid-template-columns:repeat(5,1fr)"] > div:first-child {
    border-top: none;
  }

  /* Filter bar */
  [style*="filterBarStyle"] { flex-direction: column; align-items: stretch; }

  /* Toast */
  .toast-container { bottom: 16px; right: 12px; left: 12px; }
  .toast { text-align: center; }

  /* Venc row */
  .venc-row { flex-wrap: wrap; }
}

/* ─── PLANOS DE CONTAS (v19) ───────────────────────────────────────── */
.planos-tabs { display: flex; gap: 4px; border-bottom: 1.5px solid var(--border); margin-bottom: 16px; }
.planos-tab {
  padding: 9px 18px; background: transparent; border: none;
  border-bottom: 2.5px solid transparent;
  cursor: pointer; font-family: var(--font); font-weight: 600;
  font-size: 13px; color: var(--text-3); transition: var(--tr);
}
.planos-tab:hover { color: var(--gold); }
.planos-tab.active { color: var(--gold); border-bottom-color: var(--gold); }

.planos-toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
.planos-toolbar input[type=search],
.planos-toolbar select {
  padding: 7px 11px; border: 1.5px solid var(--border-lt); border-radius: 8px;
  font-family: var(--font); font-size: 12.5px; background: var(--bg-2); color: var(--text); outline: none;
}
.planos-toolbar input[type=search] { flex: 1; min-width: 220px; }
.planos-toolbar input[type=search]:focus,
.planos-toolbar select:focus { border-color: var(--gold); }

.plano-tree {
  border: 1px solid var(--border); border-radius: var(--radius);
  background: var(--surface); max-height: 70vh; overflow: auto;
}
.plano-tree-row {
  display: grid; grid-template-columns: 22px 130px 1fr 110px 90px 70px;
  gap: 10px; padding: 7px 12px; border-bottom: 1px solid var(--border);
  align-items: center; font-size: 12.5px;
}
.plano-tree-row:last-child { border-bottom: none; }
.plano-tree-row:hover { background: var(--surface-2); }
.plano-tree-row.sintetica { font-weight: 700; background: rgba(26,82,118,.04); }
.plano-tree-row .toggle {
  cursor: pointer; user-select: none; color: var(--text-3);
  width: 16px; text-align: center; font-size: 10px;
}
.plano-tree-row .codigo { font-family: var(--mono); color: var(--text-2); font-size: 11.5px; }
.plano-tree-row .descricao {
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text);
}
.plano-tree-row .nat-tag { font-size: 10px; padding: 2px 7px; border-radius: 99px; font-weight: 700; }
.nat-receita,        .nat-RECEITA        { background: var(--green-lt); color: var(--green); }

.nat-PASSIVO         { background: var(--red-lt); color: var(--red); }
.nat-PL              { background: var(--amber-lt); color: var(--amber); }
.nat-RESULTADO       { background: var(--gold-lt); color: var(--gold); }
.nat-COMPENSACAO     { background: var(--surface-2); color: var(--text-2); }
.nat-OUTROS          { background: var(--surface-2); color: var(--text-2); }
.plano-tree-row .row-actions { display: flex; gap: 4px; justify-content: flex-end; }
.plano-tree-row .row-actions button {
  padding: 3px 7px; font-size: 11px; border: 1px solid var(--border-lt);
  background: var(--bg-2); border-radius: 6px; cursor: pointer; color: var(--text-2);
  font-family: var(--font); transition: var(--tr);
}
.plano-tree-row .row-actions button:hover { border-color: var(--gold); color: var(--gold); }

/* DE-PARA grid */
.depara-stats { display: grid; grid-template-columns: repeat(auto-fit,minmax(150px,1fr)); gap: 10px; margin-bottom: 16px; }
.depara-stat-card {
  padding: 12px 14px; background: var(--surface); border: 1px solid var(--border);

}

.depara-grid { display: grid; grid-template-columns: 1fr 70px 1fr; gap: 14px; align-items: start; }
@media (max-width: 768px) { .depara-grid { grid-template-columns: 1fr; } .depara-action { padding-top: 0 !important; flex-direction: row !important; justify-content: center; } }
.depara-col {
  border: 1px solid var(--border); border-radius: var(--radius);

}

  padding: 9px 13px; background: var(--surface-2);

  font-weight: 700; font-size: 11.5px; text-transform: uppercase;
  letter-spacing: .5px; color: var(--text-2);
}
.depara-col input[type=search] {
  width: 100%; padding: 8px 12px; border: none;
  border-bottom: 1px solid var(--border);
  font-family: var(--font); font-size: 12.5px; outline: none; background: var(--bg-2);
}
.depara-list { max-height: 50vh; overflow: auto; }
.depara-item {
  padding: 7px 12px; border-bottom: 1px solid var(--border);
  cursor: pointer; font-size: 12.5px; transition: var(--tr);
}
.depara-item:hover { background: var(--surface-2); }
.depara-item.selected { background: var(--gold-lt); border-left: 3px solid var(--gold); padding-left: 9px; }
.depara-item .codigo { font-family: var(--mono); color: var(--text-3); font-size: 10.5px; display: block; }
.depara-item.linked .descricao::after { content: ' 🔗'; opacity: .55; font-size: 10px; }

.depara-action {
  display: flex; flex-direction: column; gap: 8px; padding-top: 60px; align-items: stretch;
}
.depara-action button { white-space: nowrap; }

.vinculos-existentes {
  margin-top: 18px; border: 1px solid var(--border);
  border-radius: var(--radius); background: var(--surface);
}
.vinculo-row {
  display: grid; grid-template-columns: 1fr 24px 1fr 70px 50px;
  gap: 12px; padding: 9px 14px; border-bottom: 1px solid var(--border);
  align-items: center; font-size: 12.5px;
}

.vinculo-row button.btn-mini {
  padding: 4px 8px; font-size: 11px;

}

.empty-state-mini {
  padding: 30px; text-align: center; color: var(--text-3); font-size: 13px;
}
</style>
</head>

// ── SUPABASE ──────────────────────────────────────────────────
const $id = id => document.getElementById(id);

async function supa(method, table, opts = {}) {
  const { body, params, token, returning = false } = opts;
  let url = `${SUPA_URL}/rest/v1/${table}`;
  if (params) url += '?' + Object.entries(params).map(([k,v]) => `${k}=${encodeURIComponent(v)}`).join('&');
  const headers = {
    'apikey': SUPA_KEY,
    'Authorization': `Bearer ${token || APP.token || SUPA_KEY}`,
    'Content-Type': 'application/json',
    'Prefer': returning ? 'return=representation' : 'return=minimal',
  };
  const res = await fetch(url, { method, headers, body: body ? JSON.stringify(body) : undefined });
  if (!res.ok) { const e = await res.text(); throw new Error(e); }
  if (method === 'GET' || returning) return res.json();
  return true;
}

// ── Helpers de mitigação de rate limit do Supabase Auth (v18) ──
// Throttle: bloqueia chamadas repetidas de uma função num intervalo curto.
// Útil pra prevenir duplo-clique em botões de auth (signup, login, exclusão
// com senha) que disparam 429 (Too Many Requests) no Supabase.
// Uso: const handle = _throttle(fn, 5000); botao.onclick = handle;
function _throttle(fn, ms) {
  let lastCall = 0;
  let inFlight = false;
  return async function throttled(...args) {
    const now = Date.now();
    if (inFlight) return;            // já em execução — ignora
    if (now - lastCall < ms) return; // dentro do intervalo — ignora
    lastCall = now;
    inFlight = true;
    try { return await fn.apply(this, args); }
    finally { inFlight = false; }
  };
}

// Detecta erros de rate-limit do Auth e devolve mensagem amigável.
// Retorna { is429: true, msg } se for rate limit, ou { is429: false } senão.
// Uso: const r = _tratarErroAuth(err); if (r.is429) { toast(r.msg, 'error'); return; }
function _tratarErroAuth(err) {
  const m = String(err?.message || err || '').toLowerCase();
  const code = err?.code || err?.status || 0;
  const is429 = code === 429
    || /rate[-\s]?limit/i.test(m)
    || /too\s+many\s+requests/i.test(m)
    || /muitas\s+tentativas/i.test(m);
  if (!is429) return { is429: false };
  return {
    is429: true,
    msg: 'Muitas tentativas em pouco tempo. O Supabase bloqueou novas chamadas de autenticação por alguns minutos. Aguarde de 5 a 30 minutos antes de tentar de novo.'
  };
}

async function supaAuth(method, path, body) {
  const res = await fetch(`${SUPA_URL}/auth/v1/${path}`, {
    method, headers: { 'apikey': SUPA_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  return res.json();
}

// ── RPC (Supabase Functions) ──────────────────────────────────
// Chama functions criadas no banco (ex: fin_set_tenant, fin_minhas_empresas, fin_pode)
async function supaRpc(fnName, args = {}) {
  const url = `${SUPA_URL}/rest/v1/rpc/${fnName}`;
  const res = await fetch(url, {
    method: 'POST',
    headers: {
      'apikey': SUPA_KEY,
      'Authorization': `Bearer ${APP.token || SUPA_KEY}`,
      'Content-Type': 'application/json',
    },
    body: JSON.stringify(args),
  });
  if (!res.ok) {
    const txt = await res.text();
    throw new Error(`RPC ${fnName}: ${txt}`);
  }
  const ct = res.headers.get('content-type') || '';
  return ct.includes('application/json') ? res.json() : null;
}

// ── PERMISSÕES (frontend) ─────────────────────────────────────
// pode('receber','c') → true/false. Sempre retorna true se ehSuperadmin.
function pode(modulo, acao) {
  if (APP.ehSuperadmin) return true;
  const m = APP.permissoes?.[modulo];
  if (!m) return false;
  return !!m[acao];
}
// Atalhos legíveis
function podeVer(m)      { return pode(m, 'v'); }
function podeCriar(m)    { return pode(m, 'c'); }
function podeEditar(m)   { return pode(m, 'e'); }
function podeExcluir(m)  { return pode(m, 'x'); }

// ── TOAST ─────────────────────────────────────────────────────
function toast(msg, type = 'default', ms = 3000) {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  $id('toasts').appendChild(el);
  setTimeout(() => el.remove(), ms);
}

// ── MODAL ─────────────────────────────────────────────────────
function openModal(title, body, footer = '') {
  $id('modal-title').textContent = title;
  $id('modal-body').innerHTML = body;
  $id('modal-footer').innerHTML = footer;
  $id('modal-overlay').classList.add('open');
}
function closeModal() { $id('modal-overlay').classList.remove('open'); }

// ── CONFIRMAÇÃO ───────────────────────────────────────────────
// Substitui o confirm() nativo do browser por um modal harmônico com o app.
// Uso: if (!await confirmarAcao('Excluir?', 'Mensagem...')) return;
// opts: { tipo: 'red'|'amber'|'gold' (default 'red'), labelOk, labelCancelar }
function confirmarAcao(titulo, mensagem, opts = {}) {
  return new Promise((resolve) => {
    const tipo       = opts.tipo || 'red';
    const labelOk    = opts.labelOk    || (tipo === 'red' ? 'Excluir' : 'Confirmar');
    const labelCanc  = opts.labelCancelar || 'Cancelar';
    const corBtn     = tipo === 'red'   ? 'var(--red)'
                     : tipo === 'amber' ? 'var(--amber)'
                     :                    'var(--gold)';
    const icone      = tipo === 'red'   ? '🗑️'
                     : tipo === 'amber' ? '⚠️'
                     :                    '❓';

    openModal(titulo, `
      <div style="display:flex;gap:12px;align-items:flex-start;padding:4px 0">
        <div style="font-size:26px;line-height:1;flex-shrink:0">${icone}</div>
        <div style="font-size:13.5px;line-height:1.55;color:var(--text);flex:1">${escapeHtml(mensagem)}</div>
      </div>`,
      `<button class="btn btn-outline" id="cf-cancel">${escapeHtml(labelCanc)}</button>
       <button class="btn" id="cf-ok" style="background:${corBtn};color:#fff;border:none">${escapeHtml(labelOk)}</button>`);

    let resolvido = false;
    const finalizar = (val) => {
      if (resolvido) return;
      resolvido = true;
      closeModal();
      resolve(val);
    };

    const btnCancel = document.getElementById('cf-cancel');
    const btnOk     = document.getElementById('cf-ok');
    if (btnCancel) btnCancel.onclick = () => finalizar(false);
    if (btnOk)     btnOk.onclick     = () => finalizar(true);
    if (btnOk) btnOk.focus();
  });
}

// Pede justificativa em modal (substitui prompt() nativo).
// minLength: tamanho mínimo da resposta. Retorna string (trimmed) ou null se cancelado.
function pedirJustificativa(titulo, opts = {}) {
  return new Promise((resolve) => {
    const minLength  = opts.minLength || 10;
    const placeholder = opts.placeholder || 'Justifique a ação…';
    const labelOk    = opts.labelOk    || 'Confirmar';
    const labelCanc  = opts.labelCancelar || 'Cancelar';

      `<button class="btn btn-outline" id="pj-cancel">${escapeHtml(labelCanc)}</button>
       <button class="btn btn-gold" id="pj-ok">${escapeHtml(labelOk)}</button>`);

    let resolvido = false;
    const finalizar = (val) => {
      if (resolvido) return;
      resolvido = true;
      closeModal();
      resolve(val);
    };

    const txt    = document.getElementById('pj-texto');
    const btnC   = document.getElementById('pj-cancel');
    const btnOk  = document.getElementById('pj-ok');
    if (btnC)  btnC.onclick  = () => finalizar(null);
    if (btnOk) btnOk.onclick = () => {
      const v = (txt?.value || '').trim();
      if (v.length < minLength) {
        toast(`Justificativa obrigatória (mín. ${minLength} caracteres).`, 'error');
        return;
      }
      finalizar(v);
    };
    if (txt) txt.focus();
  });
}

// ── v34/v35 · Modal para informar data de recebimento/pagamento ──

// v35: adiciona campos opcionais para Juros, Multa e Desconto.
// Retorna { data, conta_id, juros, multa, desconto, valor_efetivo } ou null se cancelado.
function perguntarDataBaixa(opts = {}) {

    const corLt      = opts.cor === 'red' ? 'var(--red-lt)' : 'var(--green-lt)';
    const contaIdAtu = opts.contaId    || '';
    const labelExtra = opts.cor === 'red' ? 'pagamento' : 'recebimento';

    const optionsContas = (CONTAS||[]).map(c =>
      `<option value="${c.id}" ${contaIdAtu===c.id?'selected':''}>${escapeHtml(c.nome)}</option>`

    openModal(titulo, `
      <div style="display:flex;flex-direction:column;gap:14px">
        <div style="background:${corLt};border:1px solid rgba(0,0,0,.06);border-radius:10px;padding:12px 14px">
          <div style="font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Lançamento original</div>

          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-top:8px">

            <div style="font-size:15px;font-weight:700;font-family:var(--mono);color:${cor}">${fmtMoeda(valor)}</div>
          </div>

        <details id="pdb-extras" style="background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:10px 12px">

          </summary>
          <div class="form-grid" style="grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px">
            <div class="form-field">
              <label class="form-label" style="font-size:11px">Juros (R$)</label>
              <input class="form-input" type="number" id="pdb-juros" step="0.01" min="0" placeholder="0,00" oninput="atualizarTotalBaixa(${valor})">

              <label class="form-label" style="font-size:11px">Multa (R$)</label>
              <input class="form-input" type="number" id="pdb-multa" step="0.01" min="0" placeholder="0,00" oninput="atualizarTotalBaixa(${valor})">
            </div>

              <label class="form-label" style="font-size:11px">Desconto (R$)</label>
              <input class="form-input" type="number" id="pdb-desc" step="0.01" min="0" placeholder="0,00" oninput="atualizarTotalBaixa(${valor})">
            </div>
          </div>
          <div id="pdb-resumo" style="margin-top:10px;padding:8px 10px;background:var(--bg);border-radius:6px;font-size:11.5px;color:var(--text-2);line-height:1.6;display:none">
            <!-- preenchido dinamicamente -->
          </div>
          <div style="font-size:10.5px;color:var(--text-3);margin-top:8px;line-height:1.5">
            Os valores informados criam lançamentos automáticos na categoria "Juros e Multas",
            mantendo o lançamento original com seu valor de face.
          </div>
        </details>

        <div style="font-size:11px;color:var(--text-3);line-height:1.5;padding:0 2px">
          Informe a data em que o valor de fato entrou/saiu (pode diferir do vencimento). A conta selecionada terá o saldo atualizado automaticamente.
        </div>
      </div>`,
      `<button class="btn btn-outline" id="pdb-cancel">Cancelar</button>
       <button class="btn" id="pdb-ok" style="background:${cor};color:#fff;border:none">Confirmar baixa</button>`);

    // Helper global temporário para o oninput dos campos
    window.atualizarTotalBaixa = function(valorBase) {
      const j = parseFloat(document.getElementById('pdb-juros')?.value) || 0;
      const m = parseFloat(document.getElementById('pdb-multa')?.value) || 0;
      const d = parseFloat(document.getElementById('pdb-desc')?.value)  || 0;
      const totalEfetivo = valorBase + j + m - d;
      const resumo = document.getElementById('pdb-resumo');
      if (!resumo) return;
      if (j === 0 && m === 0 && d === 0) {
        resumo.style.display = 'none';
        return;
      }
      resumo.style.display = 'block';
      const corVal = totalEfetivo >= valorBase ? '#16804a' : '#c0392b';
      resumo.innerHTML = `
        <div style="display:flex;justify-content:space-between"><span>Valor original</span><span style="font-family:var(--mono)">${fmtMoeda(valorBase)}</span></div>
        ${j>0?`<div style="display:flex;justify-content:space-between;color:#b7770d"><span>+ Juros</span><span style="font-family:var(--mono)">${fmtMoeda(j)}</span></div>`:''}
        ${m>0?`<div style="display:flex;justify-content:space-between;color:#b7770d"><span>+ Multa</span><span style="font-family:var(--mono)">${fmtMoeda(m)}</span></div>`:''}
        ${d>0?`<div style="display:flex;justify-content:space-between;color:#16804a"><span>− Desconto</span><span style="font-family:var(--mono)">${fmtMoeda(d)}</span></div>`:''}
        <div style="display:flex;justify-content:space-between;border-top:1px solid var(--border-lt);margin-top:5px;padding-top:5px;font-weight:700"><span>Total efetivo ${labelExtra}</span><span style="font-family:var(--mono);color:${corVal}">${fmtMoeda(totalEfetivo)}</span></div>`;
    };

    let resolvido = false;
    const finalizar = (val) => {
      if (resolvido) return;
      resolvido = true;
      try { delete window.atualizarTotalBaixa; } catch(_) {}
      closeModal();
      resolve(val);
    };

    const btnC  = document.getElementById('pdb-cancel');
    const btnOk = document.getElementById('pdb-ok');
    const inpD  = document.getElementById('pdb-data');
    const selC  = document.getElementById('pdb-conta');

    if (btnC)  btnC.onclick  = () => finalizar(null);
    if (btnOk) btnOk.onclick = () => {
      const data = inpD?.value;
      if (!data) { toast('Informe a data.', 'error'); return; }
      finalizar({
        data,
        conta_id: selC?.value || null,
        juros:    parseFloat(document.getElementById('pdb-juros')?.value) || 0,
        multa:    parseFloat(document.getElementById('pdb-multa')?.value) || 0,
        desconto: parseFloat(document.getElementById('pdb-desc')?.value)  || 0,
      });
    };
    if (inpD) { inpD.focus(); inpD.select(); }
  });
}

// ── AUTH ──────────────────────────────────────────────────────
// (Cadastro de novos usuários agora é feito via aba Usuários ou link de convite)

$id('l-senha').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

async function doLogin() {
  const email = $id('l-email').value.trim();
  const senha  = $id('l-senha').value;
  const btn    = $id('btn-login');
  $id('login-err').textContent = '';
  if (!email || !senha) { $id('login-err').textContent = 'Preencha e-mail e senha.'; return; }
  btn.disabled = true; btn.textContent = 'Entrando...';
  try {
    const data = await supaAuth('POST', 'token?grant_type=password', { email, password: senha });
    if (!data.access_token) throw new Error(data.error_description || 'Credenciais inválidas.');
    APP.token = data.access_token;

    // Após login, verifica se há convite pendente no localStorage
    // (caso o usuário tenha vindo da página de convite e o projeto exija confirmação por email)
    try {
      const convitePendente = localStorage.getItem('fin_convite_pendente');
      if (convitePendente) {
        try {
          await supaRpc('fin_aceitar_convite', { p_token: convitePendente });
          localStorage.removeItem('fin_convite_pendente');
          toast('Convite aceito — bem-vindo(a)!', 'success');
        } catch(e) {
          console.warn('aceitar convite pendente:', e.message);
          // Não bloqueia o login se falhar
        }
      }
    } catch(_) {}

    await inicializar();
  } catch(e) {
    $id('login-err').textContent = e.message;
    btn.disabled = false; btn.textContent = 'Entrar';
  }
}

async function doLogout() {
  APP.token = null; APP.user = null; APP.tenant = null;
  APP.tenantId = null; APP.empresas = []; APP.permissoes = {};
  APP.template = null; APP.ehSuperadmin = false;
  CONTAS = []; CATEGORIAS = []; CLIENTES = []; FORNECEDORES = []; RECEITAS = []; DESPESAS = [];
  $id('app').classList.remove('visible');
  $id('auth-screen').classList.add('visible');
  $id('l-senha').value = '';
  $id('btn-login').disabled = false; $id('btn-login').textContent = 'Entrar';
}

// ── INICIALIZAR ───────────────────────────────────────────────
async function inicializar() {
  try {
    // 1) Carrega o registro do usuário (RLS deixa ele ver a si mesmo)
    const usuarios = await supa('GET', 'fin_usuarios', { params: { select: '*', limit: 1 } });
    if (!usuarios || !usuarios.length) {
      APP.nomeTemp = APP.nomeTemp || 'Usuário';
      iniciarOnboarding();
      return;
    }
    APP.user = usuarios[0];

    // 2) Verifica se é superadmin (precisa rodar ANTES de fin_minhas_empresas
    //    porque superadmin pode não ter vínculo em fin_usuarios_empresas)
    try {
      const sa = await supa('GET', 'fin_superadmins', {
        params: { email: `eq.${APP.user.email}`, select: '*', limit: 1 }
      });
      APP.ehSuperadmin = !!(sa && sa.length);
      if (APP.ehSuperadmin) SA.user = sa[0];
    } catch(_) { APP.ehSuperadmin = false; }

    // 3) Carrega empresas do usuário via RPC
    let empresas = [];
    try {
      empresas = await supaRpc('fin_minhas_empresas') || [];
    } catch(e) {
      console.warn('fin_minhas_empresas falhou:', e.message);
    }
    APP.empresas = empresas;

    // 4) Determina tenant ativo
    let tenantAtivo = null;
    if (empresas.length) {
      const def = empresas.find(e => e.is_default) || empresas[0];
      tenantAtivo = def.tenant_id;
      APP.template = def.template;
      APP.permissoes = def.permissoes || {};
    } else if (APP.ehSuperadmin) {
      // Superadmin sem vínculo: usa tenant do registro de fin_usuarios
      tenantAtivo = APP.user.tenant_id;
      APP.template = 'admin';
      APP.permissoes = {}; // pode() retorna true via ehSuperadmin
    } else {
      // Usuário sem nenhum vínculo de empresa
      toast('Sem acesso a nenhuma empresa. Contate o administrador.', 'error');
      return;
    }

    // 5) Seta tenant ativo no banco (define app.current_tenant da sessão)
    if (tenantAtivo) {
      try { await supaRpc('fin_set_tenant', { p_tenant_id: tenantAtivo }); }
      catch(e) { console.warn('fin_set_tenant:', e.message); }
    }
    APP.tenantId = tenantAtivo;

    // 6) Carrega dados do tenant
    const tenants = await supa('GET', 'fin_tenants', { params: { id: `eq.${tenantAtivo}`, select: '*' } });
    APP.tenant = tenants[0];

    await carregarDados();
    mostrarApp();
  } catch(e) {
    toast('Erro ao carregar: ' + e.message, 'error');
  }
}

// ── Helper global de paginação ─────────────────────────────────
// PostgREST tem limite default de 1000 linhas por requisição.
// Para tabelas que podem ultrapassar (receitas/despesas em empresas
// com volume), pagina automaticamente até trazer tudo.
// Safety net: para no offset 50.000 (50 páginas) para evitar loop infinito.
async function _supaFetchTudo(tabela, paramsBase) {
  const PAGE = 1000;
  let offset = 0;
  let acc = [];
  while (true) {
    const params = { ...paramsBase, limit: String(PAGE), offset: String(offset) };
    const chunk = await supa('GET', tabela, { params });
    if (!chunk || chunk.length === 0) break;
    acc = acc.concat(chunk);
    if (chunk.length < PAGE) break; // última página
    offset += PAGE;
    if (offset > 50000) {
      console.warn(`_supaFetchTudo: tabela ${tabela} ultrapassou 50k linhas — truncado por safety net`);
      break;
    }
  }
  return acc;
}

async function carregarDados() {
  const tid = APP.tenantId;
  const [contas, cats, clis, fors, recs, desps, metas, recorr] = await Promise.all([
    supa('GET', 'fin_contas',        { params: { tenant_id: `eq.${tid}`, ativo: 'eq.true', select: '*' } }),
    supa('GET', 'fin_categorias',    { params: { tenant_id: `eq.${tid}`, ativo: 'eq.true', select: '*', order: 'nome.asc' } }),
    supa('GET', 'fin_clientes',      { params: { tenant_id: `eq.${tid}`, ativo: 'eq.true', select: '*', order: 'nome.asc' } }),
    supa('GET', 'fin_fornecedores',  { params: { tenant_id: `eq.${tid}`, ativo: 'eq.true', select: '*', order: 'nome.asc' } }),
    // Receitas/Despesas: usam fetchTudo com paginação (podem ultrapassar 1000 lançamentos)
    _supaFetchTudo('fin_receitas',   { tenant_id: `eq.${tid}`, select: '*', order: 'vencimento.desc' }),
    _supaFetchTudo('fin_despesas',   { tenant_id: `eq.${tid}`, select: '*', order: 'vencimento.desc' }),
    supa('GET', 'fin_metas',         { params: { tenant_id: `eq.${tid}`, select: '*', order: 'prazo.asc' } }).catch(()=>[]),
    supa('GET', 'fin_recorrencias',  { params: { tenant_id: `eq.${tid}`, select: '*', order: 'criado_em.asc' } }).catch(()=>[]),
  ]);
  CONTAS = contas; CATEGORIAS = cats; CLIENTES = clis;
  FORNECEDORES = fors; RECEITAS = recs; DESPESAS = desps;
  METAS = metas || []; RECORRENCIAS = recorr || [];
  // Impostos carregado separado (tabela pode não existir)
  try { IMPOSTOS = await _supaFetchTudo('fin_impostos', { tenant_id: `eq.${tid}`, select: '*', order: 'vencimento.desc' }); } catch(_) { IMPOSTOS = []; }
  try { ANEXOS = await _supaFetchTudo('fin_anexos', { tenant_id: `eq.${tid}`, select: '*', order: 'criado_em.desc' }); } catch(_) { ANEXOS = []; }
  // v31: carrega regras de auto-categorização configuráveis (cache em _REGRAS_CATEG).
  // Falha silenciosa: se a tabela não existir ainda, _detectarCategoriaAuto cai no fallback hardcoded.
  try { await carregarRegrasCategorizacao(); } catch(_) { _REGRAS_CATEG = null; }
}

function mostrarApp() {
  $id('auth-screen').classList.remove('visible');
  $id('onboard-screen').classList.remove('visible');
  $id('app').classList.add('visible');
  $id('sb-tenant').textContent = APP.tenant?.nome || '—';
  $id('sb-setor').textContent  = APP.tenant?.setor || '—';
  $id('sb-user').textContent   = APP.user?.nome || '—';
  $id('sb-avatar').textContent = (APP.user?.nome || 'U')[0].toUpperCase();
  // Gera lançamentos recorrentes pendentes silenciosamente
  gerarRecorrenciasPendentes().catch(()=>{});
  // Verifica se é superadmin (já detectado em inicializar; aqui só popula UI)
  verificarSuperadmin().catch(()=>{});
  // Para usuário comum com +1 empresa, popula dropdown também
  if (!APP.ehSuperadmin && (APP.empresas || []).length > 1) {
    carregarSeletorEmpresas().catch(()=>{});
  }
  // Atualiza badge de notificações
  setTimeout(atualizarBadgeNotif, 500);
  go('dashboard');
}

function obNext1() {

}
function obNext2() {
  OB.contaNome  = $id('ob-conta-nome').value.trim() || 'Caixa';
  OB.contaTipo  = $id('ob-conta-tipo').value;
  OB.contaSaldo = parseFloat($id('ob-conta-saldo').value) || 0;
  OB.step = 3; renderOnboard();
}
function obNext3() { OB.step = 4; renderOnboard(); }
function toggleCat(i) {
  const idx = OB.categoriasSel.indexOf(i);
  if (idx === -1) OB.categoriasSel.push(i); else OB.categoriasSel.splice(idx, 1);
  document.querySelectorAll('.categoria-chip').forEach((el, j) => el.classList.toggle('selected', OB.categoriasSel.includes(j)));
}

async function finalizarOnboarding() {
  const btn = $id('btn-finalizar');
  btn.disabled = true; btn.textContent = 'Criando...';
  try {
    const tenants = await supa('POST', 'fin_tenants', { body: { nome: OB.empresa, setor: OB.setor }, returning: true });
    const tenant = tenants[0];
    const authUser = await fetch(`${SUPA_URL}/auth/v1/user`, {
      headers: { apikey: SUPA_KEY, Authorization: `Bearer ${APP.token}` }
    }).then(r => r.json());
    // Cria registro em fin_usuarios
    const usuariosCriados = await supa('POST', 'fin_usuarios', {
      body: { tenant_id: tenant.id, auth_id: authUser.id, nome: APP.nomeTemp, email: authUser.email, perfil: 'admin' },
      returning: true
    });

// ── getNome: lookup O(1) por id, com cache invalidado pela referência do array.
// O cache é uma WeakMap: cada array ganha seu próprio Map(id → nome).
// Quando carregarDados() reatribui o array (nova referência), o WeakMap descarta
// o Map antigo automaticamente. Ganho típico em listas com 500+ itens
// renderizadas N vezes: O(n²) → O(n).
const _NOME_CACHE = new WeakMap();
const getNome = (arr, id) => {
  if (!arr || !id) return '—';
  let map = _NOME_CACHE.get(arr);
  if (!map) {
    map = new Map();
    for (const x of arr) if (x && x.id) map.set(x.id, x.nome || '—');
    _NOME_CACHE.set(arr, map);
  }
  return map.get(id) || '—';
};

// ═══════════════════════════════════════════════════════════════
// HELPERS DE MUTAÇÃO LOCAL (Performance — Fase A · 24/04/2026)
// ─────────────────────────────────────────────────────────────
// Substituem o padrão `await carregarDados(); renderTela()` por
// atualização in-memory + re-render imediato. Ganho típico: 1–2s
// por ação (era 1 round-trip pra Supabase + 19 queries).
//
// Uso:
//   atualizarLocal(RECEITAS, registroNovo);   // upsert
//   removerLocal(RECEITAS, idRegistro);       // delete
//   await recarregarApenas('fin_receitas');   // refresh só 1 tabela
//   rerenderTelaAtual();                      // chama o render visível
// ═══════════════════════════════════════════════════════════════

/** Upsert local: substitui pelo id, ou adiciona no início se for novo */
function atualizarLocal(arr, registro) {
  if (!arr || !registro || !registro.id) return;
  const idx = arr.findIndex(r => r.id === registro.id);
  if (idx >= 0) arr[idx] = registro;
  else arr.unshift(registro);
  _NOME_CACHE.delete(arr);  // invalida cache de getNome (Fase C)
  // Performance v21: invalida cache RPC se mexeu em receitas/despesas/contas
  if (arr === RECEITAS || arr === DESPESAS || arr === CONTAS) {
    if (typeof invalidarCacheDashboard === 'function') invalidarCacheDashboard();
  }
}

/** Remove um registro do array local pelo id */
function removerLocal(arr, id) {
  if (!arr || !id) return;
  const idx = arr.findIndex(r => r.id === id);
  if (idx >= 0) arr.splice(idx, 1);
  _NOME_CACHE.delete(arr);  // invalida cache de getNome (Fase C)
  // Performance v21: invalida cache RPC
  if (arr === RECEITAS || arr === DESPESAS || arr === CONTAS) {
    if (typeof invalidarCacheDashboard === 'function') invalidarCacheDashboard();
  }
}

/** Recarrega apenas UMA tabela do Supabase (não todas as 19) */
async function recarregarApenas(tabela) {
  const tid = APP.tenantId;
  if (!tid) return;
  const map = {
    'fin_receitas':     { var: 'RECEITAS',     order: 'vencimento.desc' },
    'fin_despesas':     { var: 'DESPESAS',     order: 'vencimento.desc' },
    'fin_impostos':     { var: 'IMPOSTOS',     order: 'vencimento.desc' },
    'fin_contas':       { var: 'CONTAS',       extra: { ativo: 'eq.true' } },
    'fin_categorias':   { var: 'CATEGORIAS',   order: 'nome.asc', extra: { ativo: 'eq.true' } },
    'fin_clientes':     { var: 'CLIENTES',     order: 'nome.asc', extra: { ativo: 'eq.true' } },
    'fin_fornecedores': { var: 'FORNECEDORES', order: 'nome.asc', extra: { ativo: 'eq.true' } },
    'fin_metas':        { var: 'METAS',        order: 'prazo.asc' },
    'fin_recorrencias': { var: 'RECORRENCIAS', order: 'criado_em.asc' },
    'fin_anexos':       { var: 'ANEXOS',       order: 'criado_em.desc' },
  };
  const cfg = map[tabela];
  if (!cfg) { console.warn('[recarregarApenas] tabela desconhecida:', tabela); return; }
  const params = { tenant_id: `eq.${tid}`, select: '*', ...(cfg.extra || {}) };
  if (cfg.order) params.order = cfg.order;
  try {
    const dados = await supa('GET', tabela, { params });
    window[cfg.var] = dados || [];
  } catch (e) {
    console.error('[recarregarApenas] falha em', tabela, e);
  }
}

// v35 · Recálculo de saldo via RPC autoritativa
// ─────────────────────────────────────────────────────────────────────
// Usa fin_recalcular_saldos (criada na migration_v35) que recalcula
// saldo_atual = saldo_inicial + entradas - saídas. Atualiza o array
// local CONTAS com os valores retornados pela RPC.
//
// Se a RPC não existir (banco ainda sem migration), faz fallback para
// recarregarApenas + warn no console pedindo ao admin rodar a migration.
async function recalcularSaldoConta(contaId) {
  if (!contaId) return;
  try {
    const res = await supaRpc('fin_recalcular_saldos', { p_conta_id: contaId });
    if (Array.isArray(res)) {
      res.forEach(row => {
        const idx = CONTAS.findIndex(c => c.id === row.conta_id);
        if (idx >= 0) CONTAS[idx].saldo_atual = row.saldo_atual;
      });
      return;
    }
  } catch (e) {
    console.warn('[recalcularSaldoConta] RPC falhou — execute migration_v35_saldo_trigger.sql no Supabase:', e.message);
  }
  // Fallback: ao menos recarrega para pegar qualquer atualização
  await recarregarApenas('fin_contas');
}

async function recalcularTodosSaldos() {
  try {
    const res = await supaRpc('fin_recalcular_saldos', { p_conta_id: null });
    if (Array.isArray(res)) {
      res.forEach(row => {
        const idx = CONTAS.findIndex(c => c.id === row.conta_id);
        if (idx >= 0) CONTAS[idx].saldo_atual = row.saldo_atual;
      });
      return res.length;
    }
  } catch (e) {
    console.warn('[recalcularTodosSaldos] RPC falhou:', e.message);
  }
  await recarregarApenas('fin_contas');
  return CONTAS.length;
}

// ─────────────────────────────────────────────────────────────────────
// v35 · Auto-criação de lançamentos de Juros / Multa / Desconto
// ─────────────────────────────────────────────────────────────────────
// Quando o usuário baixa uma receita/despesa informando juros, multa
// ou desconto, criamos lançamentos separados (com origem rastreada
// via observação) ligados à categoria 'Juros e Multas'.
//
// Regras:
//   - Receita paga COM juros/multa: ganho extra → fin_receitas (juros recebidos)
//   - Receita paga COM desconto:    abatimento  → fin_despesas  (descontos concedidos)
//   - Despesa paga COM juros/multa: custo extra → fin_despesas  (juros pagos)
//   - Despesa paga COM desconto:    redução     → fin_receitas  (descontos obtidos)
async function criarLancamentosAjuste(o) {
  // Garante existência da categoria "Juros e Multas"
  const catJuros = await garantirCategoriaJurosMultas();

  const acrescimos = (parseFloat(o.juros)||0) + (parseFloat(o.multa)||0);
  const desconto   = parseFloat(o.desconto)||0;

  try {
    if (o.origem === 'receita') {
      // Acréscimos viram RECEITA extra
      if (acrescimos > 0) {
        const desc = `Juros/Multa recebidos · ${o.descBase}`;
        const criada = await supa('POST', 'fin_receitas', { returning: true, body: {
          tenant_id:    APP.tenantId,
          descricao:    desc,
          valor:        acrescimos,
          vencimento:   o.data,
          recebido_em:  o.data,
          status:       'recebido',
          cliente_id:   o.clienteId || null,
          categoria_id: catJuros,
          conta_id:     o.contaId || null,
          observacao:   `Auto-gerado da baixa de receita ${o.origemId}`,
        }});
        if (Array.isArray(criada) && criada[0]) atualizarLocal(RECEITAS, criada[0]);
        if (o.contaId) {
          await supa('POST', 'fin_movimentacoes', { body: {
            tenant_id: APP.tenantId, conta_id: o.contaId, tipo: 'entrada',
            valor: acrescimos, data: o.data, descricao: desc,
            receita_id: criada?.[0]?.id || null,
          }});
        }
      }
      // Desconto vira DESPESA (abatimento concedido)
      if (desconto > 0) {
        const desc = `Desconto concedido · ${o.descBase}`;
        const criada = await supa('POST', 'fin_despesas', { returning: true, body: {
          tenant_id:    APP.tenantId,
          descricao:    desc,
          valor:        desconto,
          vencimento:   o.data,
          pago_em:      o.data,
          status:       'pago',
          fornecedor_id: null,
          categoria_id: catJuros,
          conta_id:     null, // não movimenta caixa
          observacao:   `Auto-gerado da baixa de receita ${o.origemId}`,
        }});
        if (Array.isArray(criada) && criada[0]) atualizarLocal(DESPESAS, criada[0]);
      }
    } else { // origem === 'despesa'
      // Acréscimos viram DESPESA extra
      if (acrescimos > 0) {
        const desc = `Juros/Multa pagos · ${o.descBase}`;
        const criada = await supa('POST', 'fin_despesas', { returning: true, body: {
          tenant_id:    APP.tenantId,
          descricao:    desc,
          valor:        acrescimos,
          vencimento:   o.data,
          pago_em:      o.data,
          status:       'pago',
          fornecedor_id: o.fornecedorId || null,
          categoria_id: catJuros,
          conta_id:     o.contaId || null,
          observacao:   `Auto-gerado da baixa de despesa ${o.origemId}`,
        }});
        if (Array.isArray(criada) && criada[0]) atualizarLocal(DESPESAS, criada[0]);
        if (o.contaId) {
          await supa('POST', 'fin_movimentacoes', { body: {
            tenant_id: APP.tenantId, conta_id: o.contaId, tipo: 'saida',
            valor: acrescimos, data: o.data, descricao: desc,
            despesa_id: criada?.[0]?.id || null,
          }});
        }
      }
      // Desconto vira RECEITA (abatimento obtido)
      if (desconto > 0) {
        const desc = `Desconto obtido · ${o.descBase}`;
        const criada = await supa('POST', 'fin_receitas', { returning: true, body: {
          tenant_id:    APP.tenantId,
          descricao:    desc,
          valor:        desconto,
          vencimento:   o.data,
          recebido_em:  o.data,
          status:       'recebido',
          cliente_id:   null,
          categoria_id: catJuros,
          conta_id:     null,
          observacao:   `Auto-gerado da baixa de despesa ${o.origemId}`,
        }});
        if (Array.isArray(criada) && criada[0]) atualizarLocal(RECEITAS, criada[0]);
      }
    }
    // Recalcula saldo se tocou alguma conta
    if (acrescimos > 0 && o.contaId) {
      await recalcularSaldoConta(o.contaId);
    }
  } catch (e) {
    console.error('[criarLancamentosAjuste] falha:', e);
    toast('Aviso: lançamento principal OK, mas falhou ao criar juros/multa.', 'amber');
  }
}

async function garantirCategoriaJurosMultas() {
  // Procura local primeiro
  const cat = (CATEGORIAS||[]).find(c =>
    c.nome && c.nome.toLowerCase().includes('juros') &&
    (c.tipo === 'ambos' || c.tipo === 'receita' || c.tipo === 'despesa')
  );
  if (cat) return cat.id;

  // Cria
  try {
    const criada = await supa('POST', 'fin_categorias', { returning: true, body: {
      tenant_id: APP.tenantId,
      nome:      'Juros e Multas',
      tipo:      'ambos',
      icone:     '💸',
      ativo:     true,
    }});
    if (Array.isArray(criada) && criada[0]) {
      atualizarLocal(CATEGORIAS, criada[0]);
      return criada[0].id;
    }
  } catch (e) {
    console.warn('[garantirCategoriaJurosMultas] não foi possível criar:', e.message);
  }
  return null;
}

// ═══════════════════════════════════════════════════════════════════════════
// PERFORMANCE v21 — RPCs DE AGREGAÇÃO (Dashboard / DRE / Fluxo)
// ─────────────────────────────────────────────────────────────────────────
// Estratégia: tentar RPC primeiro; se falhar, mantém o cálculo legado.
// Cache de 30s por tenant pra evitar refetches em re-renders próximos.
// ═══════════════════════════════════════════════════════════════════════════

const _RPC_CACHE = new Map();   // chave: 'fn:tenant:args' → {data, expira}
const _RPC_TTL_MS = 30 * 1000;  // 30s

// Leitor SÍNCRONO do cache (retorna null se não houver hit válido).
// Usado pelos render*() para usar dados da RPC sem await — se faltar,
// o cálculo legado roda como fallback transparente.
function _rpcCacheGet(fnName, args) {
  const tid = APP.tenantId;
  if (!tid) return null;
  const key = `${fnName}:${tid}:${JSON.stringify(args || {})}`;
  const hit = _RPC_CACHE.get(key);
  if (hit && hit.expira > Date.now()) return hit.data;
  return null;
}

// Dispara RPC em background e dispara re-render quando chegar.
// Se a página mudou enquanto a RPC voltava, não faz nada.
function _rpcAquecer(fnName, args, onReadyRender) {
  const tid = APP.tenantId;
  if (!tid) return;
  const key = `${fnName}:${tid}:${JSON.stringify(args || {})}`;
  // Já em cache? Não precisa aquecer.
  const hit = _RPC_CACHE.get(key);
  if (hit && hit.expira > Date.now()) return;
  // Marca como "fetching" para evitar disparos duplicados em re-renders rápidos
  if (hit && hit.fetching) return;
  _RPC_CACHE.set(key, { fetching: true, expira: Date.now() + 5000 });
  supaRpc(fnName, args || {})
    .then(data => {
      _RPC_CACHE.set(key, { data, expira: Date.now() + _RPC_TTL_MS });
      if (typeof onReadyRender === 'function') {
        try { onReadyRender(); } catch(e) { console.warn('rerender RPC falhou:', e); }
      }
    })
    .catch(e => {
      console.warn(`RPC ${fnName} falhou:`, e?.message || e);
      // Limpa marca de fetching para tentar de novo no próximo render
      _RPC_CACHE.delete(key);
    });
}

async function _rpcCacheado(fnName, args) {
  const tid = APP.tenantId;
  if (!tid) return null;
  const key = `${fnName}:${tid}:${JSON.stringify(args || {})}`;
  const hit = _RPC_CACHE.get(key);
  if (hit && hit.expira > Date.now()) return hit.data;
  try {
    const data = await supaRpc(fnName, args || {});
    _RPC_CACHE.set(key, { data, expira: Date.now() + _RPC_TTL_MS });
    return data;
  } catch(e) {
    console.warn(`RPC ${fnName} falhou:`, e.message);
    return null;
  }
}

// Invalida cache quando dados mudam (chame após criar/editar/excluir lançamentos)
function invalidarCacheDashboard() {
  for (const k of _RPC_CACHE.keys()) {
    if (k.startsWith('fin_dashboard_kpis:') ||
        k.startsWith('fin_dre:')           ||
        k.startsWith('fin_dre_por_plano:') ||
        k.startsWith('fin_fluxo:')) {
      _RPC_CACHE.delete(k);
    }
  }
}

async function fetchDashboardKpis(dataRef) {
  return _rpcCacheado('fin_dashboard_kpis', {
    p_tenant_id: APP.tenantId,
    p_data_ref:  dataRef || today(),
  });
}

const CLAUDE_PROXY_URL = `${SUPA_URL}/functions/v1/validar-anexos`;

function soDigitos(s) {
  return (s || '').toString().replace(/\D/g, '');
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function usuarioEhAdmin() {
  return APP.user && (APP.user.perfil === 'admin' || APP.user.perfil === 'superadmin');
}

function dadosParaValidacao(tipoRef, refId) {
  let lanc = null, entidadeDoc = null, entidadeNome = null;

  if (tipoRef === 'receita') {
    lanc = RECEITAS.find(x => x.id === refId);
    if (lanc && lanc.cliente_id) {
      const entidade = CLIENTES.find(c => c.id === lanc.cliente_id);
      if (entidade) { entidadeDoc = entidade.cpf_cnpj; entidadeNome = entidade.nome; }
    }
  } else if (tipoRef === 'despesa') {
    lanc = DESPESAS.find(x => x.id === refId);
    if (lanc && lanc.fornecedor_id) {
      const entidade = FORNECEDORES.find(f => f.id === lanc.fornecedor_id);
      if (entidade) { entidadeDoc = entidade.cpf_cnpj; entidadeNome = entidade.nome; }
    }
  } else if (tipoRef === 'imposto') {
    lanc = IMPOSTOS.find(x => x.id === refId);
    entidadeDoc = APP.tenant?.cnpj;
    entidadeNome = APP.tenant?.nome;
  }

  if (!lanc) return null;

  return {
    lancamento: {
      valor: parseFloat(lanc.valor) || null,
      vencimento: lanc.vencimento || null,
      numero_documento: lanc.numero_documento || null,
      entidade_cnpj_cpf: entidadeDoc || null,
      entidade_nome: entidadeNome || null,
    },
    lanc,
    tipoRef,
  };
}

async function validarDocumentoIA(file, lancamento) {
  const fileBase64 = await fileToBase64(file);
  // IMPORTANTE: requisição "simple" sem headers customizados para evitar preflight CORS.
  // apikey vai como query param; Content-Type text/plain é permitido sem preflight.
  const resp = await fetch(`${CLAUDE_PROXY_URL}?apikey=${encodeURIComponent(SUPA_KEY)}`, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({
      validar_documento: true,
      file_base64: fileBase64,
      media_type: file.type || 'application/octet-stream',
      file_name: file.name,
      lancamento,
    }),
  });
  if (!resp.ok) {
    const txt = await resp.text();
    throw new Error(`Edge Function erro ${resp.status}: ${txt.slice(0, 200)}`);
  }
  return await resp.json();
}

function modalConferenciaAnexo(diag, contexto) {
  const { status, mensagem, divergencias, coincidencias, dados_extraidos } = diag;
  const statusStyle = {
    ok:            { cor: 'var(--green)', bg: 'rgba(30,132,73,.08)', icone: '✓', titulo: 'Documento confere' },
    divergente:    { cor: 'var(--amber)', bg: 'rgba(183,119,13,.08)', icone: '⚠', titulo: 'Divergências encontradas' },
    bloqueado:     { cor: 'var(--red)',   bg: 'rgba(192,57,43,.08)',  icone: '✕', titulo: 'Anexo bloqueado' },
    sem_validacao: { cor: 'var(--text-3)',bg: 'var(--surface-2)',     icone: '?', titulo: 'Validação parcial' },
    erro:          { cor: 'var(--red)',   bg: 'rgba(192,57,43,.08)',  icone: '✕', titulo: 'Erro na análise' },
  };
  const st = statusStyle[status] || statusStyle.erro;
  const extr = dados_extraidos || {};
  const admin = usuarioEhAdmin();

  let tabelaHtml = '';
  if ((coincidencias && coincidencias.length) || (divergencias && divergencias.length)) {
    const linhas = [];
    for (const c of (coincidencias||[])) {
      linhas.push(`<tr style="border-bottom:1px solid var(--border-lt)"><td style="padding:8px 10px;font-size:12px;color:var(--text-2)">${c.campo}</td><td style="padding:8px 10px;font-size:12px;color:var(--green);font-family:var(--mono)" colspan="2">✓ ${c.valor}</td></tr>`);
    }
    for (const d of (divergencias||[])) {
      const corLinha = d.critico ? 'var(--red)' : 'var(--amber)';
      linhas.push(`<tr style="border-bottom:1px solid var(--border-lt)"><td style="padding:8px 10px;font-size:12px;color:${corLinha};font-weight:600">${d.campo}${d.critico?' ⚠️':''}</td><td style="padding:8px 10px;font-size:12px;color:var(--text-3);font-family:var(--mono)"><div style="font-size:10px;color:var(--text-3)">Digitado</div>${d.digitado ?? '—'}</td><td style="padding:8px 10px;font-size:12px;color:${corLinha};font-family:var(--mono)"><div style="font-size:10px;color:var(--text-3)">No documento</div>${d.documento ?? '—'}</td></tr>`);
    }
    tabelaHtml = `<div style="margin-top:14px;background:var(--surface-2);border:1px solid var(--border-lt);border-radius:9px;overflow:hidden"><table style="width:100%;border-collapse:collapse"><thead><tr style="background:var(--surface)"><th style="padding:8px 10px;font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;text-align:left">Campo</th><th style="padding:8px 10px;font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;text-align:left">Lançamento</th><th style="padding:8px 10px;font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;text-align:left">Documento</th></tr></thead><tbody>${linhas.join('')}</tbody></table></div>`;
  }

  const infoExtra = `<details style="margin-top:10px"><summary style="cursor:pointer;font-size:11px;color:var(--text-3);padding:6px 0">Ver dados extraídos pela IA</summary><div style="background:var(--bg-2);padding:10px 12px;border-radius:8px;font-family:var(--mono);font-size:11px;color:var(--text-2);margin-top:6px;line-height:1.6">${extr.tipo_documento ? `<div><b>Tipo:</b> ${extr.tipo_documento}</div>`:''}${extr.nome_emitente ? `<div><b>Emitente:</b> ${extr.nome_emitente}</div>`:''}${extr.cnpj_cpf_emitente ? `<div><b>CNPJ/CPF emit.:</b> ${extr.cnpj_cpf_emitente}</div>`:''}${extr.descricao ? `<div><b>Descrição:</b> ${extr.descricao}</div>`:''}${extr.confianca != null ? `<div><b>Confiança IA:</b> ${extr.confianca}%</div>`:''}${extr.observacoes ? `<div><b>Obs:</b> ${extr.observacoes}</div>`:''}</div></details>`;

  let footerBotoes = '';
  if (status === 'ok') {
    footerBotoes = `<button class="btn btn-outline" onclick="closeModal()">Cancelar</button><button class="btn btn-gold" onclick="confirmarAnexoValidado()">✓ Anexar documento</button>`;
  } else if (status === 'divergente') {
    footerBotoes = `<button class="btn btn-outline" onclick="closeModal()">Cancelar</button><button class="btn btn-sm" style="background:var(--surface-2);color:var(--text-2);border:1px solid var(--border-lt)" onclick="confirmarAnexoValidado()">Manter lançamento e anexar</button><button class="btn btn-gold" onclick="confirmarAnexoComAtualizacao()">Usar dados do documento</button>`;
  } else if (status === 'bloqueado') {
    if (admin) {
      footerBotoes = `<button class="btn btn-outline" onclick="closeModal()">Cancelar</button><button class="btn btn-sm" style="background:var(--red-lt);color:var(--red);border:1px solid rgba(224,92,92,.2)" onclick="overrideAdminAnexo()">🔓 Override admin</button>`;
    } else {
      footerBotoes = `<button class="btn btn-gold" onclick="closeModal()">Entendi</button>`;
    }
  } else if (status === 'sem_validacao') {
    footerBotoes = `<button class="btn btn-outline" onclick="closeModal()">Cancelar</button><button class="btn btn-gold" onclick="confirmarAnexoValidado()">Anexar mesmo assim</button>`;
  } else {
    footerBotoes = `<button class="btn btn-outline" onclick="closeModal()">Cancelar</button><button class="btn btn-sm" style="background:var(--surface-2);color:var(--text-2);border:1px solid var(--border-lt)" onclick="confirmarAnexoValidado()">Anexar sem validar</button>`;
  }

  window._anexoValidacao = { diag, contexto };

  openModal('Conferência do Documento',
    `<div style="background:${st.bg};border:1px solid ${st.cor};border-radius:10px;padding:14px 16px;display:flex;align-items:flex-start;gap:12px"><span style="font-size:22px;color:${st.cor};flex-shrink:0;font-weight:700">${st.icone}</span><div><div style="font-size:13px;font-weight:700;color:${st.cor};margin-bottom:3px">${st.titulo}</div><div style="font-size:12px;color:var(--text-2);line-height:1.5">${mensagem}</div></div></div>${tabelaHtml}${infoExtra}`,
    footerBotoes
  );
}

async function confirmarAnexoValidado() {
  const ctx = window._anexoValidacao?.contexto;
  if (!ctx) return;
  closeModal();
  await executarUploadFinal(ctx);
}

async function confirmarAnexoComAtualizacao() {
  const wrap = window._anexoValidacao;
  if (!wrap) return;
  const { diag, contexto } = wrap;
  const extr = diag.dados_extraidos || {};
  closeModal();
  toast('Atualizando lançamento...', 'default', 8000);
  try {
    const patch = {};
    if (extr.valor_total != null) patch.valor = Number(extr.valor_total);
    const novaData = extr.data_vencimento || extr.data_emissao;
    if (novaData) patch.vencimento = novaData;
    if (extr.numero_documento) patch.numero_documento = String(extr.numero_documento);

    if (Object.keys(patch).length > 0) {
      const tabela = contexto.tipoRef === 'receita' ? 'fin_receitas'
                   : contexto.tipoRef === 'despesa' ? 'fin_despesas'
                   : 'fin_impostos';
      await supa('PATCH', tabela, { params: { id: `eq.${contexto.refId}` }, body: patch });
    }
    await executarUploadFinal(contexto);
    // Performance: recarrega só anexos + a tabela do tipoRef
    const tab = contexto.tipoRef === 'receita' ? 'fin_receitas'
              : contexto.tipoRef === 'despesa' ? 'fin_despesas'
              : 'fin_impostos';
    await Promise.all([
      recarregarApenas('fin_anexos'),
      recarregarApenas(tab),
    ]);
  } catch(e) {
    toast('Erro ao atualizar: ' + e.message, 'error');
  }
}

async function overrideAdminAnexo() {
  const ctx = window._anexoValidacao?.contexto;
  if (!ctx) return;
  const justificativa = await pedirJustificativa('🔓 Override administrativo', {
    minLength: 10,
    mensagem: 'Justifique por que está anexando um documento com CNPJ divergente. Esta ação ficará registrada para auditoria.',
    placeholder: 'Ex: Documento da matriz, NF emitida pela filial...',
    labelOk: 'Anexar mesmo assim',
  });
  if (!justificativa) return;
  console.warn('[OVERRIDE ADMIN] Anexo com CNPJ divergente:', {
    usuario: APP.user?.email, tipoRef: ctx.tipoRef, refId: ctx.refId,
    arquivo: ctx.file?.name, justificativa,
    diag: window._anexoValidacao.diag, timestamp: new Date().toISOString(),
  });
  toast('Override registrado. Anexando...', 'default', 5000);
  await executarUploadFinal(ctx);
}

async function executarUploadFinal(ctx) {
  try {
    await anexarDocumento(ctx.tipoRef, ctx.refId, ctx.file);
    const widget = document.getElementById(`widget-anexos-${ctx.refId}`);
    if (widget) widget.outerHTML = htmlWidgetAnexos(ctx.tipoRef, ctx.refId);
    window._anexoValidacao = null;
  } catch(e) {
    toast('Erro no upload: ' + e.message, 'error');
  }
}

async function handleAnexoUpload(input, tipoRef, refId) {
  const file = input.files[0];
  if (!file) return;
  input.value = '';

  if (file.size > 10*1024*1024) {
    toast('Arquivo muito grande. Máximo 10MB.', 'error');
    return;
  }

  const ctxDados = dadosParaValidacao(tipoRef, refId);
  if (!ctxDados) {
    toast('Lançamento não encontrado.', 'error');
    return;
  }

  const contexto = { file, tipoRef, refId, lanc: ctxDados.lanc };

  const podeValidar = /\.(pdf|png|jpe?g|webp|xml|txt)$/i.test(file.name) ||
    ['application/pdf','image/png','image/jpeg','image/jpg','image/webp','text/xml','application/xml','text/plain'].includes(file.type);

  if (!podeValidar) {
    toast('Tipo não analisável pela IA. Anexando direto...', 'default', 5000);
    await executarUploadFinal(contexto);
    return;
  }

  openModal('Analisando documento...',
    `<div style="display:flex;flex-direction:column;align-items:center;padding:20px;gap:14px"><div style="width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite"></div><div style="font-size:13px;color:var(--text-2);text-align:center">A IA está lendo <b>${file.name}</b><br>e comparando com o lançamento...</div></div><style>@keyframes spin{to{transform:rotate(360deg)}}</style>`,
    ''
  );

  try {
    const diag = await validarDocumentoIA(file, ctxDados.lancamento);
    closeModal();
    setTimeout(() => modalConferenciaAnexo(diag, contexto), 100);
  } catch(e) {
    closeModal();
    const diag = {
      status: 'erro',
      mensagem: `Não foi possível validar o documento: ${e.message}. Você pode anexar mesmo assim ou cancelar.`,
      divergencias: [], coincidencias: [], dados_extraidos: {},
    };
    setTimeout(() => modalConferenciaAnexo(diag, contexto), 100);
  }
}

async function excluirAnexoModal(id, path) {
  if (!await confirmarAcao('Excluir documento?', 'O arquivo será removido permanentemente.')) return;
  try {
    await supa('DELETE', 'fin_anexos', { params: { id: `eq.${id}` } });
    await deleteStorage(path);
    removerLocal(ANEXOS, id);
    toast('Documento excluído.', 'success');
    // Fecha modal e reabre não é necessário, mas recarrega a lista
  } catch(e) { toast('Erro: ' + e.message, 'error'); }
}

  tipo: null,        // 'receita' | 'despesa'
  fileName: '',
  linhas: [],        // [{ data, descricao, valor, contraparte_nome, contraparte_cpf_cnpj, categoria, observacao, _erros: [] }]
  cabecalhoOriginal: [],
};

// Mapa de aliases de cabeçalho — aceita variações comuns
const _CSV_ALIASES = {
  'data':                ['data','vencimento','dt','date'],
  'descricao':           ['descricao','descrição','desc','historico','histórico','description'],
  'valor':               ['valor','valor_total','total','vlr','vlr_total','amount'],
  'contraparte_nome':    ['cliente_nome','fornecedor_nome','cliente','fornecedor','nome','razao_social','razão_social','beneficiario','beneficiário'],
  'contraparte_cpf_cnpj':['cliente_cpf_cnpj','fornecedor_cpf_cnpj','cpf_cnpj','cpf','cnpj','documento','doc'],
  'categoria':           ['categoria','category','plano_contas'],
  'observacao':          ['observacao','observação','obs','obs.','nota','notes','memo'],
};

function _csvNormalizarCab(c) {
  return (c||'').trim().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')   // remove acentos
    .replace(/[^a-z0-9]/g,'_')                          // separadores → _
    .replace(/^_+|_+$/g,'');
}

function _csvDetectarColuna(cabRaw, alvo) {
  const norm = _csvNormalizarCab(cabRaw);
  const aliases = _CSV_ALIASES[alvo] || [];
  return aliases.some(a => _csvNormalizarCab(a) === norm);
}

function _csvParseValor(s) {
  if (s === null || s === undefined) return NaN;
  let v = String(s).trim();
  if (!v) return NaN;
  v = v.replace(/R\$\s?/gi,'').replace(/\s/g,'');
  // Formato BR: "1.234,56" → "1234.56"
  if (v.includes(',')) v = v.replace(/\./g,'').replace(',', '.');
  return parseFloat(v);
}

function _csvParseData(s) {
  if (!s) return null;
  const v = String(s).trim();
  if (/^\d{4}-\d{2}-\d{2}/.test(v)) return v.slice(0,10);
  // dd/mm/yyyy
  const m = v.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
  if (m) {
    let [,d,mo,y] = m;
    if (y.length === 2) y = '20'+y;
    return `${y}-${mo.padStart(2,'0')}-${d.padStart(2,'0')}`;
  }
  return null;
}

function _csvParseLinha(linha, sep) {
  // Parser simples respeitando aspas duplas
  const cols = [];
  let cur = '', dentroAspas = false;
  for (let i = 0; i < linha.length; i++) {
    const ch = linha[i];
    if (ch === '"') {
      if (dentroAspas && linha[i+1] === '"') { cur += '"'; i++; }
      else dentroAspas = !dentroAspas;
    } else if (ch === sep && !dentroAspas) {
      cols.push(cur); cur = '';
    } else { cur += ch; }
  }
  cols.push(cur);
  return cols.map(c => c.trim());
}

// ── BAIXAR TEMPLATE (CSV vazio com cabeçalho) ─────────────────
function csvLoteBaixarTemplate(tipo) {
  const ehReceita = tipo === 'receita';
  const cab = ehReceita
    ? ['data','descricao','valor','cliente_nome','cliente_cpf_cnpj','categoria','observacao']
    : ['data','descricao','valor','fornecedor_nome','fornecedor_cpf_cnpj','categoria','observacao'];
  const csv = '\uFEFF' + cab.join(';') + '\r\n';
  const blob = new Blob([csv], { type:'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `template_${ehReceita?'receitas':'despesas'}.csv`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast(`Template de ${ehReceita?'receitas':'despesas'} baixado`, 'success');
}

// ── SELECIONAR ARQUIVO E PARSEAR ──────────────────────────────
async function csvLoteSelecionar(input, tipo) {
  const file = input.files?.[0];
  if (!file) return;
  input.value = ''; // permite reimportar mesmo arquivo

  let texto;
  try {
    texto = await file.text();
  } catch(e) {
    toast('Não consegui ler o arquivo: ' + e.message, 'error');
    return;
  }

  // Detectar separador (`;` é prioridade pra BR, depois `,`, depois `\t`)
  const primeiraLinha = texto.split(/\r?\n/)[0] || '';
  const sep = primeiraLinha.includes(';') ? ';' :
              primeiraLinha.includes('\t') ? '\t' : ',';

  const linhasRaw = texto.split(/\r?\n/).filter(l => l.trim());
  if (linhasRaw.length < 2) {
    toast('Arquivo CSV vazio ou só com cabeçalho.', 'warn');
    return;
  }

  const cabRaw = _csvParseLinha(linhasRaw[0], sep).map(c =>
    c.replace(/^\uFEFF/, '') // remove BOM
  );

  // Mapear índices das colunas
  const idx = {};
  for (const alvo in _CSV_ALIASES) {
    idx[alvo] = cabRaw.findIndex(c => _csvDetectarColuna(c, alvo));
  }

  // Validar colunas obrigatórias
  const obrig = ['data','descricao','valor'];
  const faltam = obrig.filter(c => idx[c] < 0);
  if (faltam.length > 0) {
    toast(`Colunas obrigatórias faltando: ${faltam.join(', ')}. Use o template como base.`, 'error', 7000);
    return;
  }

  // Parsear cada linha
  const parsed = [];
  for (let i = 1; i < linhasRaw.length; i++) {
    const cols = _csvParseLinha(linhasRaw[i], sep);
    const erros = [];

    const dataStr = idx.data >= 0 ? cols[idx.data] : '';
    const data = _csvParseData(dataStr);
    if (!data) erros.push(`Data inválida: "${dataStr}"`);

    const descricao = idx.descricao >= 0 ? cols[idx.descricao] : '';
    if (!descricao) erros.push('Descrição vazia');

    const valor = _csvParseValor(idx.valor >= 0 ? cols[idx.valor] : '');
    if (isNaN(valor) || valor <= 0) erros.push(`Valor inválido: "${cols[idx.valor]||''}"`);

    parsed.push({
      _linha: i + 1,
      data, descricao, valor,
      contraparte_nome:     idx.contraparte_nome     >= 0 ? cols[idx.contraparte_nome]     : '',
      contraparte_cpf_cnpj: idx.contraparte_cpf_cnpj >= 0 ? cols[idx.contraparte_cpf_cnpj] : '',
      categoria:            idx.categoria            >= 0 ? cols[idx.categoria]            : '',
      observacao:           idx.observacao           >= 0 ? cols[idx.observacao]           : '',
      _erros: erros,
    });
  }

  _CSV_LOTE.tipo               = tipo;
  _CSV_LOTE.fileName           = file.name;
  _CSV_LOTE.linhas             = parsed;
  _CSV_LOTE.cabecalhoOriginal  = cabRaw;

  modalCsvLotePreview();
}

// ── EXECUTAR IMPORTAÇÃO ───────────────────────────────────────
async function csvLoteImportar() {
  const tipo      = _CSV_LOTE.tipo;
  const ehReceita = tipo === 'receita';
  const linhas    = _CSV_LOTE.linhas.filter(l => l._erros.length === 0);
  if (linhas.length === 0) { toast('Nenhuma linha válida.', 'warn'); return; }

  const tabela    = ehReceita ? 'fin_receitas' : 'fin_despesas';
  const arrayLocal = ehReceita ? RECEITAS : DESPESAS;
  const tabContra = ehReceita ? 'fin_clientes' : 'fin_fornecedores';
  const colunaContra = ehReceita ? 'cliente_id' : 'fornecedor_id';

  // ═══ FIX CRÍTICO: garantir que o backend está no tenant correto ═══
  // Sem isso, fin_tenant_atual() pode retornar tenant antigo (is_default
  // do JWT) e o RLS bloqueia INSERTs com erro 42501.
  // Usa fin_set_tenant_persistente que muda is_default no banco
  // (persiste entre fetchs, ao contrário de fin_set_tenant que só vale
  // dentro da transação atual).
  try {
    await supaRpc('fin_set_tenant_persistente', { p_tenant_id: APP.tenantId });
  } catch(e) {
    console.warn('Falha ao sincronizar tenant antes da importação:', e.message);
  }
  // ═════════════════════════════════════════════════════════════════════

  closeModal();
  // Modal de progresso
  openModal('Importando…', `
    <div style="text-align:center;padding:24px 12px">
      <div class="spinner-loader" style="width:38px;height:38px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;margin:0 auto 14px;animation:spin 0.8s linear infinite"></div>
      <div id="csv-progresso" style="font-size:13px;color:var(--text);font-weight:600">Iniciando…</div>
      <div id="csv-progresso-detail" style="font-size:11px;color:var(--text-3);margin-top:4px">0 / ${linhas.length}</div>
    </div>`, '');

  const setProgresso = (msg, n) => {
    const elM = $id('csv-progresso');
    const elD = $id('csv-progresso-detail');
    if (elM) elM.textContent = msg;
    if (elD) elD.textContent = `${n} / ${linhas.length}`;
  };

  // Cache de contrapartes recém-criadas (pra evitar duplicar dentro do mesmo CSV)
  const cacheContra = {}; // { 'nome normalizado': id }

  // Helper: buscar/criar contraparte
  const _normNome = s => (s||'').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');

  async function resolverContraparte(nome, cpfCnpj) {
    if (!nome) return null;
    const chave = _normNome(nome);
    if (cacheContra[chave]) return cacheContra[chave];

    // 1) Buscar nos arrays locais
    const arrLocal = ehReceita ? CLIENTES : FORNECEDORES;
    const achouLocal = arrLocal.find(c => _normNome(c.nome) === chave);
    if (achouLocal) { cacheContra[chave] = achouLocal.id; return achouLocal.id; }

    // 2) Buscar no banco (case-insensitive)
    try {
      const r = await supa('GET', tabContra, {
        params: { tenant_id: `eq.${APP.tenantId}`, nome: `ilike.${nome.replace(/[%_]/g,'')}`, limit: 1, select: 'id,nome' }
      });
      if (Array.isArray(r) && r[0]) {
        cacheContra[chave] = r[0].id;
        // Adiciona ao array local pra evitar nova busca
        if (ehReceita) atualizarLocal(CLIENTES, r[0]);
        else           atualizarLocal(FORNECEDORES, r[0]);
        return r[0].id;
      }
    } catch(_) {}

    // 3) Não achou — criar
    try {
      const body = {
        tenant_id: APP.tenantId,
        nome: nome.trim(),
      };
      const cpfClean = (cpfCnpj||'').replace(/\D/g,'');
      if (cpfClean) body.cpf_cnpj = cpfClean;
      const novo = await supa('POST', tabContra, { body, returning: true });
      if (novo && novo[0]?.id) {
        cacheContra[chave] = novo[0].id;
        if (ehReceita) atualizarLocal(CLIENTES, novo[0]);
        else           atualizarLocal(FORNECEDORES, novo[0]);
        return novo[0].id;
      }
    } catch(e) {
      console.warn('Falha criando contraparte:', nome, e.message);
    }
    return null;
  }

  // Helper: resolver categoria por nome
  function resolverCategoria(nome) {
    if (!nome) return null;
    const chave = _normNome(nome);
    const tipoCat = ehReceita ? 'receita' : 'despesa';
    return CATEGORIAS.find(c =>
      _normNome(c.nome) === chave && (c.tipo === tipoCat || c.tipo === 'ambos')
    )?.id || null;
  }

  let sucesso = 0;
  let erros   = [];

  for (let i = 0; i < linhas.length; i++) {
    const l = linhas[i];
    setProgresso(`Processando linha ${l._linha}…`, i);

    const contraId = await resolverContraparte(l.contraparte_nome, l.contraparte_cpf_cnpj);
    const categoriaId = resolverCategoria(l.categoria);

    const body = {
      tenant_id: APP.tenantId,
      descricao: l.descricao,
      valor:     l.valor,
      vencimento: l.data,
      status: 'pendente',
    };
    if (contraId)    body[colunaContra] = contraId;
    if (categoriaId) body.categoria_id  = categoriaId;
    if (l.observacao) body.observacao   = `${l.observacao} | Importado via CSV em lote`;
    else              body.observacao   = `Importado via CSV em lote (${_CSV_LOTE.fileName})`;

    try {
      const r = await supa('POST', tabela, { body, returning: true });
      if (r && r[0]) {
        sucesso++;
        atualizarLocal(arrayLocal, r[0]);
      }
    } catch(e) {
      erros.push({ linha: l._linha, msg: e.message });
    }
  }

  closeModal();

  // Re-renderiza tela atual (se for A Receber/A Pagar)
  try { rerenderTelaAtual && rerenderTelaAtual(); } catch(_) {}

  // Resultado final
  openModal('Resultado da importação', `
    <div style="text-align:center;padding:14px 6px">
      <div style="font-size:48px;margin-bottom:8px">${sucesso > 0 ? '✅' : '⚠️'}</div>
      <div style="font-size:18px;font-weight:700;color:var(--text);margin-bottom:6px">
        ${sucesso} de ${linhas.length} ${sucesso===1?'lançamento criado':'lançamentos criados'}
      </div>
      ${erros.length === 0 ? `
        <div style="font-size:12px;color:var(--text-3)">Tudo certo! Os ${ehReceita?'recebíveis':'pagamentos'} já estão na lista.</div>
      ` : `
        <div style="font-size:12px;color:var(--red);margin-bottom:10px">${erros.length} linha(s) com erro</div>
        <details style="text-align:left;background:var(--red-lt);border:1px solid rgba(192,57,43,.2);border-radius:8px;padding:10px 12px">
          <summary style="cursor:pointer;font-size:12px;font-weight:600;color:var(--red)">Ver detalhes</summary>
          <div style="margin-top:8px;max-height:200px;overflow-y:auto;font-size:11px;color:var(--text-2)">
            ${erros.map(e => `<div style="padding:3px 0;border-bottom:1px solid rgba(192,57,43,.15)"><strong>Linha ${e.linha}:</strong> ${e.msg}</div>`).join('')}
          </div>
        </details>
      `}
    </div>
  `,
  `<button class="btn btn-gold" onclick="closeModal()">Fechar</button>`);

  // Limpa cache do lote
  _CSV_LOTE.tipo = null;
  _CSV_LOTE.fileName = '';
  _CSV_LOTE.linhas = [];
}

// ── PROCESSAMENTO DE ARQUIVOS ──────────────────────────────────
function handleDocDrop(event) {
  const files = Array.from(event.dataTransfer.files);
  processarArquivos(files);
}

function handleDocInput(input) {
  const files = Array.from(input.files);
  processarArquivos(files);
  input.value = '';
}

function adicionarFilaItem(id, nome, status, msg, tipo) {
  const fila = $id('doc-fila');
  if (!fila) return;
  const cores = { processando:'var(--amber)', ok:'var(--green)', erro:'var(--red)', cancelado:'var(--text-3)' };
  const icons = { processando:'⏳', ok:'✅', erro:'❌', cancelado:'⊘' };
  const el = document.getElementById('fila-'+id);
  const html_item = `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:12px">
      <span style="font-size:20px">${icons[status]||'⏳'}</span>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${nome}</div>
        <div style="font-size:11.5px;color:${cores[status]||'var(--text-3)'};margin-top:2px">${msg}</div>
      </div>
      ${tipo?`<span class="badge ${tipo==='receita'?'badge-green':'badge-red'}">${tipo==='receita'?'Receita':'Despesa'}</span>`:''}
    </div>`;
  if (el) { el.outerHTML = `<div id="fila-${id}">${html_item}</div>`; }
  else    { fila.insertAdjacentHTML('beforeend', `<div id="fila-${id}">${html_item}</div>`); }
}

async function processarArquivos(files) {
  if (!files.length) return;
  window._docTab = 'importar';

  // Inicializa modo batch XML/PDF (modo 2b: 1º pede confirmação, demais silencioso)
  const temDocFiscal = Array.from(files).some(f => {
    const ext = f.name.toLowerCase().split('.').pop();
    return ext === 'xml' || ext === 'pdf';
  });
  if (temDocFiscal && typeof _xmlBatchReset === 'function') _xmlBatchReset();

  for (const file of files) {
    const id   = Date.now() + '_' + Math.random().toString(36).slice(2);
    const nome = file.name;
    const ext  = nome.split('.').pop().toLowerCase();

    adicionarFilaItem(id, nome, 'processando', 'Lendo arquivo...', null);

    try {
      if (ext === 'xml') {
        await processarXMLAutoDoc(id, file);
      } else if (ext === 'pdf') {
        await processarPDFAutoDoc(id, file);
      } else if (ext === 'ofx' || ext === 'csv' || ext === 'txt') {
        await processarExtratoAutoDoc(id, file);
      } else {
        adicionarFilaItem(id, nome, 'erro', `Formato .${ext} não suportado. Use PDF, XML, OFX ou CSV.`, null);
      }
    } catch(e) {
      adicionarFilaItem(id, nome, 'erro', 'Erro: ' + e.message, null);
    }
  }

  // Resumo do batch XML/PDF (se houve)
  if (temDocFiscal && typeof _xmlBatchResumo === 'function') _xmlBatchResumo();

  // Performance: import de docs fiscais cria receitas/despesas
  await Promise.all([
    recarregarApenas('fin_receitas'),
    recarregarApenas('fin_despesas'),
  ]);
}

// BLOCO XML · Cadastro automático de entidades (v1 — 2026-04-22)
// Suporta: NFe (emit/dest) e NFSe (prestador/tomador)
// Modo batch inteligente: primeiro XML abre modal; demais criam silencioso
// ═══════════════════════════════════════════════════════════════════

// Estado de sessão de batch (zerado a cada run da fila)
window._XMLBatch = {
  ativo: false,
  primeiroJaMostrado: false,
  entidadesCriadas: 0,
  divergenciasRevisadas: 0,
  conflitosCategoria: 0,
  ignorados: 0,
};

function _xmlBatchReset() {
  window._XMLBatch = {
    ativo: true,
    primeiroJaMostrado: false,
    entidadesCriadas: 0,
    divergenciasRevisadas: 0,
    conflitosCategoria: 0,
    ignorados: 0,
  };
}

function _xmlBatchResumo() {
  const b = window._XMLBatch;
  if (!b.ativo) return;
  const partes = [];
  if (b.entidadesCriadas)        partes.push(`${b.entidadesCriadas} entidade(s) cadastrada(s)`);
  if (b.divergenciasRevisadas)   partes.push(`${b.divergenciasRevisadas} divergência(s) revisada(s)`);
  if (b.conflitosCategoria)      partes.push(`${b.conflitosCategoria} conflito(s) de categoria`);
  if (b.ignorados)               partes.push(`${b.ignorados} ignorado(s)`);
  if (partes.length) toast('Importação XML: ' + partes.join(' · '), 'success');
  window._XMLBatch.ativo = false;
}

// ── Helpers de XML (extração robusta) ──────────────────────────────
function _xmlGetNested(doc, rootTag, childTag) {
  const root = doc.getElementsByTagName(rootTag)[0];
  if (!root) return '';
  const child = root.getElementsByTagName(childTag)[0];
  return child?.textContent?.trim() || '';
}

// Extrai dados de uma entidade (<emit>/<dest> da NFe, ou <Prestador>/<Tomador> da NFSe)
// Retorna objeto normalizado: { cpf_cnpj, nome, nome_fantasia, ie, im, endereco... }
function extrairEntidadeXML(doc, tipo) {
  // tipo: 'emit' | 'dest' | 'prestador' | 'tomador'
  const isNFe = tipo === 'emit' || tipo === 'dest';
  const rootNames = isNFe
    ? (tipo === 'emit' ? ['emit'] : ['dest'])
    : (tipo === 'prestador' ? ['prestador','Prestador','PrestadorServico'] : ['tomador','Tomador','TomadorServico']);

  let root = null;
  for (const rn of rootNames) {
    root = doc.getElementsByTagName(rn)[0];
    if (root) break;
  }
  if (!root) return null;

  const g = (...tags) => {
    for (const t of tags) {
      const el = root.getElementsByTagName(t)[0];
      if (el?.textContent?.trim()) return el.textContent.trim();
    }
    return '';
  };

  // CNPJ / CPF — tags variam muito entre layouts
  let doc_ = g('CNPJ','Cnpj','cnpj','CPF','Cpf','cpf','cpfcnpj','CpfCnpj','CNPJCPF');
  doc_ = (doc_||'').replace(/\D/g,'');

  // Nome / Razão social
  const nome = g('xNome','RazaoSocial','razao_social','Nome','nome_razao_social','NomeRazaoSocial') || '';
  const fantasia = g('xFant','NomeFantasia','nome_fantasia','sobrenome_nome_fantasia') || '';

  // Inscrições
  const ie = g('IE','InscricaoEstadual','inscricao_estadual');
  const im = g('IM','InscricaoMunicipal','inscricao_municipal');

  // Endereço — pode estar em <enderEmit>/<enderDest> (NFe) ou <Endereco>/<endereco> (NFSe)
  let end = root.getElementsByTagName('enderEmit')[0]
         || root.getElementsByTagName('enderDest')[0]
         || root.getElementsByTagName('Endereco')[0]
         || root.getElementsByTagName('endereco')[0]
         || root; // fallback: alguns XMLs põem direto na raiz
  const ge = (...tags) => {
    for (const t of tags) {
      const el = end.getElementsByTagName(t)[0];
      if (el?.textContent?.trim()) return el.textContent.trim();
    }
    return '';
  };

  return {
    cpf_cnpj:            doc_ || null,
    nome:                nome || fantasia || '—',
    nome_fantasia:       fantasia || null,
    inscricao_estadual:  ie || null,
    inscricao_municipal: im || null,
    logradouro:  ge('xLgr','Logradouro','logradouro','Endereco','endereco') || null,
    numero:      ge('nro','Numero','numero') || null,
    complemento: ge('xCpl','Complemento','complemento') || null,
    bairro:      ge('xBairro','Bairro','bairro') || null,
    municipio:   ge('xMun','Municipio','municipio','cidade') || null,
    uf:          (ge('UF','Uf','uf','estado')||'').slice(0,2).toUpperCase() || null,
    cep:         (ge('CEP','Cep','cep')||'').replace(/\D/g,'') || null,
    email:       ge('email','Email','EmailContato') || null,
    telefone:    (ge('fone','Fone','telefone','Telefone')||'').replace(/\D/g,'') || null,
  };
}

// ── Lookup na base ─────────────────────────────────────────────────
// Procura em clientes E fornecedores; retorna { registro, categoria } ou null
async function buscarEntidadePorDoc(cpfCnpj) {
  if (!cpfCnpj) return null;
  const tid = APP.tenantId;

  // Busca local primeiro (evita round-trip)
  const docLimpo = cpfCnpj.replace(/\D/g,'');
  const matchLocal = (arr) => arr.find(e => (e.cpf_cnpj||'').replace(/\D/g,'') === docLimpo);

  const cli = matchLocal(CLIENTES);
  if (cli) return { registro: cli, categoria: 'cliente' };
  const forn = matchLocal(FORNECEDORES);
  if (forn) return { registro: forn, categoria: 'fornecedor' };

  // Fallback: consulta direta (caso cache esteja desatualizado)
  try {
    const [cs, fs] = await Promise.all([
      supa('GET','fin_clientes',     { params: { tenant_id: `eq.${tid}`, cpf_cnpj: `eq.${cpfCnpj}`, select: '*', limit: 1 } }).catch(()=>[]),
      supa('GET','fin_fornecedores', { params: { tenant_id: `eq.${tid}`, cpf_cnpj: `eq.${cpfCnpj}`, select: '*', limit: 1 } }).catch(()=>[]),
    ]);
    if (cs?.length)  return { registro: cs[0],  categoria: 'cliente' };
    if (fs?.length)  return { registro: fs[0],  categoria: 'fornecedor' };
  } catch(_) {}

  return null;
}

// ── Comparação pra detectar divergências ──────────────────────────
function compararEntidades(cadastrada, xml) {
  const campos = ['nome','nome_fantasia','inscricao_estadual','inscricao_municipal',
                  'logradouro','numero','complemento','bairro','municipio','uf','cep',
                  'email','telefone'];
  const divergencias = [];
  for (const c of campos) {
    const atual = (cadastrada[c] || '').toString().trim();
    const novo  = (xml[c]        || '').toString().trim();
    // Ignora se XML não trouxe valor OU se os dois estão vazios
    if (!novo) continue;
    // Normaliza docs/CEP/telefone (só dígitos)
    const norm = (v) => ['cep','telefone'].includes(c) ? v.replace(/\D/g,'') : v.toLowerCase();
    if (norm(atual) !== norm(novo)) {
      divergencias.push({ campo: c, atual: atual || '(vazio)', novo });
    }
  }
  return divergencias;
}

// ── Criação da entidade ────────────────────────────────────────────
async function criarEntidadeDoXML(dados, categoria, origem) {
  const tabela = categoria === 'cliente' ? 'fin_clientes' : 'fin_fornecedores';
  const body = {
    tenant_id: APP.tenantId,
    ativo: true,
    origem_cadastro: origem, // 'xml_nfe' | 'xml_nfse'
    nome: dados.nome,
    cpf_cnpj: dados.cpf_cnpj,
    nome_fantasia: dados.nome_fantasia,
    inscricao_estadual: dados.inscricao_estadual,
    inscricao_municipal: dados.inscricao_municipal,
    logradouro: dados.logradouro,
    numero: dados.numero,
    complemento: dados.complemento,
    bairro: dados.bairro,
    municipio: dados.municipio,
    uf: dados.uf,
    cep: dados.cep,
    email: dados.email,
    telefone: dados.telefone,
  };
  const r = await supa('POST', tabela, { body, returning: true });
  const novo = r?.[0];
  if (novo) {
    if (categoria === 'cliente') CLIENTES.push(novo);
    else                         FORNECEDORES.push(novo);
    window._XMLBatch.entidadesCriadas++;
  }
  return novo;
}

// ── Atualização parcial (campos selecionados) ─────────────────────
async function atualizarEntidadeDoXML(registro, categoria, camposSelecionados, dadosXML) {
  if (!camposSelecionados.length) return registro;
  const tabela = categoria === 'cliente' ? 'fin_clientes' : 'fin_fornecedores';
  const body = {};
  for (const c of camposSelecionados) body[c] = dadosXML[c];
  await supa('PATCH', tabela, { params: { id: `eq.${registro.id}` }, body });
  // atualiza cache local
  Object.assign(registro, body);
  window._XMLBatch.divergenciasRevisadas++;
  return registro;
}

// ═══════════════════════════════════════════════════════════════════
// ORQUESTRADOR: resolveEntidadeXML
// Dada uma entidade extraída do XML + categoria desejada, retorna
// { id, categoria } pronta pra usar em cliente_id/fornecedor_id.
// Aplica modo batch (2b): primeiro XML pede modal, demais silencioso.
// ═══════════════════════════════════════════════════════════════════
async function resolveEntidadeXML(dadosXML, categoriaDesejada, origem) {
  if (!dadosXML || !dadosXML.cpf_cnpj) return null;

  const existente = await buscarEntidadePorDoc(dadosXML.cpf_cnpj);

  // ── CASO 1: não existe em lugar nenhum ────────────────────────
  if (!existente) {
    const batch = window._XMLBatch;
    if (batch.ativo && batch.primeiroJaMostrado) {
      // Silencioso: cria direto
      try {
        const novo = await criarEntidadeDoXML(dadosXML, categoriaDesejada, origem);
        return novo ? { id: novo.id, categoria: categoriaDesejada } : null;
      } catch(e) {
        console.error('[XML] erro cadastro silencioso:', e);
        return null;
      }
    }
    // Primeiro da fila: modal
    batch.primeiroJaMostrado = true;
    const novo = await modalNovaEntidadeXML(dadosXML, categoriaDesejada, origem);
    return novo ? { id: novo.id, categoria: categoriaDesejada } : null;
  }

  // ── CASO 2: existe na MESMA categoria ─────────────────────────
  if (existente.categoria === categoriaDesejada) {
    const divs = compararEntidades(existente.registro, dadosXML);
    if (!divs.length) {
      // Dados batem → segue
      return { id: existente.registro.id, categoria: categoriaDesejada };
    }
    // Divergências → pergunta
    const atualizado = await modalDivergenciasXML(existente.registro, divs, dadosXML, categoriaDesejada);
    return { id: atualizado.id, categoria: categoriaDesejada };
  }

  // ── CASO 3: existe em categoria DIFERENTE ────────────────────
  const novo = await modalConflitoCategoriaXML(
    existente.registro,
    existente.categoria,
    categoriaDesejada,
    dadosXML,
    origem
  );
  return novo ? { id: novo.id, categoria: categoriaDesejada } : null;
}


async function processarXMLAutoDoc(id, file) {
  const text = await file.text();
  const parser = new DOMParser();
  const doc    = parser.parseFromString(text, 'text/xml');

  const get = (...tags) => {
    for (const tag of tags) {
      const el = doc.getElementsByTagName(tag)[0];
      if (el?.textContent?.trim()) return el.textContent.trim();
    }
    return '';
  };

  const isNFSe  = doc.getElementsByTagName('CompNfse').length > 0
                || doc.getElementsByTagName('Nfse').length > 0
                || doc.getElementsByTagName('nfse').length > 0
                || text.includes('CompNfse')
                || text.includes('ConsultarNfseResposta')
                || get('numero_nfse','NumeroNfse') !== '';
  const isNFe   = doc.getElementsByTagName('NFe').length > 0
                || doc.getElementsByTagName('nfeProc').length > 0
                || get('tpNF') !== '';

  adicionarFilaItem(id, file.name, 'processando',
    isNFSe ? 'Lendo NFS-e...' : isNFe ? 'Lendo NF-e...' : 'Lendo XML...', null);

  const cnpjEmpresa = (APP.tenant?.cnpj||'').replace(/\D/g,'');

  // ═════════════════════════════════════════════════════════════════
  // NFSe
  // ═════════════════════════════════════════════════════════════════
  if (isNFSe) {
    const numero = get('numero_nfse','Numero','NumeroNfse','nNFSe');

    const dataRaw = get('data_nfse','DataEmissao','DataEmissaoNfse','Competencia','dataEmissao') || today();
    let data = today();
    if (dataRaw.includes('/')) {
      const [d,m,y] = dataRaw.split('/');
      data = `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
    } else if (dataRaw.length >= 10) {
      data = dataRaw.slice(0,10);
    }

    const valorStr = get('valor_total','ValorServicos','ValorLiquidoNfse','ValorNfse','ValorTotal','Valor','valor_tributavel');
    const valor = parseFloat(valorStr.replace(/\./g,'').replace(',','.')) || 0;

    // Extrair entidades completas via helper
    const prestador = extrairEntidadeXML(doc, 'prestador') || {};
    const tomador   = extrairEntidadeXML(doc, 'tomador')   || {};

    const cnpjPrestador = (prestador.cpf_cnpj||'').replace(/\D/g,'');
    const cnpjTomador   = (tomador.cpf_cnpj||'').replace(/\D/g,'');

    const discriminacao = get('descritivo','Discriminacao','DescricaoServico','Descricao') || '';

    if (!valor) {
      adicionarFilaItem(id, file.name, 'erro', 'NFS-e: valor não encontrado no XML.', null);
      return;
    }

    // ═══ VALIDAÇÃO CNPJ ═══════════════════════════════════════
    // Empresa SEM CNPJ cadastrado: bloqueia a importação (regra rígida)
    if (!cnpjEmpresa) {
      adicionarFilaItem(id, file.name, 'erro',
        `Empresa "${APP.tenant?.nome||'ativa'}" sem CNPJ cadastrado. Configure o CNPJ em "Empresas" antes de importar documentos fiscais.`, null);
      return;
    }
    // CNPJ deve aparecer como prestador OU tomador
    let autorizacaoSemCNPJ = null;
    if (cnpjPrestador || cnpjTomador) {
      if (cnpjEmpresa !== cnpjPrestador && cnpjEmpresa !== cnpjTomador) {
        adicionarFilaItem(id, file.name, 'erro',
          `Documento de outra empresa. CNPJ da empresa ativa (${_formatCNPJ(cnpjEmpresa)}) não consta como prestador (${_formatCNPJ(cnpjPrestador)||'—'}) nem tomador (${_formatCNPJ(cnpjTomador)||'—'}).`, null);
        return;
      }
    } else {
      // Sem CNPJ identificável → abrir modal de autorização
      autorizacaoSemCNPJ = await _autorizarSemCNPJ(file.name, 'NFS-e');
      if (!autorizacaoSemCNPJ) {
        adicionarFilaItem(id, file.name, 'erro',
          `Importação cancelada — documento sem CNPJ não autorizado.`, null);
        return;
      }
    }
    // ═══════════════════════════════════════════════════════════

    // Determinar tipo e contraparte
    let tipo = 'receita';
    if (cnpjEmpresa && cnpjTomador && cnpjTomador === cnpjEmpresa) tipo = 'despesa';
    if (cnpjEmpresa && cnpjPrestador && cnpjPrestador !== cnpjEmpresa) tipo = 'despesa';
    // Sem CNPJ autorizado → default despesa (recibo, comprovante, etc)
    if (autorizacaoSemCNPJ) tipo = 'despesa';

    const contraparte = tipo === 'receita' ? tomador : prestador;
    const categoriaEntidade = tipo === 'receita' ? 'cliente' : 'fornecedor';

    // Resolver entidade (criar/atualizar/conflito) — pula se autorização sem CNPJ
    adicionarFilaItem(id, file.name, 'processando', 'Verificando cadastro da entidade...', null);
    let entidadeResolvida = null;
    if (!autorizacaoSemCNPJ && contraparte.cpf_cnpj) {
      entidadeResolvida = await resolveEntidadeXML(contraparte, categoriaEntidade, 'xml_nfse');
    }

    const desc = `NFS-e nº ${numero} — ${contraparte.nome || (autorizacaoSemCNPJ ? 'Sem identificação' : '—')}`;

    const obsAutorizacao = autorizacaoSemCNPJ ? ` | ⚠️ Autorizado sem CNPJ. Motivo: "${autorizacaoSemCNPJ.motivo}"` : '';
    const body = {
      tenant_id:  APP.tenantId,
      descricao:  desc,
      valor,
      vencimento: data,
      status:     'pendente',
      observacao: `${discriminacao.slice(0,200)} | Prestador: ${prestador.nome||'—'} | Tomador: ${tomador.nome||'—'} | Importado via NFS-e XML${obsAutorizacao}`,
    };
    // Vincular entidade ao lançamento
    if (entidadeResolvida) {
      if (categoriaEntidade === 'cliente')     body.cliente_id = entidadeResolvida.id;
      else                                     body.fornecedor_id = entidadeResolvida.id;
    }

    // Duplicidade
    const tabela = tipo === 'receita' ? 'fin_receitas' : 'fin_despesas';
    const existentes = await supa('GET', tabela, { params: {
      tenant_id: `eq.${APP.tenantId}`,
      descricao: `eq.${desc}`,
      valor: `eq.${valor}`,
      select: 'id',
      limit: 1,
    }}).catch(()=>[]);
    if (existentes?.length) {
      adicionarFilaItem(id, file.name, 'erro',
        `Duplicado detectado — "${desc}" (${fmtMoeda(valor)}) já existe. Importação cancelada.`, null);
      return;
    }

    let refId;
    try {
      const r = await supa('POST', tabela, { body, returning: true });
      refId = r[0]?.id;
    } catch(e) {
      adicionarFilaItem(id, file.name, 'erro', 'Erro ao salvar: ' + e.message, null);
      return;
    }

    if (refId) {
      try {
        const path = `${APP.tenantId}/${tipo}/${refId}/${Date.now()}_${file.name.replace(/[^a-zA-Z0-9._-]/g,'_')}`;
        await uploadStorage(path, file);
        await supa('POST', 'fin_anexos', { body: {
          tenant_id: APP.tenantId, tipo_ref: tipo, ref_id: refId,
          nome: file.name, tipo_arquivo: 'text/xml', storage_path: path, tamanho: file.size
        }});
      } catch(_) {}
    }

    adicionarFilaItem(id, file.name, 'ok',
      `${tipo==='receita'?'Receita':'Despesa'} criada: ${desc} — ${fmtMoeda(valor)}`, tipo);

  // ═════════════════════════════════════════════════════════════════
  // NFe
  // ═════════════════════════════════════════════════════════════════
  } else if (isNFe) {
    const nNF   = get('nNF');
    const dhEmi = get('dhEmi','dEmi');
    const data  = dhEmi ? dhEmi.slice(0,10) : today();
    const vNF   = parseFloat(get('vNF')) || 0;
    const tpNF  = get('tpNF');

    if (!vNF) {
      adicionarFilaItem(id, file.name, 'erro', 'NF-e: valor não encontrado.', null);
      return;
    }

    // Extrair entidades via helper
    const emit = extrairEntidadeXML(doc, 'emit') || {};
    const dest = extrairEntidadeXML(doc, 'dest') || {};

    const cnpjEmit = (emit.cpf_cnpj||'').replace(/\D/g,'');
    const cnpjDest = (dest.cpf_cnpj||'').replace(/\D/g,'');

    // ═══ VALIDAÇÃO CNPJ ═══════════════════════════════════════
    if (!cnpjEmpresa) {
      adicionarFilaItem(id, file.name, 'erro',
        `Empresa "${APP.tenant?.nome||'ativa'}" sem CNPJ cadastrado. Configure o CNPJ em "Empresas" antes de importar documentos fiscais.`, null);
      return;
    }
    // ═══ VALIDAÇÃO CNPJ ═══════════════════════════════════════
    let autorizacaoNFe = null;
    if (cnpjEmit || cnpjDest) {
      if (cnpjEmpresa !== cnpjEmit && cnpjEmpresa !== cnpjDest) {
        adicionarFilaItem(id, file.name, 'erro',
          `Documento de outra empresa. CNPJ da empresa ativa (${_formatCNPJ(cnpjEmpresa)}) não consta como emitente (${_formatCNPJ(cnpjEmit)||'—'}) nem destinatário (${_formatCNPJ(cnpjDest)||'—'}).`, null);
        return;
      }
    } else {
      // Sem CNPJ identificável → modal de autorização
      autorizacaoNFe = await _autorizarSemCNPJ(file.name, 'NF-e');
      if (!autorizacaoNFe) {
        adicionarFilaItem(id, file.name, 'erro',
          `Importação cancelada — documento sem CNPJ não autorizado.`, null);
        return;
      }
    }
    // ═══════════════════════════════════════════════════════════

    // tpNF: 0 = entrada (despesa: emitente é fornecedor)
    //       1 = saída  (receita: destinatário é cliente)
    // Sem CNPJ autorizado → tratar como despesa por default
    const tipo = autorizacaoNFe
                 ? 'despesa'
                 : (tpNF === '0' ? 'despesa' : 'receita');
    const contraparte = tipo === 'despesa' ? emit : dest;
    const categoriaEntidade = tipo === 'despesa' ? 'fornecedor' : 'cliente';

    // Resolver entidade — pula se autorização sem CNPJ
    adicionarFilaItem(id, file.name, 'processando', 'Verificando cadastro da entidade...', null);
    let entidadeResolvida = null;
    if (!autorizacaoNFe && contraparte.cpf_cnpj) {
      entidadeResolvida = await resolveEntidadeXML(contraparte, categoriaEntidade, 'xml_nfe');
    }

    const desc = `NF-e nº ${nNF} — ${contraparte.nome || (autorizacaoNFe ? 'Sem identificação' : '—')}`;
    const body = {
      tenant_id: APP.tenantId,
      descricao: desc,
      valor: vNF,
      vencimento: data,
      status: 'pendente',
      observacao: `CNPJ: ${contraparte.cpf_cnpj||'—'} | Importado via NF-e XML${autorizacaoNFe ? ` | ⚠️ Autorizado sem CNPJ. Motivo: "${autorizacaoNFe.motivo}"` : ''}`,
    };
    if (entidadeResolvida) {
      if (categoriaEntidade === 'cliente')     body.cliente_id = entidadeResolvida.id;
      else                                     body.fornecedor_id = entidadeResolvida.id;
    }

    let refId;
    try {
      const tabela = tipo === 'receita' ? 'fin_receitas' : 'fin_despesas';
      const r = await supa('POST', tabela, { body, returning: true });
      refId = r[0]?.id;
    } catch(e) {
      adicionarFilaItem(id, file.name, 'erro', 'Erro ao salvar: ' + e.message, null);
      return;
    }

    if (refId) {
      try {
        const path = `${APP.tenantId}/${tipo}/${refId}/${Date.now()}_${file.name.replace(/[^a-zA-Z0-9._-]/g,'_')}`;
        await uploadStorage(path, file);
        await supa('POST', 'fin_anexos', { body: {
          tenant_id: APP.tenantId, tipo_ref: tipo, ref_id: refId,
          nome: file.name, tipo_arquivo: 'text/xml', storage_path: path, tamanho: file.size
        }});
      } catch(_) {}
    }

    adicionarFilaItem(id, file.name, 'ok',
      `${tipo==='receita'?'Receita':'Despesa'} criada: ${desc} — ${fmtMoeda(vNF)}`, tipo);

  } else {
    adicionarFilaItem(id, file.name, 'erro',
      'XML não reconhecido. Formatos suportados: NFS-e (ABRASF), NF-e (SEFAZ). Tente importar como PDF.', null);
  }
}


async function processarExtratoAutoDoc(id, file) {
  const text = await file.text();
  let items  = [];

  if (file.name.toLowerCase().endsWith('.ofx') || text.includes('<OFX>') || text.includes('<STMTTRN>')) {
    items = parseOFX(text);
  } else {
    const linhas = text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
    for (const linha of linhas) {
      const sep  = linha.includes(';') ? ';' : ',';
      const cols = linha.split(sep).map(c=>c.replace(/"/g,'').trim());
      if (cols.length < 3) continue;
      const valor = parseFloat(cols[2].replace(',','.'));
      if (isNaN(valor)) continue;
      const data = cols[0].length===10 ? cols[0] : null;
      if (!data) continue;
      items.push({ data, descricao: cols[1]||'Extrato', valor, tipo: valor>=0?'receita':'despesa' });
    }
  }

  if (!items.length) {
    adicionarFilaItem(id, file.name, 'erro', 'Nenhum lançamento encontrado no arquivo.', null);
    return;
  }

  // ═══ VALIDAÇÃO: extrato pertence à empresa ativa? ═══════════════
  const header = items.header || {};  // só vem em OFX; CSV genérico não tem
  const validacao = _validarExtratoContraEmpresa(header, items.slice(0,3).map(i => i.descricao));

  let observacaoExtra = '';   // será adicionada ao body de cada lançamento
  if (!validacao.ok) {
    // Pausa: pede confirmação ao usuário
    adicionarFilaItem(id, file.name, 'aguardando',
      'Extrato divergente — aguardando autorização do usuário…', null);

    const autorizado = await _modalAutorizarDivergencia(file.name, validacao.contexto, items.length);
    if (!autorizado) {
      adicionarFilaItem(id, file.name, 'erro',
        'Importação cancelada pelo usuário (divergência não autorizada).', null);
      return;
    }

    // Registra autorização em fin_auditoria
    try {
      await supaRpc('fin_registrar_autorizacao', {
        p_tabela: 'fin_movimentacoes',
        p_motivo: autorizado.motivo,
        p_dados:  { ...validacao.contexto, arquivo: file.name, total_lancamentos: items.length }
      });
    } catch(e) {
      console.warn('Falha ao registrar autorização:', e.message);
    }

    observacaoExtra = ` | ⚠️ Importação autorizada por divergência. Motivo: "${autorizado.motivo}"`;
  }
  // ═════════════════════════════════════════════════════════════════

  adicionarFilaItem(id, file.name, 'processando', `Criando ${items.length} lançamento(s)...`, null);

  let ok = 0, err = 0;
  for (const item of items) {
    try {
      const body = {
        tenant_id:  APP.tenantId,
        descricao:  item.descricao,
        valor:      Math.abs(item.valor),
        vencimento: item.data,
        status:     'pendente',
        observacao: `Importado via extrato bancário — ${file.name}${observacaoExtra}`,
      };
      if (item.tipo === 'receita') await supa('POST', 'fin_receitas', { body });
      else                         await supa('POST', 'fin_despesas', { body });
      ok++;
    } catch(_) { err++; }
  }

  adicionarFilaItem(id, file.name, ok>0?'ok':'erro',
    `${ok} lançamento(s) criado(s)${err?' · '+err+' erro(s)':''}`, null);
}

// Modal de autorização — retorna {motivo} se autorizado, null se cancelado
function _modalAutorizarDivergencia(fileName, contexto, totalItens) {
  return new Promise((resolve) => {
    const ctx = contexto || {};
    openModal('⚠️ Extrato de outra empresa?', `
      <div style="font-size:13px;color:var(--text);background:var(--amber-lt);border:1px solid var(--amber);padding:13px 14px;border-radius:9px;margin-bottom:14px;line-height:1.6">
        <strong>O sistema não conseguiu confirmar que este extrato pertence à empresa ativa.</strong><br>
        Se vc autorizar, ${totalItens} lançamento(s) serão criados em <strong>${APP.tenant?.nome||'(empresa ativa)'}</strong>.
      </div>

      <div style="background:var(--bg-2);border:1px solid var(--border);border-radius:8px;padding:11px 13px;margin-bottom:14px;font-size:11.5px;line-height:1.7">
        <div style="font-weight:700;color:var(--text-2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em;font-size:10px">Diagnóstico da divergência</div>
        <div><span style="color:var(--text-3)">Arquivo:</span> <strong style="font-family:var(--mono);font-size:11px">${fileName}</strong></div>
        <div><span style="color:var(--text-3)">Banco no arquivo:</span> ${ctx.banco_arquivo || '—'}</div>
        <div><span style="color:var(--text-3)">Conta no arquivo:</span> ${ctx.conta_arquivo || '—'}</div>
        <div><span style="color:var(--text-3)">Agência no arquivo:</span> ${ctx.agencia_arquivo || '—'}</div>
        <div style="margin-top:6px;padding-top:6px;border-top:1px solid var(--border)">
          <span style="color:var(--text-3)">Empresa ativa:</span> <strong>${ctx.empresa_ativa || '—'}</strong><br>
          <span style="color:var(--text-3)">CNPJ:</span> <strong>${ctx.cnpj_empresa || '—'}</strong>
        </div>
      </div>

      <div class="form-field full">
        <label class="form-label">Motivo da autorização * <span style="font-weight:400;color:var(--text-3);font-size:11px">(mínimo 5 caracteres — ficará no histórico)</span></label>
        <textarea class="form-input" id="auth-motivo" rows="3" placeholder="Ex: Conta pessoal do sócio usada por engano. Lançamentos serão reclassificados depois."
          style="resize:vertical;min-height:62px;font-family:var(--font);font-size:12.5px"></textarea>
      </div>
    `,
    `<button class="btn btn-outline" id="auth-cancelar">Cancelar</button>
     <button class="btn btn-gold" id="auth-confirmar">Autorizar e importar</button>`);

    const btnCancelar  = document.getElementById('auth-cancelar');
    const btnConfirmar = document.getElementById('auth-confirmar');

    btnCancelar.onclick = () => { closeModal(); resolve(null); };
    btnConfirmar.onclick = () => {
      const motivo = (document.getElementById('auth-motivo').value || '').trim();
      if (motivo.length < 5) {
        toast('Informe um motivo com pelo menos 5 caracteres.', 'warn');
        return;
      }
      closeModal();
      resolve({ motivo });
    };
  });
}

// ── Modal: autorizar importação de documento SEM CNPJ identificável (v12) ──
// Usado quando o documento (NFSe / NFe / PDF) não traz CNPJ extraível.
// Diferente do _modalAutorizarDivergencia (CNPJ existe mas não bate),
// aqui o caso é "documento informal" — recibo, comprovante, doc avulso.
// Lista de motivos pré-definidos + campo livre opcional.
// Resolve com { motivo, motivo_codigo } se autorizado, ou null se cancelado.
const _MOTIVOS_SEM_CNPJ = [
  { codigo: 'recibo_servico',     label: 'Recibo de serviço sem CNPJ (Uber, autônomo, etc)' },
  { codigo: 'comprovante_pgto',   label: 'Comprovante de pagamento (sem nota fiscal)' },

  { codigo: 'doc_estrangeiro',    label: 'Documento de fornecedor estrangeiro (sem CNPJ)' },

];

function _modalAutorizarSemCNPJ(fileName, tipoDoc) {

        <strong>Não foi possível identificar o CNPJ do prestador/emitente neste ${tipoDoc}.</strong><br>
        Você pode autorizar a importação selecionando o motivo abaixo. A autorização ficará registrada no histórico de auditoria.
      </div>

      <div style="background:var(--bg-2);border:1px solid var(--border);border-radius:8px;padding:11px 13px;margin-bottom:14px;font-size:11.5px;line-height:1.7">
        <div style="font-weight:700;color:var(--text-2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em;font-size:10px">Documento</div>
        <div><span style="color:var(--text-3)">Arquivo:</span> <strong style="font-family:var(--mono);font-size:11px">${fileName}</strong></div>
        <div><span style="color:var(--text-3)">Tipo:</span> ${tipoDoc}</div>
        <div style="margin-top:6px;padding-top:6px;border-top:1px solid var(--border)">
          <span style="color:var(--text-3)">Empresa ativa:</span> <strong>${APP.tenant?.nome || '—'}</strong>
        </div>
      </div>

      <div class="form-field full">
        <label class="form-label">Motivo *</label>

        <label class="form-label">Observação adicional <span style="font-weight:400;color:var(--text-3);font-size:11px">(opcional, ficará no histórico)</span></label>
        <textarea class="form-input" id="auth-sc-obs" rows="2" placeholder="Ex: Recibo do motorista no aeroporto"
          style="resize:vertical;min-height:50px;font-family:var(--font);font-size:12.5px"></textarea>
      </div>
    `,
    `<button class="btn btn-outline" id="auth-sc-cancelar">Cancelar</button>
     <button class="btn btn-gold" id="auth-sc-confirmar">Autorizar e importar</button>`);

    const btnCancelar  = document.getElementById('auth-sc-cancelar');
    const btnConfirmar = document.getElementById('auth-sc-confirmar');

    btnCancelar.onclick = () => { closeModal(); resolve(null); };
    btnConfirmar.onclick = () => {
      const radio = document.querySelector('input[name="auth-sc-motivo"]:checked');
      const codigo = radio ? radio.value : '';
      const item = _MOTIVOS_SEM_CNPJ.find(m => m.codigo === codigo);
      if (!item) { toast('Selecione um motivo.', 'warn'); return; }
      const obs = (document.getElementById('auth-sc-obs').value || '').trim();
      const motivo = obs ? `${item.label} — ${obs}` : item.label;
      closeModal();
      resolve({ motivo, motivo_codigo: codigo });
    };
  });
}

// Detecta se o nome do arquivo sugere extrato bancário.
// PDF de extrato é um caso ruim pra IA: muitas linhas, formato variável,
// IA tende a errar (retorna primeira linha ou "se perde" no prompt).
// OFX/CSV é determinístico e o caminho oficial — esta detecção sugere
// ao usuário trocar antes de gastar chamada de API.
const _PADROES_EXTRATO_NOME = [
  /\bextrato\b/i,
  /\bextracto\b/i,           // PT-PT
  /(^|[\s_\-.])statement([\s_\-.]|$)/i,  // EN — underscore conta como boundary
  /(^|[\s_\-.])account[_\s\-]?stmt([\s_\-.]|$)/i,
  /(^|[\s_\-.])(ext|stmt)[_\-]\d/i,    // ext_2026, stmt_04 etc
  /^extrato/i,
  /sicredi.*extrato|extrato.*sicredi/i,
];
function _pareceExtrato(file) {
  if (!file || !file.name) return false;
  const nome = String(file.name);
  for (const re of _PADROES_EXTRATO_NOME) if (re.test(nome)) return true;
  return false;
}

// Modal de aviso quando o usuário arrasta um PDF que parece extrato.
// Resolve com 'ofx' (cancelar e usar OFX) ou 'continuar' (PDF/IA mesmo assim).
